bundle_id: demo.ro.lifeos.r1.2026
version: 0.1.0
demo_mode: true
jurisdiction:
  country: RO
  uat: DEMO
event_triggers:
- event_type_id: life.moved
  obligations:
  - identity.change_domicile
  - local_taxes.update_address
  - vehicle.update_registration_address
  - utilities.change_contract_holder
- event_type_id: life.bought_vehicle
  obligations:
  - vehicle.transcribe_ownership
  - local_taxes.register_vehicle
  - insurance.rca_check
- event_type_id: life.lost_documents
  obligations:
  - identity.replace_id_card
  - driver_license.replace
  - vehicle.registration_certificate_replace
disclaimer: Demo bundle only. Do not use as legal/admin truth.
