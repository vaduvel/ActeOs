openapi: 3.1.1
info:
  title: ActeOS API
  version: 1.0.0
  description: API contract pentru ActeOS / LifeOS România. Regulile administrative critice sunt determinate de rulesets aprobate,
    nu de LLM runtime.
servers:
- url: https://api.example.invalid
  description: placeholder; configure per environment
tags:
- name: Catalog
- name: Cases
- name: Resolver
- name: Journeys
- name: Documents
- name: Channels
- name: Households
- name: Notifications
- name: Feedback
- name: ContentAdmin
- name: Health
paths:
  /v1/life-events:
