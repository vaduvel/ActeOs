[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "wb-contracts"
version = "0.1.0"
description = "Canonical contracts, canonical JSON hashing and error vocabulary for Waze pentru birocratie."
requires-python = ">=3.13"
dependencies = ["jsonschema>=4.21"]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5", "mypy>=1.10"]

[tool.setuptools.packages.find]
where = ["src"]
