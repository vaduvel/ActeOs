[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "wb-rule-engine"
version = "0.1.0"
description = "Pure deterministic rule engine for Waze pentru birocratie. No network, DB, clock or LLM at evaluation time."
requires-python = ">=3.13"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8", "hypothesis>=6", "ruff>=0.5", "mypy>=1.10"]

[tool.setuptools.packages.find]
where = ["src"]
