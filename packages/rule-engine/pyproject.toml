[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "wb-rule-engine"
version = "0.1.0"
description = "Pure deterministic rule engine for Waze pentru birocratie. No network, DB, clock or LLM at evaluation time."
requires-python = ">=3.13"
dependencies = []

[project.optional-dependencies]
# The pure evaluator (ast/effects/ruleset/golden) needs no third-party deps.
# PyYAML is only needed by the file loaders (authoring.loader / authoring.cli).
authoring = ["pyyaml>=6"]
dev = ["pytest>=8", "hypothesis>=6", "ruff>=0.5", "mypy>=1.10", "pyyaml>=6"]

[project.scripts]
wb-golden = "wb_rule_engine.authoring.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
