# Clase de freshness (A=critical, B=operational, C=explanatory). A nu se confunda cu frequency_tier (high/medium/low).
critical:        # clasa A
  review_due_days: 14
  hard_expiry_days: 45
  on_expiry: needs_confirmation
operational:     # clasa B
  review_due_days: 30
  hard_expiry_days: 90
  on_expiry: warn
explanatory:     # clasa C
  review_due_days: 90
  hard_expiry_days: 180
  on_expiry: warn
