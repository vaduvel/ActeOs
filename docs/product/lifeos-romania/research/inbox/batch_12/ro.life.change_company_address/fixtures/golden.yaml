    deadline_days: 15
    overdue: false
- id: F14
  desc: decizie după 16 zile
  facts:
    entity_type: srl
    new_address: Timișoara
    new_seat_use_right_document_available: true
    decision_date: '2026-06-09'
    request_date: '2026-06-25'
    filing_actor: legal_representative
  expect:
    status: resolved
    deadline_days: 15
    overdue: true
