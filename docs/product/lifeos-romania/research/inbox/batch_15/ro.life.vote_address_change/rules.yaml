schema_ref: ../../../contracts/rule.schema.json
batch_id: B15_VEHICLES_2_MISC
event_type_id: life.vote_address_change
status: draft
rules:
- id: rule.vote.base
  canonical_rule_id: vote.base
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  severity: critical
  when:
    op: const
    value: true
  effects:
  - type: include_step
    step_id: step.vote.identify_election
  - type: include_step
    step_id: step.vote.check_section
  - type: include_requirement
    requirement_id: req.vote.identity
  - type: attach_channel
    channel_id: ch.vote.registry
  source_claim_ids:
  - claim.vote.registry
  status: draft
- id: rule.vote.local_residence
  canonical_rule_id: vote.local_residence
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: election_type
      value: local
    - op: eq
      field: address_kind
      value: residence
  effects:
  - type: include_step
    step_id: step.vote.request_register
  - type: include_requirement
    requirement_id: req.vote.valid_residence
  - type: include_requirement
    requirement_id: req.vote.register_request
  - type: set_deadline
    step_id: step.vote.request_register
    value:
      kind: calendar_days_before_election
      days: 45
  source_claim_ids:
  - claim.vote.local_residence_6m_45d
  status: draft
- id: rule.vote.local_under6m
  canonical_rule_id: vote.local_under6m
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: election_type
      value: local
    - op: eq
      field: address_kind
      value: residence
    - op: eq
      field: residence_over_6_months
      value: false
  effects:
  - type: block
    tag: local_vote_at_residence_requires_over_6_months
    message_ro: Pentru această reședință sub 6 luni, regula verificată indică votul
      la domiciliu.
  source_claim_ids:
  - claim.vote.local_under6m
  status: draft
- id: rule.vote.local_request_missing
  canonical_rule_id: vote.local_request_missing
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: election_type
      value: local
    - op: eq
      field: address_kind
      value: residence
    - op: eq
      field: register_request_submitted
      value: false
  effects:
  - type: emit_warning
    tag: local_register_request_may_be_required
    message_ro: Verifică și depune cererea pentru Registrul Electoral la reședință
      în termenul legal.
  source_claim_ids:
  - claim.vote.local_residence_6m_45d
  status: draft
- id: rule.vote.parliamentary_residence
  canonical_rule_id: vote.parliamentary_residence
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: election_type
      value: parliamentary
    - op: eq
      field: address_kind
      value: residence
  effects:
  - type: include_step
    step_id: step.vote.request_register
  - type: include_requirement
    requirement_id: req.vote.valid_residence
  - type: include_requirement
    requirement_id: req.vote.register_request
  - type: set_deadline
    step_id: step.vote.request_register
    value:
      kind: calendar_days_before_election
      days: 45
  source_claim_ids:
  - claim.vote.parliamentary_45d
  status: draft
- id: rule.vote.presidential_same
  canonical_rule_id: vote.presidential_same
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: election_type
      value: presidential
    - op: eq
      field: same_uat_as_registered_domicile
      value: true
    - op: eq
      field: mobility_reduced
      value: false
  effects:
  - type: emit_advice
    tag: presidential_use_assigned_section_same_uat
    message_ro: În UAT-ul domiciliului votezi la secția la care ești arondat.
  source_claim_ids:
  - claim.vote.presidential_same_uat
  status: draft
- id: rule.vote.presidential_other
  canonical_rule_id: vote.presidential_other
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: election_type
      value: presidential
    - op: eq
      field: same_uat_as_registered_domicile
      value: false
  effects:
  - type: include_step
    step_id: step.vote.use_supplementary
  - type: emit_advice
    tag: presidential_supplementary_list_other_uat
    message_ro: În altă UAT poți vota la o secție din UAT-ul în care te afli, conform
      regulii prezidențiale.
  source_claim_ids:
  - claim.vote.presidential_other_uat
  status: draft
- id: rule.vote.mobility
  canonical_rule_id: vote.mobility
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: election_type
      value: presidential
    - op: eq
      field: mobility_reduced
      value: true
  effects:
  - type: emit_advice
    tag: accessible_section_same_locality
    message_ro: Poți folosi o secție accesibilă din aceeași localitate, în condițiile
      legii.
  source_claim_ids:
  - claim.vote.reduced_mobility
  status: draft
- id: rule.vote.residence_not_completed
  canonical_rule_id: vote.residence_not_completed
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: address_kind
      value: residence
    - op: eq
      field: residence_registration_completed
      value: false
  effects:
  - type: include_step
    step_id: step.vote.register_residence
  - type: block
    tag: residence_registration_not_completed
    message_ro: Finalizează stabilirea reședinței înainte de a folosi ruta electorală
      bazată pe reședință.
  source_claim_ids:
  - claim.vote.timis_residence
  status: draft
- id: rule.vote.timis_residence
  canonical_rule_id: vote.timis_residence
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro.tm.timisoara
  authority_level: uat
  severity: operational
  when:
    op: all
    args:
    - op: eq
      field: target_uat
      value: Timișoara
    - op: eq
      field: address_kind
      value: residence
  effects:
  - type: attach_channel
    channel_id: ch.vote.timis_residence
  - type: emit_advice
    tag: timisoara_residence_service_5_working_days
    message_ro: Pagina locală indică 5 zile lucrătoare pentru eliberarea mențiunii
      de reședință.
  source_claim_ids:
  - claim.vote.timis_residence
  status: draft
- id: rule.vote.unsourced_election
  canonical_rule_id: vote.unsourced_election
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  severity: critical
  when:
    op: in
    field: election_type
    values:
    - european
    - referendum
    - unknown
  effects:
  - type: require_confirmation
    tag: election_specific_address_rule_unverified
    message_ro: Regula pentru acest tip de scrutin trebuie verificată în actul electoral
      curent; nu extrapola din locale/parlamentare/prezidențiale.
  source_claim_ids: []
  status: draft
- id: rule.vote.other_uat
  canonical_rule_id: vote.other_uat
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: uat
  severity: operational
  when:
    op: neq
    field: target_uat
    value: Timișoara
  effects:
  - type: require_confirmation
    tag: verify_local_residence_service
    message_ro: Verifică serviciul de evidență a persoanelor și procedura electorală
      locală competentă.
  source_claim_ids: []
  status: draft
- id: rule.vote.exact_threshold_unknown
  canonical_rule_id: vote.exact_threshold_unknown
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: election_type
      value: local
    - op: eq
      field: address_kind
      value: residence
    - op: eq
      field: residence_over_6_months
      value: null
  effects:
  - type: require_confirmation
    tag: residence_six_month_threshold_needs_review
    message_ro: Cazul exact de frontieră trebuie calculat și confirmat pentru data
      scrutinului.
  source_claim_ids:
  - claim.vote.local_residence_6m_45d
  - claim.vote.local_under6m
  status: draft
- id: rule.vote.parliamentary_request_missing
  canonical_rule_id: vote.parliamentary_request_missing
  event_type_id: life.vote_address_change
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: election_type
      value: parliamentary
    - op: eq
      field: address_kind
      value: residence
    - op: eq
      field: register_request_submitted
      value: false
  effects:
  - type: emit_warning
    tag: parliamentary_register_request_may_be_required
    message_ro: Verifică și depune cererea de înscriere la reședință până la termenul
      legal.
  source_claim_ids:
  - claim.vote.parliamentary_45d
  status: draft
