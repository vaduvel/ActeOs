schema_ref: ../../../contracts/rule.schema.json
batch_id: B15_VEHICLES_2_MISC
event_type_id: life.road_accident_admin
status: draft
rules:
- id: rule.acc.injury_emergency
  canonical_rule_id: acc.injury_emergency
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: any
    args:
    - op: eq
      field: injuries
      value: 'yes'
    - op: eq
      field: death
      value: true
    - op: eq
      field: dangerous_goods
      value: true
  effects:
  - type: include_step
    step_id: step.acc.emergency
  - type: include_requirement
    requirement_id: req.acc.call_112
  - type: attach_channel
    channel_id: ch.acc.112
  - type: block
    tag: do_not_leave_or_alter_scene
    message_ro: Nu părăsi locul și nu modifica urmele, în afara măsurilor necesare
      pentru siguranță și salvare.
  source_claim_ids:
  - claim.acc.injury_emergency
  status: draft
- id: rule.acc.injury_unknown
  canonical_rule_id: acc.injury_unknown
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  severity: critical
  when:
    op: eq
    field: injuries
    value: unknown
  effects:
  - type: require_confirmation
    tag: treat_possible_injury_as_emergency
    message_ro: Dacă există orice suspiciune de rănire, tratează situația ca urgență
      și apelează 112.
  source_claim_ids:
  - claim.acc.injury_emergency
  status: draft
- id: rule.acc.no_alcohol
  canonical_rule_id: acc.no_alcohol
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: const
    value: true
  effects:
  - type: emit_warning
    tag: no_alcohol_after_accident
    message_ro: Nu consuma alcool sau substanțe psihoactive după accident până la
      testare/recoltare.
  source_claim_ids:
  - claim.acc.no_alcohol_after
  status: draft
- id: rule.acc.alcohol_consumed
  canonical_rule_id: acc.alcohol_consumed
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  severity: critical
  when:
    op: eq
    field: alcohol_consumed_after
    value: true
  effects:
  - type: require_confirmation
    tag: legal_assistance_alcohol_after_event
    message_ro: Situația poate avea consecințe juridice; nu conduce și solicită îndrumare
      juridică/poliției.
  source_claim_ids:
  - claim.acc.no_alcohol_after
  status: draft
- id: rule.acc.material_police
  canonical_rule_id: acc.material_police
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: material_damage_only
      value: true
    - op: eq
      field: amicable_agreement_possible
      value: false
    - op: eq
      field: own_vehicle_only
      value: false
  effects:
  - type: include_step
    step_id: step.acc.move_safe
  - type: include_step
    step_id: step.acc.police_24h
  - type: include_requirement
    requirement_id: req.acc.police_report
  - type: set_deadline
    step_id: step.acc.police_24h
    value:
      kind: hours_from_event
      hours: 24
  source_claim_ids:
  - claim.acc.material_move_report
  status: draft
- id: rule.acc.amicable
  canonical_rule_id: acc.amicable
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: vehicles_count
      value: 2
    - op: eq
      field: material_damage_only
      value: true
    - op: eq
      field: amicable_agreement_possible
      value: true
  effects:
  - type: include_step
    step_id: step.acc.amicable
  - type: include_requirement
    requirement_id: req.acc.amicable_two_vehicles
  - type: emit_advice
    tag: amicable_route_available
    message_ro: Poți folosi constatarea amiabilă dacă toate condițiile sunt îndeplinite.
  source_claim_ids:
  - claim.acc.amicable_scope
  - claim.acc.material_exceptions
  status: draft
- id: rule.acc.amicable_invalid_count
  canonical_rule_id: acc.amicable_invalid_count
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: amicable_agreement_possible
      value: true
    - op: neq
      field: vehicles_count
      value: 2
  effects:
  - type: block
    tag: amicable_not_for_vehicle_count
    message_ro: Constatarea amiabilă modelată aici este pentru exact două vehicule.
  source_claim_ids:
  - claim.acc.amicable_scope
  status: draft
- id: rule.acc.own_casco
  canonical_rule_id: acc.own_casco
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: own_vehicle_only
      value: true
    - op: eq
      field: casco_available
      value: true
  effects:
  - type: emit_advice
    tag: own_damage_casco_exception
    message_ro: Poate fi aplicabilă excepția de la prezentarea la poliție; urmează
      procedura asigurătorului facultativ.
  source_claim_ids:
  - claim.acc.material_exceptions
  status: draft
- id: rule.acc.other_damage
  canonical_rule_id: acc.other_damage
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: event_context
      value: other_damage
    - op: eq
      field: casco_available
      value: false
  effects:
  - type: include_step
    step_id: step.acc.police_24h
  - type: include_requirement
    requirement_id: req.acc.police_report
  - type: set_deadline
    step_id: step.acc.police_24h
    value:
      kind: hours_from_discovery
      hours: 24
  source_claim_ids:
  - claim.acc.other_damage_24h
  status: draft
- id: rule.acc.notify_rca
  canonical_rule_id: acc.notify_rca
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: eq
    field: rca_insurer_notified
    value: false
  effects:
  - type: include_step
    step_id: step.acc.notify_insurer
  - type: include_requirement
    requirement_id: req.acc.rca_notice
  - type: set_deadline
    step_id: step.acc.notify_insurer
    value:
      kind: working_days_from_event
      days: 5
  - type: attach_channel
    channel_id: ch.acc.rca
  source_claim_ids:
  - claim.acc.rca_notice_5wd
  status: draft
- id: rule.acc.rca_late
  canonical_rule_id: acc.rca_late
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  severity: critical
  when:
    op: all
    args:
    - op: eq
      field: rca_insurer_notified
      value: false
    - op: gt
      field: working_days_since_event
      value: 5
  effects:
  - type: emit_warning
    tag: rca_notice_deadline_passed
    message_ro: Notifică imediat asigurătorul și explică întârzierea; termenul legal
      de 5 zile lucrătoare a trecut.
  source_claim_ids:
  - claim.acc.rca_notice_5wd
  status: draft
- id: rule.acc.repair_doc
  canonical_rule_id: acc.repair_doc
  event_type_id: life.road_accident_admin
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  when:
    op: const
    value: true
  effects:
  - type: include_step
    step_id: step.acc.obtain_repair_document
  - type: include_requirement
    requirement_id: req.acc.repair_document
  source_claim_ids:
  - claim.acc.repair_document
  status: draft
