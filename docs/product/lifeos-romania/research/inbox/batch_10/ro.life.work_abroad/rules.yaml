schema_ref: ../../../contracts/rule.schema.json
batch_id: batch10.work_abroad
event_type_id: ro.life.work_abroad
required_facts:
- employment_model
- destination_scope
- worker_citizenship_scope
- profession_regulated
- qualification_recognition_ready
- social_security_status_confirmed
- tax_residence_review_done
- posting_reges_data_ready
- posting_contract_terms_complete
- jurisdiction_id
status: draft
rules:
- id: rule.work_abroad.route.v1
  canonical_rule_id: rule.work_abroad.route
  event_type_id: ro.life.work_abroad
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  required_facts: []
  severity: critical
  effective_from: '2026-01-21'
  effective_to: null
  when:
    op: const
    value: true
  effects:
  - type: include_step
    step_id: identify_employment_model_and_destination
  - type: include_step
    step_id: verify_work_right_and_profession_rules
  - type: include_step
    step_id: confirm_social_security_coverage
  - type: include_step
    step_id: review_tax_residence_departure
  source_claim_ids:
  - clm.work_abroad.eu_no_permit
  - clm.work_abroad.regulated_qualification
  - clm.work_abroad.social_security_rule
  - clm.work_abroad.z017
  override_rule_ids: []
  status: active
  reviewer_id: null
- id: rule.work_abroad.eu_direct_romanian.v1
  canonical_rule_id: rule.work_abroad.eu_direct_romanian
  event_type_id: ro.life.work_abroad
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  required_facts: []
  severity: operational
  effective_from: '2026-01-21'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: employment_model
      value: direct_host_employer
    - op: eq
      field: destination_scope
      value: eu
    - op: eq
      field: worker_citizenship_scope
      value: romanian_or_eu
  effects:
  - type: emit_advice
    tag: eu_citizen_generally_no_work_permit_in_eu
    message_ro: Cetățeanul UE nu are, de regulă, nevoie de permis de muncă în alt stat UE.
  source_claim_ids:
  - clm.work_abroad.eu_no_permit
  override_rule_ids: []
  status: active
  reviewer_id: null
- id: rule.work_abroad.country_specific_permit.v1
  canonical_rule_id: rule.work_abroad.country_specific_permit
  event_type_id: ro.life.work_abroad
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  required_facts: []
  severity: critical
  effective_from: '2026-01-21'
  effective_to: null
  when:
    op: any
    args:
    - op: eq
      field: destination_scope
      value: non_eu
    - op: eq
      field: worker_citizenship_scope
      value: third_country
  effects:
  - type: require_confirmation
    tag: confirm_destination_work_and_residence_right
    message_ro: Dreptul de muncă și ședere trebuie verificat în legislația statului gazdă și pentru cetățenia persoanei.
  source_claim_ids:
  - clm.work_abroad.non_eu_permit_gap
  override_rule_ids: []
  status: in_review
  reviewer_id: null
- id: rule.work_abroad.regulated_not_ready.v1
  canonical_rule_id: rule.work_abroad.regulated_not_ready
  event_type_id: ro.life.work_abroad
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  required_facts: []
  severity: critical
  effective_from: '2026-01-01'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: profession_regulated
      value: true
    - op: eq
      field: qualification_recognition_ready
      value: false
  effects:
  - type: include_requirement
    requirement_id: professional_qualification_recognition_in_destination
  - type: block
    code: regulated_profession_recognition_missing
    message_ro: Nu presupune dreptul de exercitare înainte de recunoașterea cerută de statul gazdă.
  source_claim_ids:
  - clm.work_abroad.regulated_qualification
  override_rule_ids: []
  status: active
  reviewer_id: null
- id: rule.work_abroad.social_not_confirmed.v1
  canonical_rule_id: rule.work_abroad.social_not_confirmed
  event_type_id: ro.life.work_abroad
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  required_facts: []
  severity: critical
  effective_from: '2026-01-01'
  effective_to: null
  when:
    op: eq
    field: social_security_status_confirmed
    value: false
  effects:
  - type: include_requirement
    requirement_id: confirmed_social_security_coverage_and_required_portable_document
  source_claim_ids:
  - clm.work_abroad.social_security_rule
  override_rule_ids: []
  status: active
  reviewer_id: null
- id: rule.work_abroad.tax_not_reviewed.v1
  canonical_rule_id: rule.work_abroad.tax_not_reviewed
  event_type_id: ro.life.work_abroad
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  required_facts: []
  severity: critical
  effective_from: '2023-02-23'
  effective_to: null
  when:
    op: eq
    field: tax_residence_review_done
    value: false
  effects:
  - type: include_step
    step_id: review_z017_tax_residence_departure_applicability
  - type: emit_advice
    tag: z017_is_departure_tax_residence_form
    message_ro: Verifică dacă formularul Z017 și termenul său se aplică situației concrete.
  source_claim_ids:
  - clm.work_abroad.z017
  override_rule_ids: []
  status: active
  reviewer_id: null
- id: rule.work_abroad.posted_route.v1
  canonical_rule_id: rule.work_abroad.posted_route
  event_type_id: ro.life.work_abroad
  jurisdiction_ids:
  - ro
