  event_type_id: ro.life.changed_job
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  required_facts: []
  severity: operational
  effective_from: '2025-04-01'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: old_end_method
      value: resignation
    - op: eq
      field: notice_waived_or_employer_breach
      value: true
  effects:
  - type: emit_advice
    tag: resignation_without_notice_document_basis
    message_ro: Păstrează dovada renunțării angajatorului la preaviz ori a neîndeplinirii obligațiilor sale.
  source_claim_ids:
  - clm.changed_job.resignation_waiver
  override_rule_ids: []
