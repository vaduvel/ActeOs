schema_ref: ../../../contracts/rule.schema.json
batch_id: batch10.changed_job
event_type_id: ro.life.changed_job
required_facts:
- old_end_method
- role_level
- notice_waived_or_employer_breach
- received_termination_document
- received_history_proof
- has_new_offer
- workplace_or_profession_changed
- medical_file_copy_available
- wants_employment_services
status: draft
rules:
- id: rule.changed_job.route.v1
  canonical_rule_id: rule.changed_job.route
  event_type_id: ro.life.changed_job
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  required_facts: []
  severity: operational
  effective_from: '2026-04-27'
  effective_to: null
  when:
    op: const
    value: true
  effects:
  - type: include_step
    step_id: close_previous_employment_record
  - type: include_step
    step_id: collect_termination_and_history_documents
  - type: include_step
    step_id: prepare_new_employment_start
  source_claim_ids:
  - clm.changed_job.history_employer
  - clm.changed_job.cim_written
  override_rule_ids: []
  status: active
  reviewer_id: null
- id: rule.changed_job.resignation_execution.v1
  canonical_rule_id: rule.changed_job.resignation_execution
  event_type_id: ro.life.changed_job
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  required_facts: []
  severity: operational
  effective_from: '2025-04-01'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: old_end_method
      value: resignation
    - op: eq
      field: role_level
      value: execution
    - op: eq
      field: notice_waived_or_employer_breach
      value: false
  effects:
  - type: emit_advice
    tag: resignation_notice_max_20_working_days
    message_ro: Pentru funcții de execuție, preavizul contractual nu poate depăși 20 de zile lucrătoare.
  source_claim_ids:
  - clm.changed_job.resignation_notice
  override_rule_ids: []
  status: active
  reviewer_id: null
- id: rule.changed_job.resignation_management.v1
  canonical_rule_id: rule.changed_job.resignation_management
  event_type_id: ro.life.changed_job
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  required_facts: []
  severity: operational
  effective_from: '2025-04-01'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: old_end_method
      value: resignation
    - op: eq
      field: role_level
      value: management
    - op: eq
      field: notice_waived_or_employer_breach
      value: false
  effects:
  - type: emit_advice
    tag: resignation_notice_max_45_working_days
    message_ro: Pentru funcții de conducere, preavizul contractual nu poate depăși 45 de zile lucrătoare.
  source_claim_ids:
  - clm.changed_job.resignation_notice
  override_rule_ids: []
  status: active
  reviewer_id: null
- id: rule.changed_job.resignation_without_notice.v1
