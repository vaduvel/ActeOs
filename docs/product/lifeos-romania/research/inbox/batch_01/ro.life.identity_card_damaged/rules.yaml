schema_ref: ../../../contracts/rule.schema.json
batch_id: B01_IDENTITY_CARD_DAMAGED
event_type_id: life.identity_card_damaged
status: draft
rules:
- id: rule.iddamage.route
  canonical_rule_id: identity_card_damaged.route
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2005-07-20'
  when:
    op: const
    value: true
  effects:
  - type: include_step
    step_id: replace_damaged_identity_card
  source_claim_ids:
  - claim.id.damage.case_deadline
  status: draft
  authority_level: national_normative
- id: rule.iddamage.deadline
  canonical_rule_id: identity_card_damaged.deadline_15d
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2005-07-20'
  when:
    op: all
    args:
    - op: exists
      field: incident_date
    - op: exists
      field: request_date
  effects:
  - type: set_deadline
    step_id: replace_damaged_identity_card
    value:
      kind: relative_calendar_days
      anchor: incident_date
      days: 15
  source_claim_ids:
  - claim.id.damage.case_deadline
  status: draft
  authority_level: national_normative
  legal_rank: OUG
  required_facts:
  - incident_date
  - request_date
- id: rule.iddamage.docs
  canonical_rule_id: identity_card_damaged.documents
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: operational
  effective_from: '2021-03-10'
  when:
    op: const
    value: true
  effects:
  - type: include_requirement
    requirement_id: req.damaged_identity_card
  - type: include_requirement
    requirement_id: req.civil_status_documents_if_applicable
  - type: include_requirement
    requirement_id: req.proof_of_domicile
  - type: include_requirement
    requirement_id: req.payment_proof_if_due
  source_claim_ids:
  - claim.id.damage.docs
  status: draft
  authority_level: national_normative
  legal_rank: HG
- id: rule.iddamage.alt_photo
  canonical_rule_id: identity_card_damaged.alternative_photo_id
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2021-03-10'
  when:
    op: eq
    field: rnep_has_face_image
    value: false
  effects:
  - type: include_requirement
    requirement_id: req.recent_official_photo_document
  source_claim_ids:
  - claim.id.damage.alt_photo
  status: draft
  authority_level: national_normative
  required_facts:
  - rnep_has_face_image
- id: rule.iddamage.verify
  canonical_rule_id: identity_card_damaged.police_identity_verification
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2021-03-10'
  when:
    op: all
    args:
    - op: eq
      field: rnep_has_face_image
      value: false
    - op: eq
      field: has_alt_photo_id
      value: false
  effects:
  - type: include_step
    step_id: police_identity_verification
  - type: require_confirmation
    tag: identity_verification_required
    message_ro: Identitatea trebuie verificată înainte de emitere.
  source_claim_ids:
  - claim.id.damage.police_verify
  status: draft
  authority_level: national_normative
- id: rule.iddamage.no_presence
  canonical_rule_id: identity_card_damaged.physical_presence
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2025-04-24'
  when:
    op: eq
    field: applicant_present
    value: false
  effects:
  - type: block
    tag: applicant_presence_required
    message_ro: Titularul trebuie să fie prezent pentru depunerea cererii CEI/CIS.
  source_claim_ids:
  - claim.id.damage.presence
  status: draft
  authority_level: national_operational
  required_facts:
  - applicant_present
- id: rule.iddamage.cei_fee
  canonical_rule_id: identity_card_damaged.cei_fee_70
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: operational
  effective_from: '2025-04-24'
  when:
    op: eq
    field: requested_document
    value: cei
  effects:
  - type: emit_advice
    tag: fee_70_ron
    message_ro: Contravaloarea publicată pentru noua CEI este 70 lei.
  source_claim_ids:
  - claim.id.damage.fees
  status: draft
  authority_level: national_operational
- id: rule.iddamage.cis_fee
  canonical_rule_id: identity_card_damaged.cis_fee_40
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: operational
  effective_from: '2025-04-24'
  when:
    op: eq
    field: requested_document
    value: cis
  effects:
  - type: emit_advice
    tag: fee_40_ron
    message_ro: Contravaloarea publicată pentru CIS este 40 lei.
  source_claim_ids:
  - claim.id.damage.fees
  status: draft
  authority_level: national_operational
- id: rule.iddamage.cei_channel
  canonical_rule_id: identity_card_damaged.cei_any_spcep
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: operational
  effective_from: '2025-08-01'
  when:
    op: eq
    field: requested_document
    value: cei
  effects:
  - type: attach_channel
    channel_id: ch.hub_cei_any_spcep
  source_claim_ids:
  - claim.id.damage.channels
  status: draft
- id: rule.iddamage.cis_channel
  canonical_rule_id: identity_card_damaged.cis_local
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: operational
  effective_from: '2025-04-24'
  when:
    op: eq
    field: requested_document
    value: cis
  effects:
  - type: attach_channel
    channel_id: ch.spcep_domicile
  - type: emit_warning
    tag: cis_local_only
    message_ro: CIS se solicită la serviciul competent pentru domiciliu.
  source_claim_ids:
  - claim.id.damage.channels
  status: draft
- id: rule.iddamage.name_change_child
  canonical_rule_id: identity_card_damaged.name_change_child
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: operational
  effective_from: '2021-03-10'
  when:
    op: eq
    field: civil_status_changed
    value: true
  effects:
  - type: trigger_child_event
    event_type_id: life.identity_card_change_name
  source_claim_ids:
  - claim.id.damage.docs
  status: draft
- id: rule.iddamage.address_child
  canonical_rule_id: identity_card_damaged.address_change_child
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro
  severity: operational
  effective_from: '2021-03-10'
  when:
    op: eq
    field: domicile_changed
    value: true
  effects:
  - type: trigger_child_event
    event_type_id: life.id_card_change_address
  source_claim_ids:
  - claim.id.damage.docs
  status: draft
- id: rule.iddamage.timisoara
  canonical_rule_id: identity_card_damaged.timisoara_channel
  event_type_id: life.identity_card_damaged
  jurisdiction_ids:
  - ro.tm.timisoara
  severity: explanatory
  effective_from: '2026-01-01'
  when:
    op: const
    value: true
  effects:
  - type: attach_channel
    channel_id: ch.dep_timisoara_mihai_eminescu_15
  source_claim_ids:
  - claim.id.damage.timisoara
  status: draft
