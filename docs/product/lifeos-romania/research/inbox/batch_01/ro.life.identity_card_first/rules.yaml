  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2005-07-20'
  when:
    op: all
    args:
    - op: gte
      field: age_years
      value: 14
    - op: exists
      field: turned_14_at
  effects:
  - type: include_step
    step_id: request_first_identity_card
  - type: set_deadline
    step_id: request_first_identity_card
