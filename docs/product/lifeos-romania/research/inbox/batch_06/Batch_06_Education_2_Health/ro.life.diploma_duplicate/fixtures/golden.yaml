batch_id: B06_DIPLOMA_DUPLICATE
defaults:
  alias_event_type_id: ro.life.diploma_duplicate
  event_type_id: life.diploma_duplicate
  timezone: Europe/Bucharest
  jurisdiction_path:
  - eu
  - ro
  - ro.tm
  - ro.tm.timisoara
  reference_date: '2026-06-25'
fixtures:
- id: DIP01
  description: Preuniversitar pierdut, dosar complet
  facts:
    education_level: preuniversity
    duplicate_reason: lost
    archive_location: issuing_school
    has_notarial_declaration: true
    has_monitorul_proof: true
    has_civil_status_copy: true
    photo_count: 2
    isj_approval: true
  expect:
    status: resolved
    included_steps:
    - identify_issuing_school_or_archive_holder
    - submit_duplicate_request
    requirements:
    - req.notarial_or_consular_declaration
    - req.monitorul_oficial_part_iii_proof
    - req.two_color_photos_3x4
- id: DIP02
  description: Preuniversitar furat fără declarație notarială
  facts:
    education_level: preuniversity
    duplicate_reason: stolen
    archive_location: issuing_school
    has_notarial_declaration: false
  expect:
    status: resolved
    missing_requirements:
    - req.notarial_or_consular_declaration
- id: DIP03
