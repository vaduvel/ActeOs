  reviewer_id: null
- id: rule.account_recovery_gov.hub_reset.r1
  canonical_rule_id: rule.account_recovery_gov.hub_reset
  event_type_id: ro.life.account_recovery_gov
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope:
  - platform:hub_mai
  legal_rank: null
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: eq
    field: platform_id
    value: hub_mai
  effects:
  - type: include_requirement
    requirement_id: req.hub_validated_contact
  - type: attach_channel
    channel_id: channel.hub_mai_reset
  source_claim_ids:
  - claim.account_recovery_gov.hub_mai_reset_channels
  - claim.account_recovery_gov.hub_mai_validated_contact
  status: draft
  reviewer_id: null
freshness_policy:
  critical:
