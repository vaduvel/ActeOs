rules:
- id: rule.account_recovery_gov.roeid_known_password.r1
  canonical_rule_id: rule.account_recovery_gov.roeid_known_password
  event_type_id: ro.life.account_recovery_gov
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope:
  - platform:roeid
  legal_rank: null
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: platform_id
      value: roeid
    - op: eq
      field: issue_type
      value: change_password
    - op: eq
      field: current_password_known
      value: true
  effects:
  - type: attach_channel
    channel_id: channel.roeid_recovery
  - type: emit_warning
    message_ro: Schimbă parola din aplicație, din Setări > Modificare parolă.
  source_claim_ids:
  - claim.account_recovery_gov.roeid_password_known
  status: draft
  reviewer_id: null
- id: rule.account_recovery_gov.roeid_reenrol.r1
  canonical_rule_id: rule.account_recovery_gov.roeid_reenrol
  event_type_id: ro.life.account_recovery_gov
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope:
  - platform:roeid
  legal_rank: null
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: platform_id
      value: roeid
    - op: in
      field: issue_type
      values:
      - forgot_password
      - change_email
      - changed_phone
  effects:
  - type: include_requirement
    requirement_id: req.roeid_reenrolment_kit
  - type: require_confirmation
    message_ro: Este necesară o nouă înrolare/validare ROeID.
  source_claim_ids:
  - claim.account_recovery_gov.roeid_password_forgotten
  - claim.account_recovery_gov.roeid_email_change
  - claim.account_recovery_gov.roeid_phone_change
