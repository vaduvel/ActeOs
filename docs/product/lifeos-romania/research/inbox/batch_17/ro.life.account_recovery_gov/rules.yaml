  reviewer_id: null
- id: rule.account_recovery_gov.ghiseul_recovery.r1
  canonical_rule_id: rule.account_recovery_gov.ghiseul_recovery
  event_type_id: ro.life.account_recovery_gov
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope:
  - platform:ghiseul
  legal_rank: null
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: eq
    field: platform_id
    value: ghiseul
  effects:
  - type: include_requirement
    requirement_id: req.registered_email
  - type: include_requirement
    requirement_id: req.cnp
  - type: attach_channel
    channel_id: channel.ghiseul_recovery
  source_claim_ids:
  - claim.account_recovery_gov.ghiseul_credentials_recovery
  - claim.account_recovery_gov.ghiseul_credentials_by_email
  status: draft
  reviewer_id: null
- id: rule.account_recovery_gov.anaf_recovery.r1
  canonical_rule_id: rule.account_recovery_gov.anaf_recovery
  event_type_id: ro.life.account_recovery_gov
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope:
  - platform:anaf_spv
  legal_rank: null
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: platform_id
      value: anaf_spv
    - op: in
      field: issue_type
      values:
      - forgot_password
      - forgot_username
  effects:
  - type: include_requirement
    requirement_id: req.registered_email
  - type: include_requirement
    requirement_id: req.cnp
  - type: attach_channel
    channel_id: channel.anaf_recovery
  source_claim_ids:
  - claim.account_recovery_gov.anaf_recovery_inputs
  - claim.account_recovery_gov.anaf_recovery_email_link
  status: draft
  reviewer_id: null
- id: rule.account_recovery_gov.anaf_change_email.r1
  canonical_rule_id: rule.account_recovery_gov.anaf_change_email
  event_type_id: ro.life.account_recovery_gov
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope:
  - platform:anaf_spv
  legal_rank: null
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: platform_id
      value: anaf_spv
    - op: eq
      field: issue_type
      value: change_email
  effects:
  - type: include_requirement
    requirement_id: req.anaf_current_credentials
  - type: attach_channel
    channel_id: channel.anaf_change_email
  source_claim_ids:
  - claim.account_recovery_gov.anaf_change_email_inputs
