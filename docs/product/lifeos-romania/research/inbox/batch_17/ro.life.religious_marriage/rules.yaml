  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: eq
    field: religion_data_storage_consent
    value: false
  effects:
  - type: emit_warning
    message_ro: Nu stoca apartenența religioasă fără consimțământ expres.
  source_claim_ids:
