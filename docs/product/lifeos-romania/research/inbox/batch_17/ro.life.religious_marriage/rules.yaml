  notes: Cerințele se confirmă la parohia competentă.
- id: channel.catholic_timisoara
  type: web
  label: Episcopia Romano-Catolică de Timișoara — parohii/contact
  url: https://gerhardus.ro/
  integration_status: DEEP_LINK
  official_domain: gerhardus.ro
  territory_ids:
  - ro.tm
  - ro.tm.timisoara
  source_claim_ids:
  - claim.religious_marriage.catholic_timisoara_channel
  notes: Cerințele se confirmă la parohia competentă.
rules:
- id: rule.religious_marriage.civil_first.r1
  canonical_rule_id: rule.religious_marriage.civil_first
  event_type_id: ro.life.religious_marriage
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: cod
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: eq
    field: civil_marriage_completed
    value: false
  effects:
  - type: block
    message_ro: Căsătoria religioasă poate fi celebrată numai după căsătoria civilă.
  - type: include_requirement
    requirement_id: req.civil_marriage_proof
  source_claim_ids:
  - claim.religious_marriage.civil_marriage_first
