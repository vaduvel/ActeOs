  source_claim_ids:
  - claim.digital_identity_ro.roeid_duration_24_72
  - claim.digital_identity_ro.roeid_duration_max_24
  status: draft
  reviewer_id: null
- id: rule.digital_identity_ro.rejected_capture.r1
  canonical_rule_id: rule.digital_identity_ro.rejected_capture
