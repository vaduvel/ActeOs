rules:
- id: rule.digital_identity_ro.supported_device.r1
  canonical_rule_id: rule.digital_identity_ro.supported_device
  event_type_id: ro.life.digital_identity_ro
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: in
    field: smartphone_os
    values:
    - other
    - none
  effects:
  - type: block
    message_ro: Este necesar un smartphone Android sau iPhone pentru înrolare.
  source_claim_ids:
  - claim.digital_identity_ro.roeid_phone_and_id
  - claim.digital_identity_ro.roeid_smartphone_internet
  status: draft
  reviewer_id: null
- id: rule.digital_identity_ro.id_required.r1
  canonical_rule_id: rule.digital_identity_ro.id_required
  event_type_id: ro.life.digital_identity_ro
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: eq
    field: identity_document_available
    value: false
  effects:
  - type: block
    message_ro: Cartea de identitate este necesară procesului ROeID.
  - type: include_requirement
    requirement_id: req.identity_card
