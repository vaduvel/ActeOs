- id: rule.digital_identity_ro.capture_requirements.r1
  canonical_rule_id: rule.digital_identity_ro.capture_requirements
  event_type_id: ro.life.digital_identity_ro
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: eq
    field: enrollment_submitted
    value: false
  effects:
  - type: include_requirement
    requirement_id: req.smartphone
  - type: include_requirement
    requirement_id: req.camera_microphone_internet
  - type: include_requirement
    requirement_id: req.email
  source_claim_ids:
  - claim.digital_identity_ro.roeid_capture_requirements
  - claim.digital_identity_ro.roeid_smartphone_internet
  status: draft
  reviewer_id: null
- id: rule.digital_identity_ro.validation_conflict.r1
  canonical_rule_id: rule.digital_identity_ro.validation_conflict
  event_type_id: ro.life.digital_identity_ro
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: null
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: eq
    field: enrollment_submitted
    value: true
  effects:
  - type: emit_warning
    message_ro: 'Durata aprobării este publicată contradictoriu: maximum 24h versus 24–72h lucrătoare.'
