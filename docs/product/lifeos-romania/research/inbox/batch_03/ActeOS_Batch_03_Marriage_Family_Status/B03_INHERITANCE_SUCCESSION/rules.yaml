schema_ref: ../../../contracts/rule.schema.json
batch_id: B03_INHERITANCE_SUCCESSION
event_type_id: ro.life.inheritance_succession
status: in_review
reference_date_floor: '2026-06-25'
required_facts:
- death_certificate_available
- last_domicile_scope
- estate_may_exist
- heirs_disagree
- months_since_death
- has_immovable_property
- territory_id
rules:
- id: rule.b03.succession.base
  canonical_rule_id: succession.assess.base
  event_type_id: ro.life.inheritance_succession
  jurisdiction_ids:
  - RO
  severity: explanatory
  effective_from: '2026-06-25'
  when:
    op: const
    value: true
  effects:
  - type: include_step
    step_id: assess_estate_heirs_and_debts
  - type: emit_advice
    tag: succession_research_in_review
    message_ro: Competența notarului, termenul opțiunii succesorale, dosarul și taxele trebuie confirmate din articolele oficiale
      atomice.
  source_claim_ids:
  - claim.b03.succession.civil_code_current
  - claim.b03.succession.timisoara_notice
  status: in_review
- id: rule.b03.succession.no_death_certificate
  canonical_rule_id: succession.require_death_certificate
  event_type_id: ro.life.inheritance_succession
  jurisdiction_ids:
  - RO
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: death_certificate_available
    value: false
  effects:
  - type: include_step
    step_id: obtain_death_certificate
  - type: include_requirement
    requirement_id: req.death_certificate
  source_claim_ids:
  - claim.b03.succession.death_certificate
  status: draft
- id: rule.b03.succession.estate_exists
  canonical_rule_id: succession.open_case
  event_type_id: ro.life.inheritance_succession
  jurisdiction_ids:
  - RO
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: estate_may_exist
    value: true
  effects:
  - type: include_step
    step_id: contact_competent_notary_for_succession
  - type: require_confirmation
    tag: confirm_notary_competence_and_dossier
    message_ro: Confirmă notarul competent, actele și costurile înainte de depunere.
  source_claim_ids:
  - claim.b03.succession.civil_code_current
  - claim.b03.succession.timisoara_notice
  status: in_review
- id: rule.b03.succession.no_known_estate
  canonical_rule_id: succession.no_known_estate
  event_type_id: ro.life.inheritance_succession
  jurisdiction_ids:
  - RO
  severity: operational
  effective_from: '2026-06-25'
  when:
    op: eq
    field: estate_may_exist
    value: false
  effects:
  - type: emit_advice
    tag: verify_assets_liabilities_before_closing
    message_ro: Verifică existența bunurilor, conturilor și datoriilor înainte de a considera că nu există masă succesorală.
  source_claim_ids:
  - claim.b03.succession.notice_content
  status: draft
- id: rule.b03.succession.timisoara_last_domicile
  canonical_rule_id: succession.timisoara_notice
  event_type_id: ro.life.inheritance_succession
  jurisdiction_ids:
  - RO-TM-TIMISOARA
  severity: operational
  effective_from: '2026-06-25'
  when:
    op: eq
    field: last_domicile_scope
    value: timisoara
  effects:
  - type: attach_channel
    step_id: assess_estate_heirs_and_debts
    channel_id: ch.timisoara.succession_notification
  - type: emit_advice
    tag: timisoara_ex_officio_succession_notice
    message_ro: Pentru ultimul domiciliu în Timișoara există fluxul local de sesizare din oficiu.
  source_claim_ids:
  - claim.b03.succession.timisoara_notice
  - claim.b03.succession.state_civil_role
  status: draft
  authority_level: institution
- id: rule.b03.succession.last_domicile_abroad
  canonical_rule_id: succession.last_domicile_abroad
  event_type_id: ro.life.inheritance_succession
  jurisdiction_ids:
  - RO
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: last_domicile_scope
    value: abroad
  effects:
  - type: require_confirmation
    tag: confirm_cross_border_succession_competence
    message_ro: Confirmă competența internațională, legea aplicabilă și documentele străine înainte de alegerea notarului.
  source_claim_ids:
  - claim.b03.succession.civil_code_current
  status: in_review
- id: rule.b03.succession.heir_dispute
  canonical_rule_id: succession.heirs_disagree
  event_type_id: ro.life.inheritance_succession
  jurisdiction_ids:
  - RO
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: heirs_disagree
    value: true
  effects:
  - type: emit_warning
    tag: heir_dispute_requires_route_review
    message_ro: Neînțelegerea dintre succesibili poate schimba traseul și trebuie clarificată juridic.
  - type: require_confirmation
    tag: confirm_disputed_succession_route
    message_ro: Confirmă dacă procedura poate continua notarial sau este necesară instanța.
  source_claim_ids:
  - claim.b03.succession.civil_code_current
  status: in_review
- id: rule.b03.succession.option_deadline_review
  canonical_rule_id: succession.option_deadline_review
  event_type_id: ro.life.inheritance_succession
  jurisdiction_ids:
  - RO
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: gte
    field: months_since_death
    value: 12
  effects:
  - type: emit_warning
    tag: succession_option_deadline_must_be_checked
    message_ro: A trecut cel puțin un an; verifică urgent termenul și efectele opțiunii succesorale din Codul civil consolidat.
  - type: require_confirmation
    tag: confirm_succession_option_deadline
    message_ro: Nu calcula termenul fără articolul oficial extras și data exactă a decesului.
  source_claim_ids:
  - claim.b03.succession.civil_code_current
  status: in_review
- id: rule.b03.succession.tax_after_two_years_review
  canonical_rule_id: succession.tax_after_two_years_review
  event_type_id: ro.life.inheritance_succession
  jurisdiction_ids:
  - RO
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: gt
    field: months_since_death
    value: 24
  effects:
  - type: require_confirmation
    tag: confirm_tax_consequence_after_two_years
    message_ro: Confirmă tratamentul fiscal al finalizării după 2 ani; nu este introdus niciun procent fără sursa fiscală
      actuală.
  source_claim_ids:
  - claim.b03.succession.civil_code_current
  status: in_review
- id: rule.b03.succession.immovable
  canonical_rule_id: succession.immovable_property
  event_type_id: ro.life.inheritance_succession
  jurisdiction_ids:
  - RO
  severity: operational
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: estate_may_exist
      value: true
    - op: eq
      field: has_immovable_property
      value: true
  effects:
  - type: include_step
    step_id: review_land_book_and_local_tax_after_succession
  - type: require_confirmation
    tag: confirm_property_post_succession_steps
    message_ro: Confirmă actele ANCPI și declarația fiscală locală după certificatul de moștenitor.
  source_claim_ids:
  - claim.b03.succession.notice_content
  status: in_review
- id: rule.b03.succession.other_uat
  canonical_rule_id: succession.local_gap
  event_type_id: ro.life.inheritance_succession
  jurisdiction_ids:
  - RO
  severity: operational
  effective_from: '2026-06-25'
  when:
    op: neq
    field: territory_id
    value: RO-TM-TIMISOARA
  effects:
  - type: require_confirmation
    tag: confirm_local_succession_notification
    message_ro: Confirmă fluxul local de sesizare și instituțiile competente în UAT-ul ultimului domiciliu.
  source_claim_ids:
  - claim.b03.succession.timisoara_notice
  status: in_review
