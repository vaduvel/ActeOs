claims:
  - id: claim.ci.deadline_15d
    source_id: src.oug_97_2005
    snapshot_id: pending
    statement: La schimbarea domiciliului, cetateanul este obligat sa solicite eliberarea unei noi carti de identitate in termen de 15 zile de la mutarea la noua adresa.
    url: https://legislatie.just.ro/Public/DetaliiDocument/63354
    publisher: Portal Legislativ (just.ro)
    authority_level: national_normative
    legal_rank: OUG
    evidence_excerpt: "art. 19: in termen de 15 zile de la producerea uneia dintre situatiile prevazute la alin (1) lit. b)-j) ... in cazul schimbarii domiciliului"
    locator: OUG 97/2005, art. 19
    accessed_at: 2026-06-25
    confidence: verified
    freshness_class: critical
    status: active
    corroborated_by: [src.cei_utile]
  - id: claim.ci.sanction_40_80
    source_id: src.oug_97_2005
    snapshot_id: pending
    statement: Nerespectarea termenului de solicitare a noului act de identitate constituie contraventie sanctionata cu amenda de la 40 la 80 lei.
    url: https://legislatie.just.ro/Public/DetaliiDocument/63354
    publisher: Portal Legislativ (just.ro)
    authority_level: national_normative
    legal_rank: OUG
    evidence_excerpt: "Sanctiunea contraventionala: 40 lei - 80 lei (art. 43, OUG 97/2005, preluat de paginile oficiale EVP)"
    locator: OUG 97/2005, regim contraventional
    accessed_at: 2026-06-25
    confidence: verified_with_local_gap
    freshness_class: critical
    status: active
    note: cuantumul exact si articolul de sanctionare de reconfirmat din textul consolidat curent.
  - id: claim.ci.docs
    source_id: src.hg_295_2021
    snapshot_id: pending
    statement: Documente la schimbarea domiciliului - cerere (completata la ghiseu), actul de identitate, certificatul de nastere original, certificatul de casatorie/divort dupa caz original, certificatele de nastere ale copiilor sub 14 ani care se muta, dovada adresei de domiciliu.
    url: https://www.primariatm.ro/CI-electronic
    publisher: Primaria Timisoara (in aplicarea HG 295/2021 art. 57)
    authority_level: national_operational
    legal_rank: HG
    evidence_excerpt: "Documentele de stare civila si cele privind dovada adresei de domiciliu se prezinta in original. Cererea se autocompleteaza la ghiseu."
    locator: HG 295/2021, art. 57; pagina Primaria Timisoara CI-electronic
    accessed_at: 2026-06-25
    confidence: verified
    freshness_class: operational
    status: active
    corroborated_by: [src.dep_timis]
  - id: claim.ci.proof_address_cf30
    source_id: src.primariatm_dep
    snapshot_id: pending
    statement: Dovada adresei de domiciliu se face cu extras de carte funciara; daca solicitantul nu este proprietar, este necesar consimtamantul gazduitorului dat in fata functionarului.
    url: https://www.primariatm.ro/dovada-adresa-domiciliu
    publisher: Primaria Municipiului Timisoara
    authority_level: institution
    evidence_excerpt: "declaratia gazduitorului / proprietarului de primire in spatiul de locuit, data in fata functionarului ... va fi generata automat de sistemul informatic"
    locator: Primaria Timisoara - dovada adresa domiciliu
    accessed_at: 2026-06-25
    confidence: verified
    freshness_class: operational
    status: active
    note: termenul 'extras nu mai vechi de 30 de zile' apare la alte SPCLEP; de confirmat pentru Timisoara.
  - id: claim.cei.address_change_no_new_doc
    source_id: src.cei_gov
    snapshot_id: pending
    statement: Pentru cartea electronica de identitate (CEI), schimbarea adresei de domiciliu se poate face fara a mai solicita un nou act de identitate.
    url: https://carteadeidentitate.gov.ro/
    publisher: MAI / DGEP
    authority_level: national_operational
    evidence_excerpt: "Schimbi adresa de domiciliu, fara sa mai soliciti un nou act de identitate."
    locator: carteadeidentitate.gov.ro - avantaje CEI
    accessed_at: 2026-06-25
    confidence: verified
    freshness_class: operational
    status: active
    note: mecanismul/procedura concreta de actualizare a adresei la CEI de detaliat; impact asupra obligatiei de 15 zile.
  - id: claim.timisoara.dep_channel
    source_id: src.primariatm_dep
    snapshot_id: pending
    statement: Direrctia de Evidenta a Persoanelor Timisoara are program L-V 08:00-16:00; programarile pentru CEI se fac prin hub.mai.gov.ro.
    url: https://www.primariatm.ro/evidenta-persoanelor
    publisher: Primaria Municipiului Timisoara
    authority_level: institution
    evidence_excerpt: "Program Luni - Vineri 8.00 - 16.00"
    locator: Primaria Timisoara - Directia Evidenta Persoanelor
    accessed_at: 2026-06-25
    confidence: verified
    freshness_class: operational
    status: active
  - id: claim.veh.address_update_exists
    source_id: src.drpciv
    snapshot_id: pending
    statement: La schimbarea adresei de domiciliu, proprietarul de vehicul trebuie sa obtina un nou certificat de inmatriculare (preschimbare in urma modificarii datelor de identificare ale detinatorului).
    url: https://dgpci.mai.gov.ro/documents-and-forms/inmatriculari
    publisher: MAI / DGPCI (DRPCIV)
    authority_level: national_operational
    evidence_excerpt: "Eliberarea unui nou certificat de inmatriculare cand se modifica date ... (operatiune listata DRPCIV)"
