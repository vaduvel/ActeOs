    evidence_excerpt: "Taxa pentru eliberarea pasaportului simplu electronic este de 258 de lei (peste 12 ani) si 234 de lei (sub 12 ani). Taxa pentru eliberarea pasaportului simplu temporar este de 96 de lei"
