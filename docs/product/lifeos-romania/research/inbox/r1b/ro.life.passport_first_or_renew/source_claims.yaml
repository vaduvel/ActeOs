  - id: claim.pass.validity
    source_id: src.dgp_valabilitate
    snapshot_id: pending
    statement: Pasaportul simplu electronic are valabilitatea 3 ani (<12 ani), 5 ani (12-18 ani) si 10 ani (>18 ani); pasaportul simplu temporar are valabilitate 12 luni.
    url: https://pasapoarte.mai.gov.ro/termene-de-valabilitate/
    publisher: Directia Generala de Pasapoarte (MAI)
    authority_level: national_operational
    evidence_excerpt: "3 ani pentru minorii cu varsta sub 12 ani. 5 ani pentru persoanele cu varsta intre 12 ani si 18 ani. 10 ani pentru persoanele cu varsta peste 18 ani. Pasaportul simplu temporar are valabilitatea 12 luni"
    locator: DGP - termene de valabilitate
    accessed_at: 2026-06-25
    confidence: verified
    freshness_class: operational
    status: active
