    expect: { status: ok, channels_absent: [ch.cazier_timis] }
  - id: J14
    desc: lipseste applicant_age
    facts: { channel_pref: counter, is_for_third_party: false, citizen_type: ro_citizen }
    expect: { status: needs_facts, missing_facts: [applicant_age] }
  - id: J15
    desc: lipseste channel_pref
    facts: { applicant_age: 30, is_for_third_party: false, citizen_type: ro_citizen }
    expect: { status: needs_facts, missing_facts: [channel_pref] }
  - id: J16
    desc: lipseste is_for_third_party
    facts: { applicant_age: 30, channel_pref: counter, citizen_type: ro_citizen }
    expect: { status: needs_facts, missing_facts: [is_for_third_party] }
  - id: J17
    desc: lipseste citizen_type
    facts: { applicant_age: 30, channel_pref: counter, is_for_third_party: false }
    expect: { status: needs_facts, missing_facts: [citizen_type] }
  - id: J18
    desc: toate faptele lipsa
    facts: {}
    expect: { status: needs_facts, missing_facts: [applicant_age, channel_pref, is_for_third_party, citizen_type] }
