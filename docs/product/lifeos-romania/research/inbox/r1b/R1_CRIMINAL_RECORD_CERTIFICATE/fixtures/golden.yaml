    desc: roman online prin imputernicit
    facts: { applicant_age: 35, channel_pref: online, is_for_third_party: true, citizen_type: ro_citizen }
    expect: { status: ok, channels: [ch.cazier_online], requirements: [req.notarial_power_of_attorney] }
