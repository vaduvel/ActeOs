    desc: in nume propriu - fara procura
    facts: { applicant_age: 30, channel_pref: counter, is_for_third_party: false, citizen_type: ro_citizen }
    expect: { status: ok, requirements_absent: [req.notarial_power_of_attorney] }
  - id: J21
    desc: cetatean UE online - 30 zile + canal online
    facts: { applicant_age: 45, channel_pref: online, is_for_third_party: false, citizen_type: eu_citizen }
    expect: { status: ok, warnings_present: [issue_foreign_30d], channels: [ch.cazier_online] }
  - id: J22
    desc: minor 13 ani prin reprezentant la ghiseu Timis
    facts: { applicant_age: 13, channel_pref: counter, is_for_third_party: true, citizen_type: ro_citizen }
