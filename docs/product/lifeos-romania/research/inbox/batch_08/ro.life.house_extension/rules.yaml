  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: eq
    field: is_extension
    value: false
  effects:
  - type: block
    code: event_not_applicable
    message_ro: Evenimentul nu este aplicabil dacă lucrarea nu este o extindere a casei.
