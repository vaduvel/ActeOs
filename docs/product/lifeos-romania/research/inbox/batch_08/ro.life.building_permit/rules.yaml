    field: cadastral_evidence_requirement_satisfied
    value: false
  effects:
  - type: include_requirement
    requirement_id: current_cadastral_plan_and_land_book_extract_if_applicable
  source_claim_ids:
  - clm.building_permit.law50.required_docs
  status: active
  reviewer_id: null
- id: rule.building_permit.missing_dt.v1
  canonical_rule_id: rule.building_permit.missing_dt
  event_type_id: ro.life.building_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
