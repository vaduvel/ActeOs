schema_ref: ../../../contracts/rule.schema.json
batch_id: batch08.building_permit
event_type_id: ro.life.building_permit
required_facts:
- jurisdiction_id
- work_scope
- has_real_right
- has_urbanism_certificate
- cadastral_evidence_requirement_satisfied
- has_dt
- approvals_requirement_satisfied
- environmental_requirement_satisfied
- has_fee_proof
- protected_area
- application_complete
status: draft
rules:
- id: rule.building_permit.route.v1
  canonical_rule_id: rule.building_permit.route
  event_type_id: ro.life.building_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope:
  - building_permit
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: in
    field: work_scope
    values:
    - new_building
    - reconstruction
    - consolidation
    - modification
    - extension
    - rehabilitation
    - change_of_use_with_works
    - repair_not_exempt
  effects:
  - type: include_step
    step_id: obtain_urbanism_certificate
  - type: include_step
    step_id: complete_environmental_procedure
  - type: include_step
    step_id: obtain_required_approvals
  - type: include_step
    step_id: prepare_technical_documentation_dt
  - type: include_step
    step_id: pay_authorisation_fee
  - type: include_step
    step_id: submit_complete_permit_file
  - type: include_step
    step_id: receive_building_permit
  - type: emit_warning
    tag: do_not_start_before_permit
    message_ro: Lucrările nu se încep înaintea emiterii autorizației.
  source_claim_ids:
  - clm.building_permit.law50.permit_scope
  - clm.building_permit.law50.procedure_docs
  status: active
  reviewer_id: null
- id: rule.building_permit.missing_real_right.v1
  canonical_rule_id: rule.building_permit.missing_real_right
  event_type_id: ro.life.building_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: eq
    field: has_real_right
    value: false
  effects:
  - type: include_requirement
    requirement_id: proof_of_title_or_real_right
  source_claim_ids:
  - clm.building_permit.law50.required_docs
  status: active
  reviewer_id: null
- id: rule.building_permit.missing_cu.v1
  canonical_rule_id: rule.building_permit.missing_cu
  event_type_id: ro.life.building_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: eq
    field: has_urbanism_certificate
    value: false
  effects:
  - type: include_requirement
    requirement_id: urbanism_certificate
  source_claim_ids:
  - clm.building_permit.law50.required_docs
  status: active
  reviewer_id: null
- id: rule.building_permit.missing_cadastral.v1
  canonical_rule_id: rule.building_permit.missing_cadastral
  event_type_id: ro.life.building_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
