  - type: include_requirement
    requirement_id: environmental_authority_act_if_applicable
  source_claim_ids:
  - clm.building_permit.law50.required_docs
  status: active
  reviewer_id: null
- id: rule.building_permit.missing_fee_proof.v1
  canonical_rule_id: rule.building_permit.missing_fee_proof
  event_type_id: ro.life.building_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: eq
    field: has_fee_proof
    value: false
  effects:
  - type: include_requirement
