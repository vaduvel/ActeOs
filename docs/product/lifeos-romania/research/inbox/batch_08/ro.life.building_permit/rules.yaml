  source_claim_ids:
  - clm.building_permit.law50.required_docs
  status: active
  reviewer_id: null
- id: rule.building_permit.missing_environment.v1
  canonical_rule_id: rule.building_permit.missing_environment
  event_type_id: ro.life.building_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
