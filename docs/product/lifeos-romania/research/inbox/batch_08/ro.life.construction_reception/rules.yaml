    step_id: investor_requests_representatives_within_5_days
  - type: include_step
    step_id: set_reception_date_and_place
  - type: include_step
    step_id: collect_participant_responses
  - type: include_step
    step_id: appoint_reception_commission
  - type: emit_advice
    tag: participant_response_10_days
    message_ro: Reprezentanții solicitați răspund în 10 zile.
  - type: emit_advice
    tag: commission_appointment_max_3_days
    message_ro: Comisia se numește în maximum 3 zile după primirea răspunsurilor.
  source_claim_ids:
  - clm.construction_reception.regulation.notifications
  status: active
  reviewer_id: null
