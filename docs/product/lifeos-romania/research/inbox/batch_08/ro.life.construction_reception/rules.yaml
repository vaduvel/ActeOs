schema_ref: ../../../contracts/rule.schema.json
batch_id: batch08.construction_reception
event_type_id: ro.life.construction_reception
required_facts:
- jurisdiction_id
- works_completed
- executor_notified_investor
- reception_decision
- technical_book_complete
- permit_and_project_docs_complete
- isc_payment_confirmation_available
- energy_certificate_applicable
- energy_certificate_available
- tax_regularization_applicable
- tax_regularization_proof_available
- designer_and_site_manager_reports_available
- warranty_expired
status: draft
rules:
- id: rule.reception.not_completed.v1
  canonical_rule_id: rule.reception.not_completed
  event_type_id: ro.life.construction_reception
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: hotărâre a Guvernului
  severity: critical
  effective_from: '2017-07-29'
  effective_to: null
  when:
    op: eq
    field: works_completed
    value: false
  effects:
  - type: block
    code: works_not_completed
    message_ro: Recepția la terminarea lucrărilor nu se organizează înainte de finalizarea lucrărilor.
  - type: emit_advice
    tag: complete_works_before_reception
    message_ro: Finalizează lucrările autorizate înainte de inițierea recepției.
  source_claim_ids:
  - clm.construction_reception.regulation.general
  status: active
  reviewer_id: null
- id: rule.reception.completed_route.v1
  canonical_rule_id: rule.reception.completed_route
  event_type_id: ro.life.construction_reception
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: hotărâre a Guvernului
