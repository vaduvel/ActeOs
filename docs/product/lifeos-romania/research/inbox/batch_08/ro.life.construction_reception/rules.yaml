      field: works_completed
      value: true
    - op: eq
      field: executor_notified_investor
      value: false
  effects:
  - type: include_requirement
    requirement_id: written_executor_completion_notice
  - type: include_step
    step_id: obtain_executor_completion_notice
  source_claim_ids:
