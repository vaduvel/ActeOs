  - type: include_step
    step_id: remedy_rejection_causes
  - type: include_step
    step_id: restart_reception_after_remediation
  - type: emit_warning
    tag: reception_rejected
    message_ro: Recepția respinsă interzice folosirea construcției până la remediere și o nouă recepție.
  source_claim_ids:
  - clm.construction_reception.regulation.suspension
  - clm.construction_reception.regulation.use_after_admission
  status: active
  reviewer_id: null
