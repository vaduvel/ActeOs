- id: rule.reception.other_uat_finalization.v1
  canonical_rule_id: rule.reception.other_uat_finalization
  event_type_id: ro.life.construction_reception
  jurisdiction_ids:
  - ro
  authority_level: uat
  competence_scope: []
  legal_rank: procedură locală
  severity: operational
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: neq
      field: jurisdiction_id
      value: ro.tm.timisoara
    - op: eq
      field: reception_decision
      value: admitted
  effects:
  - type: include_step
    step_id: identify_local_post_reception_procedure
  - type: require_confirmation
    tag: confirm_local_post_reception_finalization
    message_ro: Procedura locală de finalizare/certificare după recepție trebuie confirmată la UAT.
  - type: emit_advice
    tag: verified_with_local_gap
    message_ro: Serviciul post-recepție verificat este cel al Timișoarei.
  source_claim_ids:
  - clm.construction_reception.pmt.finalization
  status: in_review
  reviewer_id: null
