    field: works_completed
    value: true
  effects:
  - type: include_step
    step_id: executor_notifies_completion_in_writing
  - type: include_step
    step_id: organise_reception_at_completion
  source_claim_ids:
  - clm.construction_reception.regulation.general
  - clm.construction_reception.regulation.notifications
  status: active
  reviewer_id: null
- id: rule.reception.executor_notice_missing.v1
  canonical_rule_id: rule.reception.executor_notice_missing
  event_type_id: ro.life.construction_reception
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: hotărâre a Guvernului
