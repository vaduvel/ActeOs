- id: rule.reception.suspended.v1
  canonical_rule_id: rule.reception.suspended
  event_type_id: ro.life.construction_reception
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: hotărâre a Guvernului
  severity: critical
  effective_from: '2017-07-29'
  effective_to: null
  when:
    op: eq
    field: reception_decision
    value: suspended
  effects:
  - type: include_step
    step_id: remedy_reception_defects_and_missing_documents
  - type: emit_warning
    tag: reception_suspended
    message_ro: Recepția este suspendată până la remediere.
  - type: emit_advice
    tag: suspension_communication_max_3_working_days
    message_ro: Suspendarea se comunică în maximum 3 zile lucrătoare.
  - type: emit_advice
    tag: remediation_max_90_days
    message_ro: Termenul de remediere este de maximum 90 de zile.
  - type: emit_advice
    tag: possible_external_factor_extension_max_90_days
    message_ro: Pentru factori independenți poate exista o prelungire de cel mult 90 de zile.
  - type: emit_warning
    tag: do_not_use_before_admission
    message_ro: Construcția nu se utilizează înainte de admiterea recepției.
  source_claim_ids:
  - clm.construction_reception.regulation.suspension
  - clm.construction_reception.regulation.use_after_admission
  status: active
  reviewer_id: null
- id: rule.reception.rejected.v1
