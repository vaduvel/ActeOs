  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: eq
    field: protected_area
    value: true
  effects:
  - type: include_requirement
    requirement_id: specific_heritage_and_protected_area_approvals
  - type: emit_warning
    tag: protected_demolition_special_route
