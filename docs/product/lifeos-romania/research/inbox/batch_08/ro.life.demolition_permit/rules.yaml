  source_claim_ids:
  - clm.demolition_permit.law50.docs_term
  status: active
  reviewer_id: null
- id: rule.demolition_permit.inconsistent_complete_file.v1
  canonical_rule_id: rule.demolition_permit.inconsistent_complete_file
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: application_complete
      value: true
    - op: any
      args:
      - op: eq
        field: has_real_right
        value: false
      - op: eq
        field: has_urbanism_certificate
        value: false
      - op: eq
        field: cadastral_evidence_requirement_satisfied
        value: false
      - op: eq
        field: has_dt
        value: false
      - op: eq
        field: approvals_requirement_satisfied
        value: false
      - op: eq
        field: environmental_requirement_satisfied
        value: false
      - op: eq
        field: has_fee_proof
        value: false
  effects:
  - type: override_rule
    rule_id: rule.demolition_permit.complete_file.v1
  - type: block
    code: inconsistent_complete_file
    message_ro: Dosarul de desființare nu poate fi tratat ca complet cât timp o cerință este nesatisfăcută.
  source_claim_ids:
  - clm.demolition_permit.law50.docs_term
  status: active
  reviewer_id: null
- id: rule.demolition_permit.complete_file.v1
  canonical_rule_id: rule.demolition_permit.complete_file
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: eq
    field: application_complete
    value: true
  effects:
  - type: emit_advice
    tag: demolition_decision_max_30_calendar_days
    message_ro: Termenul legal este de cel mult 30 de zile pentru documentația completă.
  source_claim_ids:
  - clm.demolition_permit.law50.docs_term
  status: active
  reviewer_id: null
- id: rule.demolition_permit.incomplete_file.v1
  canonical_rule_id: rule.demolition_permit.incomplete_file
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: eq
    field: application_complete
    value: false
  effects:
  - type: emit_advice
    tag: incomplete_notice_5_working_days
    message_ro: Lipsurile se notifică în 5 zile lucrătoare.
  - type: emit_advice
    tag: supplement_window_max_3_months
    message_ro: Completările se depun în maximum 3 luni.
  source_claim_ids:
  - clm.demolition_permit.law50.incomplete
  status: active
  reviewer_id: null
- id: rule.demolition_permit.protected.v1
  canonical_rule_id: rule.demolition_permit.protected
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
