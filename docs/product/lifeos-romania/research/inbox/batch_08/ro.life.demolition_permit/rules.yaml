  effects:
  - type: include_requirement
    requirement_id: urbanism_certificate
  source_claim_ids:
  - clm.demolition_permit.law50.docs_term
  status: active
  reviewer_id: null
- id: rule.demolition_permit.missing_cadastral.v1
  canonical_rule_id: rule.demolition_permit.missing_cadastral
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: eq
    field: cadastral_evidence_requirement_satisfied
    value: false
  effects:
  - type: include_requirement
    requirement_id: current_cadastral_plan_and_land_book_extract_if_applicable
  source_claim_ids:
  - clm.demolition_permit.law50.docs_term
  status: active
  reviewer_id: null
- id: rule.demolition_permit.missing_dt.v1
  canonical_rule_id: rule.demolition_permit.missing_dt
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
