  source_claim_ids:
  - clm.demolition_permit.law50.docs_term
  status: active
  reviewer_id: null
- id: rule.demolition_permit.missing_fee.v1
  canonical_rule_id: rule.demolition_permit.missing_fee
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: eq
    field: has_fee_proof
    value: false
  effects:
  - type: include_requirement
