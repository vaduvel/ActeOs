schema_ref: ../../../contracts/rule.schema.json
batch_id: batch08.demolition_permit
event_type_id: ro.life.demolition_permit
required_facts:
- jurisdiction_id
- demolition_scope
- replacement_building_planned
- has_real_right
- has_urbanism_certificate
- cadastral_evidence_requirement_satisfied
- has_dt
- approvals_requirement_satisfied
- environmental_requirement_satisfied
- has_fee_proof
- protected_area
- application_complete
status: draft
rules:
- id: rule.demolition_permit.route.v1
  canonical_rule_id: rule.demolition_permit.route
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: in
    field: demolition_scope
    values:
    - partial
    - total
    - decommission
    - disassembly
  effects:
  - type: include_step
    step_id: obtain_urbanism_certificate
  - type: include_step
    step_id: complete_environmental_procedure
  - type: include_step
    step_id: obtain_required_approvals
  - type: include_step
    step_id: prepare_demolition_technical_documentation
  - type: include_step
    step_id: pay_authorisation_fee
  - type: include_step
    step_id: submit_demolition_permit_file
  - type: include_step
    step_id: receive_demolition_permit
  - type: emit_warning
    tag: do_not_demolish_before_permit
    message_ro: Desființarea nu începe înaintea autorizației.
  source_claim_ids:
  - clm.demolition_permit.law50.demolition_required
  - clm.demolition_permit.law50.docs_term
  status: active
  reviewer_id: null
- id: rule.demolition_permit.combined.v1
  canonical_rule_id: rule.demolition_permit.combined
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: eq
    field: replacement_building_planned
    value: true
  effects:
  - type: emit_advice
    tag: single_combined_authorisation
    message_ro: Demolarea și construcția nouă pot fi aprobate printr-o singură autorizație.
  - type: emit_advice
    tag: only_building_fee_for_combined_case
    message_ro: Pentru autorizația combinată se percepe numai taxa pentru construire.
  - type: trigger_child_event
    event_type_id: ro.life.building_permit
  source_claim_ids:
  - clm.demolition_permit.law50.combined_authorisation
  status: active
  reviewer_id: null
- id: rule.demolition_permit.missing_real_right.v1
  canonical_rule_id: rule.demolition_permit.missing_real_right
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
  legal_rank: lege
  severity: critical
  effective_from: '2026-03-27'
  effective_to: null
  when:
    op: eq
    field: has_real_right
    value: false
  effects:
  - type: include_requirement
    requirement_id: proof_of_title_or_real_right
  source_claim_ids:
  - clm.demolition_permit.law50.docs_term
  status: active
  reviewer_id: null
- id: rule.demolition_permit.missing_cu.v1
  canonical_rule_id: rule.demolition_permit.missing_cu
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  competence_scope: []
