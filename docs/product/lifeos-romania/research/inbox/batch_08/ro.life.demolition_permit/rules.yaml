- id: rule.demolition_permit.timisoara_channel_gap.v1
  canonical_rule_id: rule.demolition_permit.timisoara_channel_gap
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro.tm.timisoara
  authority_level: uat
  competence_scope: []
  legal_rank: pagină oficială expirată
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: eq
    field: jurisdiction_id
    value: ro.tm.timisoara
  effects:
  - type: emit_advice
    tag: timisoara_archived_permit_service
    message_ro: Pagina serviciului indică încheierea disponibilității în 2024.
  - type: require_confirmation
    tag: confirm_current_timisoara_demolition_submission_channel
    message_ro: Canalul actual de depunere trebuie confirmat la Primăria Timișoara.
  source_claim_ids:
  - clm.demolition_permit.pmt.permit_page_expired
  status: in_review
  reviewer_id: null
- id: rule.demolition_permit.other_uat.v1
  canonical_rule_id: rule.demolition_permit.other_uat
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: uat
  competence_scope: []
  legal_rank: procedură locală
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: neq
    field: jurisdiction_id
    value: ro.tm.timisoara
  effects:
  - type: include_step
    step_id: identify_authorising_local_authority
  - type: require_confirmation
    tag: confirm_local_demolition_submission_channel
    message_ro: Canalul și procedura locală trebuie confirmate.
  - type: emit_advice
    tag: verified_with_local_gap
    message_ro: Pilotul local este Timișoara.
  source_claim_ids:
  - clm.demolition_permit.law50.demolition_required
  status: in_review
  reviewer_id: null
- id: rule.demolition_permit.fee_amount_gap.v1
  canonical_rule_id: rule.demolition_permit.fee_amount_gap
  event_type_id: ro.life.demolition_permit
  jurisdiction_ids:
  - ro
  authority_level: uat
  competence_scope: []
  legal_rank: taxă locală
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: const
    value: true
  effects:
  - type: require_confirmation
    tag: confirm_current_local_demolition_fee_amount
    message_ro: Cuantumul taxei trebuie confirmat pentru speța concretă; regula autorizației combinate se aplică separat.
  source_claim_ids:
  - clm.demolition_permit.law50.combined_authorisation
  - clm.demolition_permit.law50.docs_term
  status: in_review
  reviewer_id: null
