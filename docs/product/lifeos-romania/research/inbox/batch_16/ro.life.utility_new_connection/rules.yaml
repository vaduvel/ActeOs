schema_version: '1.0'
schema_ref: contracts/rule.schema.json
batch_id: B16_UTILITY_NEW_CONNECTION
event_type_id: ro.life.utility_new_connection
reference_date: '2026-06-25'
status: in_review
required_facts:
- utility_type
- pilot_area
- existing_connection_status
- applicant_role
- title_or_use_document_status
- owner_consent_status
- operator_code
- technical_approval_status
- network_extension_needed
- operator_contract_status
rules:
- id: rule.unc.classify
  canonical_rule_id: utility_new_connection.classify
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: const
    value: true
  effects:
  - type: include_step
    step_id: classify_utility_location_and_existing_connection
  - type: emit_advice
    tag: new_connection_is_multistage
    message_ro: Separă eligibilitatea și avizul de contract, execuție, recepție și activare.
  source_claim_ids:
  - claim.unc.electricity_stages
  - claim.unc.water_three_steps
  - claim.unc.gas_steps
  status: in_review
- id: rule.unc.utility_unknown
  canonical_rule_id: utility_new_connection.utility_unknown
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: utility_type
    value: unknown
  effects:
  - type: include_step
    step_id: identify_requested_utility
  - type: require_confirmation
    tag: utility_type
    message_ro: 'Confirmă utilitatea: electricitate, gaze, apă/canal, termoficare sau internet fix.'
  source_claim_ids:
  - claim.unc.electricity_stages
  - claim.unc.water_three_steps
  - claim.unc.gas_steps
  status: in_review
- id: rule.unc.existing_active
  canonical_rule_id: utility_new_connection.existing_active
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: existing_connection_status
    value: existing_active
  effects:
  - type: include_step
    step_id: verify_existing_point_and_contract
  - type: emit_warning
    tag: new_connection_may_be_wrong_route
    message_ro: Un racord activ indică de regulă o problemă de contract, titular sau furnizare, nu un racord nou.
  - type: block
    tag: duplicate_new_connection_route
    message_ro: Nu porni automat o a doua racordare fără confirmarea operatorului.
  source_claim_ids:
  - claim.unc.electricity_stages
  - claim.unc.water_three_steps
  status: in_review
- id: rule.unc.existing_inactive
  canonical_rule_id: utility_new_connection.existing_inactive
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: existing_connection_status
    value: existing_inactive
  effects:
  - type: include_step
    step_id: request_operator_reactivation_or_new_connection_assessment
  - type: require_confirmation
    tag: reactivation_vs_new_connection
    message_ro: Operatorul trebuie să stabilească dacă se reactivează racordul existent sau se deschide unul nou.
  source_claim_ids:
  - claim.unc.heat_case_specific
  - claim.unc.electricity_stages
  status: in_review
- id: rule.unc.existing_unknown
  canonical_rule_id: utility_new_connection.existing_unknown
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: existing_connection_status
    value: unknown
  effects:
  - type: require_confirmation
    tag: existing_connection_status
    message_ro: Verifică dacă există deja branșament/racord și dacă este activ.
  source_claim_ids:
  - claim.unc.water_three_steps
  status: in_review
- id: rule.unc.title_missing
  canonical_rule_id: utility_new_connection.title_missing
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro.tm
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: water_sewer
    - op: eq
      field: operator_code
      value: aquatim
    - op: eq
      field: title_or_use_document_status
      value: unavailable
  effects:
  - type: block
    tag: title_or_use_evidence_missing
    message_ro: Dosarul Aquatim nu poate fi finalizat fără actul aplicabil privind imobilul sau folosința.
  - type: include_requirement
    requirement_id: req.title_or_use_document
  source_claim_ids:
  - claim.unc.water_property_and_consent
  status: in_review
- id: rule.unc.title_missing_other
  canonical_rule_id: utility_new_connection.title_missing_other
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: title_or_use_document_status
      value: unavailable
    - op: not
      arg:
        op: all
        args:
        - op: eq
          field: utility_type
          value: water_sewer
        - op: eq
          field: operator_code
          value: aquatim
  effects:
  - type: require_confirmation
    tag: operator_title_or_use_document
    message_ro: Confirmă la operatorul competent ce dovadă asupra imobilului sau folosinței este obligatorie; rulesetul nu
      extrapolează lista Aquatim.
  source_claim_ids:
  - claim.unc.electricity_document_hub
  - claim.unc.gas_steps
  - claim.unc.heat_case_specific
  status: in_review
- id: rule.unc.title_unknown
  canonical_rule_id: utility_new_connection.title_unknown
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: title_or_use_document_status
    value: unknown
  effects:
  - type: require_confirmation
    tag: title_or_use_document
    message_ro: Confirmă ce act dovedește proprietatea sau folosința imobilului.
  source_claim_ids:
  - claim.unc.water_approval_submission
  status: in_review
- id: rule.unc.applicant_unknown
  canonical_rule_id: utility_new_connection.applicant_unknown
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: applicant_role
    value: unknown
  effects:
  - type: require_confirmation
    tag: applicant_role
    message_ro: Stabilește dacă solicitantul este proprietar, chiriaș/utilizator, societate, asociație sau dezvoltator.
  source_claim_ids:
  - claim.unc.water_three_steps
  status: in_review
- id: rule.unc.tenant_consent_missing
  canonical_rule_id: utility_new_connection.tenant_consent_missing
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro.tm
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: water_sewer
    - op: eq
      field: operator_code
      value: aquatim
    - op: eq
      field: applicant_role
      value: tenant_user
    - op: eq
      field: owner_consent_status
      value: unavailable
  effects:
  - type: block
    tag: owner_consent_missing
    message_ro: Pentru ruta Aquatim pe numele chiriașului este publicat acordul scris al proprietarului.
  - type: include_requirement
    requirement_id: req.owner_written_consent
  source_claim_ids:
  - claim.unc.water_property_and_consent
  status: in_review
- id: rule.unc.tenant_consent_missing_other
  canonical_rule_id: utility_new_connection.tenant_consent_missing_other
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: applicant_role
      value: tenant_user
    - op: eq
      field: owner_consent_status
      value: unavailable
    - op: not
      arg:
        op: all
        args:
        - op: eq
          field: utility_type
          value: water_sewer
        - op: eq
          field: operator_code
          value: aquatim
  effects:
  - type: require_confirmation
    tag: operator_owner_consent_requirement
    message_ro: Confirmă direct la operator dacă este obligatoriu acordul proprietarului și forma acceptată.
  source_claim_ids:
  - claim.unc.electricity_document_hub
  - claim.unc.gas_steps
  - claim.unc.heat_case_specific
  status: in_review
- id: rule.unc.tenant_consent_unknown
  canonical_rule_id: utility_new_connection.tenant_consent_unknown
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: applicant_role
      value: tenant_user
    - op: eq
      field: owner_consent_status
      value: unknown
  effects:
  - type: require_confirmation
    tag: owner_consent_requirement
    message_ro: Confirmă dacă operatorul cere acordul proprietarului și în ce formă.
  source_claim_ids:
  - claim.unc.water_contract_15
  status: in_review
- id: rule.unc.extension_unknown
  canonical_rule_id: utility_new_connection.extension_unknown
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: network_extension_needed
    value: unknown
  effects:
  - type: require_confirmation
    tag: network_extension_need
    message_ro: Operatorul trebuie să stabilească dacă este suficient un branșament sau este necesară extinderea rețelei.
  source_claim_ids:
  - claim.unc.water_extension_docs
  - claim.unc.electricity_atr_30
  status: in_review
- id: rule.unc.operator_mismatch
  canonical_rule_id: utility_new_connection.operator_mismatch
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: any
    args:
    - op: all
      args:
      - op: eq
        field: utility_type
        value: electricity
      - op: not
        arg:
          op: in
          field: operator_code
          values:
          - retele_electrice
          - other
          - unknown
    - op: all
      args:
      - op: eq
        field: utility_type
        value: water_sewer
      - op: not
        arg:
          op: in
          field: operator_code
          values:
          - aquatim
          - other
          - unknown
    - op: all
      args:
      - op: eq
        field: utility_type
        value: natural_gas
      - op: not
        arg:
          op: in
          field: operator_code
          values:
          - gas_operator_confirmed
          - other
          - unknown
    - op: all
      args:
      - op: eq
        field: utility_type
        value: district_heat
      - op: not
        arg:
          op: in
          field: operator_code
          values:
          - colterm
          - other
          - unknown
    - op: all
      args:
      - op: eq
        field: utility_type
        value: fixed_internet
      - op: not
        arg:
          op: in
          field: operator_code
          values:
          - digi
          - orange
          - other
          - unknown
  effects:
  - type: block
    tag: operator_utility_mismatch
    message_ro: Operatorul selectat nu corespunde utilității; oprește checklistul pentru a evita documente greșite.
  - type: include_step
    step_id: correct_utility_operator_pair
  source_claim_ids:
  - claim.unc.electricity_stages
  - claim.unc.water_three_steps
  - claim.unc.gas_operator_lookup
  status: in_review
- id: rule.unc.electric_operator_unknown
  canonical_rule_id: utility_new_connection.electric_operator_unknown
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: electricity
    - op: eq
      field: operator_code
      value: unknown
  effects:
  - type: include_step
    step_id: identify_electricity_distribution_operator
  - type: require_confirmation
    tag: electricity_operator
    message_ro: Confirmă operatorul de distribuție pentru adresă înainte de a aplica termenele Rețele Electrice.
  source_claim_ids:
  - claim.unc.electricity_channels
  status: in_review
- id: rule.unc.electric_other_operator
  canonical_rule_id: utility_new_connection.electric_other_operator
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: electricity
    - op: eq
      field: operator_code
      value: other
  effects:
  - type: include_step
    step_id: obtain_electric_operator_live_connection_route
  - type: require_confirmation
    tag: electric_operator_specific_rules
    message_ro: Nu extrapola termenele și formularele Rețele Electrice altui operator.
  source_claim_ids:
  - claim.unc.electricity_review_10
  - claim.unc.electricity_atr_30
  status: in_review
- id: rule.unc.electric_start
  canonical_rule_id: utility_new_connection.electric_start
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: electricity
    - op: eq
      field: operator_code
      value: retele_electrice
    - op: eq
      field: technical_approval_status
      value: not_requested
  effects:
  - type: include_step
    step_id: submit_electricity_connection_request_and_documents
  - type: attach_channel
    channel_id: ch.retele_electrice_connection
  - type: include_requirement
    requirement_id: req.official_electricity_atr_document_set
  - type: emit_advice
    tag: electric_review_10_working_days
    message_ro: Operatorul publică maximum 10 zile lucrătoare pentru evaluarea cererii/documentației.
  - type: emit_advice
    tag: electric_atr_stage_30_calendar_days
    message_ro: Operatorul publică 30 de zile calendaristice pentru etapa de stabilire a soluției și ATR.
  - type: emit_warning
    tag: electric_cost_not_fixed
    message_ro: Costul se stabilește prin soluția tehnică și contract; nu există un preț universal în ruleset.
  source_claim_ids:
  - claim.unc.electricity_channels
  - claim.unc.electricity_document_hub
  - claim.unc.electricity_review_10
  - claim.unc.electricity_atr_30
  - claim.unc.electricity_cost_in_contract
  status: in_review
- id: rule.unc.electric_requested
  canonical_rule_id: utility_new_connection.electric_requested
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: operational
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: electricity
    - op: eq
      field: operator_code
      value: retele_electrice
    - op: eq
      field: technical_approval_status
      value: requested
  effects:
  - type: include_step
    step_id: track_electricity_document_review_and_atr
  - type: attach_channel
    channel_id: ch.retele_electrice_connection
  - type: emit_advice
    tag: electric_review_10_working_days
    message_ro: Verificarea documentației este publicată cu maximum 10 zile lucrătoare.
  source_claim_ids:
  - claim.unc.electricity_review_10
  status: in_review
- id: rule.unc.electric_contract
  canonical_rule_id: utility_new_connection.electric_contract
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: electricity
    - op: eq
      field: operator_code
      value: retele_electrice
    - op: eq
      field: technical_approval_status
      value: issued
    - op: in
      field: operator_contract_status
      values:
      - not_started
      - pending
      - unknown
  effects:
  - type: include_step
    step_id: request_and_sign_electricity_connection_contract
  - type: emit_advice
    tag: electric_contract_proposal_5_working_days
    message_ro: Pentru date complete și corecte, pagina publică maximum cinci zile lucrătoare pentru contractul propus.
  - type: emit_warning
    tag: electric_contract_contains_costs
    message_ro: Folosește suma și condițiile din contractul emis pentru cazul concret.
  source_claim_ids:
  - claim.unc.electricity_contract_5
  - claim.unc.electricity_cost_in_contract
  status: in_review
- id: rule.unc.electric_ready
  canonical_rule_id: utility_new_connection.electric_ready
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: electricity
    - op: eq
      field: operator_code
      value: retele_electrice
    - op: eq
      field: technical_approval_status
      value: issued
    - op: eq
      field: operator_contract_status
      value: signed
  effects:
  - type: include_step
    step_id: handoff_to_electricity_connection_construction
  - type: trigger_child_event
    event_type_id: ro.life.utility_connection_construction
  source_claim_ids:
  - claim.unc.electricity_stages
  status: in_review
- id: rule.unc.water_unknown_operator
  canonical_rule_id: utility_new_connection.water_unknown_operator
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro.tm
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: water_sewer
    - op: eq
      field: operator_code
      value: unknown
  effects:
  - type: include_step
    step_id: identify_water_sewer_operator
  - type: require_confirmation
    tag: water_operator
    message_ro: Confirmă operatorul de apă/canal pentru localitate și adresă.
  source_claim_ids:
  - claim.unc.water_three_steps
  status: in_review
- id: rule.unc.water_other_operator
  canonical_rule_id: utility_new_connection.water_other_operator
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: water_sewer
    - op: eq
      field: operator_code
      value: other
  effects:
  - type: include_step
    step_id: obtain_local_water_operator_route
  - type: require_confirmation
    tag: local_water_checklist
    message_ro: Checklistul Aquatim nu se aplică automat altui operator sau UAT.
  source_claim_ids:
  - claim.unc.water_three_steps
  status: in_review
- id: rule.unc.water_start
  canonical_rule_id: utility_new_connection.water_start
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro.tm
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: water_sewer
    - op: eq
      field: operator_code
      value: aquatim
    - op: eq
      field: technical_approval_status
      value: not_requested
  effects:
  - type: include_step
    step_id: submit_aquatim_technical_approval_file
  - type: attach_channel
    channel_id: ch.aquatim_technical_approval
  - type: include_requirement
    requirement_id: req.aquatim_technical_approval_request
  - type: include_requirement
    requirement_id: req.aquatim_specific_annexes
  - type: include_requirement
    requirement_id: req.aquatim_gdpr_consent
  - type: emit_advice
    tag: aquatim_approval_fee_84_70
    message_ro: La data accesării, Aquatim publică taxa de avizare de 84,70 lei cu TVA, plătibilă pe factura emisă după înregistrare.
  - type: emit_warning
    tag: aquatim_fee_recheck_at_payment
    message_ro: Reverifică suma pe factura curentă înainte de plată.
  source_claim_ids:
  - claim.unc.water_approval_submission
  - claim.unc.water_approval_fee
  status: in_review
- id: rule.unc.water_requested
  canonical_rule_id: utility_new_connection.water_requested
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro.tm
  authority_level: institution
  severity: operational
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: water_sewer
    - op: eq
      field: operator_code
      value: aquatim
    - op: eq
      field: technical_approval_status
      value: requested
  effects:
  - type: include_step
    step_id: track_aquatim_technical_approval_and_invoice
  - type: attach_channel
    channel_id: ch.aquatim_technical_approval
  - type: emit_warning
    tag: approval_not_issued_yet
    message_ro: Nu porni proiectarea sau execuția ca și cum avizul ar fi emis.
  source_claim_ids:
  - claim.unc.water_approval_submission
  - claim.unc.water_approval_fee
  status: in_review
- id: rule.unc.water_contract
  canonical_rule_id: utility_new_connection.water_contract
  event_type_id: ro.life.utility_new_connection
  jurisdiction_ids:
  - ro.tm
  authority_level: institution
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: utility_type
      value: water_sewer
    - op: eq
      field: operator_code
      value: aquatim
    - op: eq
      field: technical_approval_status
      value: issued
    - op: in
      field: operator_contract_status
      values:
      - not_started
      - pending
      - unknown
  effects:
  - type: include_step
    step_id: submit_or_complete_aquatim_service_contract
  - type: attach_channel
    channel_id: ch.aquatim_contract
