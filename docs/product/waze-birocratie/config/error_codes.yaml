version: 1
codes:
  route.bundle_not_found: No publicabil rule bundle matches intent, jurisdiction and date.
  route.bundle_expired: The critical rule bundle is past hard expiry.
  route.conflict_unresolved: Critical source or legal conflict blocks a verified route.
  route.missing_facts: Additional typed facts are required.
  route.cycle_detected: Rule graph is invalid and cannot be published.
  journey.not_found: Journey does not exist in the current ownership context.
  journey.concurrent_update: Journey changed since the client version.
  content.provenance_missing: Critical rule path has no approved source claim.
  content.self_approval_forbidden: Author cannot approve the same high-risk change.
  content.review_count_insufficient: Required independent approvals are missing.
  source.fetch_blocked: Source fetch violates safety or policy.
  source.changed_critical: A critical source change requires immediate review.
  document.unreadable: The local image is insufficiently readable.
  document.wrong_type: The imported document does not match the requirement.
  document.expired: The document is expired at the relevant date.
  document.signature_missing: A required signature was not detected.
  document.signature_unable_to_check: The analyzer cannot reliably determine signature presence.
  document.page_missing: One or more expected pages are missing.
  document.outside_validity_window: The document is too early or too old for the required event.
  integration.not_configured: Adapter exists but official configuration or approval is absent.
  privacy.consent_required: The operation requires explicit consent.
