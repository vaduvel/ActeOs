version: 1
server_data:
  anonymous_device_identity:
    retention: until_user_delete_or_24_months_inactive
  active_journey_metadata:
    retention: until_user_delete_or_24_months_inactive
  encrypted_facts:
    retention: journey_lifetime
  document_images:
    retention: never_by_default
  raw_ocr:
    retention: never_by_default
  confirmed_minimized_document_metadata:
    retention: opt_in_and_journey_lifetime
  audit_events:
    retention: 6_years_or_legal_policy
    pii_policy: no_raw_pii
  source_snapshots:
    retention: evidence_policy_and_legal_review
  analytics:
    retention: 13_months
    pii_policy: aggregate_or_pseudonymous_only
client_data:
  imported_documents:
    retention: user_controlled
  ocr_cache:
    retention: delete_after_analysis_or_user_choice
  encryption: android_keystore_backed
