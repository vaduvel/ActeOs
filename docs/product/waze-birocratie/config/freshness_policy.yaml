version: 1
classes:
  critical:
    examples: [eligibility, required_document, deadline, fee, selection_criterion, legal_basis]
    default_review_interval_days: 30
    active_campaign_review_interval_days: 7
    on_hard_expiry: block
    failed_fetch_extends_freshness: false
  operational:
    examples: [address, schedule, phone, appointment_link]
    default_review_interval_days: 30
    on_hard_expiry: needs_confirmation
    failed_fetch_extends_freshness: false
  explanatory:
    examples: [background, glossary, nonbinding_help]
    default_review_interval_days: 365
    on_hard_expiry: warn
    failed_fetch_extends_freshness: false
