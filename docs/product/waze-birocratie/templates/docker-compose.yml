name: waze-birocratie
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: waze_birocratie
      POSTGRES_USER: waze
      POSTGRES_PASSWORD: waze_local_only
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waze -d waze_birocratie"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: local-only-change-me
      MINIO_ROOT_PASSWORD: local-only-change-me
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
  mailpit:
    image: axllent/mailpit:latest
    ports: ["1025:1025", "8025:8025"]
  api:
    profiles: ["app"]
    build: ./services/api
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
    ports: ["8000:8000"]
  worker:
    profiles: ["app"]
    build: ./services/worker
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
  curator:
    profiles: ["app"]
    build: ./apps/curator
    env_file: .env
    ports: ["3000:3000"]
    depends_on:
      api: {condition: service_started}
volumes:
  postgres_data: {}
  minio_data: {}
