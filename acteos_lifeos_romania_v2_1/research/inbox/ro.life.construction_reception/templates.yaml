# Step & requirement templates for ro.life.construction_reception (life.construction_reception).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: executor_notifies_completion_in_writing
    semantic_key: executor_notifies_completion_in_writing
    title_ro: "Executorul notifica in scris terminarea lucrarilor"
    instruction_ro: >-
      Dupa finalizarea lucrarilor, obtine notificarea scrisa a executorului catre investitor sau proprietar.
    sequence_hint: 10
    completion_evidence_ro:
      - "Notificarea scrisa a executorului este disponibila"
    recovery_actions_ro:
      - "Daca lipseste notificarea, cere-o inainte de organizarea receptiei"
    status: draft

  - id: organise_reception_at_completion
    semantic_key: organise_reception_at_completion
    title_ro: "Organizeaza receptia la terminarea lucrarilor"
    instruction_ro: >-
      Dupa confirmarea terminarii lucrarilor, porneste organizarea receptiei la terminare.
    sequence_hint: 20
    completion_evidence_ro:
      - "Ruta pentru receptia la terminare a fost pornita"
    recovery_actions_ro:
      - "Daca lucrarile nu sunt finalizate complet, nu porni receptia"
    status: draft

  - id: obtain_executor_completion_notice
    semantic_key: obtain_executor_completion_notice
    title_ro: "Obtine notificarea de terminare de la executor"
    instruction_ro: >-
      Daca executorul nu a notificat inca in scris, obtine documentul de terminare inainte de restul pasilor.
    sequence_hint: 30
    completion_evidence_ro:
      - "Notificarea de terminare a fost obtinuta"
    recovery_actions_ro:
      - "Daca executorul nu confirma terminarea, nu continua receptia"
    status: draft

  - id: investor_requests_representatives_within_5_days
    semantic_key: investor_requests_representatives_within_5_days
    title_ro: "Solicita reprezentantii pentru receptie"
    instruction_ro: >-
      Dupa notificarea terminarii, investitorul solicita participantii si reprezentantii necesari pentru receptie.
    sequence_hint: 40
    completion_evidence_ro:
      - "Solicitarea participantilor la receptie a fost pregatita"
    recovery_actions_ro:
      - "Daca participantii relevanti nu sunt identificati, clarifica lista inainte de programare"
    status: draft

  - id: set_reception_date_and_place
    semantic_key: set_reception_date_and_place
    title_ro: "Stabileste data si locul receptiei"
    instruction_ro: >-
      Stabileste data si locul receptiei dupa demararea procedurii de convocare.
    sequence_hint: 50
    completion_evidence_ro:
      - "Data si locul receptiei sunt stabilite"
    recovery_actions_ro:
      - "Daca nu exista confirmari suficiente, reprogrameaza etapa"
    status: draft

  - id: collect_participant_responses
    semantic_key: collect_participant_responses
    title_ro: "Colecteaza raspunsurile participantilor"
    instruction_ro: >-
      Urmareste raspunsurile participantilor chemati la receptie si integreaza clarificarile lor.
    sequence_hint: 60
    completion_evidence_ro:
      - "Raspunsurile participantilor au fost colectate"
    recovery_actions_ro:
      - "Daca lipsesc raspunsuri esentiale, urmareste-le inainte de receptie"
    status: draft

  - id: appoint_reception_commission
    semantic_key: appoint_reception_commission
    title_ro: "Numeste comisia de receptie"
    instruction_ro: >-
      Formeaza comisia de receptie potrivit procedurii aplicabile dupa etapa de convocare.
    sequence_hint: 70
    completion_evidence_ro:
      - "Comisia de receptie a fost desemnata"
    recovery_actions_ro:
      - "Daca nu sunt disponibile persoanele necesare, nu finaliza convocarea"
    status: draft

  - id: remedy_reception_defects_and_missing_documents
    semantic_key: remedy_reception_defects_and_missing_documents
    title_ro: "Remediaza defectele si lipsurile constatate la receptie"
    instruction_ro: >-
      Daca receptia este suspendata, remediaza defectele si completeaza documentele lipsa inainte de reluare.
    sequence_hint: 80
    completion_evidence_ro:
      - "Ruta de remediere dupa suspendare este clarificata"
    recovery_actions_ro:
      - "Daca motivele suspendarii nu sunt clare, cere detalii inainte de remediere"
    status: draft

  - id: remedy_rejection_causes
    semantic_key: remedy_rejection_causes
    title_ro: "Remediaza cauzele respingerii"
    instruction_ro: >-
      Daca receptia este respinsa, identifica si remediaza cauzele inainte de reluarea procedurii.
    sequence_hint: 90
    completion_evidence_ro:
      - "Cauzele respingerii au fost identificate pentru remediere"
    recovery_actions_ro:
      - "Daca nu stii exact ce a fost respins, cere documentul complet al deciziei"
    status: draft

  - id: restart_reception_after_remediation
    semantic_key: restart_reception_after_remediation
    title_ro: "Reia receptia dupa remediere"
    instruction_ro: >-
      Dupa remedierea cauzelor de respingere, reia receptia pe traseul procedural relevant.
    sequence_hint: 100
    completion_evidence_ro:
      - "Ruta de reluare a receptiei este pregatita"
    recovery_actions_ro:
      - "Daca remedierile nu sunt complete, nu relua receptia"
    status: draft

  - id: investor_approves_and_signs_minutes_within_3_days
    semantic_key: investor_approves_and_signs_minutes_within_3_days
    title_ro: "Investitorul aproba si semneaza procesul-verbal"
    instruction_ro: >-
      Daca receptia este admisa, urmareste aprobarea si semnarea procesului-verbal pe traseul prevazut.
    sequence_hint: 110
    completion_evidence_ro:
      - "Procesul-verbal de receptie este aprobat sau semnat"
    recovery_actions_ro:
      - "Daca lipseste forma finala a procesului-verbal, nu continua etapa de predare"
    status: draft

  - id: communicate_reception_minutes_within_5_days
    semantic_key: communicate_reception_minutes_within_5_days
    title_ro: "Comunica procesul-verbal de receptie"
    instruction_ro: >-
      Comunica procesul-verbal de receptie catre partile sau autoritatile relevante, dupa admitere.
    sequence_hint: 120
    completion_evidence_ro:
      - "Procesul-verbal de receptie a fost pregatit pentru comunicare"
    recovery_actions_ro:
      - "Daca lista destinatarilor nu este clara, confirma-o inainte de trimitere"
    status: draft

  - id: take_over_construction
    semantic_key: take_over_construction
    title_ro: "Preia constructia"
    instruction_ro: >-
      Dupa receptia admisa, formalizeaza preluarea constructiei conform traseului procedural.
    sequence_hint: 130
    completion_evidence_ro:
      - "Constructia a fost pregatita pentru preluare"
    recovery_actions_ro:
      - "Daca receptia nu este admisa, nu marca preluarea ca finalizata"
    status: draft

  - id: obtain_use_authorisations_if_required
    semantic_key: obtain_use_authorisations_if_required
    title_ro: "Obtine autorizatiile de folosire, daca sunt cerute"
    instruction_ro: >-
      Dupa receptia admisa, verifica daca sunt necesare autorizatii suplimentare pentru utilizarea
      constructiei.
    sequence_hint: 140
    completion_evidence_ro:
      - "Necesitatea autorizatiilor de folosire a fost verificata"
    recovery_actions_ro:
      - "Daca sunt necesare autorizatii suplimentare, nu folosi constructia fara ele"
    status: draft

  - id: organise_final_reception_within_10_days_after_warranty
    semantic_key: organise_final_reception_within_10_days_after_warranty
    title_ro: "Organizeaza receptia finala dupa expirarea garantiei"
    instruction_ro: >-
      Dupa expirarea garantiei, pregateste receptia finala pe ruta prevazuta.
    sequence_hint: 150
    completion_evidence_ro:
      - "Ruta pentru receptia finala a fost evaluata"
    recovery_actions_ro:
      - "Daca garantia nu a expirat, nu activa receptia finala"
    status: draft

  - id: submit_timisoara_work_finalization_file
    semantic_key: submit_timisoara_work_finalization_file
    title_ro: "Depune dosarul de finalizare a lucrarilor in Timisoara"
    instruction_ro: >-
      Pentru Timisoara, pregateste dosarul de finalizare a lucrarilor dupa admiterea receptiei.
    sequence_hint: 160
    completion_evidence_ro:
      - "Dosarul de finalizare din Timisoara este pregatit sau depus"
    recovery_actions_ro:
      - "Daca lipsesc actele cerute local, completeaza-le inainte de depunere"
    status: draft

  - id: identify_local_post_reception_procedure
    semantic_key: identify_local_post_reception_procedure
    title_ro: "Identifica procedura locala de dupa receptie"
    instruction_ro: >-
      Pentru alte UAT-uri, identifica procedura locala de finalizare dupa admiterea receptiei.
    sequence_hint: 170
    completion_evidence_ro:
      - "Procedura locala de dupa receptie a fost identificata"
    recovery_actions_ro:
      - "Daca procedura locala nu este confirmata, nu presupune traseul din Timisoara"
    status: draft

requirement_templates:
  - id: written_executor_completion_notice
    title_ro: "Notificare scrisa de terminare din partea executorului"
    description_ro: >-
      Notificarea scrisa prin care executorul anunta terminarea lucrarilor.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Notificare scrisa a executorului"
    readiness_checks:
      - "Notificarea terminarii lucrarilor este disponibila"
    status: draft

  - id: permit_project_execution_and_as_built_documents
    title_ro: "Autorizatia, proiectul de executie si documentele as-built"
    description_ro: >-
      Setul de documente tehnice si juridice folosit la receptia constructiei.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Autorizatie"
      - "Proiect de executie"
      - "Documente as-built"
    readiness_checks:
      - "Documentele de proiect si executie sunt complete"
    status: draft

  - id: complete_technical_book
    title_ro: "Cartea tehnica completa"
    description_ro: >-
      Cartea tehnica a constructiei, completa pentru receptie.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Cartea tehnica a constructiei"
    readiness_checks:
      - "Cartea tehnica este completa pentru receptie"
    status: draft

  - id: isc_payment_confirmation
    title_ro: "Confirmare de plata catre ISC"
    description_ro: >-
      Confirmarea platii relevante catre ISC, daca este ceruta pentru receptie.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Confirmare de plata ISC"
    readiness_checks:
      - "Confirmarea platii ISC este disponibila daca este aplicabila"
    status: draft

  - id: energy_performance_certificate
    title_ro: "Certificat de performanta energetica"
    description_ro: >-
      Certificatul de performanta energetica, daca tipul constructiei il cere la receptie.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat de performanta energetica"
    readiness_checks:
      - "Certificatul energetic este disponibil daca este aplicabil"
    status: draft

  - id: authorisation_fee_regularization_proof
    title_ro: "Dovada regularizarii taxei autorizatiei"
    description_ro: >-
      Dovada regularizarii taxei autorizatiei, daca aceasta etapa este aplicabila dupa receptie.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Dovada regularizarii taxei"
    readiness_checks:
      - "Regularizarea taxei este acoperita daca este aplicabila"
    status: draft

  - id: building_permit_copy
    title_ro: "Copie a autorizatiei de construire"
    description_ro: >-
      Copia autorizatiei de construire folosita in dosarul local de finalizare.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Copie a autorizatiei de construire"
    readiness_checks:
      - "Autorizatia este disponibila in copie pentru dosarul local"
    status: draft

  - id: reception_minutes
    title_ro: "Proces-verbal de receptie"
    description_ro: >-
      Procesul-verbal de receptie admisa, folosit in etapele ulterioare.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Proces-verbal de receptie"
    readiness_checks:
      - "Procesul-verbal de receptie este disponibil"
    status: draft

  - id: designer_and_site_manager_completion_reports
    title_ro: "Rapoartele de finalizare ale proiectantului si dirigintelui"
    description_ro: >-
      Rapoartele cerute local privind finalizarea lucrarilor, daca sunt aplicabile.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Raport al proiectantului"
      - "Raport al dirigintelui de santier"
    readiness_checks:
      - "Rapoartele de finalizare cerute local sunt disponibile"
    status: draft
