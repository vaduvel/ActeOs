# Step & requirement templates for ro.life.baptism (life.baptism).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates: []

requirement_templates:
  - id: req.consent_confirmation
    title_ro: "Confirmare privind consimtamantul"
    description_ro: >-
      Confirmarea privind consimtamantul persoanelor care trebuie sa aprobe ceremonia sau
      demersul aferent.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Declaratie sau confirmare ceruta de unitatea religioasa"
    readiness_checks:
      - "Consimtamantul cerut pentru situatie este clar si disponibil"
    status: draft

  - id: req.guardian_authority_confirmation
    title_ro: "Confirmare privind autoritatea parinteasca sau tutela"
    description_ro: >-
      Documentele sau confirmarile care arata cine are autoritatea necesara pentru a decide in
      numele minorului, daca situatia o cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente privind autoritatea parinteasca"
      - "Documente de tutela sau reprezentare"
    readiness_checks:
      - "Persoana care semneaza poate dovedi autoritatea ceruta"
    status: draft

  - id: req.local_checklist_confirmation
    title_ro: "Confirmare lista locala de documente"
    description_ro: >-
      Verificarea listei de documente si conditii cerute local de unitatea religioasa sau de
      comunitatea care organizeaza ceremonia.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Checklist local confirmat"
    readiness_checks:
      - "Lista locala a fost verificata inainte de programare"
    status: draft
