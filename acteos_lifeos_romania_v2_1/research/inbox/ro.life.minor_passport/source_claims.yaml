schema_ref: ../../../contracts/source_claim.schema.json
batch_id: R1_MINOR_PASSPORT
claims:
  - id: claim.mp.docs
    source_id: src.dgp_temporar_minor
    snapshot_id: pending
    statement: Pentru pasaportul minorului se prezinta certificatul de nastere al minorului in original, documentele de identitate valabile ale parintilor/reprezentantului legal, dovada platii si pasaportul anterior al minorului daca exista; 2 fotografii 3,5x4,5 cm doar daca minorul nu este prezent.
    url: https://pasapoarte.mai.gov.ro/documente-necesare-pentru-pasaport-simplu-temporar/
    publisher: Directia Generala de Pasapoarte (MAI)
    authority_level: national_operational
    evidence_excerpt: "Certificatul de nastere al minorului, in original ... Document/documente de identitate al parintelui/ale parintilor ... 2 fotografii color identice ale minorului ... numai pentru situatiile in care acesta nu este prezent"
    locator: DGP - documente pasaport simplu temporar (minor)
    accessed_at: '2026-06-25'
    confidence: verified
    freshness_class: operational
    status: active
  - id: claim.mp.under14_both_parents
    source_id: src.eguvernare_pasaport
    snapshot_id: pending
    statement: Cererile pentru pasaport simplu electronic pentru minorii care nu au implinit 14 ani se formuleaza de ambii parinti, sau de parintele imputernicit printr-o procura speciala ori care are acordul scris al celuilalt parinte.
    url: https://edirect.e-guvernare.ro/Admin/Proceduri/ProceduraVizualizare.aspx?IdInregistrare=516108&IdOperatiune=2
    publisher: e-guvernare.ro (procedura oficiala)
    authority_level: national_operational
    evidence_excerpt: "Cererile care privesc eliberarea unui pasaport simplu electronic pentru minorii care nu au implinit varsta de 14 ani se formuleaza de catre: a) ambii parinti; b) parintele imputernicit ... ori care are acordul scris al celuilalt parinte"
    locator: e-guvernare - eliberare pasapoarte minori sub 14
    accessed_at: '2026-06-25'
    confidence: verified
    freshness_class: operational
    status: active
  - id: claim.mp.presence_required
    source_id: src.consular_minor
    snapshot_id: pending
    statement: Prezenta minorului si a parintilor este obligatorie; cererea se semneaza de ambii parinti, de parintele supravietuitor, de parintele caruia i-a fost incredintat minorul prin hotarare definitiva sau de reprezentantul legal.
    url: https://cglondra.mae.ro/node/846
    publisher: Consulat / MAE
    authority_level: institution
    evidence_excerpt: "Prezenta minorului si a parintilor este obligatorie. Cererea ... se va semna de catre ambii parinti, de parintele supravietuitor, de parintele caruia i-a fost incredintat minorul ... sau ... de reprezentantul legal"
    locator: Consulat - pasaport minor
    accessed_at: '2026-06-25'
    confidence: verified
    freshness_class: operational
    status: active
  - id: claim.mp.over14_personal_pickup
    source_id: src.consular_minor_ro
    snapshot_id: pending
    statement: Pentru minorii sub 14 ani pasaportul poate fi ridicat de oricare parinte; minorul mai mare de 14 ani isi ridica pasaportul personal, insotit de un parinte, prezentand cartea de identitate valabila.
    url: https://cglondra.mae.ro/node/269
    publisher: Consulat / MAE
    authority_level: institution
    evidence_excerpt: "Pentru minorii sub 14 ani poate ridica pasaportul oricare dintre parinti ... Minorul mai mare de 14 ani isi ridica pasaportul personal, insotit de unul dintre parinti"
    locator: Consulat - pasaport minor domiciliu Romania
    accessed_at: '2026-06-25'
    confidence: verified
    freshness_class: operational
    status: active
  - id: claim.mp.single_parent_docs
    source_id: src.digi24_minor
    snapshot_id: pending
    statement: Cand cererea este formulata de un singur parinte este nevoie de procura de imputernicire de la celalalt parinte sau, dupa caz, hotarare judecatoreasca de incredintare, act de deces al parintelui.
    url: https://www.digi24.ro/stiri/actualitate/social/pasaport-pentru-copii-in-2025-ce-acte-sunt-necesare-si-cat-este-taxa-pentru-eliberarea-documentului-de-calatorie-3165499
    publisher: Digi24 (secundar, coroboreaza e-guvernare)
    authority_level: institution
    evidence_excerpt: "in situatia in care cererea ... este formulata de un singur parinte este nevoie si de o procura de imputernicire ... hotararea judecatoreasca de incredintare a minorului, act de deces al parintelui"
    locator: Digi24 - pasaport copii
    accessed_at: '2026-06-25'
    confidence: verified
    freshness_class: operational
    status: active
  - id: claim.mp.validity
    source_id: src.dgp_valabilitate
    snapshot_id: pending
    statement: Pasaportul electronic al minorului are valabilitate 3 ani (<12 ani) si 5 ani (12-18 ani); temporar 12 luni.
    url: https://pasapoarte.mai.gov.ro/termene-de-valabilitate/
    publisher: Directia Generala de Pasapoarte (MAI)
    authority_level: national_operational
    evidence_excerpt: "3 ani pentru minorii cu varsta sub 12 ani. 5 ani pentru persoanele cu varsta intre 12 ani si 18 ani"
    locator: DGP - termene de valabilitate
    accessed_at: '2026-06-25'
    confidence: verified
    freshness_class: operational
    status: active
