    municipality_id: ro.tm.timisoara
    local_commercial_agreement_exists: true
    activity_data_changes: true
    filing_actor: legal_representative
  expect:
    status: needs_confirmation
    included_steps:
    - modify_timisoara_commercial_agreement
- id: F21
  desc: activitate în alt UAT
  facts:
    entity_type: srl
    activity_change_type: add_activity
    municipality_id: ro.cj.cluj
    local_commercial_agreement_exists: true
    activity_data_changes: true
    filing_actor: legal_representative
  expect:
    status: needs_confirmation
    warnings:
