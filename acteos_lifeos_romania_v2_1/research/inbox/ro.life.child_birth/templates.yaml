# Step & requirement templates for ro.life.child_birth (life.child_birth).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: assess_child_allowance
    semantic_key: assess_child_allowance
    title_ro: "Evalueaza pasii pentru alocatia copilului"
    instruction_ro: >-
      Verifica daca situatia copilului deschide pasii urmatori pentru alocatia de stat si noteaza
      dosarul care trebuie pregatit separat pentru acest drept.
    sequence_hint: 10
    completion_evidence_ro:
      - "Situatia pentru alocatia copilului a fost evaluata"
    recovery_actions_ro:
      - "Daca lipsesc date despre copil sau reprezentant, reia evaluarea dupa completarea lor"
    status: draft

  - id: assess_parental_leave
    semantic_key: assess_parental_leave
    title_ro: "Evalueaza pasii pentru concediu si indemnizatie"
    instruction_ro: >-
      Verifica daca nasterea copilului deschide pasii urmatori pentru concediul si indemnizatia
      asociate ingrijirii copilului si separa dosarul relevant de cel de stare civila.
    sequence_hint: 20
    completion_evidence_ro:
      - "Posibilul traseu pentru concediu sau indemnizatie a fost evaluat"
    recovery_actions_ro:
      - "Daca situatia profesionala sau familiala nu este clara, actualizeaza analiza inainte de depunere"
    status: draft

requirement_templates: []
