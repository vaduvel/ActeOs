# Step & requirement templates for ro.life.lost_all_documents (life.lost_all_documents).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: replace_id_card_first
    semantic_key: replace_id_card_first
    title_ro: "Refa mai intai actul de identitate"
    instruction_ro: >-
      Pentru pierderea tuturor actelor, porneste cu inlocuirea cartii de identitate, fiindca ea este
      necesara pentru celelalte documente.
    sequence_hint: 10
    completion_evidence_ro:
      - "Ruta pentru refacerea actului de identitate a fost pornita prima"
    recovery_actions_ro:
      - "Daca incerci sa inlocuiesti alte acte fara CI, revino la acest pas"
    status: draft

  - id: open_replacement_routes_for_each_lost_document
    semantic_key: open_replacement_routes_for_each_lost_document
    title_ro: "Deschide ruta de inlocuire pentru fiecare act pierdut"
    instruction_ro: >-
      Dupa actul de identitate, urmeaza separat evenimentele copil potrivite pentru pasaport,
      permis sau talon, in functie de ce s-a pierdut.
    sequence_hint: 20
    completion_evidence_ro:
      - "Au fost identificate rutele copil pentru fiecare document pierdut"
    recovery_actions_ro:
      - "Daca lipseste un document din inventar, completeaza lista actelor pierdute"
    status: draft

requirement_templates: []
