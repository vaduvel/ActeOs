# Step & requirement templates for ro.life.reinsertion_incentive (life.reinsertion_incentive).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: apply_insertion_incentive
    semantic_key: apply_insertion_incentive
    title_ro: "Depune cererea pentru stimulentul de insertie"
    instruction_ro: >-
      Depune cererea dupa inceperea veniturilor eligibile si pregateste dosarul complet pentru
      stimulentul de insertie.
    sequence_hint: 10
    completion_evidence_ro:
      - "Cererea pentru stimulentul de insertie a fost depusa"
    recovery_actions_ro:
      - "Daca lipseste dovada inceperii veniturilor, completeaza dosarul inainte de depunere"
    status: draft

  - id: early_incentive_end
    semantic_key: early_incentive_end
    title_ro: "Verifica momentul de incetare al dreptului"
    instruction_ro: >-
      Verifica momentul pana la care dreptul poate continua in functie de varsta copilului si de
      situatia aplicabila.
    sequence_hint: 20
    completion_evidence_ro:
      - "Momentul de incetare al stimulentului a fost verificat"
    recovery_actions_ro:
      - "Daca situatia copilului se schimba, reanalizeaza durata"
    status: draft

  - id: suspend_ccc_indemnity
    semantic_key: suspend_ccc_indemnity
    title_ro: "Evita cumulul cu indemnizatia CCC"
    instruction_ro: >-
      Verifica daca indemnizatia pentru cresterea copilului trebuie oprita sau suspendata pentru a
      evita cumulul cu stimulentul.
    sequence_hint: 30
    completion_evidence_ro:
      - "Situatia de ne-cumulare cu indemnizatia CCC a fost verificata"
    recovery_actions_ro:
      - "Daca indemnizatia CCC inca este platita, clarifica suspendarea inainte de cerere"
    status: draft

  - id: report_incentive_change
    semantic_key: report_incentive_change
    title_ro: "Raporteaza modificarile relevante"
    instruction_ro: >-
      Notifica orice modificare care afecteaza plata stimulentului pe ruta si in termenul
      operational relevante.
    sequence_hint: 40
    completion_evidence_ro:
      - "Modificarile relevante sunt pregatite pentru notificare"
    recovery_actions_ro:
      - "Daca a aparut o schimbare si nu ai notificat-o, trimite informarea fara intarziere"
    status: draft

requirement_templates:
  - id: req.application
    title_ro: "Cerere pentru stimulentul de insertie"
    description_ro: >-
      Cererea folosita pentru obtinerea stimulentului de insertie.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Cerere completata"
    readiness_checks:
      - "Cererea este completata pentru ruta corecta"
    status: draft

  - id: req.income_start_proof
    title_ro: "Dovada inceperii veniturilor eligibile"
    description_ro: >-
      Documentele care arata ca au inceput veniturile eligibile pentru stimulent.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Documente privind inceperea veniturilor eligibile"
    readiness_checks:
      - "Dovada indica data de start a veniturilor"
    status: draft

  - id: req.child_birth_certificate
    title_ro: "Certificat de nastere al copilului"
    description_ro: >-
      Certificatul de nastere al copilului pentru deschiderea dreptului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Certificat de nastere"
    readiness_checks:
      - "Certificatul corespunde copilului pentru care se cere dreptul"
    status: draft

  - id: req.applicant_identity_document
    title_ro: "Act de identitate al solicitantului"
    description_ro: >-
      Actul de identitate al persoanei care solicita stimulentul de insertie.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Act de identitate valabil"
    readiness_checks:
      - "Actul de identitate este disponibil si valabil"
    status: draft
