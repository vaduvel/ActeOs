# Step & requirement templates for ro.life.started_job (life.started_job).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: review_employment_offer_and_terms
    semantic_key: review_employment_offer_and_terms
    title_ro: "Verifica oferta si conditiile de angajare"
    instruction_ro: >-
      Verifica functia, conditiile de munca si data inceperii inainte de semnarea contractului si
      de prima zi de activitate.
    sequence_hint: 10
    completion_evidence_ro:
      - "Conditiile esentiale ale angajarii au fost verificate"
    recovery_actions_ro:
      - "Daca exista neclaritati, cere clarificare inainte de semnare"
    status: draft

  - id: sign_written_employment_contract
    semantic_key: sign_written_employment_contract
    title_ro: "Semneaza contractul individual de munca in scris"
    instruction_ro: >-
      Asigura-te ca exista un contract individual de munca semnat in scris inainte de inceperea
      activitatii.
    sequence_hint: 20
    completion_evidence_ro:
      - "Contractul individual de munca a fost semnat in scris"
    recovery_actions_ro:
      - "Daca nu exista contract semnat, nu incepe activitatea"
    status: draft

  - id: complete_occupational_health_check
    semantic_key: complete_occupational_health_check
    title_ro: "Finalizeaza controlul de medicina muncii"
    instruction_ro: >-
      Obtine fisa sau certificatul de aptitudine medicala valabil inainte de prima zi de munca.
    sequence_hint: 30
    completion_evidence_ro:
      - "Aptitudinea medicala pentru munca a fost obtinuta"
    recovery_actions_ro:
      - "Daca lipseste aptitudinea medicala, reprogrameaza controlul inainte de incepere"
    status: draft

  - id: verify_reges_transmission
    semantic_key: verify_reges_transmission
    title_ro: "Verifica transmiterea in REGES"
    instruction_ro: >-
      Confirma cu angajatorul ca raportul de munca a fost transmis in REGES cel tarziu in ziua
      anterioara inceperii.
    sequence_hint: 40
    completion_evidence_ro:
      - "Transmiterea in REGES a fost confirmata"
    recovery_actions_ro:
      - "Daca transmiterea nu este facuta, nu incepe activitatea pana la remediere"
    status: draft

  - id: receive_employee_contract_copy
    semantic_key: receive_employee_contract_copy
    title_ro: "Primeste exemplarul salariatului"
    instruction_ro: >-
      Primeste exemplarul tau din contractul semnat inainte de inceperea activitatii.
    sequence_hint: 50
    completion_evidence_ro:
      - "Exemplarul salariatului din contract a fost primit"
    recovery_actions_ro:
      - "Daca nu ai primit exemplarul, solicita-l inainte de prima zi"
    status: draft

  - id: complete_ssm_induction
    semantic_key: complete_ssm_induction
    title_ro: "Finalizeaza instructajul SSM"
    instruction_ro: >-
      Parcurge instructajul SSM cerut de angajator inainte de a incepe efectiv munca.
    sequence_hint: 60
    completion_evidence_ro:
      - "Instructajul SSM a fost finalizat"
    recovery_actions_ro:
      - "Daca instructajul nu a fost facut, solicita programarea lui inainte de lucru"
    status: draft

requirement_templates:
  - id: written_employment_contract_before_start
    title_ro: "Contract individual de munca in scris, inainte de start"
    description_ro: >-
      Contractul individual de munca semnat in scris inainte de inceperea activitatii.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Contract individual de munca semnat"
    readiness_checks:
      - "Contractul este semnat inainte de prima zi de lucru"
    status: draft

  - id: reges_transmission_before_start
    title_ro: "Transmitere in REGES inainte de incepere"
    description_ro: >-
      Confirmarea ca angajatorul a transmis raportul de munca in REGES in termenul cerut.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Confirmare a transmiterii in REGES"
    readiness_checks:
      - "Transmiterea este facuta cel tarziu in ziua anterioara inceperii"
    status: draft

  - id: employee_copy_of_signed_cim
    title_ro: "Exemplarul semnat al contractului pentru salariat"
    description_ro: >-
      Exemplarul semnat al contractului individual de munca, remis salariatului inainte de incepere.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Exemplarul salariatului din contractul semnat"
    readiness_checks:
      - "Exemplarul este primit si corespunde contractului semnat"
    status: draft

  - id: occupational_medical_aptitude
    title_ro: "Aptitudine medicala pentru munca"
    description_ro: >-
      Fisa sau certificatul de aptitudine emis pentru inceperea activitatii.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Fisa de aptitudine"
      - "Certificat medical de aptitudine"
    readiness_checks:
      - "Aptitudinea medicala este valabila la data inceperii"
    status: draft

  - id: ssm_induction_and_instruction
    title_ro: "Instructaj SSM"
    description_ro: >-
      Dovada instruirii SSM efectuate inainte de inceperea activitatii.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Documente de instructaj SSM"
    readiness_checks:
      - "Instructajul este finalizat inainte de inceperea muncii"
    status: draft

  - id: employment_authorisation_or_documented_exemption
    title_ro: "Autorizatie de munca sau exceptie documentata"
    description_ro: >-
      Documentul care permite munca in Romania pentru lucratorii din afara UE, daca este cazul.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Autorizatie de munca"
      - "Document privind exceptia legala"
    readiness_checks:
      - "Documentul acopera situatia concreta a lucratorului"
    status: draft
