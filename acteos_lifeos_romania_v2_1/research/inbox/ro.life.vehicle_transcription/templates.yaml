# Step & requirement templates for ro.life.vehicle_transcription (life.vehicle_transcription).
# Transcribed from event_card.md (R1A-veh4). No legal text fabricated.

step_templates:
  - id: transcribe_vehicle
    semantic_key: transcribe_vehicle
    title_ro: "Transcrie vehiculul la SPCRPCIV Timiș"
    instruction_ro: >-
      Solicită transcrierea dreptului de proprietate la SPCRPCIV Timiș, cu programare prealabilă.
      Documente necesare (Ordinul MAI 1501/2006, art. 8): cererea, documentul de proprietate
      (original + copie), CIV valabil, ITP în termen, dovada declarării fiscale la organul fiscal
      local. Termen orientativ: 90 de zile de la data contractului.
    sequence_hint: 20
    completion_evidence_ro:
      - "Cererea a fost depusă și înregistrată la SPCRPCIV Timiș"
      - "A fost emis noul certificat de înmatriculare"
    recovery_actions_ro:
      - "Dacă transcrierea este respinsă, completează documentele lipsă (ITP, RCA, fiscal)"
      - "Termenul de 90 zile este orientativ; confirmă exactitudinea textului Ordinului 1501/2006"
    status: draft

  - id: do_itp
    semantic_key: do_itp
    title_ro: "Efectuează ITP"
    instruction_ro: >-
      Dacă ITP-ul vehiculului nu este în termen de valabilitate, efectuează o inspecție
      tehnică periodică la o stație autorizată înainte de transcriere.
    sequence_hint: 15
    completion_evidence_ro:
      - "ITP-a fost efectuată și este în termen"
    recovery_actions_ro:
      - "Lasă ITP-ul la o stație autorizată de Registrul Auto Român"
    status: draft

requirement_templates:
  - id: req.ownership_document
    title_ro: "Document de proprietate (original + copie)"
    description_ro: >-
      Contract de vânzare-cumpărare sau alt act de proprietate în original și copie, conform
      art. 8 din Ordinul MAI 1501/2006.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Contract de vânzare-cumpărare în original + copie"
      - "Act de donație, moștenire etc., când e cazul"
    readiness_checks:
      - "Verifică semnăturile și datele din act"
    status: draft

  - id: req.fiscal_declaration_proof
    title_ro: "Dovada declarării fiscale la organul local"
    description_ro: >-
      Adeverință/certificat care dovedește că vehiculul a fost declarat la organul fiscal local.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Adeverință emisă de DFMT/DITL în original"
    readiness_checks:
      - "Verifică că documentul este în termen de valabilitate"
    status: draft
