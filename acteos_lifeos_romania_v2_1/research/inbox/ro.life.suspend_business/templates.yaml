step_templates:
  - id: approve_pfa_interruption
    semantic_key: suspend_business_approve_pfa_interruption
    title_ro: "Decide intreruperea temporara pentru PFA"
    instruction_ro: >-
      Stabileste durata suspendarii in limita legala si verifica daca nu exista
      deja o suspendare activa inscrisa.
    sequence_hint: 10
    completion_evidence_ro:
      - "Durata si eligibilitatea suspendarii PFA sunt clarificate."
    recovery_actions_ro:
      - "Daca durata depaseste limita legala, redu perioada inainte de depunere."
    status: draft
  - id: file_pfa_suspension_mention
    semantic_key: suspend_business_file_pfa_mention
    title_ro: "Depune mentiunea de suspendare PFA"
    instruction_ro: >-
      Depune mentiunea de intrerupere temporara a activitatii pentru PFA prin
      canalul oficial ales.
    sequence_hint: 20
    completion_evidence_ro:
      - "Mentiunea de suspendare PFA este depusa."
    recovery_actions_ro:
      - "Daca nu primesti confirmare, verifica semnatarul si canalul folosit."
    status: draft
  - id: approve_srl_temporary_inactivity
    semantic_key: suspend_business_approve_srl_inactivity
    title_ro: "Aproba inactivitatea temporara a SRL"
    instruction_ro: >-
      Pentru SRL, obtine hotararea interna privind suspendarea temporara si
      verifica durata ceruta.
    sequence_hint: 30
    completion_evidence_ro:
      - "Hotararea interna pentru suspendarea SRL este pregatita."
    recovery_actions_ro:
      - "Daca durata sau competenta interna nu sunt clare, lamureste-le inainte de depunere."
    status: draft
  - id: file_srl_suspension_mention
    semantic_key: suspend_business_file_srl_mention
    title_ro: "Depune mentiunea de suspendare SRL"
    instruction_ro: >-
      Depune mentiunea de suspendare temporara pentru SRL la ONRC si pastreaza
      dovada depunerii.
    sequence_hint: 40
    completion_evidence_ro:
      - "Mentiunea de suspendare SRL este depusa."
    recovery_actions_ro:
      - "Daca dosarul este incomplet, corecteaza actul intern sau datele de depunere."
    status: draft
  - id: review_timisoara_agreement_during_suspension
    semantic_key: suspend_business_review_timisoara_agreement
    title_ro: "Verifica efectul suspendarii asupra acordului local"
    instruction_ro: >-
      Pentru Timisoara, verifica separat daca acordul comercial trebuie mentinut,
      modificat sau inchis pe durata suspendarii.
    sequence_hint: 50
    completion_evidence_ro:
      - "Efectul suspendarii asupra acordului local este clarificat."
    recovery_actions_ro:
      - "Nu presupune anularea automata a acordului local doar din suspendarea ONRC."
    status: draft
