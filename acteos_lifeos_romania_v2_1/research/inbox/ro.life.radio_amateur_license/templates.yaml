# Step & requirement templates for ro.life.radio_amateur_license (ro.life.radio_amateur_license).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: step.choose_radio_amateur_class
    semantic_key: step.choose_radio_amateur_class
    title_ro: "Alege clasa de radioamator"
    instruction_ro: >-
      Clarifica clasa dorita si trateaza explicit conflictele oficiale privind clasele III restrins si IV.
    sequence_hint: 10
    completion_evidence_ro: ["Clasa de radioamator a fost clarificata"]
    recovery_actions_ro: ["Daca sursele oficiale raman in conflict, nu continua cu o clasa presupusa"]
    status: draft

  - id: step.choose_ancom_exam_session
    semantic_key: step.choose_ancom_exam_session
    title_ro: "Alege sesiunea ANCOM"
    instruction_ro: >-
      Selecteaza sesiunea ANCOM relevanta si verifica termenul exact al acelei sesiuni.
    sequence_hint: 20
    completion_evidence_ro: ["Sesiunea ANCOM relevanta a fost identificata"]
    recovery_actions_ro: ["Nu reutiliza termenul unei sesiuni pentru alta sesiune"]
    status: draft

  - id: step.prepare_exam_application
    semantic_key: step.prepare_exam_application
    title_ro: "Pregateste dosarul de examinare"
    instruction_ro: >-
      Pregateste formularul si documentele cerute pentru inscrierea la examen.
    sequence_hint: 30
    completion_evidence_ro: ["Dosarul de examinare este pregatit"]
    recovery_actions_ro: ["Daca lipsesc documente de identitate sau consimtamantul pentru minor, completeaza dosarul"]
    status: draft

  - id: step.submit_exam_file_before_session_deadline
    semantic_key: step.submit_exam_file_before_session_deadline
    title_ro: "Depune dosarul inainte de termen"
    instruction_ro: >-
      Depune dosarul de examen inainte de termenul sesiunii alese.
    sequence_hint: 40
    completion_evidence_ro: ["Dosarul de examen este pregatit pentru depunere in termen"]
    recovery_actions_ro: ["Daca termenul sesiunii este depasit, alege o sesiune noua"]
    status: draft

  - id: step.submit_by_2026_07_02
    semantic_key: step.submit_by_2026_07_02
    title_ro: "Depune pentru sesiunea cu termen 2026-07-02"
    instruction_ro: >-
      Daca este selectata sesiunea relevanta din 2026, pregateste depunerea pina la termenul publicat.
    sequence_hint: 50
    completion_evidence_ro: ["Termenul special al sesiunii 2026 a fost luat in calcul"]
    recovery_actions_ro: ["Daca sesiunea nu este aceasta, nu aplica termenul special"]
    status: draft

  - id: step.prepare_individual_authorization_application
    semantic_key: step.prepare_individual_authorization_application
    title_ro: "Pregateste cererea pentru autorizatia individuala"
    instruction_ro: >-
      Dupa obtinerea certificatului relevant, pregateste dosarul pentru autorizatia individuala.
    sequence_hint: 60
    completion_evidence_ro: ["Cererea pentru autorizatia individuala este pregatita"]
    recovery_actions_ro: ["Daca lipseste certificatul pentru clasa ceruta, nu continua aceasta ramura"]
    status: draft

  - id: step.submit_individual_authorization_to_ancom
    semantic_key: step.submit_individual_authorization_to_ancom
    title_ro: "Depune autorizatia individuala la ANCOM"
    instruction_ro: >-
      Depune dosarul pentru autorizatia individuala pe canalul ANCOM relevant.
    sequence_hint: 70
    completion_evidence_ro: ["Dosarul pentru autorizatia individuala este pregatit pentru depunere"]
    recovery_actions_ro: ["Daca lipsesc fotografia, identitatea sau certificatul, completeaza dosarul"]
    status: draft

  - id: step.use_ancom_modification_extension_form
    semantic_key: step.use_ancom_modification_extension_form
    title_ro: "Foloseste formularul ANCOM de modificare sau prelungire"
    instruction_ro: >-
      Pentru modificare ori prelungire, foloseste formularul dedicat ANCOM si confirma checklistul curent.
    sequence_hint: 80
    completion_evidence_ro: ["Ruta de modificare sau prelungire a fost clarificata"]
    recovery_actions_ro: ["Daca checklistul de prelungire nu este complet confirmat, mentine cazul in clarificare"]
    status: draft

  - id: step.use_duplicate_certificate_form
    semantic_key: step.use_duplicate_certificate_form
    title_ro: "Foloseste formularul pentru duplicat de certificat"
    instruction_ro: >-
      Pentru duplicat de certificat, pregateste formularul si declaratia ceruta.
    sequence_hint: 90
    completion_evidence_ro: ["Ruta pentru duplicat de certificat a fost pregatita"]
    recovery_actions_ro: ["Daca lipseste declaratia pentru duplicat, completeaza dosarul"]
    status: draft

  - id: step.use_duplicate_authorization_form
    semantic_key: step.use_duplicate_authorization_form
    title_ro: "Foloseste formularul pentru duplicat de autorizatie"
    instruction_ro: >-
      Pentru duplicat de autorizatie, pregateste formularul si declaratia ceruta.
    sequence_hint: 100
    completion_evidence_ro: ["Ruta pentru duplicat de autorizatie a fost pregatita"]
    recovery_actions_ro: ["Daca lipseste declaratia pentru duplicat, completeaza dosarul"]
    status: draft

  - id: step.prepare_radioclub_authorization_file
    semantic_key: step.prepare_radioclub_authorization_file
    title_ro: "Pregateste dosarul pentru radioclub"
    instruction_ro: >-
      Pregateste documentele persoanei juridice si angajamentele responsabililor pentru autorizarea radioclubului.
    sequence_hint: 110
    completion_evidence_ro: ["Dosarul pentru radioclub este pregatit"]
    recovery_actions_ro: ["Daca lipsesc dovezile persoanei juridice sau angajamentele, completeaza dosarul"]
    status: draft

  - id: step.prepare_repeater_beacon_file
    semantic_key: step.prepare_repeater_beacon_file
    title_ro: "Pregateste dosarul pentru repetor sau baliza"
    instruction_ro: >-
      Pregateste documentatia tehnica si cererea relevanta pentru repetor sau baliza.
    sequence_hint: 120
    completion_evidence_ro: ["Dosarul pentru repetor sau baliza este pregatit"]
    recovery_actions_ro: ["Daca memorandum-ul tehnic lipseste, completeaza documentatia"]
    status: draft

  - id: step.file_exam_result_contest
    semantic_key: step.file_exam_result_contest
    title_ro: "Depune contestatia la rezultatul examenului"
    instruction_ro: >-
      Daca este contestat rezultatul examenului, pregateste contestatia pe ruta relevanta.
    sequence_hint: 130
    completion_evidence_ro: ["Ruta de contestatie la examen a fost pregatita"]
    recovery_actions_ro: ["Daca nu exista rezultat contestat, nu activa aceasta ramura"]
    status: draft

  - id: step.submit_passport_photo_for_certificate
    semantic_key: step.submit_passport_photo_for_certificate
    title_ro: "Depune fotografia pentru certificat"
    instruction_ro: >-
      Pregateste fotografia tip pasaport daca ruta selectata o cere pentru certificat sau autorizatie.
    sequence_hint: 140
    completion_evidence_ro: ["Cerinta privind fotografia tip pasaport a fost clarificata"]
    recovery_actions_ro: ["Daca fotografia nu este necesara pe ramura curenta, nu o cere inutil"]
    status: draft

