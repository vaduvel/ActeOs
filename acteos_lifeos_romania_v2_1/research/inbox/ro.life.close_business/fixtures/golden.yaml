- id: F14
  desc: decizie SRL în ziua a 15-a
  facts:
    entity_type: srl
    decision_date: '2026-06-10'
    request_date: '2026-06-25'
    filing_actor: legal_representative
  expect:
    status: resolved
    deadline_days: 15
    overdue: false
- id: F15
  desc: decizie SRL de 16 zile
  facts:
    entity_type: srl
    decision_date: '2026-06-09'
    request_date: '2026-06-25'
    filing_actor: legal_representative
  expect:
    status: resolved
    deadline_days: 15
    overdue: true
- id: F16
  desc: depunere prin avocat
  facts:
