# Step & requirement templates for ro.life.marriage_planning (ro.life.marriage_planning).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: file_marriage_declaration
    semantic_key: file_marriage_declaration
    title_ro: "Depune declaratia de casatorie"
    instruction_ro: >-
      Pregateste declaratia de casatorie si documentele de baza in fereastra legala aplicabila.
    sequence_hint: 10
    completion_evidence_ro: ["Declaratia de casatorie este pregatita pentru depunere"]
    recovery_actions_ro: ["Daca lipsesc documentele de baza sau fereastra nu este respectata, replanifica depunerea"]
    status: draft

  - id: celebrate_civil_marriage
    semantic_key: celebrate_civil_marriage
    title_ro: "Parcurge oficierea casatoriei civile"
    instruction_ro: >-
      Dupa declaratie si confirmarile necesare, urmeaza oficierea casatoriei civile pe ruta competenta.
    sequence_hint: 20
    completion_evidence_ro: ["Ruta pentru oficierea casatoriei civile a fost pregatita"]
    recovery_actions_ro: ["Daca dosarul nu este complet sau exista impedimente, nu trata casatoria ca programata"]
    status: draft

  - id: refile_marriage_declaration
    semantic_key: refile_marriage_declaration
    title_ro: "Rede pune declaratia de casatorie, daca este necesar"
    instruction_ro: >-
      Daca fereastra legala expirata sau alte conditii cer reluarea procedurii, pregateste redepunerea declaratiei.
    sequence_hint: 30
    completion_evidence_ro: ["Cerinta de redepunere a declaratiei a fost clarificata"]
    recovery_actions_ro: ["Daca declaratia initiala este inca valida, nu activa aceasta ramura"]
    status: draft

requirement_templates:
  - id: req.identity_documents
    title_ro: "Actele de identitate"
    description_ro: "Actele de identitate ale viitorilor soti."
    obligation: mandatory
    timing: now
    accepted_forms: ["Actele de identitate ale viitorilor soti"]
    readiness_checks: ["Actele de identitate sunt disponibile si valabile"]
    status: draft

  - id: req.birth_certificates
    title_ro: "Certificatele de nastere"
    description_ro: "Certificatele de nastere cerute pentru dosarul de casatorie."
    obligation: mandatory
    timing: now
    accepted_forms: ["Certificate de nastere"]
    readiness_checks: ["Certificatele de nastere sunt pregatite"]
    status: draft

  - id: req.prenuptial_medical_certificates
