# Step & requirement templates for ro.life.minor_travel_abroad (life.minor_travel_abroad).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates: []

requirement_templates:
  - id: req.minor_valid_travel_document
    title_ro: "Document de calatorie valabil al minorului"
    description_ro: >-
      Documentul de calatorie valabil folosit de minor pentru iesirea din tara.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Pasaport valabil"
      - "Alt document de calatorie valabil"
    readiness_checks:
      - "Documentul de calatorie este valabil pentru data plecarii"
    status: draft

  - id: req.parental_consent_declaration
    title_ro: "Declaratie de acord parental"
    description_ro: >-
      Declaratia de acord a parintilor sau a persoanelor care exercita autoritatea relevanta pentru
      iesirea minorului din tara, atunci cand este ceruta.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Declaratie de acord parental"
    readiness_checks:
      - "Declaratia corespunde traseului de calatorie al minorului"
    status: draft

  - id: req.other_parent_authenticated_consent
    title_ro: "Acord autentificat al celuilalt parinte"
    description_ro: >-
      Acordul autentificat al celuilalt parinte, pentru situatiile in care acesta este cerut.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Acord autentificat al celuilalt parinte"
    readiness_checks:
      - "Acordul autentificat este emis pentru calatoria relevanta"
    status: draft

  - id: req.exception_proof_sole_authority_death_or_judgment
    title_ro: "Dovada exceptiei privind autoritatea unica, decesul sau hotararea"
    description_ro: >-
      Documentele care justifica exceptia de la acordul obisnuit al ambilor parinti.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Hotarare relevanta"
      - "Certificat de deces"
      - "Alta dovada privind autoritatea unica"
    readiness_checks:
      - "Exceptia invocata este sustinuta de documentul potrivit"
    status: draft

  - id: req.authenticated_parental_consent_for_third_person
    title_ro: "Acord autentificat pentru insotitor tert"
    description_ro: >-
      Acordul autentificat al parintilor sau reprezentantilor atunci cand minorul calatoreste cu o
      alta persoana.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Acord autentificat pentru insotitor tert"
    readiness_checks:
      - "Insotitorul tert este identificat in acord"
    status: draft

  - id: req.companion_identity_document
    title_ro: "Actul de identitate al insotitorului"
    description_ro: >-
      Documentul de identitate al persoanei care insoteste minorul, daca exista insotitor.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act de identitate al insotitorului"
    readiness_checks:
      - "Actul insotitorului este valabil si corespunde persoanei mentionate"
    status: draft

  - id: req.destination_domicile_or_residence_proof
    title_ro: "Dovada domiciliului sau resedintei la destinatie"
    description_ro: >-
      Documentele care sustin domiciliul sau resedinta la destinatie, pentru situatiile in care
      acestea trebuie demonstrate.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Dovada domiciliului la destinatie"
      - "Dovada resedintei la destinatie"
    readiness_checks:
      - "Dovada se refera la destinatia relevanta a calatoriei"
    status: draft

  - id: req.official_romanian_medical_documents
    title_ro: "Documente medicale oficiale din Romania"
    description_ro: >-
      Documentele medicale oficiale romanesti necesare pentru exceptiile sau situatiile medicale
      invocate in dosar.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente medicale oficiale romanesti"
    readiness_checks:
      - "Documentele medicale sustin motivul invocat pentru calatorie"
    status: draft

  - id: req.organizer_documents
    title_ro: "Documente ale organizatorului"
    description_ro: >-
      Documentele furnizate de organizator, atunci cand calatoria are loc printr-o organizare
      colectiva sau institutionala.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente ale organizatorului calatoriei"
    readiness_checks:
      - "Organizatorul este identificat clar in documente"
    status: draft

  - id: req.one_parent_authenticated_consent
    title_ro: "Acord autentificat al unui singur parinte"
    description_ro: >-
      Acordul autentificat al unui singur parinte, pentru situatiile in care acest tip de acord
      este suficient potrivit traseului aplicabil.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Acord autentificat al unui singur parinte"
    readiness_checks:
      - "Acordul corespunde exact situatiei de calatorie"
    status: draft

  - id: req.parents_or_legal_representative_consent
    title_ro: "Acordul parintilor sau al reprezentantului legal"
    description_ro: >-
      Acordul persoanelor care exercita autoritatea relevanta asupra minorului, cand dosarul il
      cere in aceasta forma.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Acordul parintilor"
      - "Acordul reprezentantului legal"
    readiness_checks:
      - "Persoana care da acordul poate dovedi calitatea invocata"
    status: draft

  - id: req.consular_authentication_or_apostille_legalisation
    title_ro: "Autentificare consulara sau apostila/legalizare"
    description_ro: >-
      Formalitatea externa necesara pentru documentele emise in strainatate, daca aceasta se cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Autentificare consulara"
      - "Apostila"
      - "Legalizare"
    readiness_checks:
      - "Formalitatea aplicabila documentului strain este prezenta"
    status: draft

  - id: req.physical_criminal_record_certificate
    title_ro: "Certificat fizic de cazier judiciar"
    description_ro: >-
      Certificatul de cazier judiciar in format fizic, pentru situatiile in care acesta este cerut
      in dosarul de iesire din tara.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat fizic de cazier judiciar"
    readiness_checks:
      - "Certificatul este disponibil si in termenul de utilizare cerut"
    status: draft
