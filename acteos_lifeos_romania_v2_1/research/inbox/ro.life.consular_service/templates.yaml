# Step & requirement templates for ro.life.consular_service (life.consular_service).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: classify_consular_request
    semantic_key: classify_consular_request
    title_ro: "Clasifica cererea consulara"
    instruction_ro: >-
      Stabileste categoria exacta a serviciului consular si daca exista misiune romana competenta
      pentru cazul tau.
    sequence_hint: 10
    completion_evidence_ro:
      - "Serviciul consular si misiunea relevanta au fost identificate"
    recovery_actions_ro:
      - "Daca serviciul nu este clar, nu folosi un checklist consular generic"
    status: draft

  - id: open_passport_consular_route
    semantic_key: open_passport_consular_route
    title_ro: "Deschide ruta consulara pentru pasaport sau calatorie"
    instruction_ro: >-
      Daca serviciul vizat este legat de pasaport sau documente de calatorie, urmeaza ruta
      consulara dedicata acestui tip de serviciu.
    sequence_hint: 20
    completion_evidence_ro:
      - "Ruta consulara pentru pasaport sau calatorie a fost identificata"
    recovery_actions_ro:
      - "Daca situatia este una de urgenta, separa-o de ruta standard"
    status: draft

  - id: open_civil_status_consular_route
    semantic_key: open_civil_status_consular_route
    title_ro: "Deschide ruta consulara pentru stare civila"
    instruction_ro: >-
      Daca serviciul este de stare civila, identifica exact operatiunea si misiunea competenta.
    sequence_hint: 30
    completion_evidence_ro:
      - "Ruta consulara de stare civila a fost identificata"
    recovery_actions_ro:
      - "Daca operatiunea nu este clar delimitata, revino la clasificare"
    status: draft

  - id: submit_citizenship_application_at_mission
    semantic_key: submit_citizenship_application_at_mission
    title_ro: "Pregateste depunerea consulara pentru cetatenie"
    instruction_ro: >-
      Daca baza legala permite depunerea consulara pentru cetatenie, pregateste ruta catre misiunea
      competenta.
    sequence_hint: 40
    completion_evidence_ro:
      - "Ruta consulara pentru cetatenie a fost pregatita"
    recovery_actions_ro:
      - "Daca baza legala nu este clara, nu presupune depunerea consulara"
    status: draft

  - id: confirm_citizenship_submission_authority
    semantic_key: confirm_citizenship_submission_authority
    title_ro: "Confirma autoritatea de depunere pentru cetatenie"
    instruction_ro: >-
      Confirma daca misiunea consulara este autoritatea corecta pentru baza juridica invocata.
    sequence_hint: 50
    completion_evidence_ro:
      - "Autoritatea de depunere pentru cetatenie a fost confirmata"
    recovery_actions_ro:
      - "Daca autoritatea nu este corecta, redirectioneaza cazul pe ruta potrivita"
    status: draft

  - id: open_renunciation_consular_route
    semantic_key: open_renunciation_consular_route
    title_ro: "Deschide ruta consulara pentru renuntare"
    instruction_ro: >-
      Daca serviciul vizat este renuntarea la cetatenie, identifica ruta consulara dedicata si
      misiunea competenta.
    sequence_hint: 60
    completion_evidence_ro:
      - "Ruta consulara pentru renuntare a fost identificata"
    recovery_actions_ro:
      - "Daca baza juridica nu sustine aceasta ruta, nu continua pe ea"
    status: draft

  - id: open_lost_documents_emergency_route
    semantic_key: open_lost_documents_emergency_route
    title_ro: "Deschide ruta de urgenta pentru documente pierdute"
    instruction_ro: >-
      Daca problema este legata de documente pierdute in strainatate, foloseste ruta consulara de
      urgenta pentru acest tip de caz.
    sequence_hint: 70
    completion_evidence_ro:
      - "Ruta consulara de urgenta a fost identificata"
    recovery_actions_ro:
      - "Daca nu este vorba de urgenta sau de documente pierdute, revino la clasificare"
    status: draft

  - id: request_other_eu_consular_protection
    semantic_key: request_other_eu_consular_protection
    title_ro: "Cere protectie consulara de la alt stat UE"
    instruction_ro: >-
      Daca esti intr-un stat tert si nu exista misiune romana disponibila, verifica ruta de
      protectie consulara prin alt stat membru UE.
    sequence_hint: 80
    completion_evidence_ro:
      - "Ruta de protectie consulara UE a fost evaluata"
    recovery_actions_ro:
      - "Daca exista misiune romana disponibila, foloseste mai intai acea ruta"
    status: draft

  - id: confirm_specific_consular_notarial_service
    semantic_key: confirm_specific_consular_notarial_service
    title_ro: "Confirma serviciul consular notarial sau de legalizare"
    instruction_ro: >-
      Daca serviciul este notarial sau de legalizare, verifica exact ce operatiune ofera misiunea
      si ce documente cere.
    sequence_hint: 90
    completion_evidence_ro:
      - "Serviciul consular notarial sau de legalizare a fost clarificat"
    recovery_actions_ro:
      - "Daca lista documentelor nu este confirmata, nu presupune o procedura standard"
    status: draft

  - id: open_visa_specific_route
    semantic_key: open_visa_specific_route
    title_ro: "Deschide ruta specifica pentru viza"
    instruction_ro: >-
      Daca serviciul vizat este o viza pentru Romania, foloseste ruta dedicata si portalul oficial
      relevant.
    sequence_hint: 100
    completion_evidence_ro:
      - "Ruta specifica pentru viza a fost identificata"
    recovery_actions_ro:
      - "Daca tipul de viza nu este clar, verifica-l inainte de depunere"
    status: draft

  - id: identify_exact_consular_service
    semantic_key: identify_exact_consular_service
    title_ro: "Identifica exact serviciul consular"
    instruction_ro: >-
      Pentru categoriile neclare sau alte servicii, identifica exact procedura din catalogul live al
      misiunii.
    sequence_hint: 110
    completion_evidence_ro:
      - "Serviciul consular exact a fost identificat"
    recovery_actions_ro:
      - "Daca nu gasesti corespondenta clara, confirma procedura direct in catalogul oficial al misiunii"
    status: draft

requirement_templates: []
