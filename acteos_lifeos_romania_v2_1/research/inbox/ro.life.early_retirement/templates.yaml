# Step & requirement templates for ro.life.early_retirement (life.early_retirement).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: prepare_early_retirement_application
    semantic_key: prepare_early_retirement_application
    title_ro: "Pregateste cererea pentru pensia anticipata"
    instruction_ro: >-
      Dupa verificarea varstei standard, a stagiului si a diminuarii, pregateste cererea si
      documentele pentru pensia anticipata.
    sequence_hint: 10
    completion_evidence_ro:
      - "Cererea pentru pensia anticipata este pregatita"
    recovery_actions_ro:
      - "Daca stagiul eligibil sau fereastra de anticipare nu sunt clare, revino la verificare"
    status: draft

  - id: recalculate_qualifying_stage_without_excluded_periods
    semantic_key: recalculate_qualifying_stage_without_excluded_periods
    title_ro: "Recalculeaza stagiul eligibil fara perioadele excluse"
    instruction_ro: >-
      Recalculeaza stagiul contributiv eligibil fara perioadele care nu deschid dreptul la pensie
      anticipata.
    sequence_hint: 20
    completion_evidence_ro:
      - "Stagiul eligibil a fost recalculat"
    recovery_actions_ro:
      - "Daca perioadele excluse nu sunt clar delimitate, nu trata stagiul ca final"
    status: draft

  - id: submit_early_retirement_application
    semantic_key: submit_early_retirement_application
    title_ro: "Depune cererea de pensie anticipata"
    instruction_ro: >-
      Dupa pregatirea dosarului, depune cererea la casa teritoriala competenta pe canalul relevant.
    sequence_hint: 30
    completion_evidence_ro:
      - "Cererea de pensie anticipata este pregatita sau depusa"
    recovery_actions_ro:
      - "Daca lipseste un document din dosar, completeaza-l inainte de depunere"
    status: draft

  - id: monitor_ex_officio_conversion_to_old_age
    semantic_key: monitor_ex_officio_conversion_to_old_age
    title_ro: "Urmareste transformarea din oficiu in pensie pentru limita de varsta"
    instruction_ro: >-
      Dupa acordarea pensiei anticipate, urmareste transformarea din oficiu la implinirea
      conditiilor pentru pensia de limita de varsta.
    sequence_hint: 40
    completion_evidence_ro:
      - "Etapa de urmarire a transformarii din oficiu a fost clarificata"
    recovery_actions_ro:
      - "Daca dreptul nu este inca deschis, nu activa aceasta ramura"
    status: draft

requirement_templates:
  - id: req.annex4_early_retirement_application
    title_ro: "Cererea Anexa nr. 4 pentru pensie anticipata"
    description_ro: >-
      Cererea folosita pentru pensia anticipata, conform formularului indicat de event card.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Cererea Anexa nr. 4"
    readiness_checks:
      - "Cererea pentru pensie anticipata este completata"
    status: draft
