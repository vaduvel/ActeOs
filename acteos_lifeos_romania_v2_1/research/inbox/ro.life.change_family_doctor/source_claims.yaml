- id: claim.change_gp.early_exceptions
  source_id: src.cnas.contract_framework_2026
  snapshot_id: pending
  statement: 'Schimbarea înainte de 6 luni este permisă în cazurile enumerate: decesul medicului, ieșirea/suspendarea din
    contract, preluarea praxisului, mutarea domiciliului în altă localitate, situații de detenție, mobilitatea personalului
    din sistemele speciale și încetarea raporturilor medicului din aceste sisteme.'
  url: https://cnas.ro/wp-content/uploads/2026/01/HG-521_2023-actualizata.pdf
  publisher: Casa Națională de Asigurări de Sănătate
  authority_level: national_normative
  evidence_excerpt: 'îşi pot schimba medicul de familie înaintea expirării termenului de 6 luni în următoarele situaţii: a)
    decesul ... b) ... nu se mai află în relaţie contractuală ... c) a fost preluat praxisul ... d) ... schimbă domiciliul
    dintr-o localitate în alta'
  locator: HG nr. 521/2023 actualizată, art. 12 alin. (1), PDF p. 37
  accessed_at: '2026-06-25'
  confidence: verified
  freshness_class: critical
  status: active
  legal_rank: HG nr. 521/2023, art. 12
  territory_ids:
  - ro
  effective_from: '2023-07-01'
