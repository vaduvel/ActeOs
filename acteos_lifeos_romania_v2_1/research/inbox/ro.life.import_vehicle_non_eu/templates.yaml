# Step & requirement templates for ro.life.import_vehicle_non_eu (life.import_vehicle_non_eu).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: complete_customs_clearance
    semantic_key: complete_customs_clearance
    title_ro: "Clarifica vama si TVA la import"
    instruction_ro: >-
      Inainte de RAR si inmatriculare, pregateste dovada situatiei vamale si a importului pentru vehiculul din afara UE.
    sequence_hint: 10
    completion_evidence_ro:
      - "Ruta vamala si de import a fost pregatita"
    recovery_actions_ro:
      - "Daca situatia vamala nu este finalizata sau clarificata, nu continua dosarul de inmatriculare"
    status: draft

  - id: obtain_rar_civ_and_required_checks
    semantic_key: obtain_rar_civ_and_required_checks
    title_ro: "Obtine CIV RAR si verificarile necesare"
    instruction_ro: >-
      Pregateste ruta RAR pentru CIV si verificarile aplicabile dupa clarificarea importului.
    sequence_hint: 20
    completion_evidence_ro:
      - "Ruta RAR pentru CIV si verificari este pregatita"
    recovery_actions_ro:
      - "Daca documentele straine sau cerintele RAR lipsesc, completeaza dosarul inainte de programare"
    status: draft

  - id: declare_vehicle_at_local_tax_authority
    semantic_key: declare_vehicle_at_local_tax_authority
    title_ro: "Declara vehiculul la autoritatea fiscala locala"
    instruction_ro: >-
      Dupa clarificarea documentului de proprietate si a importului, pregateste declararea fiscala locala.
    sequence_hint: 30
    completion_evidence_ro:
      - "Ruta de declarare fiscala locala a fost pregatita"
    recovery_actions_ro:
      - "Daca actul de proprietate nu este inregistrat fiscal, nu continua dosarul de inmatriculare"
    status: draft

  - id: submit_imported_vehicle_registration
    semantic_key: submit_imported_vehicle_registration
    title_ro: "Depune inmatricularea vehiculului importat"
    instruction_ro: >-
      Dupa vama, RAR, fiscalitate si platile aplicabile, pregateste depunerea dosarului de inmatriculare.
    sequence_hint: 40
    completion_evidence_ro:
      - "Dosarul de inmatriculare pentru vehiculul importat din afara UE este pregatit"
    recovery_actions_ro:
      - "Daca lipsesc documente de reprezentare, identitate sau plata, completeaza dosarul inainte de depunere"
    status: draft

