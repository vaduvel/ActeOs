# Step & requirement templates for ro.life.inheritance_succession (ro.life.inheritance_succession).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: assess_estate_heirs_and_debts
    semantic_key: assess_estate_heirs_and_debts
    title_ro: "Evalueaza bunurile, mostenitorii si datoriile"
    instruction_ro: >-
      Incepe prin a inventaria bunurile, datoriile si persoanele care pot intra
      in masa succesorala, fara a trage concluzii juridice neverificate.
    sequence_hint: 10
    completion_evidence_ro:
      - "Evaluarea initiala a masei succesorale a fost pregatita"
    recovery_actions_ro:
      - "Daca bunurile sau mostenitorii nu sunt clarificati, mentine cazul la etapa de evaluare"
    status: draft

  - id: obtain_death_certificate
    semantic_key: obtain_death_certificate
    title_ro: "Obtine certificatul de deces"
    instruction_ro: >-
      Pregateste certificatul de deces ca document de pornire pentru traseele succesorale ulterioare.
    sequence_hint: 20
    completion_evidence_ro:
      - "Certificatul de deces este disponibil pentru dosarul succesoral"
    recovery_actions_ro:
      - "Daca certificatul de deces lipseste, nu continua traseele succesorale dependente"
    status: draft

  - id: contact_competent_notary_for_succession
    semantic_key: contact_competent_notary_for_succession
    title_ro: "Contacteaza notarul competent pentru succesiune"
    instruction_ro: >-
      Dupa evaluarea initiala, confirma competenta notariala si traseul oficial al dosarului succesoral.
    sequence_hint: 30
    completion_evidence_ro:
      - "Ruta de confirmare a competentei notariale a fost pregatita"
    recovery_actions_ro:
      - "Daca competenta sau documentele notariale nu sunt clare, cere confirmare inainte de continuare"
    status: draft

  - id: review_land_book_and_local_tax_after_succession
    semantic_key: review_land_book_and_local_tax_after_succession
    title_ro: "Revizuieste cartea funciara si fiscalitatea locala dupa succesiune"
    instruction_ro: >-
      Daca exista bunuri imobile, pregateste verificarile ANCPI si fiscale dupa finalizarea certificatului succesoral.
    sequence_hint: 40
    completion_evidence_ro:
      - "Ruta de actualizare post-succesiune pentru imobile a fost pregatita"
    recovery_actions_ro:
      - "Daca nu exista imobile sau succesiunea nu este finalizata, nu activa aceasta ramura"
    status: draft

requirement_templates:
  - id: req.death_certificate
    title_ro: "Certificatul de deces"
    description_ro: >-
      Certificatul de deces folosit ca document de pornire pentru dosarul succesoral.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Certificat de deces"
    readiness_checks:
      - "Certificatul de deces este disponibil si lizibil"
    status: draft
