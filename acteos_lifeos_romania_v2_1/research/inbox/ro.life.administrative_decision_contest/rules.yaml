      field: special_judicial_procedure_checked
      value: true
    - op: eq
      field: special_judicial_procedure_exists
      value: true
  effects:
  - type: block
    tag: special_procedure_overrides_general_route
    message_ro: Nu aplica traseul general al Legii nr. 554/2004; urmează procedura judiciară specială identificată.
