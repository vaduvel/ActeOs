# Step & requirement templates for ro.life.military_reserve_status (ro.life.military_reserve_status).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: step.identify_reserve_status_goal
    semantic_key: step.identify_reserve_status_goal
    title_ro: "Identifica scopul legat de rezerva militara"
    instruction_ro: >-
      Clarifica daca utilizatorul vrea recrutare, verificare de statut, actualizare de date sau document militar.
    sequence_hint: 10
    completion_evidence_ro: ["Scopul legat de rezerva militara a fost clarificat"]
    recovery_actions_ro: ["Daca scopul nu este clar, nu combina rute diferite in acelasi checklist"]
    status: draft

  - id: step.start_volunteer_reservist_recruitment
    semantic_key: step.start_volunteer_reservist_recruitment
    title_ro: "Porneste recrutarea pentru rezervist voluntar"
    instruction_ro: >-
      Daca obiectivul este intrarea in rezerva voluntara, pregateste subtraseul de recrutare relevant.
    sequence_hint: 20
    completion_evidence_ro: ["Subtraseul pentru rezervist voluntar a fost identificat"]
    recovery_actions_ro: ["Daca obiectivul nu este recrutarea, foloseste ramura potrivita"]
    status: draft

  - id: step.request_confirmation_of_military_record
    semantic_key: step.request_confirmation_of_military_record
    title_ro: "Solicita confirmarea evidentei militare"
    instruction_ro: >-
      Pentru verificarea statutului, cere confirmarea evidentei la centrul militar competent.
    sequence_hint: 30
    completion_evidence_ro: ["Ruta de confirmare a evidentei militare a fost pregatita"]
    recovery_actions_ro: ["Daca checklistul exact nu este confirmat, mentine cazul in clarificare"]
    status: draft

  - id: step.notify_military_center_of_personal_data_change
    semantic_key: step.notify_military_center_of_personal_data_change
    title_ro: "Notifica schimbarea datelor personale"
    instruction_ro: >-
      Daca s-au schimbat datele personale, pregateste notificarea catre centrul militar de domiciliu.
    sequence_hint: 40
    completion_evidence_ro: ["Ruta de actualizare a datelor personale a fost pregatita"]
    recovery_actions_ro: ["Daca tipul schimbarii nu este clar, confirma documentele necesare inainte de depunere"]
    status: draft

  - id: step.request_reserve_retired_id
    semantic_key: step.request_reserve_retired_id
    title_ro: "Solicita legitimatia de rezervist sau retras"
    instruction_ro: >-
      Daca scopul este documentul de rezervist sau retras, pregateste trimiterea pe subtraseul documentului militar.
    sequence_hint: 50
    completion_evidence_ro: ["Subtraseul pentru legitimatia de rezervist sau retras a fost identificat"]
    recovery_actions_ro: ["Daca scopul real este altul, revino la ramura corespunzatoare"]
    status: draft

requirement_templates: []
