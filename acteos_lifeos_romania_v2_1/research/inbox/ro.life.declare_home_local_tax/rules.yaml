schema_ref: ../../../contracts/rule.schema.json
batch_id: batch08.declare_home_local_tax
event_type_id: ro.life.declare_home_local_tax
required_facts:
- jurisdiction_id
- owner_type
- home_case
status: draft
rules:
- id: rule.home_tax.timisoara.pf_new.v1
  canonical_rule_id: rule.home_tax.timisoara.pf_new
  event_type_id: ro.life.declare_home_local_tax
  jurisdiction_ids:
  - ro.tm.timisoara
  authority_level: uat
  competence_scope:
  - local_tax_declaration
  legal_rank: pagină oficială de serviciu
  severity: operational
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: jurisdiction_id
      value: ro.tm.timisoara
    - op: eq
      field: owner_type
      value: person
    - op: eq
      field: home_case
      value: new_residential_building
  effects:
  - type: include_step
    step_id: select_atlas_tax_case
  - type: include_step
    step_id: prepare_home_tax_file
  - type: include_step
    step_id: submit_home_tax_declaration
  - type: attach_channel
    channel_id: pmt_atlas_tax
  - type: emit_advice
    tag: atlas_case_controls_documents
    message_ro: Lista documentelor este afișată în Atlas după selectarea speței.
  source_claim_ids:
  - clm.home_tax.pmt.pf_new_atlas
  status: active
  reviewer_id: null
- id: rule.home_tax.timisoara.pf_apartment.v1
  canonical_rule_id: rule.home_tax.timisoara.pf_apartment
  event_type_id: ro.life.declare_home_local_tax
  jurisdiction_ids:
  - ro.tm.timisoara
  authority_level: uat
  competence_scope:
  - local_tax_declaration
  legal_rank: pagină oficială de serviciu
  severity: operational
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: jurisdiction_id
      value: ro.tm.timisoara
    - op: eq
      field: owner_type
      value: person
    - op: eq
      field: home_case
      value: apartment
  effects:
  - type: include_step
    step_id: select_atlas_tax_case
  - type: include_step
    step_id: prepare_home_tax_file
  - type: include_step
    step_id: submit_home_tax_declaration
  - type: attach_channel
    channel_id: pmt_atlas_tax
  - type: emit_advice
    tag: atlas_case_controls_documents
    message_ro: Lista documentelor este afișată în Atlas după selectarea speței.
  source_claim_ids:
  - clm.home_tax.pmt.pf_apartment_atlas
  status: active
  reviewer_id: null
- id: rule.home_tax.timisoara.pj_built_or_acquired.v1
  canonical_rule_id: rule.home_tax.timisoara.pj_built_or_acquired
  event_type_id: ro.life.declare_home_local_tax
  jurisdiction_ids:
  - ro.tm.timisoara
  authority_level: uat
  competence_scope:
  - local_tax_declaration
  legal_rank: pagină oficială de serviciu
  severity: operational
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: jurisdiction_id
      value: ro.tm.timisoara
    - op: eq
      field: owner_type
      value: legal_entity
    - op: in
      field: home_case
      values:
      - built_residential_building
      - acquired_residential_building
  effects:
  - type: include_step
    step_id: select_atlas_tax_case
  - type: include_step
    step_id: prepare_home_tax_file
  - type: include_requirement
    requirement_id: destination_supporting_documents_if_applicable
  - type: include_requirement
    requirement_id: utility_expense_supporting_documents_if_applicable
  - type: include_requirement
    requirement_id: copies_certified_conform_to_original
  - type: include_step
    step_id: submit_home_tax_declaration
  - type: attach_channel
    channel_id: pmt_atlas_tax
  source_claim_ids:
  - clm.home_tax.pmt.pj_built
  - clm.home_tax.pmt.pj_acquired
  status: active
  reviewer_id: null
- id: rule.home_tax.timisoara.unmapped_case.v1
  canonical_rule_id: rule.home_tax.timisoara.unmapped_case
  event_type_id: ro.life.declare_home_local_tax
  jurisdiction_ids:
  - ro.tm.timisoara
  authority_level: uat
  competence_scope:
  - local_tax_declaration
  legal_rank: pagină oficială de serviciu
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: jurisdiction_id
      value: ro.tm.timisoara
    - op: not
      arg:
        op: any
        args:
        - op: all
          args:
          - op: eq
            field: owner_type
            value: person
          - op: eq
            field: home_case
            value: new_residential_building
        - op: all
          args:
          - op: eq
            field: owner_type
            value: person
          - op: eq
            field: home_case
            value: apartment
        - op: all
          args:
          - op: eq
            field: owner_type
            value: legal_entity
          - op: in
            field: home_case
            values:
            - built_residential_building
            - acquired_residential_building
  effects:
  - type: include_step
    step_id: select_atlas_tax_case
  - type: attach_channel
    channel_id: pmt_atlas_tax
  - type: require_confirmation
    tag: confirm_atlas_home_case
    message_ro: Speța exactă și documentele obligatorii trebuie confirmate în Atlas.
  source_claim_ids:
  - clm.home_tax.pmt.index
  status: in_review
  reviewer_id: null
- id: rule.home_tax.other_uat.v1
  canonical_rule_id: rule.home_tax.other_uat
  event_type_id: ro.life.declare_home_local_tax
  jurisdiction_ids:
  - ro
  authority_level: uat
  competence_scope:
  - local_tax_declaration
  legal_rank: procedură locală
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: neq
    field: jurisdiction_id
    value: ro.tm.timisoara
  effects:
  - type: include_step
    step_id: identify_competent_local_tax_authority
  - type: require_confirmation
    tag: confirm_local_home_tax_procedure
    message_ro: Procedura, formularul și canalul UAT-ului competent trebuie confirmate local.
  - type: emit_advice
    tag: verified_with_local_gap
    message_ro: Datele operaționale verificate în acest batch sunt pentru Timișoara.
  source_claim_ids:
  - clm.home_tax.pmt.index
  status: in_review
  reviewer_id: null
- id: rule.home_tax.deadline_confirmation.v1
  canonical_rule_id: rule.home_tax.deadline_confirmation
  event_type_id: ro.life.declare_home_local_tax
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope:
  - local_tax_deadline
  legal_rank: lege — text indisponibil pentru extragere
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: const
    value: true
  effects:
  - type: require_confirmation
    tag: confirm_current_home_tax_declaration_deadline
    message_ro: Termenul național curent de declarare trebuie reconfirmat din textul oficial disponibil al Codului fiscal.
  source_claim_ids:
  - clm.home_tax.cod_fiscal_unavailable
  status: in_review
  reviewer_id: null
