# Step & requirement templates for ro.life.construction_start_notice (life.construction_start_notice).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: record_actual_start_date
    semantic_key: record_actual_start_date
    title_ro: "Stabileste data reala de incepere"
    instruction_ro: >-
      Stabileste data efectiva a inceperii lucrarilor inainte de trimiterea instiintarilor.
    sequence_hint: 10
    completion_evidence_ro:
      - "Data efectiva de incepere este cunoscuta"
    recovery_actions_ro:
      - "Daca data nu este clara, nu finaliza instiintarile"
    status: draft

  - id: verify_issuer_and_isc_notifications
    semantic_key: verify_issuer_and_isc_notifications
    title_ro: "Verifica notificarile catre emitent si ISC"
    instruction_ro: >-
      Verifica separat obligatia fata de emitentul autorizatiei si fata de inspectoratul teritorial
      in constructii.
    sequence_hint: 20
    completion_evidence_ro:
      - "Necesitatea ambelor notificari a fost verificata"
    recovery_actions_ro:
      - "Daca una dintre notificari lipseste, nu marca etapa ca finalizata"
    status: draft

  - id: submit_start_notice_to_timisoara
    semantic_key: submit_start_notice_to_timisoara
    title_ro: "Trimite instiintarea catre emitent in Timisoara"
    instruction_ro: >-
      Pentru autorizatiile din Timisoara, pregateste instiintarea de incepere si documentele cerute
      de serviciul local.
    sequence_hint: 30
    completion_evidence_ro:
      - "Instiintarea pentru emitentul din Timisoara este pregatita sau transmisa"
    recovery_actions_ro:
      - "Daca lipsesc documentele cerute local, completeaza-le inainte de trimitere"
    status: draft

  - id: identify_issuer_notice_channel
    semantic_key: identify_issuer_notice_channel
    title_ro: "Identifica canalul emitentului pentru alte UAT-uri"
    instruction_ro: >-
      Pentru alte UAT-uri, identifica ruta locala prin care se transmite instiintarea de incepere.
    sequence_hint: 40
    completion_evidence_ro:
      - "Canalul local al emitentului a fost identificat"
    recovery_actions_ro:
      - "Daca ruta locala nu este confirmata, nu presupune procedura din Timisoara"
    status: draft

  - id: submit_start_notice_to_territorial_isc
    semantic_key: submit_start_notice_to_territorial_isc
    title_ro: "Trimite instiintarea catre ISC teritorial"
    instruction_ro: >-
      Pregateste notificarea catre inspectoratul teritorial in constructii, separata de cea catre emitent.
    sequence_hint: 50
    completion_evidence_ro:
      - "Instiintarea catre ISC este pregatita sau transmisa"
    recovery_actions_ro:
      - "Daca ruta curenta a ISC nu este confirmata, clarific-o inainte de trimitere"
    status: draft

requirement_templates:
  - id: actual_construction_start_date
    title_ro: "Data efectiva a inceperii lucrarilor"
    description_ro: >-
      Data efectiva a inceperii lucrarilor, folosita pentru instiintarile obligatorii.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Data efectiva a inceperii lucrarilor"
    readiness_checks:
      - "Data inceperii este confirmata"
    status: draft

  - id: standard_start_notice
    title_ro: "Instiintarea standard de incepere"
    description_ro: >-
      Formularul sau documentul standard folosit pentru instiintarea de incepere a lucrarilor.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Instiintare standard de incepere"
    readiness_checks:
      - "Instiintarea standard este completata"
    status: draft

  - id: building_permit_copy
    title_ro: "Copie a autorizatiei de construire"
    description_ro: >-
      Copia autorizatiei de construire folosita la instiintarea de incepere.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Copie a autorizatiei de construire"
    readiness_checks:
      - "Autorizatia este disponibila in copie pentru notificare"
    status: draft

  - id: identity_document
    title_ro: "Act de identitate"
    description_ro: >-
      Actul de identitate al persoanei care transmite instiintarea sau al reprezentantului folosit.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Act de identitate"
    readiness_checks:
      - "Persoana care transmite poate fi identificata"
    status: draft

  - id: authorisation_fee_regularization_proof_if_applicable
    title_ro: "Dovada regularizarii taxei autorizatiei, daca este cazul"
    description_ro: >-
      Dovada regularizarii taxei de autorizatie, daca ruta locala o cere la inceperea lucrarilor.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Dovada regularizarii taxei"
    readiness_checks:
      - "Regularizarea taxei este acoperita daca este aplicabila"
    status: draft

  - id: power_of_attorney
    title_ro: "Imputernicire"
    description_ro: >-
      Imputernicirea folosita cand instiintarea este transmisa prin reprezentant.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Imputernicire"
    readiness_checks:
      - "Imputernicirea este disponibila daca se foloseste reprezentant"
    status: draft
