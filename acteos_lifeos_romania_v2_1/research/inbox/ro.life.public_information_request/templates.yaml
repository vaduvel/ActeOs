step_templates:
  - id: classify_request_as_public_information
    semantic_key: public_information_request_classify
    title_ro: "Stabileste daca cererea intra sub Legea 544"
    instruction_ro: >-
      Clarifica daca informatia cautata este informatie de interes public si
      daca autoritatea aleasa este cea care o detine.
    sequence_hint: 10
    completion_evidence_ro:
      - "Cadrul cererii si autoritatea vizata sunt clarificate."
    recovery_actions_ro:
      - "Daca nu este clar cine detine informatia, confirma mai intai autoritatea relevanta."
    status: draft
  - id: submit_law_544_request
    semantic_key: public_information_request_choose_submission_route
    title_ro: "Alege ruta de depunere"
    instruction_ro: >-
      Decide daca folosesti depunerea electronica, cererea scrisa ori adresarea
      verbala, in functie de situatie si de dovada pe care vrei sa o pastrezi.
    sequence_hint: 20
    completion_evidence_ro:
      - "Ruta de depunere este aleasa."
    recovery_actions_ro:
      - "Daca ai nevoie de trasabilitate, prefera o ruta care lasa dovada clara a solicitarii."
    status: draft
  - id: prepare_written_information_request
    semantic_key: public_information_request_prepare_written
    title_ro: "Pregateste cererea scrisa"
    instruction_ro: >-
      Redacteaza cererea cu informatia ceruta, destinatarul si datele de
      raspuns necesare canalului ales.
    sequence_hint: 30
    completion_evidence_ro:
      - "Cererea scrisa este pregatita."
    recovery_actions_ro:
      - "Daca formularea este prea vaga, precizeaza informatia cautata mai exact."
    status: draft
  - id: submit_information_request_electronically
    semantic_key: public_information_request_submit_electronic
    title_ro: "Trimite cererea electronic"
    instruction_ro: >-
      Depune cererea prin e-mail sau prin formularul oficial disponibil si
      pastreaza confirmarea transmiterii.
    sequence_hint: 40
    completion_evidence_ro:
      - "Cererea a fost transmisa pe canalul electronic oficial."
    recovery_actions_ro:
      - "Daca nu exista confirmare, salveaza dovada trimiterii si verifica adresa oficiala."
    status: draft
  - id: ask_information_verbally
    semantic_key: public_information_request_ask_verbally
    title_ro: "Solicita verbal informatia"
    instruction_ro: >-
      Adreseaza verbal cererea cand informatia poate fi furnizata imediat prin
      relatia cu publicul sau telefonic, fara a pierde din vedere limitele
      acestei rute.
    sequence_hint: 50
    completion_evidence_ro:
      - "Solicitarea verbala a fost adresata."
    recovery_actions_ro:
      - "Daca raspunsul nu poate fi dat pe loc, treci la o cerere scrisa."
    status: draft
  - id: submit_law_544_request_in_writing
    semantic_key: public_information_request_submit_written
    title_ro: "Depune cererea in scris"
    instruction_ro: >-
      Depune cererea semnata pe suportul acceptat de autoritate si pastreaza
      dovada inregistrarii sau a expedierii.
    sequence_hint: 60
    completion_evidence_ro:
      - "Cererea scrisa are dovada de depunere."
    recovery_actions_ro:
      - "Daca lipseste dovada, solicita numar de inregistrare sau confirma primirea."
    status: draft
  - id: receive_standard_response
    semantic_key: public_information_request_receive_standard_response
    title_ro: "Primeste raspunsul standard"
    instruction_ro: >-
      Verifica daca raspunsul primit acopera integral cererea si daca a fost
      comunicat prin canalul indicat.
    sequence_hint: 70
    completion_evidence_ro:
      - "Exista un raspuns standard primit de la autoritate."
    recovery_actions_ro:
      - "Daca raspunsul este incomplet, noteaza exact ce lipseste."
    status: draft
  - id: receive_extended_response
    semantic_key: public_information_request_receive_extended_response
    title_ro: "Gestioneaza prelungirea termenului"
    instruction_ro: >-
      Daca autoritatea comunica prelungirea, pastreaza notificarea si noul
      termen indicat pentru raspuns.
    sequence_hint: 80
    completion_evidence_ro:
      - "Prelungirea termenului este documentata."
    recovery_actions_ro:
      - "Daca nu primesti apoi raspunsul promis, foloseste dovada prelungirii in pasul urmator."
    status: draft
  - id: receive_reasoned_refusal
    semantic_key: public_information_request_receive_refusal
    title_ro: "Analizeaza refuzul motivat"
    instruction_ro: >-
      Citeste motivele refuzului si verifica daca raspunsul explica expres de
      ce informatia nu este furnizata.
    sequence_hint: 90
    completion_evidence_ro:
      - "Refuzul motivat este primit si pastrat."
    recovery_actions_ro:
      - "Daca refuzul este neclar sau insuficient, pregateste contestarea administrativa."
    status: draft
  - id: submit_administrative_complaint_to_authority_head
    semantic_key: public_information_request_submit_administrative_complaint
    title_ro: "Depune reclamatia administrativa"
    instruction_ro: >-
      Formuleaza reclamatia administrativa catre conducatorul autoritatii si
      ataseaza dovada cererii initiale si a raspunsului sau a lipsei lui.
    sequence_hint: 100
    completion_evidence_ro:
      - "Reclamatia administrativa este depusa."
    recovery_actions_ro:
      - "Daca lipseste o piesa de dovada, completeaza dosarul inainte de transmitere."
    status: draft
  - id: receive_administrative_complaint_response
    semantic_key: public_information_request_receive_administrative_complaint_response
    title_ro: "Primeste raspunsul la reclamatia administrativa"
    instruction_ro: >-
      Urmareste raspunsul la reclamatia administrativa si verifica daca remediaza
      refuzul sau intarzierea initiala.
    sequence_hint: 110
    completion_evidence_ro:
      - "Exista un raspuns sau o lipsa documentata de raspuns la reclamatia administrativa."
    recovery_actions_ro:
      - "Daca problema persista, pregateste plangerea in instanta."
    status: draft
  - id: submit_court_complaint
    semantic_key: public_information_request_submit_court_complaint
    title_ro: "Depune plangerea in instanta"
    instruction_ro: >-
      Pregateste actiunea in instanta cu documentele stranse pe parcursul
      cererii si contestarii administrative.
    sequence_hint: 120
    completion_evidence_ro:
      - "Dosarul pentru instanta este pregatit sau depus."
    recovery_actions_ro:
      - "Daca lipsesc dovezi din etapele anterioare, completeaza-le inainte de sesizare."
    status: draft

requirement_templates:
  - id: target_authority
    title_ro: "Autoritatea vizata"
    description_ro: >-
      Institutia publica despre care se considera ca detine informatia ceruta.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Denumirea autoritatii sau institutiei publice vizate."
    readiness_checks:
      - "Autoritatea este identificata suficient pentru a primi cererea."
    status: draft
  - id: identifiable_information_description
    title_ro: "Descrierea identificabila a informatiei"
    description_ro: >-
      Descriere suficient de precisa a informatiei de interes public cerute.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Text clar care descrie documentul, datele sau informatia solicitata."
    readiness_checks:
      - "Cererea nu este atat de vaga incat autoritatea sa nu poata identifica informatia."
    status: draft
  - id: requester_name
    title_ro: "Numele solicitantului"
    description_ro: >-
      Numele persoanei care formuleaza cererea, atunci cand canalul ales il cere.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Numele complet al solicitantului."
    readiness_checks:
      - "Numele este trecut consecvent in cerere."
    status: draft
  - id: requester_signature
    title_ro: "Semnatura solicitantului"
    description_ro: >-
      Semnatura folosita pentru cererile scrise atunci cand forma aleasa o
      necesita.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Semnatura olografa sau forma acceptata de canalul oficial."
    readiness_checks:
      - "Ruta aleasa este una scrisa si cere semnatura."
    status: draft
  - id: response_address
    title_ro: "Adresa pentru raspuns"
    description_ro: >-
      Adresa postala sau electronica indicata autoritatii pentru comunicarea
      raspunsului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Adresa de e-mail, adresa postala sau alt canal de raspuns acceptat."
    readiness_checks:
      - "Adresa indicata poate primi efectiv raspunsul."
    status: draft
