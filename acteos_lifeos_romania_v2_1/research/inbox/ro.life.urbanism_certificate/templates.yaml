# Step & requirement templates for ro.life.urbanism_certificate (life.urbanism_certificate).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: define_purpose_and_property
    semantic_key: define_purpose_and_property
    title_ro: "Defineste scopul si imobilul"
    instruction_ro: >-
      Clarifica scopul cererii si identifica imobilul pentru care soliciti certificatul de urbanism.
    sequence_hint: 10
    completion_evidence_ro:
      - "Scopul si imobilul au fost clarificate"
    recovery_actions_ro:
      - "Daca scopul nu este explicit, nu continua pregatirea cererii"
    status: draft

  - id: select_timisoara_case
    semantic_key: select_timisoara_case
    title_ro: "Selecteaza cazul local din Timisoara"
    instruction_ro: >-
      Pentru Timisoara, alege cazul corect din portalul local inainte de depunere.
    sequence_hint: 20
    completion_evidence_ro:
      - "Cazul local pentru Timisoara a fost selectat"
    recovery_actions_ro:
      - "Daca imobilul nu este in Timisoara, foloseste autoritatea locala relevanta"
    status: draft

  - id: pay_issuance_fee
    semantic_key: pay_issuance_fee
    title_ro: "Achita taxa de emitere"
    instruction_ro: >-
      Achita taxa de emitere pe canalul local confirmat si pastreaza dovada platii.
    sequence_hint: 30
    completion_evidence_ro:
      - "Dovada platii taxei de emitere este disponibila"
    recovery_actions_ro:
      - "Daca ruta locala de plata nu este confirmata, nu presupune modalitatea"
    status: draft

  - id: submit_request
    semantic_key: submit_request
    title_ro: "Depune cererea"
    instruction_ro: >-
      Depune cererea de certificat de urbanism dupa ce ai completat datele despre scop si imobil.
    sequence_hint: 40
    completion_evidence_ro:
      - "Cererea a fost depusa"
    recovery_actions_ro:
      - "Daca lipsesc date esentiale despre imobil, completeaza-le inainte de depunere"
    status: draft

  - id: download_certificate
    semantic_key: download_certificate
    title_ro: "Descarca certificatul"
    instruction_ro: >-
      Daca ruta locala permite livrare digitala, descarca certificatul emis si pastreaza-l.
    sequence_hint: 50
    completion_evidence_ro:
      - "Certificatul a fost descarcat sau pregatit pentru ridicare"
    recovery_actions_ro:
      - "Daca livrarea digitala nu este disponibila, urmareste ridicarea pe canalul indicat"
    status: draft

  - id: receive_certificate
    semantic_key: receive_certificate
    title_ro: "Primeste certificatul de urbanism"
    instruction_ro: >-
      Urmareste emiterea certificatului de urbanism dupa inregistrarea cererii.
    sequence_hint: 60
    completion_evidence_ro:
      - "Certificatul de urbanism a fost primit"
    recovery_actions_ro:
      - "Daca termenul a trecut fara raspuns, urmareste dosarul la autoritatea competenta"
    status: draft

  - id: obtain_certificate_before_notarial_operation
    semantic_key: obtain_certificate_before_notarial_operation
    title_ro: "Obtine certificatul inaintea operatiunii notariale"
    instruction_ro: >-
      Pentru operatiunile enumerate care cer certificat de urbanism, nu continua actul notarial fara
      acest document.
    sequence_hint: 70
    completion_evidence_ro:
      - "Necesitatea certificatului inainte de operatiunea notariala a fost verificata"
    recovery_actions_ro:
      - "Daca scopul este unul notarial acoperit, opreste operatiunea pana la obtinere"
    status: draft

requirement_templates:
  - id: property_locality
    title_ro: "Localitatea imobilului"
    description_ro: >-
      Localitatea in care se afla imobilul pentru care ceri certificatul de urbanism.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Localitatea imobilului"
    readiness_checks:
      - "Localitatea imobilului este cunoscuta"
    status: draft

  - id: request_purpose
    title_ro: "Scopul cererii"
    description_ro: >-
      Scopul explicit pentru care este solicitat certificatul de urbanism.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Scop explicit al cererii"
    readiness_checks:
      - "Scopul este formulat clar"
    status: draft

  - id: cadastral_number
    title_ro: "Numarul cadastral"
    description_ro: >-
      Numarul cadastral al imobilului, atunci cand datele cadastrale sunt aplicabile.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Numar cadastral"
    readiness_checks:
      - "Numarul cadastral este disponibil daca este aplicabil"
    status: draft

  - id: land_book_number
    title_ro: "Numarul de carte funciara"
    description_ro: >-
      Numarul de carte funciara al imobilului, daca este aplicabil pentru cerere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Numar de carte funciara"
    readiness_checks:
      - "Numarul de carte funciara este disponibil daca este aplicabil"
    status: draft
