# Step & requirement templates for ro.life.military_enrollment (ro.life.military_enrollment).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: step.identify_available_sgp_unit
    semantic_key: step.identify_available_sgp_unit
    title_ro: "Identifica unitatea disponibila pentru SGP"
    instruction_ro: >-
      Pentru ruta soldat gradat profesionist, identifica unitatea cu post disponibil si canalul de inscriere.
    sequence_hint: 10
    completion_evidence_ro: ["Unitatea relevanta pentru SGP a fost identificata"]
    recovery_actions_ro: ["Daca nu este clar ca ruta este SGP, nu aplica acest checklist altor cariere militare"]
    status: draft

  - id: step.submit_sgp_application_at_unit
    semantic_key: step.submit_sgp_application_at_unit
    title_ro: "Depune dosarul SGP la unitate"
    instruction_ro: >-
      Pregateste si depune dosarul SGP la unitatea relevanta, cu documentele publicate.
    sequence_hint: 20
    completion_evidence_ro: ["Dosarul SGP este pregatit pentru depunere"]
    recovery_actions_ro: ["Daca lipsesc documente de baza, completeaza dosarul inainte de depunere"]
    status: draft

  - id: step.complete_military_selection
    semantic_key: step.complete_military_selection
    title_ro: "Parcurge selectia militara"
    instruction_ro: >-
      Urmeaza etapa de selectie militara pentru ruta aleasa, conform procedurii publicate.
    sequence_hint: 30
    completion_evidence_ro: ["Etapa de selectie militara a fost pregatita sau parcursa"]
    recovery_actions_ro: ["Daca nu este clar ca selectia se aplica rutei alese, confirma inainte de prezentare"]
    status: draft

  - id: step.complete_medical_examination
    semantic_key: step.complete_medical_examination
    title_ro: "Parcurge examinarea medicala"
    instruction_ro: >-
      Dupa selectie sau in paralel cu aceasta, urmeaza examinarea medicala pe traseul publicat.
    sequence_hint: 40
    completion_evidence_ro: ["Etapa de examinare medicala a fost pregatita sau parcursa"]
    recovery_actions_ro: ["Daca lipsesc documentele medicale cerute, completeaza dosarul inainte de examinare"]
    status: draft

  - id: step.contact_military_center_at_domicile
    semantic_key: step.contact_military_center_at_domicile
    title_ro: "Contacteaza centrul militar de domiciliu"
    instruction_ro: >-
      Pentru ruta de rezervist voluntar, foloseste centrul militar de domiciliu ca punct de intrare.
    sequence_hint: 50
    completion_evidence_ro: ["Centrul militar de domiciliu a fost identificat pentru ruta relevanta"]
    recovery_actions_ro: ["Daca ruta nu este rezervist voluntar, foloseste traseul militar corect"]
    status: draft

  - id: step.submit_volunteer_reservist_file
    semantic_key: step.submit_volunteer_reservist_file
    title_ro: "Depune dosarul pentru rezervist voluntar"
    instruction_ro: >-
      Pregateste si depune dosarul pentru rezervist voluntar la centrul militar competent.
    sequence_hint: 60
    completion_evidence_ro: ["Dosarul pentru rezervist voluntar este pregatit pentru depunere"]
    recovery_actions_ro: ["Daca lipsesc documentele de baza sau de competenta, completeaza dosarul inainte de depunere"]
    status: draft

  - id: step.identify_exact_military_career_route
    semantic_key: step.identify_exact_military_career_route
    title_ro: "Identifica exact ruta de cariera militara"
    instruction_ro: >-
      Daca obiectivul este alta forma de cariera militara, clarifica ruta exacta inainte de a genera dosarul.
    sequence_hint: 70
    completion_evidence_ro: ["Ruta exacta de cariera militara a fost clarificata"]
    recovery_actions_ro: ["Daca ruta ramane neconfirmata, mentine cazul in clarificare si nu reutiliza lista SGP"]
    status: draft

