claims:
  - id: claim.veh.fiscal_declaration_30d
    source_id: src.cod_fiscal_227_2015
    snapshot_id: pending
    statement: Orice persoana care dobandeste un mijloc de transport are obligatia de a depune o declaratie fiscala la organul fiscal local in termen de 30 de zile de la data dobandirii; depunerea peste termen se sanctioneaza conform Codului Fiscal.
    url: https://ditl5.ro/persoane-fizice/
    publisher: DITL Sector 5 (in aplicarea Legii 227/2015)
    authority_level: institution
    evidence_excerpt: "Termenul legal de depunere a declaratiei pentru mijloacele de transport este de 30 de zile ... se sanctioneaza cu amenda conform Legii nr. 227/2015"
    locator: Cod Fiscal L227/2015, impozitul pe mijloacele de transport; DITL5
    accessed_at: '2026-06-25'
    confidence: verified
    freshness_class: critical
    status: active
    corroborated_by: [src.ditl3, src.mfinante_titlul9]
  - id: claim.veh.transcription_90d
    source_id: src.ordin_1501_2006
    snapshot_id: pending
    statement: Noul proprietar are obligatia sa solicite transcrierea transmiterii dreptului de proprietate in termen de maximum 90 de zile de la data dobandirii (data contractului).
    url: https://onedauneauto.ro/acte-necesare-inmatriculare-auto-in-romania/
    publisher: sursa secundara (de confirmat din Ordinul MAI 1501/2006)
    authority_level: institution
    evidence_excerpt: "trebuie finalizata in maximum 90 de zile de la data contractului"
    locator: Ordinul MAI 1501/2006, art. 8 (de confirmat locator exact)
    accessed_at: '2026-06-25'
    confidence: needs_confirmation
    freshness_class: critical
    status: in_review
    note: termen critic; doar surse secundare il citeaza. NU se afiseaza ca termen ferm pana la confirmarea din textul Ordinului 1501/2006.
  - id: claim.veh.transcription_docs
    source_id: src.dgpci_transcriere
    snapshot_id: pending
    statement: Pentru transcrierea unui vehicul inmatriculat anterior in Romania se prezinta cererea solicitantului, documentul care atesta dreptul de proprietate (original si copie), CIV valabil, ITP in termen, RCA si dovada declararii fiscale la organul fiscal local.
    url: https://dgpci.mai.gov.ro/document-details/inmatriculari/5ab11465fa4e9422012c2b67
    publisher: DGPCI / DRPCIV (MAI)
    authority_level: national_operational
    evidence_excerpt: "vehiculul trebuie sa beneficieze de o carte de identitate a vehiculului valabila, si de inspectie tehnica periodica aflata in termenul de valabilitate ... dovada declararii fiscale la organul fiscal local"
    locator: DGPCI - transcriere vehicul inmatriculat anterior in Romania
    accessed_at: '2026-06-25'
    confidence: verified
    freshness_class: operational
    status: active
  - id: claim.veh.transcription_fee_37
    source_id: src.avocatnet
    snapshot_id: pending
    statement: Daca se pastreaza numerele vechi, singura taxa obligatorie pentru transcriere este contravaloarea noului certificat de inmatriculare, in valoare de 37 lei.
    url: https://www.avocatnet.ro/articol_24174/Cum-se-transcrie-un-autoturism-dupa-vanzare.html
    publisher: Avocatnet.ro (secundar)
    authority_level: institution
    evidence_excerpt: "singura taxa care trebuie achitata este cea pentru un nou certificat de inmatriculare, in valoare de 37 de lei"
    locator: Avocatnet - transcriere autoturism
    accessed_at: '2026-06-25'
    confidence: needs_confirmation
    freshness_class: operational
    status: in_review
    note: cuantum taxa din sursa secundara; de confirmat din tariful oficial DRPCIV (apar si valori de 49 lei in alte surse).
