# Step & requirement templates for ro.life.bought_used_vehicle_ro (life.vehicle_bought_used).
# Transcribed from event_card.md (R1A-veh1). No legal text fabricated.

step_templates:
  - id: declare_vehicle_local_tax
    semantic_key: declare_vehicle_local_tax
    title_ro: "Declară vehiculul la taxele locale"
    instruction_ro: >-
      După achiziționarea vehiculului, declară-l la Direcția Fiscală a Municipiului Timișoara
      (dfmt.ro) în termen de 30 de zile de la data contractului. Vei obține un certificat
      de atestare fiscală care dovedește lipsa datoriilor.
    sequence_hint: 10
    completion_evidence_ro:
      - "Adeverința de la DITL/DFMT a fost obținută cu data depunerii"
      - "Vehiculul apare înregistrat pe numele noului proprietar la organul fiscal local"
    recovery_actions_ro:
      - "Dacă nu ai primit confirmarea în 30 de zile, contactează DFMT"
    status: draft

  - id: transcribe_vehicle
    semantic_key: transcribe_vehicle
    title_ro: "Transcrie vehiculul la SPCRPCIV"
    instruction_ro: >-
      În termen de 90 de zile (termen de confirmat) de la data contractului, solicită
      transcrierea dreptului de proprietate la SPCRPCIV Timiș. Vei avea nevoie de CIV valabil,
      ITP în termen și dovada declarării fiscale.
    sequence_hint: 20
    completion_evidence_ro:
      - "Cererea de transcriere a fost depusă și înregistrată"
      - "A fost emis noul certificat de înmatriculare"
    recovery_actions_ro:
      - "Dacă transcrierea e respinsă, verifică cerințele lipsă (ITP, RCA, fiscal)"
    status: draft

  - id: do_itp
    semantic_key: do_itp
    title_ro: "Efectuează ITP"
    instruction_ro: >-
      Dacă ITP-ul vehiculului nu este în termen de valabilitate, efectuează o inspecție
      tehnică periodică la o stație autorizată înainte de transcriere.
    sequence_hint: 15
    completion_evidence_ro:
      - "ITP-a fost efectuată și este în termen"
    recovery_actions_ro:
      - "Lasă ITP-ul la o stație autorizată de Registrul Auto Român"
    status: draft

requirement_templates:
  - id: req.rca_buyer
    title_ro: "Poliță RCA valabilă pe numele cumpărătorului"
    description_ro: >-
      Asigurare de răspundere civilă auto (RCA) încheiată pe numele tău, valabilă la data transcrierii.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Poliță RCA emisă de un asigurător autorizat, în original sau copie scanată"
    readiness_checks:
      - "Verifică data expirării RCA"
      - "Verifică că numele asiguratului coincide cu cel din cartea de identitate"
    status: draft

  - id: req.new_plates_fee
    title_ro: "Dovada plății pentru plăcuțe noi (dacă nu păstrezi cele vechi)"
    description_ro: >-
      Dacă nu păstrezi numerele de înmatriculare vechi (keeps_old_plates=false), trebuie să
      plătești contravaloarea plăcuțelor noi și să prezinți dovada plății. Cuantumul exact
      se confirmă la ghișeu.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Chitanță de plată la SPCRPCIV / online prin ghișeul.ro"
    readiness_checks:
      - "Confirmă cuantumul exact la SPCRPCIV Timiș înainte de plată"
    status: draft

  - id: req.ownership_document
    title_ro: "Document de proprietate în original și copie"
    description_ro: >-
      Contract de vânzare-cumpărare în original (cerere, document de proprietate orig+copie)
      pentru transcriere.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Contract de vânzare-cumpărare semnat de ambele părți"
      - "Act de donație, moștenire, etc., după caz"
    readiness_checks:
      - "Verifică semnăturile și data contractului"
      - "Verifică transcrierea în cartea de identitate a vânzătorului"
    status: draft

  - id: req.fiscal_declaration_proof
    title_ro: "Dovada declarării fiscale la organul local"
    description_ro: >-
      Adeverință/certificat de atestare fiscală eliberată de organul fiscal local de la
      domiciliul cumpărătorului, prin care se atestă că vehiculul a fost declarat.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Adeverință emisă de DFMT/DITL în original"
    readiness_checks:
      - "Verifică că adeverința este în termen de valabilitate"
    status: draft
