# Step & requirement templates for ro.life.moved_home (life.moved).
#
# Authoring note: transcribed from event_card.md (batch R1A-1, accessed_at
# 2026-06-25) and the step/requirement ids referenced by rules.yaml; no extra
# legal content or invented amounts were added. NO fine amount is stated in the
# templates (the ID-card sanction figure is asserted only inside the rule
# warning, where it is sourced; the broader sanction-source conflict remains
# open). update_vehicle_registration and register_residence_visa are governed by
# needs_confirmation/in_review rules, so they are phrased as conditional and
# their exact deadlines are not asserted here.

step_templates:
  - id: update_identity_card
    semantic_key: update_identity_card
    title_ro: "Actualizează actul de identitate la noua adresă"
    instruction_ro: >-
      La schimbarea domiciliului cu carte de identitate simplă sau buletin, solicită un
      nou act de identitate în 15 zile de la mutare, la serviciul de evidența persoanelor.
      Adu actul de identitate vechi, certificatul de naștere și dovada noii adrese; dacă
      ești căsătorit, adu și certificatul de căsătorie, iar dacă te muți cu copii sub 14 ani,
      certificatele lor de naștere. La cartea electronică de identitate (CEI), schimbarea
      adresei se poate face fără un act nou — confirmă procedura curentă la serviciul de
      evidența persoanelor.
    sequence_hint: 10
    completion_evidence_ro:
      - "Cererea pentru noul act de identitate a fost înregistrată"
      - "Termenul de 15 zile de la mutare a fost respectat"
    recovery_actions_ro:
      - "Dacă ai depășit 15 zile, programează-te și depune cererea cât mai curând"
      - "Dacă ai carte electronică de identitate, confirmă dacă mai este nevoie de un act nou"
    status: draft

  - id: update_vehicle_registration
    semantic_key: update_vehicle_registration
    title_ro: "Actualizează certificatul de înmatriculare al vehiculului"
    instruction_ro: >-
      Dacă deții un vehicul și ți-ai schimbat domiciliul, certificatul de înmatriculare
      trebuie actualizat la noua adresă, la autoritatea de înmatriculări (DRPCIV).
      Termenul legal exact este în curs de confirmare din sursa oficială.
    sequence_hint: 20
    completion_evidence_ro:
      - "Actualizarea adresei pe certificatul de înmatriculare a fost solicitată"
    recovery_actions_ro:
      - "Confirmă termenul și documentele exacte la autoritatea de înmatriculări"
    status: draft

  - id: register_residence_visa
    semantic_key: register_residence_visa
    title_ro: "Solicită viza de reședință (flotant)"
    instruction_ro: >-
      Pentru reședință (flotant), solicită viza de reședință la serviciul de evidența
      persoanelor. Documentele și valabilitatea se confirmă din sursa oficială.
    sequence_hint: 30
    completion_evidence_ro:
      - "Cererea pentru viza de reședință a fost înregistrată"
    recovery_actions_ro:
      - "Confirmă documentele și valabilitatea vizei de reședință la serviciul de evidența persoanelor"
    status: draft

requirement_templates:
  - id: req.id_card_old
    title_ro: "Actul de identitate actual"
    description_ro: >-
      Actul de identitate deținut în prezent, prezentat la actualizarea adresei.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Carte de identitate / buletin"
    readiness_checks:
      - "Actul de identitate actual este disponibil"
    status: draft

  - id: req.birth_certificate
    title_ro: "Certificatul de naștere"
    description_ro: >-
      Certificatul de naștere al solicitantului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Certificat de naștere"
    readiness_checks:
      - "Certificatul de naștere este disponibil"
    status: draft

  - id: req.address_proof
    title_ro: "Dovada noii adrese"
    description_ro: >-
      Documentul care face dovada noii adrese de domiciliu.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Act de proprietate"
      - "Contract de închiriere / comodat"
      - "Alt document care atestă adresa"
    readiness_checks:
      - "Documentul atestă noua adresă de domiciliu"
    status: draft

  - id: req.marriage_certificate
    title_ro: "Certificatul de căsătorie"
    description_ro: >-
      Certificatul de căsătorie, necesar când solicitantul este căsătorit.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat de căsătorie"
    readiness_checks:
      - "Certificatul de căsătorie este disponibil, dacă este cazul"
    status: draft

  - id: req.children_birth_certificates
    title_ro: "Certificatele de naștere ale copiilor sub 14 ani"
    description_ro: >-
      Certificatele de naștere ale copiilor minori sub 14 ani care se mută împreună cu solicitantul.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat de naștere al copilului"
    readiness_checks:
      - "Certificatele de naștere ale copiilor sub 14 ani sunt disponibile, dacă este cazul"
    status: draft

  - id: req.host_consent
    title_ro: "Declarația de primire în spațiu a gazdei"
    description_ro: >-
      Când noua adresă este la o gazdă: declarația de primire în spațiu (consimțământul gazdei).
    obligation: conditional
    timing: now
    accepted_forms:
      - "Declarație de primire în spațiu a gazdei"
    readiness_checks:
      - "Declarația gazdei acoperă noua adresă, dacă este cazul"
    status: draft
