# Step & requirement templates for ro.life.nursery_enrollment (life.nursery_enrollment).
# Transcribed from event_card.md (B05_EDUCATION_1, an școlar 2026-2027). No legal text fabricated.
# Status: research_inbox (neaprobat). Pilot ro.tm.timisoara.

step_templates:
  - id: step.nursery.identify_stage
    semantic_key: identify_stage
    title_ro: "Identifică etapa activă"
    instruction_ro: >-
      Determină etapa calendaristică activă (reînscrieri, etapa I, etapa a II-a, ajustări)
      pe baza datei de referință și a modului de înscriere (nou sau reînscriere).
    sequence_hint: 10
    completion_evidence_ro:
      - "Etapa a fost determinată din data de referință și modul de înscriere"
    recovery_actions_ro:
      - "Recalculează data de referință sau modul de înscriere dacă etapa nu e clară"
    status: draft

  - id: step.nursery.verify_unit
    semantic_key: verify_unit
    title_ro: "Verifică unitatea, locurile și criteriile"
    instruction_ro: >-
      Verifică pe site-ul oficial ales că unitatea aleasă are locuri libere și criteriile
      actuale publicate. Confirmă datele locale înainte de a continua.
    sequence_hint: 20
    completion_evidence_ro:
      - "Există URL oficial pentru unitate, data verificării și confirmare"
    recovery_actions_ro:
      - "Dacă datele locale nu sunt verificate, nu afișa recomandare fermă"
    status: draft

  - id: step.nursery.prepare_dossier
    semantic_key: prepare_dossier
    title_ro: "Pregătește dosarul personalizat"
    instruction_ro: >-
      Pregătește dosarul cu documentele aplicabile conform metodologiei oficiale: cerere-tip,
      certificat de naștere, acte de identitate ale părinților/reprezentantului, etc.
    sequence_hint: 30
    completion_evidence_ro:
      - "Documentele obligatorii și condiționale aplicabile sunt pregătite"
    recovery_actions_ro:
      - "Revizuiește lista documentelor în funcție de situația ta (părinți divorțați, criterii invocate etc.)"
    status: draft

  - id: step.nursery.submit
    semantic_key: submit
    title_ro: "Depune cererea în fereastra activă"
    instruction_ro: >-
      Depune cererea-tip la unitatea aleasă în fereastra calendaristică corespunzătoare etapei
      active (reînscrieri, etapa I, etapa a II-a, ajustări).
    sequence_hint: 40
    completion_evidence_ro:
      - "Există dovadă de depunere și dată"
      - "Cererea a fost înregistrată la unitate"
    recovery_actions_ro:
      - "Dacă ești în afara ferestrei, urmărește etapa următoare sau ajustările"
    status: draft

  - id: step.nursery.validate
    semantic_key: validate
    title_ro: "Validează cererea la unitate"
    instruction_ro: >-
      Aduce originalele documentelor la unitate pentru validarea dosarului, inclusiv în cazul
      depunerii prin e-mail/poștă (este necesară o declarație de veridicitate).
    sequence_hint: 50
    completion_evidence_ro:
      - "Cererea este validată și există număr/confirmare de înregistrare"
    recovery_actions_ro:
      - "Completează cererea cu documente lipsă înainte de termenul de validare"
    status: draft

  - id: step.nursery.medical
    semantic_key: medical
    title_ro: "Pregătește documentele medicale la momentul corect"
    instruction_ro: >-
      La momentul acceptării cererii, obține adeverința clinică și avizul epidemiologic.
      Nu obține avizul epidemiologic mai devreme de fereastra de max. 5 zile înainte de
      începerea frecventării.
    sequence_hint: 60
    completion_evidence_ro:
      - "Adeverința clinică și avizul epidemiologic/vaccinare sunt valabile la începerea frecventării"
    recovery_actions_ro:
      - "Reia avizul epidemiologic dacă expiră înainte de începerea frecventării"
    status: draft

  - id: step.nursery.check_result
    semantic_key: check_result
    title_ro: "Verifică rezultatul și ruta următoare"
    instruction_ro: >-
      Verifică rezultatul afișat în perioada calendaristică aferentă etapei active.
      Dacă cererea este respinsă, identifică etapa următoare sau ajustările disponibile.
    sequence_hint: 70
    completion_evidence_ro:
      - "Rezultatul este salvat; etapa următoare este identificată (dacă e cazul)"
    recovery_actions_ro:
      - "În caz de respingere, evaluează alte unități sau etapa de ajustări"
    status: draft

requirement_templates:
  - id: req.nursery.application
    title_ro: "Cerere-tip cu trei opțiuni"
    description_ro: >-
      Cerere-tip conform metodologiei actuale, completată cu cele trei opțiuni de unități.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Cerere-tip oficială (în format fizic / online / prin e-mail) cu datele părintelui și ale copilului"
    readiness_checks:
      - "Verifică completitudinea câmpurilor"
      - "Selectează 3 unități în ordinea preferinței"
    status: draft

  - id: req.nursery.birth_certificate
    title_ro: "Copie certificat de naștere"
    description_ro: >-
      Copie după certificatul de naștere al copilului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Copie certificat de naștere (scan sau xerox)"
    readiness_checks:
      - "Verifică lizibilitatea"
    status: draft

  - id: req.nursery.parent_ids
    title_ro: "Copii acte identitate părinți/reprezentant"
    description_ro: >-
      Copii după actele de identitate ale părinților sau ale reprezentantului legal.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Copii CI/BI ale ambilor părinți sau ale reprezentantului legal"
    readiness_checks:
      - "Verifică concordanța cu datele din cerere"
    status: draft

  - id: req.nursery.employment
    title_ro: "Adeverințe de angajat / concediu creștere"
    description_ro: >-
      Adeverințe de la angajator privind situația parentală (angajat / concediu creștere,
      program extins, etc.), în funcție de program_type și alte criterii.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Adeverință de la angajator sau declarație pe proprie răspundere"
    readiness_checks:
      - "Verifică dacă programul ales necesită acest document"
    status: draft

  - id: req.nursery.criteria
    title_ro: "Documente pentru criteriile invocate"
    description_ro: >-
      Documente justificative pentru criteriile de departajare invocate (criteria_invoked=true).
    obligation: conditional
    timing: now
    accepted_forms:
      - "Adeverințe, declarații sau alte documente justificative"
    readiness_checks:
      - "Coroborează cu lista oficială de criterii publicată de unitate"
    status: draft

  - id: req.nursery.remote_declaration
    title_ro: "Declarație de veridicitate pentru e-mail/poștă"
    description_ro: >-
      Declarație pe proprie răspundere privind conformitatea documentelor transmise, cerută
      în cazul depunerii prin e-mail/poștă.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Declarație semnată atașată cererii"
    readiness_checks:
      - "Verifică includerea declarației în dosar"
    status: draft

  - id: req.nursery.parental_authority
    title_ro: "Dovada autorității părintești / locuinței minorului"
    description_ro: >-
      Documente care dovedesc autoritatea părintească sau calitatea de reprezentant legal
      (ex. hotărâre judecătorească în caz de divorț).
    obligation: conditional
    timing: now
    accepted_forms:
      - "Hotărâre judecătorească de încredințare minor, procură specială etc."
    readiness_checks:
      - "Verifică concordanța cu cererea"
    status: draft

  - id: req.nursery.originals
    title_ro: "Originalele actelor pentru validare"
    description_ro: >-
      Originalele documentelor din dosar, prezentate la unitate pentru validare.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Originalele CI, certificat de naștere, etc."
    readiness_checks:
      - "Verifică disponibilitatea la momentul validării"
    status: draft

  - id: req.nursery.medical
    title_ro: "Adeverință clinică și aviz epidemiologic/vaccinare"
    description_ro: >-
      Adeverință de la medicul de familie (clinică) și aviz epidemiologic/vaccinare, valabile
      la începerea frecventării.
    obligation: mandatory
    timing: later
    accepted_forms:
      - "Adeverință eliberată de medicul de familie"
      - "Aviz epidemiologic cu data emiterii"
    readiness_checks:
      - "Verifică valabilitatea la data începerii frecventării"
    status: draft
