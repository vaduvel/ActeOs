# Step & requirement templates for ro.life.transcribe_foreign_birth (life.transcribe_foreign_birth).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: classify_foreign_birth_transcription
    semantic_key: classify_foreign_birth_transcription
    title_ro: "Clasifica ruta de transcriere"
    instruction_ro: >-
      Stabileste daca cererea se depune in Romania sau prin misiune/oficiu consular si identifica
      autoritatea competenta pentru domiciliul, resedinta sau ultima localizare relevanta.
    sequence_hint: 10
    completion_evidence_ro:
      - "Ruta de depunere a fost clasificata"
    recovery_actions_ro:
      - "Daca autoritatea nu este cea corecta, reface incadrarea inainte de depunere"
    status: draft

  - id: prepare_foreign_birth_transcription
    semantic_key: prepare_foreign_birth_transcription
    title_ro: "Pregateste dosarul de transcriere"
    instruction_ro: >-
      Strange actul de nastere strain, dovada cetateniei romane si traducerile sau formalitatile
      de recunoastere cerute pentru dosarul de transcriere.
    sequence_hint: 20
    completion_evidence_ro:
      - "Documentele de baza pentru transcriere sunt pregatite"
    recovery_actions_ro:
      - "Daca lipseste un act esential, completeaza dosarul inainte de programare"
    status: draft

  - id: file_at_domicile_or_last_domicile_uat
    semantic_key: file_at_domicile_or_last_domicile_uat
    title_ro: "Depune la UAT-ul competent din Romania"
    instruction_ro: >-
      Daca ruta competenta este in Romania, depune dosarul la UAT-ul aferent domiciliului sau
      ultimului domiciliu relevant, conform incadrarii facute.
    sequence_hint: 30
    completion_evidence_ro:
      - "Dosarul a fost depus la UAT-ul competent"
    recovery_actions_ro:
      - "Daca dosarul a fost dus la alt UAT, reprogrameaza depunerea la autoritatea corecta"
    status: draft

  - id: file_at_romanian_mission_or_consulate
    semantic_key: file_at_romanian_mission_or_consulate
    title_ro: "Depune prin misiune sau consulat roman"
    instruction_ro: >-
      Daca ruta competenta este in strainatate, depune dosarul prin misiunea diplomatica sau
      oficiul consular roman competent pentru locul tau.
    sequence_hint: 40
    completion_evidence_ro:
      - "Dosarul a fost depus prin misiunea sau consulatul competent"
    recovery_actions_ro:
      - "Daca ai ales alta misiune, verifica din nou competenta teritoriala"
    status: draft

  - id: file_sector1_bucharest
    semantic_key: file_sector1_bucharest
    title_ro: "Depune la Sector 1 Bucuresti"
    instruction_ro: >-
      Foloseste aceasta ruta doar daca incadrarea dosarului trimite expres la autoritatea de stare
      civila competenta din Sectorul 1 Bucuresti.
    sequence_hint: 50
    completion_evidence_ro:
      - "Ruta catre Sector 1 Bucuresti a fost confirmata"
    recovery_actions_ro:
      - "Daca incadrarea nu confirma aceasta autoritate, revino la ruta competenta"
    status: draft

  - id: file_bucharest_sector_or_county_seat
    semantic_key: file_bucharest_sector_or_county_seat
    title_ro: "Depune la sectorul sau municipiul resedinta de judet competent"
    instruction_ro: >-
      Daca dosarul apartine unei autoritati din Bucuresti sau din municipiul resedinta de judet,
      foloseste traseul competent identificat la clasificare.
    sequence_hint: 60
    completion_evidence_ro:
      - "Autoritatea locala competenta a fost identificata si folosita"
    recovery_actions_ro:
      - "Daca depunerea este refuzata pentru competenta, verifica din nou incadrarea teritoriala"
    status: draft

  - id: file_personally_at_competent_mission
    semantic_key: file_personally_at_competent_mission
    title_ro: "Depune personal la misiunea competenta"
    instruction_ro: >-
      Pentru cazurile in care prezenta personala este ceruta, mergi la misiunea sau consulatul
      competent cu dosarul complet.
    sequence_hint: 70
    completion_evidence_ro:
      - "Prezenta personala la misiunea competenta a fost asigurata"
    recovery_actions_ro:
      - "Daca lipseste o piesa din dosar, refa programarea dupa completare"
    status: draft

  - id: book_timisoara_online_appointment
    semantic_key: book_timisoara_online_appointment
    title_ro: "Programeaza online depunerea la Timisoara"
    instruction_ro: >-
      Daca ruta aleasa cere programare online pentru Timisoara, rezerva intervalul inainte de
      deplasare si pastreaza confirmarea.
    sequence_hint: 80
    completion_evidence_ro:
      - "Programarea online a fost facuta"
    recovery_actions_ro:
      - "Daca nu mai exista locuri, cauta un interval nou inainte de prezentare"
    status: draft

requirement_templates:
  - id: req.foreign_birth_certificate_or_extract_original
    title_ro: "Act de nastere strain in original"
    description_ro: >-
      Certificatul sau extrasul de nastere emis in strainatate, in original, pentru transcriere.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Certificat de nastere strain in original"
      - "Extras de nastere strain in original"
    readiness_checks:
      - "Documentul original este disponibil si lizibil"
    status: draft

  - id: req.proof_romanian_citizenship
    title_ro: "Dovada cetateniei romane"
    description_ro: >-
      Documentele care sustin cetatenia romana a persoanei pentru care se cere transcrierea.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Acte privind cetatenia romana"
    readiness_checks:
      - "Dovada cetateniei este prezenta in dosar"
    status: draft

  - id: req.authenticated_romanian_translation
    title_ro: "Traducere autorizata in limba romana"
    description_ro: >-
      Traducerea in limba romana a actului strain, acolo unde dosarul o cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Traducere autorizata in romana"
    readiness_checks:
      - "Traducerea acopera actul strain din dosar"
    status: draft

  - id: req.apostille
    title_ro: "Apostila"
    description_ro: >-
      Apostila pentru actul strain, daca ruta de recunoastere a documentului o cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Apostila aplicata pe actul strain"
    readiness_checks:
      - "Apostila este ceruta pentru statul emitent si este prezenta"
    status: draft

  - id: req.supralegalisation
    title_ro: "Supralegalizare"
    description_ro: >-
      Supralegalizarea documentului strain, daca aceasta este formalitatea aplicabila.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act strain supralegalizat"
    readiness_checks:
      - "Supralegalizarea este cea corecta pentru documentul depus"
    status: draft

  - id: req.additional_authentic_evidence_for_missing_fields
    title_ro: "Dovezi autentice suplimentare pentru date lipsa"
    description_ro: >-
      Dovezi autentice suplimentare cand actul strain nu contine toate datele necesare
      transcrierii.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente autentice suplimentare"
    readiness_checks:
      - "Documentele suplimentare acopera campurile lipsa"
    status: draft

  - id: req.parent_or_legal_representative_application
    title_ro: "Cerere semnata de parinte sau reprezentant legal"
    description_ro: >-
      Cererea depusa de parinte sau reprezentant legal pentru persoana care nu depune singura.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Cerere semnata de parinte"
      - "Cerere semnata de reprezentant legal"
    readiness_checks:
      - "Semnatarul poate dovedi calitatea invocata"
    status: draft

  - id: req.subject_application_assisted_as_applicable
    title_ro: "Cerere depusa de persoana vizata, cu asistenta cand e cazul"
    description_ro: >-
      Cererea depusa direct de persoana vizata, atunci cand aceasta este ruta corecta, inclusiv cu
      asistenta aplicabila pentru situatie.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Cerere depusa de persoana vizata"
    readiness_checks:
      - "Modalitatea de depunere corespunde capacitatii si situatiei persoanei"
    status: draft
