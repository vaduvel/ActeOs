# Step & requirement templates for ro.life.event_public_space_authorisation (life.event_public_space_authorisation).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: classify_event_and_public_space_use
    semantic_key: classify_event_and_public_space_use
    title_ro: "Clasifica evenimentul si folosirea spatiului public"
    instruction_ro: >-
      Stabileste daca evenimentul foloseste domeniul public si daca intra pe ruta generala, pe
      adunare publica sau pe ramura speciala locala.
    sequence_hint: 10
    completion_evidence_ro:
      - "Tipul evenimentului si ramura relevanta au fost identificate"
    recovery_actions_ro:
      - "Daca folosirea domeniului public nu este clara, nu continua pe ruta locala"
    status: draft

  - id: select_timisoara_event_case
    semantic_key: select_timisoara_event_case
    title_ro: "Selecteaza cazul local din Timisoara"
    instruction_ro: >-
      Pentru Timisoara, selecteaza cazul local potrivit inainte de a pregati cererea.
    sequence_hint: 20
    completion_evidence_ro:
      - "Cazul local pentru Timisoara a fost selectat"
    recovery_actions_ro:
      - "Daca evenimentul nu este in Timisoara, foloseste autoritatea locala relevanta"
    status: draft

  - id: submit_timisoara_event_request
    semantic_key: submit_timisoara_event_request
    title_ro: "Trimite cererea pentru eveniment"
    instruction_ro: >-
      Daca evenimentul intra pe ruta locala din Timisoara, pregateste si trimite cererea folosind
      canalul local verificat.
    sequence_hint: 30
    completion_evidence_ro:
      - "Cererea pentru eveniment este pregatita sau transmisa"
    recovery_actions_ro:
      - "Daca lista exacta de acte este in conflict local, nu presupune documente neverificate"
    status: draft

  - id: assess_limited_access_outdoor_event_tax
    semantic_key: assess_limited_access_outdoor_event_tax
    title_ro: "Evalueaza ramura taxei pentru acces limitat in aer liber"
    instruction_ro: >-
      Verifica doar daca toate conditiile cumulative pentru ramura speciala sunt indeplinite
      inainte de a o activa.
    sequence_hint: 40
    completion_evidence_ro:
      - "Aplicabilitatea ramurii speciale a fost evaluata"
    recovery_actions_ro:
      - "Daca lipseste una dintre conditii, nu aplica ramura speciala"
    status: draft

  - id: submit_before_event_start
    semantic_key: submit_before_event_start
    title_ro: "Depune inainte de inceperea evenimentului"
    instruction_ro: >-
      Pentru ramura speciala, pregateste depunerea inainte de data de inceput a evenimentului.
    sequence_hint: 50
    completion_evidence_ro:
      - "Conditia de depunere inainte de start a fost verificata"
    recovery_actions_ro:
      - "Daca evenimentul incepe prea repede, trateaza cazul ca urgent"
    status: draft

  - id: check_public_assembly_requirements
    semantic_key: check_public_assembly_requirements
    title_ro: "Verifica cerintele pentru adunare publica"
    instruction_ro: >-
      Daca evenimentul este o adunare publica sau protest, directioneaza-l spre ramura separata,
      fara sa inventezi termenul.
    sequence_hint: 60
    completion_evidence_ro:
      - "Ramura pentru adunare publica a fost identificata"
    recovery_actions_ro:
      - "Daca nu este adunare publica, revino la ruta de eveniment obisnuit"
    status: draft

requirement_templates: []
