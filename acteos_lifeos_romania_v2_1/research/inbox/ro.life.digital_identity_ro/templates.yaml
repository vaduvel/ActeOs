# Step & requirement templates for ro.life.digital_identity_ro (life.digital_identity_ro).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: verify_device_and_identity_document
    semantic_key: verify_device_and_identity_document
    title_ro: "Verifica telefonul si cartea de identitate"
    instruction_ro: >-
      Pregateste un smartphone compatibil, conexiunea la internet si cartea de identitate valabila
      inainte de a incepe inrolarea ROeID.
    sequence_hint: 10
    completion_evidence_ro:
      - "Dispozitivul si actul de identitate sunt pregatite"
    recovery_actions_ro:
      - "Daca telefonul sau actul nu sunt potrivite, opreste inrolarea pana le rezolvi"
    status: draft

  - id: install_official_roeid_app
    semantic_key: install_official_roeid_app
    title_ro: "Instaleaza aplicatia oficiala ROeID"
    instruction_ro: >-
      Acceseaza pagina oficiala ROeID pentru cetateni si instaleaza aplicatia oficiala din magazinul
      potrivit dispozitivului tau.
    sequence_hint: 20
    completion_evidence_ro:
      - "Aplicatia oficiala ROeID este instalata"
    recovery_actions_ro:
      - "Daca linkul nu este clar, foloseste doar canalele oficiale ROeID"
    status: draft

  - id: complete_roeid_capture_flow
    semantic_key: complete_roeid_capture_flow
    title_ro: "Parcurge capturile si trimite solicitarea"
    instruction_ro: >-
      Introdu datele cerute, fotografiaza actul, fa selfie-ul si inregistrarile cerute de aplicatie,
      apoi trimite solicitarea de validare.
    sequence_hint: 30
    completion_evidence_ro:
      - "Solicitarea ROeID a fost trimisa"
    recovery_actions_ro:
      - "Daca solicitarea este refuzata, refa capturile in lumina buna si cu actul original"
    status: draft

  - id: monitor_roeid_validation
    semantic_key: monitor_roeid_validation
    title_ro: "Urmareste validarea"
    instruction_ro: >-
      Urmareste e-mailul si notificarile aplicatiei pentru rezultat, fara sa tratezi intervalul
      publicat ca termen garantat.
    sequence_hint: 40
    completion_evidence_ro:
      - "Rezultatul validarii a fost primit sau monitorizat"
    recovery_actions_ro:
      - "Daca nu primesti raspuns, foloseste suportul oficial ROeID"
    status: draft

  - id: use_roeid_authentication
    semantic_key: use_roeid_authentication
    title_ro: "Foloseste autentificarea ROeID"
    instruction_ro: >-
      Pe serviciile compatibile, selecteaza autentificarea cu ROeID si aproba cererea din
      aplicatie.
    sequence_hint: 50
    completion_evidence_ro:
      - "Autentificarea cu ROeID a fost folosita pe un serviciu compatibil"
    recovery_actions_ro:
      - "Daca autentificarea nu merge, verifica disponibilitatea ROeID pe platforma tinta"
    status: draft

requirement_templates:
  - id: req.smartphone
    title_ro: "Smartphone compatibil"
    description_ro: >-
      Smartphone Android sau iPhone compatibil cu aplicatia ROeID.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Telefon Android"
      - "iPhone"
    readiness_checks:
      - "Telefonul este compatibil si functional"
    status: draft

  - id: req.identity_card
    title_ro: "Carte de identitate"
    description_ro: >-
      Cartea de identitate folosita la inrolarea ROeID.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Carte de identitate in original"
    readiness_checks:
      - "Cartea de identitate este valabila, lizibila si la indemana"
    status: draft

  - id: req.camera_microphone_internet
    title_ro: "Camera, microfon si internet functionale"
    description_ro: >-
      Camera, microfonul si conexiunea la internet necesare capturilor si validarii ROeID.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Dispozitiv cu camera si microfon functionale"
      - "Conexiune la internet"
    readiness_checks:
      - "Camera, microfonul si internetul functioneaza"
    status: draft

  - id: req.email
    title_ro: "Adresa de e-mail accesibila"
    description_ro: >-
      Adresa de e-mail pe care vei primi confirmarile si notificarile de validare.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Adresa de e-mail accesibila"
    readiness_checks:
      - "Ai acces la adresa de e-mail folosita pentru inrolare"
    status: draft
