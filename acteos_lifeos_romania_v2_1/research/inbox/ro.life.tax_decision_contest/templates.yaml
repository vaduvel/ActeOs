# Step & requirement templates for ro.life.tax_decision_contest (life.tax_decision_contest).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: compare_elapsed_days_with_act_contest_instruction
    semantic_key: compare_elapsed_days_with_act_contest_instruction
    title_ro: "Compara zilele scurse cu instructiunile din act"
    instruction_ro: >-
      Verifica data comunicarii, termenul mentionat in act si urgenta situatiei inainte de a
      pregati contestatia.
    sequence_hint: 10
    completion_evidence_ro:
      - "Termenul indicat de act a fost comparat cu situatia curenta"
    recovery_actions_ro:
      - "Daca termenul din act nu este clar, nu afisa un countdown juridic sigur"
    status: draft

  - id: prepare_tax_administrative_contest
    semantic_key: prepare_tax_administrative_contest
    title_ro: "Pregateste contestatia administrativa fiscala"
    instruction_ro: >-
      Structureaza motivele de fapt si de drept si aduna inscrisurile necesare pentru contestatie.
    sequence_hint: 20
    completion_evidence_ro:
      - "Contestatia fiscala este pregatita"
    recovery_actions_ro:
      - "Daca motivele sau probele nu sunt gata, completeaza dosarul inainte de depunere"
    status: draft

  - id: assess_separate_suspension_remedy
    semantic_key: assess_separate_suspension_remedy
    title_ro: "Evalueaza separat remediul de suspendare"
    instruction_ro: >-
      Daca vrei suspendarea efectelor actului, trateaza aceasta procedura separat de contestatia
      principala.
    sequence_hint: 30
    completion_evidence_ro:
      - "Necesitatea unui remediu separat de suspendare a fost evaluata"
    recovery_actions_ro:
      - "Daca nu este clar ce remediu urmaresti, nu il amesteca cu contestatia principala"
    status: draft

  - id: read_anaf_act_contest_instructions
    semantic_key: read_anaf_act_contest_instructions
    title_ro: "Citeste instructiunile actului emis de ANAF"
    instruction_ro: >-
      Daca actul este emis de ANAF, foloseste instructiunile din act si din ruta centrala aferenta.
    sequence_hint: 40
    completion_evidence_ro:
      - "Instructiunile actului ANAF au fost verificate"
    recovery_actions_ro:
      - "Daca autoritatea emitenta nu este clara, confirma mai intai aceasta informatie"
    status: draft

  - id: read_timisoara_tax_act_contest_instructions
    semantic_key: read_timisoara_tax_act_contest_instructions
    title_ro: "Citeste instructiunile actului emis local in Timisoara"
    instruction_ro: >-
      Daca actul este emis local in Timisoara, verifica separat instructiunile si canalul aplicabil.
    sequence_hint: 50
    completion_evidence_ro:
      - "Instructiunile locale din Timisoara au fost verificate"
    recovery_actions_ro:
      - "Daca emitentul nu este Timisoara, nu folosi aceasta ramura"
    status: draft

requirement_templates:
  - id: req.copy_of_contested_tax_act
    title_ro: "Copia actului fiscal contestat"
    description_ro: >-
      Copia actului fiscal sau administrativ fiscal pe care il contesti.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Copia actului contestat"
    readiness_checks:
      - "Actul contestat este disponibil integral"
    status: draft

  - id: req.proof_of_communication_date
    title_ro: "Dovada datei comunicarii"
    description_ro: >-
      Dovada datei la care actul a fost comunicat, folosita pentru evaluarea termenului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Dovada comunicarii"
    readiness_checks:
      - "Data comunicarii poate fi identificata clar"
    status: draft

  - id: req.tax_contest_factual_and_legal_grounds
    title_ro: "Motive de fapt si de drept pentru contestatie"
    description_ro: >-
      Motivele de fapt si de drept folosite pentru sustinerea contestatiei fiscale.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Expunerea motivelor de fapt si de drept"
    readiness_checks:
      - "Motivele contestatiei sunt formulate suficient de clar"
    status: draft

  - id: req.supporting_evidence_or_evidence_index
    title_ro: "Probele sau indexul probelor"
    description_ro: >-
      Probele atasate ori lista/indexul lor pentru sustinerea contestatiei fiscale.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Probele atasate"
      - "Index al probelor"
    readiness_checks:
      - "Probele sau indexul lor acopera motivele invocate"
    status: draft
