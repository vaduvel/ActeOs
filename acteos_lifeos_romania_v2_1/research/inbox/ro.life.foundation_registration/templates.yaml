# Step & requirement templates for ro.life.foundation_registration (ro.life.foundation_registration).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: step.reserve_or_verify_foundation_name
    semantic_key: step.reserve_or_verify_foundation_name
    title_ro: "Rezerva sau verifica denumirea fundatiei"
    instruction_ro: >-
      Verifica disponibilitatea denumirii si obtine dovada relevanta inainte de depunerea dosarului.
    sequence_hint: 10
    completion_evidence_ro:
      - "Dovada privind denumirea fundatiei este pregatita"
    recovery_actions_ro:
      - "Daca denumirea cere aprobare speciala, obtine-o inainte de depunere"
    status: draft

  - id: step.prepare_foundation_statute
    semantic_key: step.prepare_foundation_statute
    title_ro: "Pregateste statutul fundatiei"
    instruction_ro: >-
      Pregateste statutul fundatiei in forma adecvata cazului si scopului declarat.
    sequence_hint: 20
    completion_evidence_ro:
      - "Statutul fundatiei este pregatit"
    recovery_actions_ro:
      - "Daca exista aport imobiliar sau activitati speciale, completeaza forma relevanta"
    status: draft

  - id: step.establish_initial_foundation_assets
    semantic_key: step.establish_initial_foundation_assets
    title_ro: "Stabileste patrimoniul initial al fundatiei"
    instruction_ro: >-
      Confirma patrimoniul initial si pragul aplicabil inainte de depunerea dosarului.
    sequence_hint: 30
    completion_evidence_ro:
      - "Patrimoniul initial al fundatiei a fost documentat"
    recovery_actions_ro:
      - "Daca pragul patrimonial nu este atins sau nu este demonstrat, nu continua dosarul"
    status: draft

  - id: step.file_at_district_court_of_seat
    semantic_key: step.file_at_district_court_of_seat
    title_ro: "Depune dosarul la judecatoria sediului"
    instruction_ro: >-
      Depune dosarul complet la judecatoria competenta pentru sediul fundatiei.
    sequence_hint: 40
    completion_evidence_ro:
      - "Dosarul fundatiei este pregatit pentru depunere la judecatorie"
    recovery_actions_ro:
      - "Daca sediul sau competenta nu sunt clare, confirma instanta inainte de depunere"
    status: draft

  - id: step.obtain_sgg_prior_name_approval
    semantic_key: step.obtain_sgg_prior_name_approval
    title_ro: "Obtine aprobarea speciala pentru denumire"
    instruction_ro: >-
      Daca denumirea fundatiei intra intr-o categorie speciala, obtine aprobarea prealabila relevanta.
    sequence_hint: 50
    completion_evidence_ro:
      - "Aprobarea speciala pentru denumire a fost pregatita sau solicitata"
    recovery_actions_ro:
      - "Daca aprobarea lipseste, nu trata denumirea speciala ca definitiva"
    status: draft

  - id: step.obtain_sector_authorizations_before_activity
    semantic_key: step.obtain_sector_authorizations_before_activity
    title_ro: "Obtine autorizatiile sectoriale inainte de activitate"
    instruction_ro: >-
      Pentru activitati reglementate, confirma autorizatiile sectoriale inainte de operare.
    sequence_hint: 60
    completion_evidence_ro:
      - "Ruta de autorizare sectoriala a fost evaluata"
    recovery_actions_ro:
      - "Daca activitatea este reglementata si autorizatiile lipsesc, nu prezenta fundatia ca operationala"
    status: draft

requirement_templates:
  - id: req.foundation_statute
    title_ro: "Statutul fundatiei"
    description_ro: "Statutul fundatiei pregatit pentru dosar."
    obligation: mandatory
    timing: now
    accepted_forms: ["Statutul fundatiei"]
    readiness_checks: ["Statutul fundatiei este complet si pregatit"]
    status: draft

  - id: req.seat_proof
    title_ro: "Dovada sediului"
    description_ro: "Documentul care sustine sediul fundatiei."
    obligation: mandatory
    timing: now
    accepted_forms: ["Dovada sediului"]
    readiness_checks: ["Sediul este sustinut prin document oficial"]
    status: draft

  - id: req.initial_assets_proof
    title_ro: "Dovada patrimoniului initial"
    description_ro: "Documentele care arata patrimoniul initial al fundatiei."
    obligation: mandatory
    timing: now
    accepted_forms: ["Dovada patrimoniului initial"]
    readiness_checks: ["Patrimoniul initial este demonstrat"]
    status: draft

  - id: req.founders_and_board_identity_documents
    title_ro: "Actele fondatorilor si ale conducerii"
    description_ro: "Documentele de identitate ale fondatorilor si membrilor relevanti ai conducerii."
    obligation: mandatory
    timing: now
    accepted_forms: ["Acte de identitate ale fondatorilor si conducerii"]
    readiness_checks: ["Identitatea fondatorilor si conducerii este acoperita de documente"]
    status: draft

  - id: req.name_availability_or_refusal_proof
    title_ro: "Dovada privind denumirea"
    description_ro: "Dovada disponibilitatii denumirii sau documentul oficial echivalent."
    obligation: mandatory
    timing: now
    accepted_forms: ["Dovada disponibilitatii denumirii"]
    readiness_checks: ["Denumirea este acoperita de dovada oficiala"]
    status: draft

  - id: req.court_stamp_fee_100_ron
    title_ro: "Dovada taxei judiciare de timbru"
    description_ro: "Dovada platii taxei judiciare de timbru publicate."
    obligation: mandatory
    timing: now
    accepted_forms: ["Dovada platii taxei judiciare de timbru"]
    readiness_checks: ["Dovada platii este disponibila"]
    status: draft

  - id: req.authentic_form_statute
    title_ro: "Statut in forma autentica"
    description_ro: "Forma autentica a statutului, acolo unde este ceruta."
    obligation: conditional
    timing: now
    accepted_forms: ["Statut in forma autentica"]
    readiness_checks: ["Forma autentica este pregatita daca se aplica"]
    status: draft

  - id: req.beneficial_owner_declaration
    title_ro: "Declaratia de beneficiar real"
    description_ro: "Declaratia pregatita daca exceptia legala nu se aplica."
    obligation: conditional
    timing: now
    accepted_forms: ["Declaratie de beneficiar real"]
    readiness_checks: ["Declaratia este pregatita daca se aplica"]
    status: draft

  - id: req.certified_copies_and_legalized_romanian_translations
    title_ro: "Copii certificate si traduceri legalizate"
    description_ro: "Documentele straine pregatite in forma acceptata."
    obligation: conditional
    timing: now
    accepted_forms: ["Copii certificate", "Traduceri legalizate in limba romana"]
    readiness_checks: ["Documentele straine sunt pregatite in forma ceruta"]
    status: draft

  - id: req.cult_ministry_advisory_opinion_if_applicable
    title_ro: "Aviz consultativ pentru activitati religioase"
    description_ro: "Avizul relevant, daca fundatia intra pe aceasta ramura."
    obligation: conditional
    timing: now
    accepted_forms: ["Aviz consultativ relevant"]
    readiness_checks: ["Avizul este pregatit daca activitatea il cere"]
    status: draft

  - id: req.sgg_prior_approval
    title_ro: "Aprobarea prealabila pentru denumire"
    description_ro: "Aprobarea speciala ceruta pentru anumite denumiri."
    obligation: conditional
    timing: now
    accepted_forms: ["Aprobare prealabila pentru denumire"]
    readiness_checks: ["Aprobarea speciala este disponibila daca se aplica"]
    status: draft
