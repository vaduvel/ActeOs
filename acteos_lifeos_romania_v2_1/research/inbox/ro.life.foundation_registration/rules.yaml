  - b18.foundation_registration.assets
  status: active
  legal_rank: OG nr. 26/2000
- id: rule.b18.foundation_registration.immovable
  canonical_rule_id: canonical.foundation_registration.immovable
  event_type_id: ro.life.foundation_registration
  jurisdiction_ids:
  - ro
  authority_level: national
  severity: operational
  effective_from: '2026-01-01'
