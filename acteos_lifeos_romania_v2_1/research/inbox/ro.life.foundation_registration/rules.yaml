batch_id: batch18.foundation_registration
event_type_id: ro.life.foundation_registration
version: 2.1.0
as_of: '2026-06-25'
jurisdiction_ids:
- ro
- ro.county.timis
- ro.uat.timisoara
required_facts:
- goal
rules:
- id: rule.b18.foundation_registration.base
  canonical_rule_id: canonical.foundation_registration.base
  event_type_id: ro.life.foundation_registration
  jurisdiction_ids:
  - ro
  authority_level: national
  severity: operational
  effective_from: '2026-01-01'
  when:
    op: eq
    field: goal
    value: register_foundation
  effects:
  - type: include_step
    step_id: step.reserve_or_verify_foundation_name
