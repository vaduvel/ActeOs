  source_claim_ids:
  - b18.foundation_registration.statute
  status: active
  legal_rank: OG nr. 26/2000
- id: rule.b18.foundation_registration.movable
  canonical_rule_id: canonical.foundation_registration.movable
  event_type_id: ro.life.foundation_registration
  jurisdiction_ids:
  - ro
  authority_level: national
  severity: operational
  effective_from: '2026-01-01'
  when:
    op: all
    args:
    - op: eq
      field: goal
      value: register_foundation
    - op: eq
      field: immovable_contribution
      value: false
