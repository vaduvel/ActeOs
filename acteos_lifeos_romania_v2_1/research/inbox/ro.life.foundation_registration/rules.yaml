  legal_rank: OG nr. 26/2000; OUG nr. 80/2013
- id: rule.b18.foundation_registration.no_founder
  canonical_rule_id: canonical.foundation_registration.no_founder
  event_type_id: ro.life.foundation_registration
  jurisdiction_ids:
  - ro
  authority_level: national
  severity: critical
  effective_from: '2026-01-01'
  when:
    op: all
    args:
    - op: eq
      field: goal
      value: register_foundation
    - op: lt
      field: founder_count
      value: 1
  effects:
  - type: block
    code: foundation_min_one_founder
    message_ro: Este necesar cel puțin un fondator.
  source_claim_ids:
  - b18.foundation_registration.founders_court
  status: active
  legal_rank: OG nr. 26/2000
- id: rule.b18.foundation_registration.standard_low
  canonical_rule_id: canonical.foundation_registration.standard_low
  event_type_id: ro.life.foundation_registration
  jurisdiction_ids:
  - ro
  authority_level: national
  severity: critical
  effective_from: '2026-01-01'
  when:
    op: all
    args:
    - op: eq
      field: goal
      value: register_foundation
    - op: eq
      field: fundraising_only_for_other_ngos
      value: false
    - op: lt
      field: initial_assets_multiple
      value: 10
  effects:
  - type: block
    code: foundation_assets_below_10x
    message_ro: Patrimoniul este sub pragul 10x.
  source_claim_ids:
  - b18.foundation_registration.assets
  status: active
  legal_rank: OG nr. 26/2000
- id: rule.b18.foundation_registration.special_low
  canonical_rule_id: canonical.foundation_registration.special_low
  event_type_id: ro.life.foundation_registration
  jurisdiction_ids:
  - ro
  authority_level: national
  severity: critical
  effective_from: '2026-01-01'
  when:
    op: all
    args:
    - op: eq
      field: goal
      value: register_foundation
    - op: eq
      field: fundraising_only_for_other_ngos
      value: true
    - op: lt
      field: initial_assets_multiple
      value: 2
  effects:
  - type: block
    code: foundation_assets_below_2x
    message_ro: Patrimoniul este sub pragul 2x.
  source_claim_ids:
  - b18.foundation_registration.assets
  status: active
  legal_rank: OG nr. 26/2000
- id: rule.b18.foundation_registration.standard_threshold
  canonical_rule_id: canonical.foundation_registration.standard_threshold
  event_type_id: ro.life.foundation_registration
  jurisdiction_ids:
  - ro
  authority_level: national
  severity: operational
  effective_from: '2026-01-01'
  when:
    op: all
    args:
    - op: eq
      field: goal
      value: register_foundation
    - op: eq
      field: fundraising_only_for_other_ngos
      value: false
  effects:
  - type: emit_advice
    tag: standard_assets_threshold_10x
    message_ro: Pragul standard este 10x salariul minim brut în vigoare.
  source_claim_ids:
  - b18.foundation_registration.assets
  status: active
  legal_rank: OG nr. 26/2000
- id: rule.b18.foundation_registration.special_threshold
  canonical_rule_id: canonical.foundation_registration.special_threshold
  event_type_id: ro.life.foundation_registration
  jurisdiction_ids:
  - ro
  authority_level: national
  severity: operational
  effective_from: '2026-01-01'
  when:
    op: all
