step_templates:
  - id: determine_certificate_applicability
    semantic_key: energy_performance_determine_applicability
    title_ro: "Verifica daca certificatul este aplicabil"
    instruction_ro: >-
      Stabileste daca imobilul intra in sfera certificatului energetic sau daca
      se aplica o exceptie legala.
    sequence_hint: 10
    completion_evidence_ro:
      - "Aplicabilitatea certificatului energetic este clarificata."
    recovery_actions_ro:
      - "Nu presupune obligatia daca tipul cladirii este exceptat."
    status: draft
  - id: select_attested_energy_auditor
    semantic_key: energy_performance_select_auditor
    title_ro: "Alege un auditor energetic atestat"
    instruction_ro: >-
      Daca este necesar un certificat nou, selecteaza un auditor energetic
      atestat din lista oficiala.
    sequence_hint: 20
    completion_evidence_ro:
      - "Auditorul energetic atestat este selectat."
    recovery_actions_ro:
      - "Nu ghici onorariul sau durata de lucru a auditorului."
    status: draft
  - id: obtain_energy_certificate
    semantic_key: energy_performance_obtain_certificate
    title_ro: "Obtine certificatul energetic"
    instruction_ro: >-
      Obtine un certificat valabil, cu cod unic, daca nu exista unul valabil sau
      daca a intervenit o renovare majora relevanta.
    sequence_hint: 30
    completion_evidence_ro:
      - "Certificatul energetic este obtinut sau valabilitatea lui este confirmata."
    recovery_actions_ro:
      - "Lipsa codului unic blocheaza folosirea documentului."
    status: draft
  - id: give_copy_to_potential_buyer_before_contract
    semantic_key: energy_performance_give_copy_buyer
    title_ro: "Da copia potentialului cumparator inainte de contract"
    instruction_ro: >-
      Daca scopul este vanzarea, pune copia certificatului la dispozitia
      potentialului cumparator inainte de contract.
    sequence_hint: 40
    completion_evidence_ro:
      - "Copia certificatului este pusa la dispozitie inainte de vanzare."
    recovery_actions_ro:
      - "Nu astepta semnarea contractului pentru acest pas."
    status: draft
  - id: give_copy_to_potential_tenant_before_contract
    semantic_key: energy_performance_give_copy_tenant
    title_ro: "Da copia potentialului chirias inainte de contract"
    instruction_ro: >-
      Daca scopul este inchirierea, pune copia certificatului la dispozitia
      potentialului chirias inainte de semnare.
    sequence_hint: 50
    completion_evidence_ro:
      - "Copia certificatului este pusa la dispozitie inainte de inchiriere."
    recovery_actions_ro:
      - "Nu confunda aceasta etapa cu predarea originalului la vanzare."
    status: draft
  - id: transfer_original_to_buyer
    semantic_key: energy_performance_transfer_original
    title_ro: "Preda originalul cumparatorului"
    instruction_ro: >-
      La vanzare, originalul certificatului energetic se preda cumparatorului in
      dosarul final al proprietatii.
    sequence_hint: 60
    completion_evidence_ro:
      - "Originalul certificatului este predat cumparatorului."
    recovery_actions_ro:
      - "Pastreaza o copie pentru evidenta proprie, daca este necesar."
    status: draft
  - id: deposit_copy_with_competent_tax_body
    semantic_key: energy_performance_deposit_copy_tax
    title_ro: "Depune copia la organul fiscal competent, daca este ceruta"
    instruction_ro: >-
      Daca procedura fiscala aplicabila o cere, pregateste si copia
      certificatului pentru organul fiscal competent.
    sequence_hint: 70
    completion_evidence_ro:
      - "Necesitatea depunerii copiei la fiscal este clarificata sau indeplinita."
    recovery_actions_ro:
      - "Nu universaliza aceasta cerinta fara cadrul procedural concret."
    status: draft
  - id: present_certificate_at_reception
    semantic_key: energy_performance_present_at_reception
    title_ro: "Prezinta certificatul la receptia cladirii noi"
    instruction_ro: >-
      Pentru o cladire noua, prezinta certificatul energetic la receptia
      lucrarilor, conform cadrului modelat.
    sequence_hint: 80
    completion_evidence_ro:
      - "Certificatul este pregatit pentru receptia cladirii noi."
    recovery_actions_ro:
      - "Nu inlocui acest document cu simple informatii energetice necertificate."
    status: draft
  - id: attach_copy_to_reception_record_and_technical_book
    semantic_key: energy_performance_attach_copy_reception_book
    title_ro: "Ataseaza copia la procesul-verbal si cartea tehnica"
    instruction_ro: >-
      Daca ruta de receptie o cere, ataseaza copia certificatului energetic la
      procesul-verbal si in cartea tehnica a constructiei.
    sequence_hint: 90
    completion_evidence_ro:
      - "Copia este integrata in dosarul tehnic al receptiei."
    recovery_actions_ro:
      - "Verifica integritatea documentelor tehnice finale ale cladirii."
    status: draft

