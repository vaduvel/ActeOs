    tag: do_not_start_regulated_activity_before_authorization
    message_ro: Nu începe activitatea înainte de autorizație.
  source_claim_ids:
  - b18.association_registration.regulated
  status: active
  legal_rank: OG nr. 26/2000
- id: rule.b18.association_registration.timis
  canonical_rule_id: canonical.association_registration.timis
  event_type_id: ro.life.association_registration
  jurisdiction_ids:
  - ro.county.timis
  authority_level: county
  severity: operational
  effective_from: '2026-01-01'
  when:
    op: all
    args:
    - op: eq
      field: goal
      value: register_association
    - op: eq
      field: seat_county
