schema_ref: https://acteos/schemas/rule.schema.json
batch_id: B14_VEHICLE_INHERITANCE
alias_event_type_id: ro.life.vehicle_inheritance
event_type_id: life.vehicle_inheritance
status: draft
required_facts:
- intended_action
- succession_status
- applicant_county
rules:
- id: rule.vehicle_inheritance.succession.not_completed_keep
  canonical_rule_id: vehicle_inheritance.succession.not_completed_keep
  event_type_id: life.vehicle_inheritance
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: in
      field: succession_status
      values:
      - not_opened
      - in_progress
    - op: in
      field: intended_action
      values:
      - keep_and_use
      - sell
  effects:
  - type: block
    code: succession_not_completed_for_ownership_transfer
    message_ro: Dreptul dobândit prin moștenire nu este încă dovedit printr-un document de proprietate verificabil
      pentru transcriere sau înstrăinare.
  source_claim_ids:
  - claim.vehicle_inheritance.transcription_docs
  - claim.vehicle_inheritance.deregistration_grounds_heirs
  status: draft
- id: rule.vehicle_inheritance.keep.route
  canonical_rule_id: vehicle_inheritance.keep.route
  event_type_id: life.vehicle_inheritance
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: succession_status
      value: completed
    - op: eq
      field: intended_action
      value: keep_and_use
    - op: eq
      field: applicant_role
      value: legal_heir
  effects:
  - type: include_step
    step_id: declare_inherited_vehicle_at_local_tax_authority
  - type: include_step
    step_id: prepare_inherited_vehicle_transcription_file
  - type: include_step
    step_id: submit_vehicle_transcription_application
  - type: include_requirement
    requirement_id: req.document_attesting_inherited_ownership_registered_local_tax
  - type: include_requirement
    requirement_id: req.previous_registration_certificate_or_substitute
  - type: include_requirement
    requirement_id: req.registration_plates_or_substitute
  - type: include_requirement
    requirement_id: req.valid_vehicle_identity_card_civ
  - type: include_requirement
    requirement_id: req.valid_itp
  - type: include_requirement
    requirement_id: req.valid_rca_current_owner_name
  - type: attach_channel
    channel_id: ch.dgpci_information
  source_claim_ids:
  - claim.vehicle_inheritance.transcription_docs
  - claim.vehicle_inheritance.competent_service
  status: draft
- id: rule.vehicle_inheritance.sell.route
  canonical_rule_id: vehicle_inheritance.sell.route
  event_type_id: life.vehicle_inheritance
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: succession_status
      value: completed
    - op: eq
      field: intended_action
      value: sell
    - op: eq
      field: applicant_role
      value: legal_heir
  effects:
  - type: include_step
    step_id: establish_inherited_ownership_before_disposal
  - type: include_requirement
    requirement_id: req.document_attesting_inherited_ownership
  - type: require_confirmation
    tag: sale_route_after_inheritance
    message_ro: Confirmă forma actului de înstrăinare, calitatea tuturor semnatarilor și formalitățile fiscale aplicabile
      situației succesorale concrete.
  source_claim_ids:
  - claim.vehicle_inheritance.transcription_docs
  status: draft
- id: rule.vehicle_inheritance.deregister.route
  canonical_rule_id: vehicle_inheritance.deregister.route
  event_type_id: life.vehicle_inheritance
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: intended_action
      value: deregister
    - op: eq
      field: applicant_role
      value: legal_heir
  effects:
  - type: include_step
    step_id: select_verified_deregistration_ground
  - type: include_step
    step_id: prepare_inherited_vehicle_deregistration_file
  - type: include_step
    step_id: submit_vehicle_deregistration_application
  - type: include_requirement
    requirement_id: req.registration_certificate
  - type: include_requirement
    requirement_id: req.registration_plates_or_substitute_proof
  - type: include_requirement
    requirement_id: req.valid_identity_or_entity_documents
  - type: include_requirement
    requirement_id: req.document_proving_selected_deregistration_ground
  - type: require_confirmation
    tag: proof_of_legal_heir_capacity
    message_ro: Confirmă documentul oficial acceptat pentru dovedirea calității de moștenitor legal.
  - type: attach_channel
    channel_id: ch.dgpci_information
  source_claim_ids:
  - claim.vehicle_inheritance.deregistration_grounds_heirs
  - claim.vehicle_inheritance.deregistration_docs
  - claim.vehicle_inheritance.competent_service
  status: draft
- id: rule.vehicle_inheritance.role.not_heir
  canonical_rule_id: vehicle_inheritance.role.not_heir
  event_type_id: life.vehicle_inheritance
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: applicant_role
    value: other
  effects:
  - type: block
    code: applicant_not_verified_legal_heir
    message_ro: Ruta este verificată pentru moștenitorul legal; o altă calitate nu este suficient susținută de sursele
      acestui eveniment.
  source_claim_ids:
  - claim.vehicle_inheritance.deregistration_grounds_heirs
  - claim.vehicle_inheritance.transcription_docs
  status: draft
- id: rule.vehicle_inheritance.role.missing
  canonical_rule_id: vehicle_inheritance.role.missing
  event_type_id: life.vehicle_inheritance
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: missing
    field: applicant_role
  effects:
  - type: require_confirmation
    tag: legal_heir_capacity
    message_ro: Precizează și dovedește calitatea în care soliciți operațiunea asupra vehiculului moștenit.
  source_claim_ids:
  - claim.vehicle_inheritance.deregistration_grounds_heirs
  status: draft
- id: rule.vehicle_inheritance.transcription.deadline
  canonical_rule_id: vehicle_inheritance.transcription.deadline
  event_type_id: life.vehicle_inheritance
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: succession_status
      value: completed
    - op: eq
      field: intended_action
      value: keep_and_use
    - op: eq
      field: legal_acquisition_date_confirmed
      value: true
    - op: exists
      field: acquisition_date
  effects:
  - type: include_step
    step_id: request_transcription_within_90_days
  - type: set_deadline
    step_id: request_transcription_within_90_days
    value:
      kind: relative_calendar_days
      anchor: acquisition_date
      days: 90
  source_claim_ids:
  - claim.vehicle_inheritance.transcription_90
  status: draft
- id: rule.vehicle_inheritance.transcription.date_unconfirmed
  canonical_rule_id: vehicle_inheritance.transcription.date_unconfirmed
  event_type_id: life.vehicle_inheritance
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: eq
      field: succession_status
      value: completed
    - op: eq
      field: intended_action
      value: keep_and_use
    - op: eq
      field: legal_acquisition_date_confirmed
      value: false
  effects:
  - type: require_confirmation
    tag: inheritance_acquisition_date_for_90_day_deadline
    message_ro: Confirmă data juridică a dobândirii dreptului de proprietate; termenul de 90 de zile nu este calculat
      dintr-o dată presupusă.
  source_claim_ids:
  - claim.vehicle_inheritance.transcription_90
  status: draft
- id: rule.vehicle_inheritance.coheirs
  canonical_rule_id: vehicle_inheritance.coheirs
  event_type_id: life.vehicle_inheritance
  jurisdiction_ids:
  - ro
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: co_heirs
    value: true
  effects:
  - type: require_confirmation
    tag: co_heir_consent_or_partition
    message_ro: Confirmă actul succesoral, atribuirea vehiculului și puterile fiecărui co-moștenitor înainte de
      transcriere, vânzare sau radiere.
  source_claim_ids:
  - claim.vehicle_inheritance.deregistration_grounds_heirs
  - claim.vehicle_inheritance.transcription_docs
  status: draft
- id: rule.vehicle_inheritance.minor_heir
