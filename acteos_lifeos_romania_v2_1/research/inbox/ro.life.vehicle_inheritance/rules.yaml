  source_claim_ids:
  - claim.vehicle_inheritance.deregistration_grounds_heirs
  status: draft
- id: rule.vehicle_inheritance.keep.rca_invalid
  canonical_rule_id: vehicle_inheritance.keep.rca_invalid
