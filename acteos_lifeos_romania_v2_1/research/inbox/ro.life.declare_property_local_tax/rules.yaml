- id: rule.property_tax.timisoara.other_case.v1
  canonical_rule_id: rule.property_tax.timisoara.other_case
  event_type_id: ro.life.declare_property_local_tax
  jurisdiction_ids:
  - ro.tm.timisoara
  authority_level: uat
  competence_scope: []
  legal_rank: pagină oficială de serviciu
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: jurisdiction_id
      value: ro.tm.timisoara
    - op: not
      arg:
        op: any
        args:
        - op: all
          args:
          - op: eq
            field: owner_type
            value: person
          - op: eq
            field: property_kind
            value: land
        - op: all
          args:
          - op: eq
            field: owner_type
            value: legal_entity
          - op: eq
            field: property_kind
            value: land
          - op: eq
            field: property_event
            value: acquired
        - op: all
          args:
          - op: eq
            field: owner_type
            value: legal_entity
          - op: eq
            field: property_kind
            value: building
          - op: in
            field: property_event
            values:
            - acquired
            - revalued
  effects:
  - type: include_step
    step_id: select_atlas_tax_case
  - type: attach_channel
    channel_id: pmt_atlas_tax
  - type: require_confirmation
    tag: confirm_atlas_property_case
    message_ro: Speța exactă și documentele obligatorii trebuie confirmate în Atlas.
  source_claim_ids:
  - clm.property_tax.pmt.index
  status: in_review
  reviewer_id: null
- id: rule.property_tax.other_uat.v1
  canonical_rule_id: rule.property_tax.other_uat
  event_type_id: ro.life.declare_property_local_tax
  jurisdiction_ids:
  - ro
  authority_level: uat
  competence_scope: []
  legal_rank: procedură locală
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: neq
    field: jurisdiction_id
    value: ro.tm.timisoara
  effects:
  - type: include_step
    step_id: identify_competent_local_tax_authority
  - type: require_confirmation
    tag: confirm_local_property_tax_procedure
    message_ro: Procedura și documentele UAT-ului competent trebuie confirmate local.
  - type: emit_advice
    tag: verified_with_local_gap
    message_ro: Pilotul operațional verificat este Timișoara.
  source_claim_ids:
  - clm.property_tax.pmt.index
  status: in_review
  reviewer_id: null
- id: rule.property_tax.deadline_confirmation.v1
  canonical_rule_id: rule.property_tax.deadline_confirmation
  event_type_id: ro.life.declare_property_local_tax
  jurisdiction_ids:
  - ro
  authority_level: national_operational
  competence_scope: []
  legal_rank: lege — text indisponibil pentru extragere
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: const
    value: true
  effects:
  - type: require_confirmation
    tag: confirm_current_property_tax_declaration_deadline
    message_ro: Termenul național curent trebuie reconfirmat din textul oficial disponibil al Codului fiscal.
  source_claim_ids:
  - clm.property_tax.cod_fiscal_unavailable
  status: in_review
  reviewer_id: null
