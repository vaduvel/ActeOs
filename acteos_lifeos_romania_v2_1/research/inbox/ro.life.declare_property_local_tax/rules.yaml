  when:
    op: all
    args:
    - op: eq
      field: jurisdiction_id
      value: ro.tm.timisoara
    - op: eq
      field: owner_type
      value: legal_entity
    - op: eq
      field: property_kind
      value: land
    - op: eq
      field: property_event
      value: acquired
  effects:
  - type: include_step
    step_id: select_atlas_tax_case
  - type: include_requirement
