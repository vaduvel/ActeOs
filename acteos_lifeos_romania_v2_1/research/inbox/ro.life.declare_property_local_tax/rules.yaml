  authority_level: uat
  competence_scope: []
  legal_rank: pagină oficială de serviciu
  severity: operational
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: jurisdiction_id
      value: ro.tm.timisoara
    - op: eq
      field: owner_type
      value: person
    - op: eq
      field: property_kind
      value: land
  effects:
  - type: include_step
    step_id: select_atlas_tax_case
