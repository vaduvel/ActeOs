  - id: req.final_protection_judgment
    title_ro: "Hotarare definitiva de ocrotire"
    description_ro: >-
      Hotararea definitiva folosita pentru luarea in evidenta a adultului ocrotit legal.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Hotarare definitiva de ocrotire"
    readiness_checks:
