  - id: req.guardian_medical_income_criminal_integrity_documents
    title_ro: "Documente medicale, de venit si integritate ale tutorelui"
    description_ro: >-
      Documentele privind starea medicala, veniturile si integritatea tutorelui sau ocrotitorului.
