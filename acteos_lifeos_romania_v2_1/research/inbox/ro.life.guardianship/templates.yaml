  - id: req.protected_adult_medical_income_property_documents
    title_ro: "Documente medicale, de venit si proprietate ale adultului ocrotit"
    description_ro: >-
      Documentele medicale, de venit si proprietate ale adultului ocrotit, daca sunt cerute in dosarul local.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente medicale"
      - "Documente de venit"
      - "Documente de proprietate"
    readiness_checks:
