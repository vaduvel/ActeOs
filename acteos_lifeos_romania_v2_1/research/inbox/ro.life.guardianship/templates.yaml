    status: draft

  - id: req.protected_adult_identity_and_birth_documents
    title_ro: "Acte de identitate si nastere ale adultului ocrotit"
    description_ro: >-
      Documentele de identitate si de nastere ale adultului ocrotit.
    obligation: mandatory
    timing: now
