      - "Documente de venit"
      - "Documente privind integritatea"
    readiness_checks:
      - "Documentele tutorelui sau ocrotitorului sunt disponibile daca sunt cerute"
    status: draft

  - id: req.minor_identity_document
    title_ro: "Actul de identitate al minorului"
    description_ro: >-
      Actul de identitate al minorului, daca varsta il face aplicabil.
    obligation: conditional
    timing: now
    accepted_forms:
