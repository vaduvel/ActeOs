# Step & requirement templates for ro.life.guardianship (life.guardianship).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: obtain_guardianship_or_protection_judgment
    semantic_key: obtain_guardianship_or_protection_judgment
    title_ro: "Obtine hotararea definitiva de tutela sau ocrotire"
    instruction_ro: >-
      Separă instituirea judiciara a masurii de ocrotire de etapa de luare in evidenta la autoritatea tutelara.
    sequence_hint: 10
    completion_evidence_ro:
      - "Necesitatea hotararii definitive a fost clarificata"
    recovery_actions_ro:
      - "Daca hotararea definitiva nu exista, nu continua cu dosarul local post-hotarare"
    status: draft

  - id: register_minor_guardianship_with_tutelary_authority
    semantic_key: register_minor_guardianship_with_tutelary_authority
    title_ro: "Inregistreaza tutela minorului la autoritatea tutelara"
    instruction_ro: >-
      Dupa hotararea definitiva, pregateste dosarul local pentru luarea in evidenta a tutelei minorului.
    sequence_hint: 20
    completion_evidence_ro:
      - "Dosarul pentru tutela minorului este pregatit sau depus"
    recovery_actions_ro:
      - "Daca lipsesc actele minorului sau ale tutorelui, completeaza dosarul"
    status: draft

  - id: register_legally_protected_adult
    semantic_key: register_legally_protected_adult
    title_ro: "Inregistreaza adultul ocrotit legal"
    instruction_ro: >-
      Dupa hotararea definitiva, pregateste dosarul local pentru luarea in evidenta a adultului ocrotit.
    sequence_hint: 30
    completion_evidence_ro:
      - "Dosarul pentru adultul ocrotit este pregatit sau depus"
    recovery_actions_ro:
      - "Daca lipsesc actele adultului ocrotit sau ale ocrotitorului, completeaza dosarul"
    status: draft

requirement_templates:
  - id: req.final_guardianship_judgment
    title_ro: "Hotarare definitiva de tutela"
    description_ro: >-
      Hotararea definitiva folosita pentru luarea in evidenta a tutelei minorului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Hotarare definitiva de tutela"
    readiness_checks:
      - "Hotararea definitiva este disponibila"
    status: draft

  - id: req.minor_birth_certificate
    title_ro: "Certificat de nastere al minorului"
    description_ro: >-
      Certificatul de nastere al minorului folosit in dosarul de tutela.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Certificat de nastere al minorului"
    readiness_checks:
      - "Identitatea minorului este dovedita documentar"
    status: draft

  - id: req.minor_medical_and_school_documents
    title_ro: "Documente medicale si scolare ale minorului"
    description_ro: >-
      Documentele medicale si scolare ale minorului, daca sunt cerute in dosarul local.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente medicale ale minorului"
      - "Documente scolare ale minorului"
    readiness_checks:
      - "Documentele medicale si scolare ale minorului sunt disponibile daca sunt cerute"
    status: draft

  - id: req.parent_status_documents
    title_ro: "Documente privind situatia parintilor"
    description_ro: >-
      Documentele privind situatia parintilor, folosite in dosarul de tutela al minorului.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente privind situatia parintilor"
    readiness_checks:
      - "Situatia parintilor este dovedita documentar daca ramura o cere"
    status: draft

  - id: req.guardian_identity_and_civil_status_documents
    title_ro: "Actele de identitate si stare civila ale tutorelui sau ocrotitorului"
    description_ro: >-
      Documentele de identitate si stare civila ale tutorelui sau persoanei ocrotitoare.
    obligation: mandatory
    timing: now
    accepted_forms:
