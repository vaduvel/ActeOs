    status: draft

  - id: req.guardian_spouse_consent
    title_ro: "Acordul sotului sau sotiei tutorelui"
    description_ro: >-
      Acordul sotului sau sotiei tutorelui, daca lista locala il cere pentru dosarul post-hotarare.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Acordul sotului sau sotiei"
    readiness_checks:
