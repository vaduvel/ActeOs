# Step & requirement templates for ro.life.documents_legalisation_translation (life.documents_legalisation_translation).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: classify_document_and_destination
    semantic_key: classify_document_and_destination
    title_ro: "Clasifica documentul si destinatia"
    instruction_ro: >-
      Stabileste sensul circuitului, regimul statelor implicate si tipul documentului inainte de a
      alege apostila, supralegalizarea sau traducerea.
    sequence_hint: 10
    completion_evidence_ro:
      - "Regimul juridic al documentului a fost clasificat"
    recovery_actions_ro:
      - "Daca perechea de state sau autoritatea emitenta nu sunt clare, nu continua pe o formalitate presupusa"
    status: draft

  - id: use_eu_public_document_simplification
    semantic_key: use_eu_public_document_simplification
    title_ro: "Foloseste simplificarea UE pentru documente publice"
    instruction_ro: >-
      Daca traseul este UE catre UE si documentul intra in materia acoperita, foloseste ruta fara
      apostila pentru autenticitate si verifica daca este suficienta.
    sequence_hint: 20
    completion_evidence_ro:
      - "Ruta simplificata UE a fost confirmata"
    recovery_actions_ro:
      - "Daca autoritatea primitoare cere altceva, confirma cerinta exacta inainte de continuare"
    status: draft

  - id: obtain_apostille_from_competent_authority
    semantic_key: obtain_apostille_from_competent_authority
    title_ro: "Obtine apostila de la autoritatea competenta"
    instruction_ro: >-
      Daca perechea de state confirma ruta Haga, pregateste dosarul pentru autoritatea competenta
      care poate emite apostila.
    sequence_hint: 30
    completion_evidence_ro:
      - "Ruta de apostilare a fost pregatita"
    recovery_actions_ro:
      - "Daca nu este confirmata conventia pentru perechea concreta, nu presupune apostila"
    status: draft

  - id: submit_to_timis_prefecture_for_apostille
    semantic_key: submit_to_timis_prefecture_for_apostille
    title_ro: "Depune la Prefectura Timis, daca aceasta este competenta"
    instruction_ro: >-
      Daca documentul romanesc administrativ intra pe competenta prefecturii din Timis, pregateste
      depunerea pe canalul local verificat.
    sequence_hint: 40
    completion_evidence_ro:
      - "Depunerea la Prefectura Timis a fost evaluata sau pregatita"
    recovery_actions_ro:
      - "Daca documentul tine de alta autoritate, redirectioneaza catre competenta corecta"
    status: draft

  - id: confirm_supralegalisation_chain
    semantic_key: confirm_supralegalisation_chain
    title_ro: "Confirma lantul de supralegalizare"
    instruction_ro: >-
      Daca traseul este non-Haga sau neclar, confirma lantul de supralegalizare cu autoritatea
      primitoare inainte de a incepe formalitatile.
    sequence_hint: 50
    completion_evidence_ro:
      - "Necesarul de supralegalizare a fost confirmat"
    recovery_actions_ro:
      - "Daca lantul nu este clar, nu porni formalitati partiale"
    status: draft

  - id: request_multilingual_standard_form
    semantic_key: request_multilingual_standard_form
    title_ro: "Cere formularul multilingv, daca este disponibil"
    instruction_ro: >-
      Daca documentul permite formular multilingv standard, verifica disponibilitatea lui pentru a
      evita o traducere inutila.
    sequence_hint: 60
    completion_evidence_ro:
      - "Necesitatea formularului multilingv a fost verificata"
    recovery_actions_ro:
      - "Daca formularul nu este disponibil, revino la ruta de traducere sau alta formalitate"
    status: draft

  - id: confirm_translation_requirement
    semantic_key: confirm_translation_requirement
    title_ro: "Confirma daca este necesara traducerea"
    instruction_ro: >-
      Verifica daca autoritatea primitoare accepta limba documentului sau daca este necesara o
      traducere autorizata.
    sequence_hint: 70
    completion_evidence_ro:
      - "Necesitatea traducerii a fost confirmata"
    recovery_actions_ro:
      - "Daca limba acceptata nu este clara, cere confirmare autoritatii primitoare"
    status: draft

requirement_templates: []
