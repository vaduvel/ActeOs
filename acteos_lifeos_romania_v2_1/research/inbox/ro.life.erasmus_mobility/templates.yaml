# Step & requirement templates for ro.life.erasmus_mobility (life.erasmus_mobility).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: check_upt_partner_and_current_call
    semantic_key: check_upt_partner_and_current_call
    title_ro: "Verifica partenerul si apelul curent"
    instruction_ro: >-
      Verifica institutia partenera si apelul curent aplicabil mobilitatii inainte de pregatirea
      dosarului.
    sequence_hint: 10
    completion_evidence_ro:
      - "Partenerul si apelul curent au fost verificate"
    recovery_actions_ro:
      - "Daca partenerul nu este eligibil, cauta alta optiune compatibila"
    status: draft

  - id: check_upt_traineeship_call
    semantic_key: check_upt_traineeship_call
    title_ro: "Verifica apelul pentru traineeship"
    instruction_ro: >-
      Daca urmaresti o mobilitate de traineeship, verifica apelul si conditiile specifice pentru
      acest traseu.
    sequence_hint: 20
    completion_evidence_ro:
      - "Apelul pentru traineeship a fost verificat"
    recovery_actions_ro:
      - "Daca apelul nu este deschis, asteapta sau muta dosarul pe alta ruta eligibila"
    status: draft

  - id: check_upt_mobility_type_page
    semantic_key: check_upt_mobility_type_page
    title_ro: "Verifica pagina tipului de mobilitate"
    instruction_ro: >-
      Citeste pagina dedicata tipului de mobilitate pentru a confirma criteriile, calendarul si
      documentele folosite.
    sequence_hint: 30
    completion_evidence_ro:
      - "Pagina tipului de mobilitate a fost verificata"
    recovery_actions_ro:
      - "Daca pagina indica alte cerinte, adapteaza dosarul"
    status: draft

  - id: read_current_official_call
    semantic_key: read_current_official_call
    title_ro: "Citeste apelul oficial curent"
    instruction_ro: >-
      Citeste apelul oficial curent inainte de depunere si urmareste conditiile si calendarul
      publicat acolo.
    sequence_hint: 40
    completion_evidence_ro:
      - "Apelul oficial curent a fost citit"
    recovery_actions_ro:
      - "Daca apelul se modifica, revizuieste dosarul inainte de trimitere"
    status: draft

  - id: complete_home_and_host_institution_documents
    semantic_key: complete_home_and_host_institution_documents
    title_ro: "Completeaza documentele institutiei de origine si gazda"
    instruction_ro: >-
      Strange si completeaza documentele cerute atat de institutia de origine, cat si de institutia
      gazda pentru mobilitate.
    sequence_hint: 50
    completion_evidence_ro:
      - "Documentele pentru ambele institutii sunt completate"
    recovery_actions_ro:
      - "Daca lipseste o semnatura sau aprobare, obtine-o inainte de depunere"
    status: draft

  - id: submit_host_evidence_for_credit_recognition
    semantic_key: submit_host_evidence_for_credit_recognition
    title_ro: "Depune dovezile pentru recunoasterea creditelor"
    instruction_ro: >-
      Daca mobilitatea cere recunoasterea creditelor, depune dovezile de la institutia gazda in
      forma ceruta de institutia de origine.
    sequence_hint: 60
    completion_evidence_ro:
      - "Dovezile pentru recunoasterea creditelor au fost depuse"
    recovery_actions_ro:
      - "Daca lipsesc acte de la institutia gazda, completeaza dosarul dupa obtinerea lor"
    status: draft

requirement_templates:
  - id: req.host_institution_relevant_documents
    title_ro: "Documente relevante de la institutia gazda"
    description_ro: >-
      Documentele emise sau cerute de institutia gazda pentru mobilitatea Erasmus.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Documente ale institutiei gazda"
    readiness_checks:
      - "Documentele corespund apelului si tipului de mobilitate"
    status: draft
