  - id: req.home_evaluation_request
    title_ro: "Cerere de evaluare la domiciliu"
    description_ro: >-
      Cererea folosita pentru evaluarea la domiciliu, acolo unde ruta o permite.
    obligation: conditional
    timing: now
    accepted_forms:
