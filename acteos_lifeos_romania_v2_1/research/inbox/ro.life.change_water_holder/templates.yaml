step_templates:
  - id: change_water_holder
    semantic_key: change_water_holder
    title_ro: "Depune documentația pentru contractul Aquatim"
    instruction_ro: >-
      La Timișoara, serviciul de apă și canalizare este operat de Aquatim; dacă
      există deja branșament sau racord, depune documentele pentru încheierea
      contractului, iar Serviciul Clienți pregătește contractul și te contactează
      pentru semnare, folosind formularul F-01.00.06-3.
    sequence_hint: 10
    completion_evidence_ro:
      - "Documentele sunt depuse pentru încheierea contractului Aquatim."
    recovery_actions_ro:
      - "Dacă nu există branșament sau racord, urmează mai întâi procesul de aviz tehnic de branșare sau racordare."
      - "Dacă ruta este după deces, confirmă cu Aquatim procedura de preluare."
    status: draft

requirement_templates:
  - id: req.valid_id
    title_ro: "Act de identitate valabil"
    description_ro: >-
      Document inclus în documentația depusă la Aquatim pentru încheierea
      contractului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Document cerut în setul depus pentru contractul Aquatim."
    readiness_checks:
      - "Documentul este pregătit pentru dosarul depus la Aquatim."
    status: draft
  - id: req.proof_of_space
    title_ro: "Dovada folosirii spațiului"
    description_ro: >-
      Document inclus în documentația depusă la Aquatim pentru încheierea
      contractului la locul de consum.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Document cerut în setul depus pentru contractul Aquatim."
    readiness_checks:
      - "Documentul este pregătit pentru dosarul depus la Aquatim."
    status: draft
  - id: req.death_certificate
    title_ro: "Certificatul de deces al titularului"
    description_ro: >-
      Pentru ruta de preluare după deces, certificatul de deces al titularului
      rămâne de confirmat în procedura specifică Aquatim.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificatul de deces al titularului, dacă procedura Aquatim îl confirmă."
    readiness_checks:
      - "Ruta este cea de preluare după deces."
      - "Procedura Aquatim pentru preluare după deces este confirmată."
    status: draft
