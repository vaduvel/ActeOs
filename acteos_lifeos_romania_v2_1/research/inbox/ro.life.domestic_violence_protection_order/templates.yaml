# Step & requirement templates for ro.life.domestic_violence_protection_order (ro.life.domestic_violence_protection_order).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: step.call_112_now
    semantic_key: step.call_112_now
    title_ro: "Suna imediat la 112"
    instruction_ro: >-
      Daca exista pericol imediat, foloseste 112 si prioritizeaza siguranta
      personala inaintea oricarui pas administrativ.
    sequence_hint: 10
    completion_evidence_ro:
      - "Ruta de urgenta 112 a fost indicata ca prioritate"
    recovery_actions_ro:
      - "Daca pericolul este imediat, nu amana apelul prin pasi administrativi"
    status: draft

  - id: step.contact_police_for_risk_assessment
    semantic_key: step.contact_police_for_risk_assessment
    title_ro: "Contacteaza politia pentru evaluarea riscului"
    instruction_ro: >-
      Daca este urmarit ordinul provizoriu, contacteaza politia pentru evaluarea
      riscului iminent pe traseul oficial.
    sequence_hint: 20
    completion_evidence_ro:
      - "Ruta de evaluare a riscului de catre politie a fost pregatita"
    recovery_actions_ro:
      - "Daca situatia devine pericol imediat, revino la pasul de urgenta 112"
    status: draft

  - id: step.provide_available_evidence_safely
    semantic_key: step.provide_available_evidence_safely
    title_ro: "Ofera in siguranta dovezile disponibile"
    instruction_ro: >-
      Pune la dispozitie in siguranta informatiile si dovezile disponibile,
      fara a te expune suplimentar unui risc.
    sequence_hint: 30
    completion_evidence_ro:
      - "Dovezile disponibile au fost integrate in ruta de evaluare"
    recovery_actions_ro:
      - "Daca transmiterea dovezilor creste riscul, cauta sprijinul autoritatilor pe canalul sigur"
    status: draft

  - id: step.prepare_court_protection_order_request
    semantic_key: step.prepare_court_protection_order_request
    title_ro: "Pregateste cererea pentru ordinul de protectie la instanta"
    instruction_ro: >-
      Daca ruta provizorie nu este disponibila sau nu este suficienta, pregateste
      cererea catre instanta competenta.
    sequence_hint: 40
    completion_evidence_ro:
      - "Ruta pentru cererea la instanta a fost pregatita"
    recovery_actions_ro:
      - "Daca nu este clar daca se urmareste ordin provizoriu sau judecatoresc, clarifica obiectivul imediat"
    status: draft

  - id: step.identify_competent_district_court
    semantic_key: step.identify_competent_district_court
    title_ro: "Identifica judecatoria competenta"
    instruction_ro: >-
      Stabileste judecatoria competenta dupa baza legala relevanta inainte de
      depunerea cererii pentru ordinul de protectie.
    sequence_hint: 50
    completion_evidence_ro:
      - "Judecatoria competenta a fost identificata"
    recovery_actions_ro:
      - "Daca baza de competenta nu este clara, confirma instanta inainte de depunere"
    status: draft

  - id: step.complete_statutory_protection_order_form
    semantic_key: step.complete_statutory_protection_order_form
    title_ro: "Completeaza formularul legal pentru ordinul de protectie"
    instruction_ro: >-
      Completeaza formularul legal aplicabil cererii la instanta pe baza
      situatiei concrete si a datelor disponibile.
    sequence_hint: 60
    completion_evidence_ro:
      - "Formularul legal pentru ordinul de protectie este pregatit"
    recovery_actions_ro:
      - "Daca formularul nu este complet sau competenta nu este confirmata, nu depune cererea in aceasta forma"
    status: draft

  - id: step.file_protection_order_request
    semantic_key: step.file_protection_order_request
    title_ro: "Depune cererea pentru ordinul de protectie"
    instruction_ro: >-
      Dupa pregatirea formularului si a instantei competente, depune cererea pe
      canalul oficial relevant.
    sequence_hint: 70
    completion_evidence_ro:
      - "Cererea pentru ordinul de protectie este pregatita pentru depunere"
    recovery_actions_ro:
      - "Daca instanta sau formularul nu sunt confirmate, clarifica-le inainte de depunere"
    status: draft

  - id: step.file_provisional_order_contest
    semantic_key: step.file_provisional_order_contest
    title_ro: "Depune contestatia la ordinul provizoriu"
    instruction_ro: >-
      Daca obiectivul este contestarea ordinului provizoriu, foloseste ruta
      oficiala si verifica ancora corecta a termenului.
    sequence_hint: 80
    completion_evidence_ro:
      - "Ruta de contestare a ordinului provizoriu a fost pregatita"
    recovery_actions_ro:
      - "Daca termenul sau actul contestat nu sunt clare, confirma-le inainte de depunere"
    status: draft

  - id: step.file_protection_order_appeal
    semantic_key: step.file_protection_order_appeal
    title_ro: "Depune apelul impotriva ordinului de protectie"
    instruction_ro: >-
      Daca se urmareste apelul impotriva hotararii instantei, pregateste ruta
      de atac in termenul legal aplicabil.
    sequence_hint: 90
    completion_evidence_ro:
      - "Ruta de apel impotriva ordinului de protectie a fost pregatita"
    recovery_actions_ro:
      - "Daca ancora termenului nu este corecta, confirma data de la care curge apelul"
    status: draft

  - id: step.contact_police_about_order_breach
    semantic_key: step.contact_police_about_order_breach
    title_ro: "Contacteaza politia pentru incalcarea ordinului"
    instruction_ro: >-
      Daca ordinul este incalcat, sesizeaza politia pe canalul relevant si
      trateaza incalcarea ca prioritate de siguranta.
    sequence_hint: 100
    completion_evidence_ro:
      - "Ruta pentru sesizarea incalcarii ordinului a fost pregatita"
    recovery_actions_ro:
      - "Daca exista risc imediat, prioritatea ramane apelul la 112"
    status: draft

  - id: step.compare_provisional_and_court_order_routes
    semantic_key: step.compare_provisional_and_court_order_routes
    title_ro: "Compara ruta ordinului provizoriu cu ruta la instanta"
    instruction_ro: >-
      Daca trebuie ales intre ordin provizoriu si ordin judecatoresc, compara
      conditiile si scopul fiecarei rute fara a le confunda.
    sequence_hint: 110
    completion_evidence_ro:
      - "Diferenta dintre ruta provizorie si ruta la instanta a fost clarificata"
    recovery_actions_ro:
      - "Daca obiectivul utilizatorului ramane neclar, cere clarificare pe ruta de protectie potrivita"
    status: draft

requirement_templates:
  - id: req.statutory_protection_order_form
    title_ro: "Formularul legal pentru ordinul de protectie"
    description_ro: >-
      Formularul legal folosit la cererea de ordin de protectie in instanta.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Formular legal pentru ordinul de protectie"
    readiness_checks:
      - "Formularul legal este completat pentru instanta competenta"
    status: draft
