# Step & requirement templates for ro.life.public_domain_occupation (life.public_domain_occupation).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: classify_public_domain_occupation
    semantic_key: classify_public_domain_occupation
    title_ro: "Clasifica ocuparea domeniului public"
    instruction_ro: >-
      Stabileste cazul local in functie de tipul ocuparii si de eventualele autorizatii deja
      existente.
    sequence_hint: 10
    completion_evidence_ro:
      - "Cazul de ocupare a domeniului public a fost clasificat"
    recovery_actions_ro:
      - "Daca tipul ocuparii nu este clar, nu alege un caz local la intamplare"
    status: draft

  - id: select_timisoara_occupation_case
    semantic_key: select_timisoara_occupation_case
    title_ro: "Selecteaza cazul local din Timisoara"
    instruction_ro: >-
      Pentru Timisoara, selecteaza cazul local potrivit din portal inainte de pregatirea dosarului.
    sequence_hint: 20
    completion_evidence_ro:
      - "Cazul local pentru Timisoara a fost selectat"
    recovery_actions_ro:
      - "Daca ocuparea nu este in Timisoara, foloseste autoritatea locala relevanta"
    status: draft

  - id: upload_case_documents
    semantic_key: upload_case_documents
    title_ro: "Incarca documentele cazului"
    instruction_ro: >-
      Pregateste si incarca documentele cerute de cazul local selectat inainte de transmiterea
      cererii.
    sequence_hint: 30
    completion_evidence_ro:
      - "Documentele cazului sunt pregatite pentru incarcare"
    recovery_actions_ro:
      - "Daca nu ai toate documentele, nu trimite dosarul incomplet"
    status: draft

  - id: submit_occupation_request
    semantic_key: submit_occupation_request
    title_ro: "Trimite cererea de ocupare"
    instruction_ro: >-
      Dupa selectarea cazului si pregatirea documentelor, trimite cererea pe canalul local verificat.
    sequence_hint: 40
    completion_evidence_ro:
      - "Cererea de ocupare a fost pregatita sau transmisa"
    recovery_actions_ro:
      - "Daca dosarul nu este complet, completeaza-l inainte de trimitere"
    status: draft

  - id: pay_assessed_occupation_charge
    semantic_key: pay_assessed_occupation_charge
    title_ro: "Achita suma calculata dupa verificarea dosarului"
    instruction_ro: >-
      Daca autoritatea a calculat o suma dupa verificarea dosarului, pregateste plata pe baza
      acelei evaluari.
    sequence_hint: 50
    completion_evidence_ro:
      - "Suma solicitata a fost evaluata pentru plata"
    recovery_actions_ro:
      - "Daca nu exista inca o suma calculata, nu afisa o taxa generica"
    status: draft

  - id: download_public_domain_agreement
    semantic_key: download_public_domain_agreement
    title_ro: "Descarca acordul pentru ocupare"
    instruction_ro: >-
      Dupa plata finalizata, descarca sau pastreaza acordul emis pentru ocuparea temporara.
    sequence_hint: 60
    completion_evidence_ro:
      - "Acordul pentru ocupare este disponibil"
    recovery_actions_ro:
      - "Daca acordul nu apare dupa plata, urmareste dosarul la autoritatea competenta"
    status: draft

requirement_templates: []
