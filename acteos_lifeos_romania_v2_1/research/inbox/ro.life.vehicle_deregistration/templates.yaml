step_templates:
  - id: prepare_vehicle_deregistration_file
    semantic_key: vehicle_deregistration_prepare_file
    title_ro: "Pregateste dosarul de radiere"
    instruction_ro: >-
      Stabileste temeiul legal al radierii si strange certificatul, placutele,
      documentele de identitate si dovada motivului invocat.
    sequence_hint: 10
    completion_evidence_ro:
      - "Dosarul de radiere este pregatit pentru motivul selectat."
    recovery_actions_ro:
      - "Daca motivul nu este unul admis ori nu poate fi dovedit, nu continua depunerea."
    status: draft
  - id: submit_deregistration_to_registering_authority
    semantic_key: vehicle_deregistration_submit_authority
    title_ro: "Depune radierea la autoritatea de inmatriculare"
    instruction_ro: >-
      Depune dosarul complet la autoritatea care a inmatriculat vehiculul sau
      la canalul competent publicat.
    sequence_hint: 20
    completion_evidence_ro:
      - "Cererea de radiere este depusa la autoritatea competenta."
    recovery_actions_ro:
      - "Verifica daca solicitantul are calitatea acceptata inainte de depunere."
    status: draft
  - id: declare_deregistration_to_local_tax_authority
    semantic_key: vehicle_deregistration_declare_local_tax
    title_ro: "Declara radierea la organul fiscal local"
    instruction_ro: >-
      Dupa radiere, declara scoaterea vehiculului din evidenta fiscala in
      termenul aplicabil.
    sequence_hint: 30
    completion_evidence_ro:
      - "Radierea este declarata fiscal."
    recovery_actions_ro:
      - "Pastreaza dovada radierii pentru dosarul fiscal local."
    status: draft

requirement_templates:
  - id: req.registration_certificate
    title_ro: "Certificatul de inmatriculare"
    description_ro: >-
      Certificatul de inmatriculare al vehiculului, atunci cand este disponibil
      pentru radiere.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Certificatul de inmatriculare sau forma ceruta de procedura."
    readiness_checks:
      - "Documentul este disponibil ori exista un substitut admis."
    status: draft
  - id: req.registration_plates_or_loss_retention_theft_proof
    title_ro: "Placutele sau dovada pentru lipsa lor"
    description_ro: >-
      Placutele de inmatriculare ori dovada pierderii, retinerii sau furtului,
      daca nu mai pot fi predate.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Placute disponibile sau dovada oficiala care explica lipsa lor."
    readiness_checks:
      - "Motivul lipsei placutelor este documentat."
    status: draft
  - id: req.valid_identity_or_entity_documents
    title_ro: "Acte valabile de identitate sau ale entitatii"
    description_ro: >-
      Documentele de identificare ale persoanei fizice ori juridice care cere
      radierea.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Act de identitate valabil sau documente ale entitatii solicitante."
    readiness_checks:
      - "Solicitantul poate fi identificat oficial."
    status: draft
  - id: req.proof_of_deregistration_ground
    title_ro: "Dovada temeiului de radiere"
    description_ro: >-
      Documentul care sustine motivul ales pentru radierea vehiculului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Dovada oficiala a temeiului de radiere."
    readiness_checks:
      - "Temeiul de radiere este clar si documentat."
    status: draft
  - id: req.proof_of_lawfully_held_storage_space
    title_ro: "Dovada spatiului de pastrare legala"
    description_ro: >-
      Dovada spatiului de pastrare pentru radierea bazata pe depozitare legala,
      daca se aplica.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Document privind spatiul de depozitare detinut legal."
    readiness_checks:
      - "Radierea este ceruta pentru stocare legala."
    status: draft
  - id: req.scrapping_dismantling_or_specialised_unit_evidence
    title_ro: "Dovada casarii sau dezmembrarii"
    description_ro: >-
      Documentele de la unitatea specializata ori alte dovezi pentru radierea
      prin casare sau dezmembrare.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente emise de unitatea autorizata sau alte dovezi admise."
    readiness_checks:
      - "Temeiul radierii este casarea ori dezmembrarea."
    status: draft
  - id: req.proof_of_permanent_export
    title_ro: "Dovada exportului permanent"
    description_ro: >-
      Dovada ca vehiculul paraseste definitiv circuitul national, atunci cand
      radierea se bazeaza pe export permanent.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente de export permanent acceptate oficial."
    readiness_checks:
      - "Temeiul radierii este exportul permanent."
    status: draft
  - id: req.competent_authority_vehicle_theft_proof
    title_ro: "Dovada furtului de la autoritatea competenta"
    description_ro: >-
      Documentul oficial care confirma furtul vehiculului pentru radiere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Adeverinta sau alt document oficial privind furtul."
    readiness_checks:
      - "Temeiul radierii este furtul vehiculului."
    status: draft
  - id: req.ownership_document_registered_local_tax
    title_ro: "Documentul de proprietate inregistrat fiscal"
    description_ro: >-
      Actul de proprietate cu formalitatea fiscala locala indeplinita, atunci
      cand radierea il cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act de proprietate inregistrat in evidenta fiscala locala."
    readiness_checks:
      - "Ruta concreta a radierii il cere."
    status: draft
  - id: req.sworn_statement_dismantled_or_permanently_withdrawn
    title_ro: "Declaratie pe proprie raspundere privind retragerea definitiva"
    description_ro: >-
      Declaratia folosita in cazurile modelate in care vehiculul este
      dezmembrat sau retras definitiv si procedura o admite.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Declaratie pe proprie raspundere in forma acceptata."
    readiness_checks:
      - "Cazul concret admite aceasta declaratie ca piesa relevanta."
    status: draft
  - id: req.local_fiscal_clearance_certificate_all_obligations_paid
    title_ro: "Certificat fiscal local cu obligatii achitate"
    description_ro: >-
      Certificatul fiscal local care arata ca obligatiile datorate sunt
      achitate, daca procedura il cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat de atestare fiscala locala valabil."
    readiness_checks:
      - "Radierea la cerere pe canalul ales il necesita."
    status: draft
  - id: req.valid_identity_document
    title_ro: "Act de identitate valabil"
    description_ro: >-
      Actul de identitate valabil al persoanei care depune radierea.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Act de identitate valabil."
    readiness_checks:
      - "Solicitantul poate fi identificat oficial."
    status: draft
  - id: req.legal_entity_documents
    title_ro: "Documentele persoanei juridice"
    description_ro: >-
      Documentele necesare cand radierea este ceruta de o persoana juridica.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente oficiale ale persoanei juridice solicitante."
    readiness_checks:
      - "Solicitantul este persoana juridica."
    status: draft
  - id: req.legal_representative_identity
    title_ro: "Actul reprezentantului legal"
    description_ro: >-
      Actul de identitate al reprezentantului legal al persoanei juridice.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act de identitate valabil al reprezentantului legal."
    readiness_checks:
      - "Dosarul este depus prin reprezentantul legal."
    status: draft
  - id: req.lawyer_mandate
    title_ro: "Mandat avocatial"
    description_ro: >-
      Imputernicirea folosita atunci cand radierea este depusa prin avocat.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Imputernicire avocatiala valabila."
    readiness_checks:
      - "Reprezentarea este facuta prin avocat."
    status: draft
  - id: req.notarial_power_of_attorney
    title_ro: "Procura notariala"
    description_ro: >-
      Procura folosita atunci cand radierea este depusa prin imputernicit.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Procura notariala valabila."
    readiness_checks:
      - "Dosarul este depus prin imputernicit."
    status: draft
  - id: req.company_written_mandate
    title_ro: "Mandat scris al companiei"
    description_ro: >-
      Mandatul intern scris al companiei, atunci cand procedura accepta un
      delegat al acesteia.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Mandat scris semnat de companie."
    readiness_checks:
      - "Dosarul este depus de delegatul companiei."
    status: draft

