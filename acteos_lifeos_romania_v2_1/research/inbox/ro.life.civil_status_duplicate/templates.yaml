step_templates:
  - id: request_civil_status_certificate
    semantic_key: civil_status_duplicate_request
    title_ro: "Solicita duplicatul sau extrasul certificatului"
    instruction_ro: >-
      Clarifica tipul certificatului, calitatea solicitantului si canalul de
      depunere, apoi pregateste documentele de identitate si actele care sustin
      dreptul de a cere duplicatul.
    sequence_hint: 10
    completion_evidence_ro:
      - "Cererea pentru duplicat sau extras este pregatita ori depusa."
    recovery_actions_ro:
      - "Daca ruta electronica sau taxa sunt neclare in local, trateaza-le ca puncte de confirmat, nu ca fapte sigure."
    status: draft

requirement_templates:
  - id: req.valid_identity_document
    title_ro: "Act de identitate valabil"
    description_ro: >-
      Documentul de identitate valabil al persoanei care solicita certificatul
      ori duplicatul.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Act de identitate valabil in forma acceptata de canalul ales."
    readiness_checks:
      - "Solicitantul poate fi identificat oficial."
    status: draft
  - id: req.proof_legitimate_interest
    title_ro: "Dovada interesului legitim"
    description_ro: >-
      Documentele care explica de ce o persoana indreptatita solicita
      certificatul, atunci cand legea cere interes legitim.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Acte sau explicatii documentate care sustin interesul legitim."
    readiness_checks:
      - "Solicitantul nu este titularul direct al certificatului ori reprezentantul standard."
    status: draft
  - id: req.mayor_approval
    title_ro: "Aprobarea primarului competent"
    description_ro: >-
      Aprobarea necesara in cazurile in care o alta persoana cere certificatul
      de deces pe baza interesului legitim.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Aprobarea emisa ori consemnata de autoritatea competenta."
    readiness_checks:
      - "Ruta concreta pentru certificatul de deces o cere."
    status: draft
  - id: req.special_power_of_attorney
    title_ro: "Procura speciala"
    description_ro: >-
      Procura speciala folosita cand cererea este depusa prin mandatar.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Procura speciala valabila pentru solicitarea certificatului."
    readiness_checks:
      - "Solicitantul actioneaza prin mandatar."
    status: draft
  - id: req.proxy_identity_document
    title_ro: "Actul de identitate al mandatarului"
    description_ro: >-
      Documentul de identitate al persoanei care depune cererea in baza unei
      procuri speciale.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act de identitate valabil al mandatarului."
    readiness_checks:
      - "Cererea este depusa prin mandatar."
    status: draft
  - id: req.lawyer_authorization
    title_ro: "Imputernicire avocatiala"
    description_ro: >-
      Imputernicirea folosita cand cererea este formulata prin avocat.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Imputernicire avocatiala valabila pentru solicitarea certificatului."
    readiness_checks:
      - "Solicitantul actioneaza prin avocat."
    status: draft
  - id: req.old_civil_status_certificate
    title_ro: "Certificatul vechi, daca exista"
    description_ro: >-
      Certificatul vechi prezentat pentru preschimbare ori inlocuire, daca este
      disponibil.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificatul vechi, in original, daca este in posesia solicitantului."
    readiness_checks:
      - "Cazul este unul de preschimbare sau de inlocuire cu documentul vechi disponibil."
    status: draft
  - id: req.final_status_change_act
    title_ro: "Act final care explica schimbarea statutului"
    description_ro: >-
      Actul final care arata schimbarea de stare civila relevanta pentru
      certificatul solicitat.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Hotarare, certificat sau alt act final relevant."
    readiness_checks:
      - "Statutul civil s-a schimbat si afecteaza cererea."
    status: draft
  - id: req.kinship_civil_status_documents
    title_ro: "Documente de rudenie si stare civila"
    description_ro: >-
      Actele care sustin relatia de rudenie sau calitatea persoanei
      indreptatite sa ceara certificatul.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificate sau alte documente care dovedesc rudenia ori calitatea."
    readiness_checks:
      - "Calitatea solicitantului trebuie demonstrata suplimentar."
    status: draft
