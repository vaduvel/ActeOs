  timezone: Europe/Bucharest
  jurisdiction_path:
  - eu
  - ro
  - ro.tm
  - ro.tm.timisoara
  reference_date: '2026-06-25'
fixtures:
- id: HIS01
  description: Verificare online — asigurat
  facts:
    can_use_online_check: true
    status_result: insured
  expect:
    status: resolved
    included_steps:
    - check_insurance_status_in_siui
    channels:
    - ch.siui_insured_status
    advice:
    - use_current_siui_address
    - portal_reports_insured
- id: HIS02
  description: Verificare online — neasigurat
