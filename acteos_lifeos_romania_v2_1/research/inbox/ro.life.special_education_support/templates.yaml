# Step & requirement templates for ro.life.special_education_support (life.special_education_support).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: prepare_cjrae_orientation_dossier
    semantic_key: prepare_cjrae_orientation_dossier
    title_ro: "Pregateste dosarul de orientare"
    instruction_ro: >-
      Strange documentele educationale, medicale si sociale cerute pentru dosarul de orientare
      catre sprijin educational special.
    sequence_hint: 10
    completion_evidence_ro:
      - "Dosarul de orientare este pregatit"
    recovery_actions_ro:
      - "Daca lipseste un raport sau un act medical, completeaza dosarul inainte de depunere"
    status: draft

  - id: submit_to_cjrae_cmbrae
    semantic_key: submit_to_cjrae_cmbrae
    title_ro: "Depune la CJRae/CMBRAE"
    instruction_ro: >-
      Depune dosarul complet la structura competenta pentru orientare scolara si profesionala
      aplicabila cazului tau.
    sequence_hint: 20
    completion_evidence_ro:
      - "Dosarul a fost depus la structura competenta"
    recovery_actions_ro:
      - "Daca structura cere completari, adauga documentele lipsa si redepune"
    status: draft

  - id: submit_orientation_appeal_to_seosp
    semantic_key: submit_orientation_appeal_to_seosp
    title_ro: "Depune contestatia de orientare, daca este cazul"
    instruction_ro: >-
      Daca solutia de orientare trebuie contestata, pregateste contestatia si depune-o pe traseul
      indicat pentru SEOSP.
    sequence_hint: 30
    completion_evidence_ro:
      - "Necesitatea contestatiei a fost verificata sau contestatia a fost depusa"
    recovery_actions_ro:
      - "Daca lipseste motivarea sau un document suport, completeaza contestatia inainte de depunere"
    status: draft

requirement_templates:
  - id: req.orientation_application
    title_ro: "Cerere de orientare"
    description_ro: >-
      Cererea folosita pentru orientarea scolara si profesionala a copilului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Cerere de orientare completata"
    readiness_checks:
      - "Cererea este completata si semnata de persoana relevanta"
    status: draft

  - id: req.child_identity_copy
    title_ro: "Copie act de identitate al copilului"
    description_ro: >-
      Copia actului de identitate sau a documentului de identificare al copilului.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Copie act de identitate al copilului"
    readiness_checks:
      - "Copia de identificare corespunde copilului din dosar"
    status: draft

  - id: req.parent_or_representative_identity_copies
    title_ro: "Copii acte identitate parinte sau reprezentant"
    description_ro: >-
      Copiile actelor de identitate ale parintelui sau reprezentantului legal care depune dosarul.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Copii acte de identitate ale parintelui sau reprezentantului"
    readiness_checks:
      - "Persoana care depune poate fi identificata din acte"
    status: draft

  - id: req.legal_representation_proof_if_applicable
    title_ro: "Dovada reprezentarii legale, daca este cazul"
    description_ro: >-
      Documentele care arata reprezentarea legala, pentru cazurile in care dosarul este depus de
      alta persoana decat parintele.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente de reprezentare legala"
    readiness_checks:
      - "Dovada acopera exact persoana care semneaza sau depune"
    status: draft

  - id: req.social_inquiry
    title_ro: "Ancheta sociala"
    description_ro: >-
      Ancheta sociala ceruta pentru evaluarea situatiei copilului, daca traseul o include.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Ancheta sociala"
    readiness_checks:
      - "Ancheta sociala este actuala si relevanta pentru dosar"
    status: draft

  - id: req.synthetic_medical_sheet
    title_ro: "Fisa medicala sintetica"
    description_ro: >-
      Fisa medicala sintetica pregatita pentru dosarul de orientare.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Fisa medicala sintetica"
    readiness_checks:
      - "Fisa sintetica este semnata si completa"
    status: draft

  - id: req.medical_certificate_a5
    title_ro: "Certificat medical A5"
    description_ro: >-
      Certificatul medical A5, acolo unde este cerut in dosarul de orientare.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat medical A5"
    readiness_checks:
      - "Certificatul medical A5 este prezent si lizibil"
    status: draft

  - id: req.psychological_evaluation
    title_ro: "Evaluare psihologica"
    description_ro: >-
      Evaluarea psihologica folosita pentru sustinerea orientarii educationale speciale.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Raport de evaluare psihologica"
    readiness_checks:
      - "Raportul psihologic este relevant pentru copilul evaluat"
    status: draft

  - id: req.psychopedagogical_sheet
    title_ro: "Fisa psihopedagogica"
    description_ro: >-
      Fisa psihopedagogica necesara pentru dosarul de orientare.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Fisa psihopedagogica"
    readiness_checks:
      - "Fisa psihopedagogica este completata integral"
    status: draft

  - id: req.school_enrollment_or_transcript
    title_ro: "Dovada scolarizarii sau situatiei scolare"
    description_ro: >-
      Documentele care arata inscrierea la scoala sau situatia scolara curenta.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Adeverinta de inscriere"
      - "Foaie matricola sau alt document de situatie scolara"
    readiness_checks:
      - "Documentul de scolarizare este actual si relevant"
    status: draft

  - id: req.previous_orientation_certificate
    title_ro: "Certificat anterior de orientare"
    description_ro: >-
      Certificatul anterior de orientare, pentru cazurile in care exista deja o incadrare.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat anterior de orientare"
    readiness_checks:
      - "Certificatul anterior este inclus daca exista"
    status: draft

  - id: req.individualized_services_plan
    title_ro: "Plan de servicii individualizat"
    description_ro: >-
      Planul de servicii individualizat, daca acesta exista si este cerut pentru dosar.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Plan de servicii individualizat"
    readiness_checks:
      - "Planul este semnat si corespunde copilului"
    status: draft

  - id: req.monitoring_report
    title_ro: "Raport de monitorizare"
    description_ro: >-
      Raportul de monitorizare relevant pentru cazul copilului, daca traseul il cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Raport de monitorizare"
    readiness_checks:
      - "Raportul este actual si relevant pentru orientare"
    status: draft
