# Step & requirement templates for ro.life.local_tax_certificate (life.local_tax_certificate).
#
# Authoring note: transcribed from event_card.md (batch R1A-6, accessed_at
# 2026-06-25) and the step/requirement ids referenced by rules.yaml; no extra
# legal content or invented amounts were added. Issue term (~2 working days) and
# validity (~30 days for individuals) are governed by in_review rules pending
# confirmation against the Fiscal Procedure Code (L207/2015), so they are phrased
# as orientative / to be confirmed, not asserted as final.

step_templates:
  - id: request_fiscal_certificate
    semantic_key: request_fiscal_certificate
    title_ro: "Solicită certificatul de atestare fiscală locală"
    instruction_ro: >-
      Depune cererea pe formularul ITL010/2016 la organul fiscal local (Direcția Fiscală / DITL),
      împreună cu actul de identitate (copie și original). Pentru succesiune, adu și certificatul
      de deces și adresa de la notariat; dacă soliți prin împuternicit, adu împuternicirea și actul
      de identitate al împuternicitului.
    sequence_hint: 10
    completion_evidence_ro:
      - "Cererea pe formularul ITL010 a fost depusă la organul fiscal local"
    recovery_actions_ro:
      - "Dacă dosarul este incomplet, completează-l cu documentele prevăzute pentru situația ta"
    status: draft

  - id: use_fiscal_certificate
    semantic_key: use_fiscal_certificate
    title_ro: "Folosește certificatul în termenul de valabilitate"
    instruction_ro: >-
      Folosește certificatul de atestare fiscală în perioada lui de valabilitate. Pentru persoane
      fizice, valabilitatea orientativă este de 30 de zile de la emitere; aceasta se confirmă din
      articolul exact al Codului de procedură fiscală (L207/2015).
    sequence_hint: 20
    completion_evidence_ro:
      - "Certificatul a fost folosit înainte de expirarea valabilității"
    recovery_actions_ro:
      - "Dacă valabilitatea a expirat, solicită un certificat nou"
    status: draft

requirement_templates:
  - id: req.form_itl010
    title_ro: "Cererea pe formularul ITL010/2016"
    description_ro: >-
      Formularul-tip ITL010/2016 pentru eliberarea certificatului de atestare fiscală, completat și semnat.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Formular ITL010/2016"
    readiness_checks:
      - "Formularul ITL010 este completat și semnat"
    status: draft

  - id: req.id_card
    title_ro: "Actul de identitate"
    description_ro: >-
      Actul de identitate al solicitantului (copie și original).
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Carte de identitate (copie și original)"
    readiness_checks:
      - "Actul de identitate este valabil și disponibil în copie și original"
    status: draft

  - id: req.death_certificate
    title_ro: "Certificatul de deces"
    description_ro: >-
      Certificatul de deces, necesar când certificatul fiscal este solicitat pentru dezbatere succesorală.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat de deces"
    readiness_checks:
      - "Certificatul de deces este disponibil, dacă este pentru succesiune"
    status: draft

  - id: req.notary_request
    title_ro: "Adresa de la notariat"
    description_ro: >-
      Adresa/solicitarea de la notariat pentru dezbaterea succesorală.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Adresă notariat"
    readiness_checks:
      - "Adresa de la notariat este disponibilă, dacă este pentru succesiune"
    status: draft

  - id: req.power_of_attorney
    title_ro: "Împuternicirea"
    description_ro: >-
      Împuternicirea în original sau copie legalizată, când certificatul este solicitat prin împuternicit/notar.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Împuternicire în original"
      - "Împuternicire în copie legalizată"
    readiness_checks:
      - "Împuternicirea acoperă solicitarea, dacă este prin împuternicit"
    status: draft

  - id: req.proxy_id_card
    title_ro: "Actul de identitate al împuternicitului"
    description_ro: >-
      Actul de identitate al persoanei împuternicite, când certificatul este solicitat prin împuternicit.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Carte de identitate a împuternicitului"
    readiness_checks:
      - "Actul de identitate al împuternicitului este valabil, dacă este prin împuternicit"
    status: draft
