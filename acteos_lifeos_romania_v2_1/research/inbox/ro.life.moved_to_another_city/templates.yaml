# Step & requirement templates for ro.life.moved_to_another_city (life.moved_to_another_city).
# Orchestrator event: triggers child events based on facts. No local requirements.

step_templates:
  - id: trigger_moved_home
    semantic_key: trigger_moved_home
    title_ro: "Deschide schimbarea adresei în cartea de identitate"
    instruction_ro: >-
      Dacă te-ai mutat în altă localitate, trebuie să actualizezi adresa din cartea de identitate
      în maxim 15 zile de la mutare. Apelează subtraseul de schimbare a adresei din CI.
    sequence_hint: 10
    completion_evidence_ro:
      - "Subtraseul de schimbare a adresei din CI a fost deschis"
    recovery_actions_ro:
      - "Dacă nu ești sigur dacă a fost actualizată adresa, verifică cu primăria sau online"
    status: draft

  - id: trigger_vehicle_change_address
    semantic_key: trigger_vehicle_change_address
    title_ro: "Deschide actualizarea adresei în certificatul de înmatriculare"
    instruction_ro: >-
      Dacă deții un vehicul și ți-ai schimbat domiciliul, trebuie să actualizezi adresa din
      certificatul de înmatriculare (talon) în maxim 30 de zile. Apelează subtraseul de
      actualizare a adresei în talon.
    sequence_hint: 20
    completion_evidence_ro:
      - "Subtraseul de actualizare a adresei în talon a fost deschis"
    recovery_actions_ro:
      - "Verifică dacă talonul conține deja adresa nouă"
    status: draft

  - id: trigger_vehicle_tax_new_uat
    semantic_key: trigger_vehicle_tax_new_uat
    title_ro: "Deschide declararea impozitului auto la noua UAT"
    instruction_ro: >-
      Dacă deții un vehicul și te-ai mutat într-o altă UAT (localitate), trebuie să declari
      vehiculul la organul fiscal local de la noua adresă. Apelează subtraseul de declarare
      a impozitului pe vehicule.
    sequence_hint: 30
    completion_evidence_ro:
      - "Subtraseul de declarare a impozitului auto la noua UAT a fost deschis"
    recovery_actions_ro:
      - "Verifică dacă vechiul impozit a fost încasat și dacă s-a făcut transferul fiscal"
    status: draft

  - id: trigger_utilities
    semantic_key: trigger_utilities
    title_ro: "Deschide schimbarea titularilor la utilități"
    instruction_ro: >-
      Dacă ești titular de contracte de electricitate, gaze și/sau apă, trebuie să schimbi
      titularul contractelor la noua adresă. Apelează subtraseele respective pentru electricitate,
      gaze și apă.
    sequence_hint: 40
    completion_evidence_ro:
      - "Subtraseele de schimbare a titularului la utilități au fost deschise"
    recovery_actions_ro:
      - "Verifică dacă contractele vechi au fost închise și cele noi active"
    status: draft

  - id: school_advice
    semantic_key: school_advice
    title_ro: "Inițiază transferul/înscrierea copiilor la școală/grădiniță"
    instruction_ro: >-
      Dacă ai copii înscriși la școală sau grădiniță, inițiază transferul/înscrierea la
      unitatea de învățământ de la noua adresă. Acest pas nu este un traseu automat,
      ci o recomandare de acțiune.
    sequence_hint: 50
    completion_evidence_ro:
      - "Cererea de transfer/în scriere a fost depusă la unitatea de învățământ"
    recovery_actions_ro:
      - "Contactează inspectoratul școlar județean pentru detalii despre transfer"
    status: draft

requirement_templates: []
