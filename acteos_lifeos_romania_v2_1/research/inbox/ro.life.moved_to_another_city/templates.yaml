# Step & requirement templates for ro.life.moved_to_another_city (life.moved_to_another_city).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: update_identity_address_route
    semantic_key: update_identity_address_route
    title_ro: "Porneste actualizarea adresei din actul de identitate"
    instruction_ro: >-
      La mutarea intr-un alt oras sau alta localitate, porneste mai intai ruta copil pentru
      actualizarea adresei din actul de identitate.
    sequence_hint: 10
    completion_evidence_ro:
      - "Ruta pentru actualizarea adresei din actul de identitate a fost identificata"
    recovery_actions_ro:
      - "Daca data mutarii nu este clara, stabileste-o inainte de a porni evenimentele copil"
    status: draft

  - id: trigger_vehicle_and_local_tax_routes_if_applicable
    semantic_key: trigger_vehicle_and_local_tax_routes_if_applicable
    title_ro: "Porneste rutele pentru vehicul si taxe locale, daca se aplica"
    instruction_ro: >-
      Daca persoana detine vehicul si schimba UAT-ul, porneste separat rutele copil pentru talon si
      declararea la noul organ fiscal.
    sequence_hint: 20
    completion_evidence_ro:
      - "Rutele pentru vehicul si taxe locale au fost evaluate"
    recovery_actions_ro:
      - "Daca nu exista vehicul sau nu se schimba UAT-ul, nu activa aceasta ramura"
    status: draft

  - id: trigger_utility_holder_routes_if_applicable
    semantic_key: trigger_utility_holder_routes_if_applicable
    title_ro: "Porneste rutele pentru utilitati, daca persoana este titular"
    instruction_ro: >-
      Daca persoana este titular pe contracte de utilitati, porneste evenimentele copil relevante
      pentru schimbarea titularului sau actualizarea situatiei.
    sequence_hint: 30
    completion_evidence_ro:
      - "Rutele pentru utilitati au fost evaluate"
    recovery_actions_ro:
      - "Daca persoana nu este titular, nu activa aceasta ramura"
    status: draft

  - id: trigger_school_or_kindergarten_routes_if_applicable
    semantic_key: trigger_school_or_kindergarten_routes_if_applicable
    title_ro: "Porneste rutele pentru scoala sau gradinita, daca exista copii"
    instruction_ro: >-
      Daca exista copii inscrisi la scoala sau gradinita, marcheaza separat rutele copil legate de
      noua adresa.
    sequence_hint: 40
    completion_evidence_ro:
      - "Rutele pentru copii la noua adresa au fost evaluate"
    recovery_actions_ro:
      - "Daca nu exista copii in sistemul educational, nu activa aceasta ramura"
    status: draft

requirement_templates: []
