# Step & requirement templates for ro.life.adoption (ro.life.adoption).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: start_adoption_guidance
    semantic_key: start_adoption_guidance
    title_ro: "Incepe informarea pentru adoptie"
    instruction_ro: >-
      Incepe cu serviciul competent pentru informare si orientare, astfel incat
      traseul adoptiei sa fie ales corect de la inceput.
    sequence_hint: 10
    completion_evidence_ro:
      - "Canalul de informare si orientare pentru adoptie a fost identificat"
    recovery_actions_ro:
      - "Daca autoritatea competenta nu este clara, confirma DGASPC-ul relevant inainte de continuare"
    status: draft

  - id: complete_adopter_evaluation
    semantic_key: complete_adopter_evaluation
    title_ro: "Parcurge evaluarea pentru atestat"
    instruction_ro: >-
      Daca procedura este in etapa de evaluare sau lipseste atestatul valabil,
      pregateste dosarul si confirmarile necesare pentru evaluarea adoptatorului.
    sequence_hint: 20
    completion_evidence_ro:
      - "Etapa de evaluare pentru atestat a fost pregatita"
    recovery_actions_ro:
      - "Daca dosarul sau calendarul nu sunt clare, confirma-le cu autoritatea competenta"
    status: draft

  - id: participate_in_adoption_matching
    semantic_key: participate_in_adoption_matching
    title_ro: "Participa la etapa de potrivire"
    instruction_ro: >-
      Daca exista atestat valabil si etapa de potrivire este activa, urmeaza
      procedura de matching gestionata de autoritatea competenta.
    sequence_hint: 30
    completion_evidence_ro:
      - "Etapa de potrivire a fost deschisa pe ruta autoritatii competente"
    recovery_actions_ro:
      - "Daca lipseste atestatul valabil sau copilul nu este identificat pe traseul oficial, nu continua aceasta ramura"
    status: draft

  - id: complete_placement_monitoring
    semantic_key: complete_placement_monitoring
    title_ro: "Parcurge monitorizarea in incredintare"
    instruction_ro: >-
      Daca procedura a ajuns in etapa de incredintare, urmeaza monitorizarea
      publicata pentru perioada premergatoare adoptiei.
    sequence_hint: 40
    completion_evidence_ro:
      - "Etapa de monitorizare a incredintarii a fost evaluata"
    recovery_actions_ro:
      - "Daca nu este clar stadiul dosarului, confirma cu serviciul de adoptii inainte de continuare"
    status: draft

  - id: complete_post_adoption_monitoring
    semantic_key: complete_post_adoption_monitoring
    title_ro: "Parcurge monitorizarea postadoptie"
    instruction_ro: >-
      Daca adoptia este in etapa postadoptie, urmeaza monitorizarea
      postadoptie indicata de autoritatea competenta.
    sequence_hint: 50
    completion_evidence_ro:
      - "Monitorizarea postadoptie a fost pregatita pe ruta oficiala"
    recovery_actions_ro:
      - "Daca etapa postadoptie nu este confirmata, revino la stadiul procedural corect"
    status: draft

  - id: create_new_birth_record_after_adoption
    semantic_key: create_new_birth_record_after_adoption
    title_ro: "Pregateste noul act de nastere dupa adoptie"
    instruction_ro: >-
      Dupa finalizarea adoptiei, pregateste pasii pentru intocmirea noului act
      de nastere pe baza hotararii definitive si a confirmarii oficiului competent.
    sequence_hint: 60
    completion_evidence_ro:
      - "Ruta pentru noul act de nastere dupa adoptie a fost pregatita"
    recovery_actions_ro:
      - "Daca hotararea definitiva sau oficiul competent nu sunt confirmate, nu trata etapa ca inchisa"
    status: draft

requirement_templates:
  - id: req.final_adoption_judgment
    title_ro: "Hotararea definitiva de adoptie"
    description_ro: >-
      Hotararea definitiva folosita pentru etapa ulterioara de intocmire a
      noului act de nastere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Hotarare definitiva de adoptie"
    readiness_checks:
      - "Hotararea definitiva este disponibila si poate fi folosita pentru noul act de nastere"
    status: draft
