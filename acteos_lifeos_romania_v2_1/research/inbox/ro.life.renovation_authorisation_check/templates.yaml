# Step & requirement templates for ro.life.renovation_authorisation_check (life.renovation_authorisation_check).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: document_art11_assessment
    semantic_key: document_art11_assessment
    title_ro: "Documenteaza evaluarea de exceptare art. 11"
    instruction_ro: >-
      Daca lucrarea pare exceptata, documenteaza de ce intra in exceptia generala si de ce nu
      afecteaza structura ori aspectul arhitectural.
    sequence_hint: 10
    completion_evidence_ro:
      - "Evaluarea pentru exceptia generala a fost documentata"
    recovery_actions_ro:
      - "Daca exista dubii privind structura sau aspectul, trateaza cazul ca posibil cu autorizatie"
    status: draft

  - id: document_change_of_use_assessment
    semantic_key: document_change_of_use_assessment
    title_ro: "Documenteaza schimbarea de destinatie fara lucrari autorizabile"
    instruction_ro: >-
      Daca este vorba doar de schimbarea de destinatie fara lucrari autorizabile, documenteaza de ce
      ramura fara autorizatie poate fi folosita.
    sequence_hint: 20
    completion_evidence_ro:
      - "Evaluarea schimbarii de destinatie a fost documentata"
    recovery_actions_ro:
      - "Daca urbanismul local nu este compatibil, nu continua pe ruta fara autorizatie"
    status: draft

  - id: document_protected_zone_art11_assessment
    semantic_key: document_protected_zone_art11_assessment
    title_ro: "Documenteaza evaluarea in zona protejata"
    instruction_ro: >-
      Pentru zona protejata non-monument, documenteaza strict conditiile speciale inainte de a trata
      lucrarea ca exceptata.
    sequence_hint: 30
    completion_evidence_ro:
      - "Evaluarea pentru zona protejata a fost documentata"
    recovery_actions_ro:
      - "Daca lipseste una dintre conditiile stricte, nu folosi ruta de exceptare"
    status: draft

  - id: notify_local_authority_before_works
    semantic_key: notify_local_authority_before_works
    title_ro: "Notifica autoritatea locala inainte de lucrari"
    instruction_ro: >-
      Pentru monumente sau imobile cu valoare arhitecturala, pregateste notificarea catre autoritatea locala.
    sequence_hint: 40
    completion_evidence_ro:
      - "Notificarea catre autoritatea locala este pregatita"
    recovery_actions_ro:
      - "Daca regimul de protectie nu este clar, confirma-l inainte de notificare"
    status: draft

  - id: notify_deconcentrated_culture_service
    semantic_key: notify_deconcentrated_culture_service
    title_ro: "Notifica serviciul deconcentrat de cultura"
    instruction_ro: >-
      Pentru cazurile cu patrimoniu, pregateste notificarea catre serviciul deconcentrat de cultura.
    sequence_hint: 50
    completion_evidence_ro:
      - "Notificarea catre serviciul de cultura este pregatita"
    recovery_actions_ro:
      - "Daca lipseste dovada incadrarii de patrimoniu, clarific-o inainte de continuare"
    status: draft

  - id: start_building_permit_route
    semantic_key: start_building_permit_route
    title_ro: "Porneste ruta pentru autorizatie de construire"
    instruction_ro: >-
      Daca lucrarea depaseste exceptia, porneste traseul dedicat autorizatiei de construire.
    sequence_hint: 60
    completion_evidence_ro:
      - "Ruta pentru autorizatia de construire a fost pornita"
    recovery_actions_ro:
      - "Daca lucrarea schimba structura sau aspectul, nu trata cazul ca exceptat"
    status: draft

  - id: prepare_art11_local_request
    semantic_key: prepare_art11_local_request
    title_ro: "Pregateste cererea locala pentru pozitie oficiala art. 11"
    instruction_ro: >-
      Daca vrei o pozitie oficiala in Timisoara, pregateste cererea si documentele locale cerute.
    sequence_hint: 70
    completion_evidence_ro:
      - "Cererea locala art. 11 este pregatita"
    recovery_actions_ro:
      - "Daca documentele locale lipsesc, nu trimite cererea"
    status: draft

  - id: identify_local_art11_contact
    semantic_key: identify_local_art11_contact
    title_ro: "Identifica contactul local pentru pozitia art. 11"
    instruction_ro: >-
      Pentru alte UAT-uri, identifica procedura si contactul local pentru o pozitie oficiala privind
      art. 11.
    sequence_hint: 80
    completion_evidence_ro:
      - "Contactul local pentru pozitia art. 11 a fost identificat"
    recovery_actions_ro:
      - "Daca procedura locala nu este confirmata, nu presupune acelasi traseu ca in Timisoara"
    status: draft

requirement_templates:
  - id: written_heritage_agreement
    title_ro: "Acord scris de patrimoniu"
    description_ro: >-
      Acordul scris cerut pentru lucrari la monumente sau imobile cu valoare arhitecturala.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Acord scris de patrimoniu"
    readiness_checks:
      - "Acordul scris este disponibil daca regimul de patrimoniu il cere"
    status: draft

  - id: art11_standard_request
    title_ro: "Cerere standard pentru art. 11"
    description_ro: >-
      Cererea standard folosita pentru obtinerea unei pozitii oficiale privind art. 11.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Cerere standard art. 11"
    readiness_checks:
      - "Cererea art. 11 este completata"
    status: draft

  - id: title_document
    title_ro: "Document de titlu"
    description_ro: >-
      Documentul care arata dreptul asupra imobilului pentru cererea art. 11.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Document de titlu"
    readiness_checks:
      - "Dreptul asupra imobilului este dovedit"
    status: draft

  - id: land_book_extract_max_30_days
    title_ro: "Extras de carte funciara de maximum 30 de zile"
    description_ro: >-
      Extrasul de carte funciara recent, cerut pentru cererea locala art. 11.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Extras de carte funciara recent"
    readiness_checks:
      - "Extrasul de carte funciara este in fereastra ceruta"
    status: draft

  - id: site_plan_photos_and_intervention_proposal
    title_ro: "Plan de situatie, fotografii si propunerea de interventie"
    description_ro: >-
      Materialele suport cerute pentru cererea locala privind evaluarea lucrarilor.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Plan de situatie"
      - "Fotografii"
      - "Propunere de interventie"
    readiness_checks:
      - "Materialele cerute sunt pregatite pentru dosar"
    status: draft
