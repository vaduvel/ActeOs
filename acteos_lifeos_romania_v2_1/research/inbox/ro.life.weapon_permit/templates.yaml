# Step & requirement templates for ro.life.weapon_permit (ro.life.weapon_permit).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: step.determine_weapon_category_and_purpose
    semantic_key: step.determine_weapon_category_and_purpose
    title_ro: "Stabileste categoria armei si scopul"
    instruction_ro: >-
      Clarifica categoria armei si scopul permisului inainte de a genera dosarul AESP.
    sequence_hint: 10
    completion_evidence_ro: ["Categoria armei si scopul permisului au fost clarificate"]
    recovery_actions_ro: ["Daca categoria sau scopul nu sint clare, nu folosi un checklist unic pentru toate cazurile"]
    status: draft

  - id: step.prepare_first_acquisition_file
    semantic_key: step.prepare_first_acquisition_file
    title_ro: "Pregateste dosarul pentru prima procurare"
    instruction_ro: >-
      Pregateste dosarul pentru prima procurare pe ruta AESP competenta teritorial.
    sequence_hint: 20
    completion_evidence_ro: ["Dosarul pentru prima procurare este pregatit"]
    recovery_actions_ro: ["Daca lipsesc documente medicale sau categoria nu este confirmata, completeaza dosarul"]
    status: draft

  - id: step.submit_to_territorial_aesp
    semantic_key: step.submit_to_territorial_aesp
    title_ro: "Depune dosarul la AESP teritorial"
    instruction_ro: >-
      Depune dosarul la structura Arme, Explozivi si Substante Periculoase competenta teritorial.
    sequence_hint: 30
    completion_evidence_ro: ["Dosarul este pregatit pentru depunere la AESP"]
    recovery_actions_ro: ["Daca teritorialitatea nu este confirmata, clarifica structura competenta inainte de depunere"]
    status: draft

  - id: step.check_permit_expiry
    semantic_key: step.check_permit_expiry
    title_ro: "Verifica expirarea permisului"
    instruction_ro: >-
      Pentru prelungire, verifica daca permisul este inca in termen si daca ruta standard ramine disponibila.
    sequence_hint: 40
    completion_evidence_ro: ["Starea de valabilitate a permisului a fost clarificata"]
    recovery_actions_ro: ["Daca permisul este deja expirat, nu activa ruta standard de prelungire"]
    status: draft

  - id: step.prepare_extension_file
    semantic_key: step.prepare_extension_file
    title_ro: "Pregateste dosarul de prelungire"
    instruction_ro: >-
      Daca permisul este inca valabil, pregateste dosarul de prelungire inainte de expirare.
    sequence_hint: 50
    completion_evidence_ro: ["Dosarul de prelungire este pregatit"]
    recovery_actions_ro: ["Daca permisul este expirat sau documentele lipsesc, nu continua aceasta ramura"]
    status: draft

  - id: step.submit_extension_before_expiry
    semantic_key: step.submit_extension_before_expiry
    title_ro: "Depune prelungirea inainte de expirare"
    instruction_ro: >-
      Depune cererea de prelungire inainte de expirarea permisului.
    sequence_hint: 60
    completion_evidence_ro: ["Ruta de depunere a prelungirii a fost pregatita"]
    recovery_actions_ro: ["Daca termenul este depasit, revino la ramura corecta pentru situatie"]
    status: draft

  - id: step.identify_loss_theft_destruction
    semantic_key: step.identify_loss_theft_destruction
    title_ro: "Identifica pierderea, furtul sau distrugerea"
    instruction_ro: >-
      Clarifica exact cauza inlocuirii documentului pentru a aplica formalitatile potrivite.
    sequence_hint: 70
    completion_evidence_ro: ["Motivul inlocuirii documentului a fost clarificat"]
    recovery_actions_ro: ["Daca motivul nu este clar, nu continua cu formalitatea de duplicat"]
    status: draft

  - id: step.request_replacement_document
    semantic_key: step.request_replacement_document
    title_ro: "Solicita duplicatul documentului"
    instruction_ro: >-
      Dupa clarificarea motivului, pregateste cererea pentru duplicatul documentului relevant.
    sequence_hint: 80
    completion_evidence_ro: ["Ruta pentru duplicatul documentului a fost pregatita"]
    recovery_actions_ro: ["Daca lipsesc formalitatile prealabile, completeaza-le inainte de depunere"]
    status: draft

  - id: step.publish_event_in_official_gazette
    semantic_key: step.publish_event_in_official_gazette
    title_ro: "Publica evenimentul in Monitorul Oficial, daca este cerut"
    instruction_ro: >-
      Pentru pierdere, furt sau distrugere, pregateste formalitatea de publicare daca ruta o cere.
    sequence_hint: 90
    completion_evidence_ro: ["Cerinta de publicare in Monitorul Oficial a fost clarificata"]
    recovery_actions_ro: ["Daca formalitatea nu este indeplinita, nu trata dosarul de duplicat ca complet"]
    status: draft

  - id: step.verify_weapon_is_category_d_in_permit
    semantic_key: step.verify_weapon_is_category_d_in_permit
    title_ro: "Verifica daca arma este din categoria D"
    instruction_ro: >-
      Clarifica daca se aplica ruta certificatului de detinator pentru categoria D.
    sequence_hint: 100
    completion_evidence_ro: ["Aplicabilitatea rutei pentru categoria D a fost clarificata"]
    recovery_actions_ro: ["Daca arma nu este din categoria D, foloseste alta ramura"]
    status: draft

  - id: step.request_holder_certificate
    semantic_key: step.request_holder_certificate
    title_ro: "Solicita certificatul de detinator"
    instruction_ro: >-
      Daca arma intra pe categoria D, pregateste cererea pentru certificatul de detinator.
    sequence_hint: 110
    completion_evidence_ro: ["Ruta pentru certificatul de detinator a fost pregatita"]
    recovery_actions_ro: ["Daca categoria D nu este confirmata, nu continua aceasta ramura"]
    status: draft

  - id: step.request_weapon_strike_off
    semantic_key: step.request_weapon_strike_off
    title_ro: "Solicita radierea armei transferate"
    instruction_ro: >-
      Daca arma a fost transferata, pregateste radierea in termenul relevant.
    sequence_hint: 120
    completion_evidence_ro: ["Ruta de radiere a armei transferate a fost pregatita"]
    recovery_actions_ro: ["Daca termenul este depasit, semnaleaza urgent situatia si nu o trata ca rezolvata"]
    status: draft

  - id: step.notify_domicile_change
    semantic_key: step.notify_domicile_change
    title_ro: "Notifica schimbarea domiciliului"
    instruction_ro: >-
      Pregateste notificarea schimbarii domiciliului in termenul relevant catre structura competenta.
    sequence_hint: 130
    completion_evidence_ro: ["Ruta de notificare a schimbarii domiciliului a fost pregatita"]
    recovery_actions_ro: ["Daca termenul este depasit, semnaleaza urgent situatia si clarifica pasii"]
    status: draft

  - id: step.update_weapon_storage_location
    semantic_key: step.update_weapon_storage_location
    title_ro: "Actualizeaza locul de pastrare al armei"
    instruction_ro: >-
      Daca schimbarea domiciliului afecteaza locul de pastrare, pregateste actualizarea acestei informatii.
    sequence_hint: 140
    completion_evidence_ro: ["Cerinta privind actualizarea locului de pastrare a fost clarificata"]
    recovery_actions_ro: ["Daca locul de pastrare nu se schimba, nu activa aceasta ramura"]
    status: draft

requirement_templates:
  - id: req.medical_certificate_original_and_copy
    title_ro: "Certificat medical in original si copie"
    description_ro: "Documentul medical cerut pentru dosarul relevant."
    obligation: conditional
    timing: now
    accepted_forms: ["Certificat medical in original", "Copie certificat medical"]
    readiness_checks: ["Documentul medical este pregatit in forma ceruta"]
    status: draft

  - id: req.proof_of_official_gazette_publication
    title_ro: "Dovada publicarii in Monitorul Oficial"
    description_ro: "Dovada publicarii cerute pentru anumite cazuri de duplicat."
    obligation: conditional
    timing: now
    accepted_forms: ["Dovada publicarii in Monitorul Oficial"]
    readiness_checks: ["Dovada publicarii este pregatita daca ruta o cere"]
    status: draft
