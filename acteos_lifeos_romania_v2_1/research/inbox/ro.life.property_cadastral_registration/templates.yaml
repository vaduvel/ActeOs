step_templates:
  - id: prepare_ocpi_registration_file
    semantic_key: property_cadastral_prepare_ocpi_file
    title_ro: "Pregateste dosarul pentru OCPI"
    instruction_ro: >-
      Strange cererea, documentatia cadastrala, actul de titlu, dovada platii si
      orice acte suplimentare cerute de cazul de inscriere.
    sequence_hint: 10
    completion_evidence_ro:
      - "Dosarul de cadastru si carte funciara este pregatit."
    recovery_actions_ro:
      - "Separarea intre proprietate existenta si constructie finalizata trebuie clarificata de la inceput."
    status: draft
  - id: submit_cadastral_and_land_book_request
    semantic_key: property_cadastral_submit_request
    title_ro: "Depune cererea de cadastru si carte funciara"
    instruction_ro: >-
      Depune dosarul la OCPI competent dupa ce ai verificat toate piesele cerute
      de cazul procedural ales.
    sequence_hint: 20
    completion_evidence_ro:
      - "Cererea OCPI este depusa."
    recovery_actions_ro:
      - "Daca tariful sau termenul generic nu sunt confirmate, trateaza-le ca punct de confirmare la depunere."
    status: draft
  - id: identify_competent_ocpi
    semantic_key: property_cadastral_identify_other_ocpi
    title_ro: "Identifica OCPI-ul competent"
    instruction_ro: >-
      Daca imobilul nu este in pilotul Timis, identifica OCPI-ul competent si
      canalul local prin care se depune dosarul.
    sequence_hint: 30
    completion_evidence_ro:
      - "OCPI-ul competent si canalul local sunt identificate."
    recovery_actions_ro:
      - "Nu extrapola canalele Timis catre alte judete."
    status: draft

requirement_templates:
  - id: standard_ocpi_application
    title_ro: "Cererea standard OCPI"
    description_ro: >-
      Cererea standard folosita pentru inscrierea cadastrala si in cartea
      funciara.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Cererea standard completata in forma ceruta de OCPI."
    readiness_checks:
      - "Cererea corespunde exact serviciului solicitat."
    status: draft
  - id: received_cadastral_documentation_if_applicable
    title_ro: "Documentatia cadastrala"
    description_ro: >-
      Documentatia cadastrala primita de la specialistul autorizat sau deja
      disponibila pentru dosar.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Documentatie cadastrala completa in forma acceptata."
    readiness_checks:
      - "Documentatia corespunde imobilului si cazului procedural."
    status: draft
  - id: cadastral_tariff_payment_proof
    title_ro: "Dovada platii tarifului cadastral"
    description_ro: >-
      Dovada platii tarifului aplicabil pentru serviciul OCPI solicitat.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Chitanta sau alta dovada oficiala a platii."
    readiness_checks:
      - "Plata corespunde tipului de serviciu cerut."
    status: draft
  - id: ownership_title_documents
    title_ro: "Actele de titlu pentru proprietate"
    description_ro: >-
      Documentele care atesta dreptul de proprietate atunci cand se inscrie
      dreptul asupra imobilului.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act autentic, hotarare sau alt titlu de proprietate relevant."
    readiness_checks:
      - "Cazul de inscriere este unul de proprietate."
    status: draft
  - id: municipality_completion_or_edification_certificate
    title_ro: "Certificat de receptie sau edificare"
    description_ro: >-
      Documentul emis de autoritatea locala ori relevant pentru constructia
      finalizata inscrisa in cartea funciara.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Proces-verbal de receptie, certificat de edificare sau act echivalent."
    readiness_checks:
      - "Cazul este o constructie finalizata."
    status: draft
  - id: fiscal_certificate_with_tax_value
    title_ro: "Certificat fiscal cu valoarea de impozitare"
    description_ro: >-
      Certificatul fiscal folosit in dosarul constructiei finalizate, atunci
      cand este cerut.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat fiscal relevant pentru imobil."
    readiness_checks:
      - "Cazul de constructie finalizata il cere."
    status: draft
  - id: surface_right_or_superficies_act
    title_ro: "Act privind dreptul de superficie sau folosinta terenului"
    description_ro: >-
      Documentul care sustine dreptul de superficie ori alta situatie similara,
      atunci cand este aplicabil.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act de superficie sau alt act relevant privind dreptul asupra terenului."
    readiness_checks:
      - "Situatia concreta impune clarificarea raportului cu terenul."
    status: draft

