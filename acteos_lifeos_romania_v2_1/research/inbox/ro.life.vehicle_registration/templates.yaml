step_templates:
  - id: identify_registration_case
    semantic_key: vehicle_registration_identify_case
    title_ro: "Identifica cazul de inmatriculare"
    instruction_ro: >-
      Stabileste daca este vorba despre vehicul nou intern, nou importat, uzat
      importat sau transcriere de proprietate, pentru a urma dosarul corect.
    sequence_hint: 10
    completion_evidence_ro:
      - "Cazul procedural al vehiculului este clarificat."
    recovery_actions_ro:
      - "Daca exista dubiu intre inmatriculare si transcriere, opreste pregatirea dosarului pana la clarificare."
    status: draft
  - id: prepare_competent_service_application
    semantic_key: vehicle_registration_prepare_service_application
    title_ro: "Pregateste cererea pentru serviciul competent"
    instruction_ro: >-
      Strange documentele de identitate, proprietate, stare tehnica si plata
      potrivite cazului selectat, apoi verifica serviciul competent.
    sequence_hint: 20
    completion_evidence_ro:
      - "Dosarul de baza este pregatit pentru autoritatea competenta."
    recovery_actions_ro:
      - "Daca lipseste un act fiscal sau de reprezentare, completeaza-l inainte de depunere."
    status: draft
  - id: declare_vehicle_at_local_tax_authority
    semantic_key: vehicle_registration_declare_vehicle_tax
    title_ro: "Declara vehiculul la organul fiscal local"
    instruction_ro: >-
      Inainte de inmatriculare, inregistreaza documentul de proprietate in
      evidenta fiscala locala atunci cand ruta aleasa cere aceasta etapa.
    sequence_hint: 30
    completion_evidence_ro:
      - "Vehiculul este declarat fiscal pe ruta aplicabila."
    recovery_actions_ro:
      - "Daca UAT-ul cere alt document pentru canalul ales, confirma cerinta locala inainte de depunere."
    status: draft
  - id: submit_new_domestic_registration
    semantic_key: vehicle_registration_submit_new_domestic
    title_ro: "Depune inmatricularea pentru vehicul nou din Romania"
    instruction_ro: >-
      Depune dosarul pentru vehicul nou achizitionat din Romania dupa
      inregistrarea fiscala si verificarea RCA/CIV.
    sequence_hint: 40
    completion_evidence_ro:
      - "Cererea pentru inmatricularea vehiculului nou intern este depusa."
    recovery_actions_ro:
      - "Nu continua daca RCA sau CIV nu sunt valabile."
    status: draft
  - id: submit_new_imported_registration
    semantic_key: vehicle_registration_submit_new_imported
    title_ro: "Depune inmatricularea pentru vehicul nou importat"
    instruction_ro: >-
      Depune dosarul pentru vehicul nou importat dupa ce actele de provenienta,
      fiscalitatea si documentele tehnice sunt pregatite.
    sequence_hint: 50
    completion_evidence_ro:
      - "Cererea pentru vehiculul nou importat este depusa."
    recovery_actions_ro:
      - "Daca lipseste certificatul fiscal ori documentul de import relevant, completeaza dosarul inainte de depunere."
    status: draft
  - id: obtain_rar_civ_and_required_checks
    semantic_key: vehicle_registration_obtain_rar_checks
    title_ro: "Obtine CIV si verificarile RAR necesare"
    instruction_ro: >-
      Pentru vehiculul uzat importat, obtine CIV-ul RAR si verificarile tehnice
      sau de autenticitate necesare inainte de depunerea dosarului.
    sequence_hint: 60
    completion_evidence_ro:
      - "Documentele tehnice si verificarile RAR necesare sunt obtinute."
    recovery_actions_ro:
      - "Nu depune dosarul pentru vehicul uzat importat fara aceste verificari."
    status: draft
  - id: submit_used_imported_registration
    semantic_key: vehicle_registration_submit_used_imported
    title_ro: "Depune inmatricularea pentru vehicul uzat importat"
    instruction_ro: >-
      Dupa obtinerea documentelor tehnice, fiscale si de provenienta, depune
      dosarul de inmatriculare pentru vehiculul uzat importat.
    sequence_hint: 70
    completion_evidence_ro:
      - "Cererea pentru vehiculul uzat importat este depusa."
    recovery_actions_ro:
      - "Verifica originalele si eventualele placute straine inainte de prezentare."
    status: draft
  - id: declare_acquisition_at_local_tax_authority
    semantic_key: vehicle_registration_declare_acquisition_tax
    title_ro: "Declara dobandirea la fiscal"
    instruction_ro: >-
      Pentru transcrierea proprietatii, declara mai intai dobandirea la organul
      fiscal local al noului proprietar.
    sequence_hint: 80
    completion_evidence_ro:
      - "Dobandirea este declarata fiscal."
    recovery_actions_ro:
      - "Fara inregistrare fiscala a documentului de proprietate, transcrierea nu trebuie continuata."
    status: draft
  - id: submit_ownership_transcription
    semantic_key: vehicle_registration_submit_transcription
    title_ro: "Depune transcrierea dreptului de proprietate"
    instruction_ro: >-
      Depune dosarul de transcriere cu documentele tehnice, fiscale si de
      proprietate cerute pentru noul titular.
    sequence_hint: 90
    completion_evidence_ro:
      - "Cererea de transcriere a proprietatii este depusa."
    recovery_actions_ro:
      - "Daca lipsesc certificatul sau placutele anterioare, pregateste documentele substitutive relevante."
    status: draft
  - id: complete_transcription_within_90_days
    semantic_key: vehicle_registration_complete_transcription_90_days
    title_ro: "Finalizeaza transcrierea in 90 de zile"
    instruction_ro: >-
      Urmareste ca dosarul de transcriere sa fie depus in termenul procedural de
      90 de zile calculat de la data dobandirii.
    sequence_hint: 100
    completion_evidence_ro:
      - "Termenul de 90 de zile este urmarit si respectat."
    recovery_actions_ro:
      - "Daca data dobandirii nu este certa, clarific-o inainte de calculul termenului."
    status: draft
  - id: deposit_previous_plates
    semantic_key: vehicle_registration_deposit_previous_plates
    title_ro: "Preda placutele anterioare"
    instruction_ro: >-
      Preda placutele anterioare atunci cand cazul procedural sau exceptiile
      privind transferul lor cer acest lucru.
    sequence_hint: 110
    completion_evidence_ro:
      - "Placutele anterioare sunt predate sau ruta substitutiva este clarificata."
    recovery_actions_ro:
      - "Daca placutele nu sunt disponibile, pregateste dovada substitutiva acceptata."
    status: draft
  - id: request_deregistration
    semantic_key: vehicle_registration_request_deregistration
    title_ro: "Solicita radierea vehiculului, daca este cazul"
    instruction_ro: >-
      Activeaza separat ruta de radiere numai pentru situatiile in care cazul
      procedural o cere in mod explicit.
    sequence_hint: 120
    completion_evidence_ro:
      - "Necesitatea radierii este clarificata."
    recovery_actions_ro:
      - "Nu porni radierea pentru un transfer intern obisnuit daca regula o exclude."
    status: draft

requirement_templates:
  - id: req.ownership_document_registered_local_tax
    title_ro: "Documentul de proprietate inregistrat fiscal"
    description_ro: >-
      Actul de proprietate deja inscris in evidenta fiscala locala, atunci cand
      procedura il cere.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Document de proprietate cu formalitatea fiscala locala indeplinita."
    readiness_checks:
      - "Ruta selectata cere inregistrarea fiscala anterioara depunerii."
    status: draft
  - id: req.valid_rca_copy_owner_name
    title_ro: "RCA valabila pe numele proprietarului"
    description_ro: >-
      Dovada RCA valabila pentru proprietarul care solicita inmatricularea.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Polita RCA valabila sau copia acceptata oficial."
    readiness_checks:
      - "Numele asiguratului corespunde proprietarului din dosar."
    status: draft
  - id: req.valid_vehicle_identity_card_civ
    title_ro: "CIV valabila"
    description_ro: >-
      Cartea de identitate a vehiculului valabila pentru operatiunea ceruta.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "CIV in original sau forma ceruta de procedura."
    readiness_checks:
      - "Documentul corespunde exact vehiculului din dosar."
    status: draft
  - id: req.foreign_registration_documents_original
    title_ro: "Actele straine de inmatriculare in original"
    description_ro: >-
      Actele de inmatriculare straine prezentate in original pentru vehiculul
      importat.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificate sau documente straine de inmatriculare in original."
    readiness_checks:
      - "Vehiculul este importat si procedura le cere."
    status: draft
  - id: req.foreign_registration_plates
    title_ro: "Placutele straine de inmatriculare"
    description_ro: >-
      Placutele straine ale vehiculului importat, atunci cand trebuie predate
      ori prezentate.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Placutele straine disponibile sau dovada substitutiva admisa."
    readiness_checks:
      - "Vehiculul importat este inca insotit de placutele straine."
    status: draft
  - id: req.valid_itp
    title_ro: "ITP valabil"
    description_ro: >-
      Dovada unei inspectii tehnice periodice valabile pentru cazurile care o
      cer inainte de circulatie sau de depunere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "ITP valabil sau verificare oficiala acceptata."
    readiness_checks:
      - "Cazul procedural impune ITP valabil."
    status: draft
  - id: req.valid_authenticity_certificate
    title_ro: "Certificat de autenticitate valabil"
    description_ro: >-
      Certificatul de autenticitate cerut pentru vehiculul uzat importat.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat de autenticitate emis de autoritatea competenta."
    readiness_checks:
      - "Vehiculul este uzat importat si ruta il cere."
    status: draft
  - id: req.previous_registration_certificate_or_substitute
    title_ro: "Certificatul anterior sau document substitutiv"
    description_ro: >-
      Certificatul de inmatriculare anterior ori dovada admisa care il
      inlocuieste.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat anterior sau document substitutiv acceptat."
    readiness_checks:
      - "Cazul este transcriere si documentul anterior este cerut."
    status: draft
  - id: req.valid_rca_current_owner
    title_ro: "RCA valabila pentru noul proprietar"
    description_ro: >-
      Dovada RCA valabile pentru proprietarul curent in cazul transcrierii.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Polita RCA valabila pe numele proprietarului curent."
    readiness_checks:
      - "Cazul este transcrierea dreptului de proprietate."
    status: draft
  - id: req.previous_plates_or_substitute
    title_ro: "Placutele anterioare sau dovada substitutiva"
    description_ro: >-
      Placutele anterioare ale vehiculului ori documentul acceptat care explica
      lipsa lor.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Placute anterioare sau dovada substitutiva admisa."
    readiness_checks:
      - "Procedura concreta cere predarea sau justificarea lor."
    status: draft
  - id: req.intracommunity_vehicle_vat_certificate
    title_ro: "Certificat TVA pentru vehicul intracomunitar"
    description_ro: >-
      Documentul fiscal relevant pentru vehiculul intracomunitar, atunci cand
      este cerut de dosar.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat sau dovada fiscala privind TVA intracomunitara."
    readiness_checks:
      - "Vehiculul intra in categoria pentru care documentul este necesar."
    status: draft
  - id: req.customs_clearance_and_import_tax_evidence
    title_ro: "Dovezi vamale si de plata a taxelor de import"
    description_ro: >-
      Actele vamale si dovezile de plata aferente importului non-UE, daca sunt
      aplicabile.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente vamale si dovezi de plata relevante."
    readiness_checks:
      - "Vehiculul provine dintr-un import pentru care aceste acte sunt cerute."
    status: draft
  - id: req.local_fiscal_clearance_certificate_all_obligations_paid
    title_ro: "Certificat fiscal local cu obligatii achitate"
    description_ro: >-
      Certificatul fiscal care arata achitarea obligatiilor locale, atunci cand
      procedura il cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat de atestare fiscala locala valabil."
    readiness_checks:
      - "Canalul sau cazul procedural il cere expres."
    status: draft
  - id: req.valid_identity_document
    title_ro: "Act de identitate valabil"
    description_ro: >-
      Actul de identitate valabil al persoanei care depune dosarul.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Act de identitate valabil in forma acceptata de autoritate."
    readiness_checks:
      - "Persoana care depune poate fi identificata oficial."
    status: draft
  - id: req.legal_entity_documents
    title_ro: "Documentele persoanei juridice"
    description_ro: >-
      Actele de identificare si reprezentare ale persoanei juridice solicitante.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente oficiale ale persoanei juridice cerute de dosar."
    readiness_checks:
      - "Solicitantul este persoana juridica."
    status: draft
  - id: req.legal_representative_identity
    title_ro: "Actul reprezentantului legal"
    description_ro: >-
      Documentul de identitate al reprezentantului legal care actioneaza pentru
      persoana juridica.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act de identitate valabil al reprezentantului legal."
    readiness_checks:
      - "Dosarul este depus prin reprezentant legal."
    status: draft
  - id: req.lawyer_mandate
    title_ro: "Mandat avocatial"
    description_ro: >-
      Imputernicirea avocatiala folosita atunci cand dosarul este depus prin
      avocat.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Imputernicire avocatiala valabila."
    readiness_checks:
      - "Reprezentarea este facuta prin avocat."
    status: draft
  - id: req.notarial_power_of_attorney
    title_ro: "Procura notariala"
    description_ro: >-
      Procura folosita atunci cand dosarul este depus prin persoana imputernicita.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Procura notariala valabila pentru operatiunea solicitata."
    readiness_checks:
      - "Dosarul este depus prin imputernicit."
    status: draft
  - id: req.company_written_mandate
    title_ro: "Mandat scris al companiei"
    description_ro: >-
      Mandatul intern scris folosit de delegatul companiei, daca aceasta forma
      este admisa de procedura.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Mandat scris semnat de companie."
    readiness_checks:
      - "Depunerea este facuta de delegatul companiei."
    status: draft
  - id: req.registration_and_plate_payment_proof
    title_ro: "Dovada platii pentru inmatriculare si placute"
    description_ro: >-
      Dovada platii tarifelor aferente certificatului si placutelor, dupa cazul
      procedural.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Chitanta sau alta dovada oficiala a platii."
    readiness_checks:
      - "Plata corespunde exact cazului si configuratiei solicitate."
    status: draft

