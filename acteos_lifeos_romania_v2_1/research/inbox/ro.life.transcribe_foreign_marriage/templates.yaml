# Step & requirement templates for ro.life.transcribe_foreign_marriage (life.transcribe_foreign_marriage).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: transcribe_foreign_marriage_certificate
    semantic_key: transcribe_foreign_marriage_certificate
    title_ro: "Pregateste si depune dosarul de transcriere a casatoriei"
    instruction_ro: >-
      Strange certificatul de casatorie strain, documentele de identitate si actele conexe cerute,
      apoi depune dosarul pe ruta competenta pentru transcriere.
    sequence_hint: 10
    completion_evidence_ro:
      - "Dosarul de transcriere a certificatului de casatorie este pregatit si depus"
    recovery_actions_ro:
      - "Daca lipseste un act al unuia dintre soti, completeaza dosarul inainte de depunere"
    status: draft

requirement_templates:
  - id: req.foreign_marriage_certificate_original
    title_ro: "Certificat de casatorie strain in original"
    description_ro: >-
      Certificatul de casatorie emis in strainatate, in original, folosit pentru transcriere.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Certificat de casatorie strain in original"
    readiness_checks:
      - "Documentul original este disponibil si lizibil"
    status: draft

  - id: req.spouses_birth_certificates
    title_ro: "Certificatele de nastere ale sotilor"
    description_ro: >-
      Actele de nastere ale sotilor cerute in dosarul de transcriere a casatoriei.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificate de nastere ale sotilor"
    readiness_checks:
      - "Ambele certificate cerute sunt incluse in dosar"
    status: draft

  - id: req.spouses_identity_documents
    title_ro: "Actele de identitate ale sotilor"
    description_ro: >-
      Documentele de identitate ale sotilor folosite pentru identificare in dosar.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Acte de identitate ale sotilor"
    readiness_checks:
      - "Actele de identitate sunt valabile si corespund persoanelor din dosar"
    status: draft

  - id: req.romanian_identity_or_citizenship_proof
    title_ro: "Dovada identitatii romane sau a cetateniei romane"
    description_ro: >-
      Documentele care sustin legatura relevanta cu autoritatile romane pentru transcriere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act de identitate romanesc"
      - "Dovada cetateniei romane"
    readiness_checks:
      - "Documentul ales sustine ruta de transcriere folosita"
    status: draft

  - id: req.authenticated_romanian_translation
    title_ro: "Traducere autorizata in limba romana"
    description_ro: >-
      Traducerea in limba romana a certificatului strain sau a altor acte, daca dosarul o cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Traducere autorizata in romana"
    readiness_checks:
      - "Traducerea acopera documentele straine din dosar"
    status: draft

  - id: req.apostille_or_supralegalization_as_applicable
    title_ro: "Apostila sau supralegalizare, dupa caz"
    description_ro: >-
      Formalitatea de recunoastere externa aplicabila documentelor straine din dosar.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act apostilat"
      - "Act supralegalizat"
    readiness_checks:
      - "Formalitatea aplicabila statului emitent este prezenta"
    status: draft

  - id: req.notarized_joint_surname_declaration
    title_ro: "Declaratie notariala privind numele comun"
    description_ro: >-
      Declaratia notariala a sotilor privind numele purtat dupa casatorie, daca dosarul o cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Declaratie notariala privind numele dupa casatorie"
    readiness_checks:
      - "Declaratia este semnata de persoanele relevante"
    status: draft

  - id: req.proof_prior_marriage_ended
    title_ro: "Dovada incetarii unei casatorii anterioare"
    description_ro: >-
      Documentele care arata incetarea unei casatorii anterioare, daca situatia sotilor o cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act de divort"
      - "Certificat de deces"
      - "Alta dovada privind incetarea casatoriei anterioare"
    readiness_checks:
      - "Documentul prezentat explica integral starea civila anterioara relevanta"
    status: draft
