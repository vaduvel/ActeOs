step_templates:
  - id: request_clinical_certificate_from_family_doctor
    semantic_key: school_medical_certificate_request_clinical
    title_ro: "Solicita certificatul clinic de la medicul de familie"
    instruction_ro: >-
      Programeaza sau contacteaza medicul de familie pentru certificatul cerut
      la intrarea in colectivitate sau in unitatea scolara.
    sequence_hint: 10
    completion_evidence_ro:
      - "Certificatul clinic este solicitat sau obtinut."
    recovery_actions_ro:
      - "Daca unitatea cere si alte documente medicale, confirma lista exacta inainte de deplasare."
    status: draft
  - id: obtain_special_education_medical_documents
    semantic_key: school_medical_certificate_special_education_documents
    title_ro: "Obtine documentele pentru invatamant special"
    instruction_ro: >-
      Daca traseul vizeaza invatamantul special, aduna documentele medicale
      specifice cerute pentru evaluare sau inscriere.
    sequence_hint: 20
    completion_evidence_ro:
      - "Documentele medicale specifice sunt obtinute sau pregatite."
    recovery_actions_ro:
      - "Daca lipseste un formular medical specific, confirma modelul cerut de unitatea sau comisia competenta."
    status: draft

requirement_templates:
  - id: req.clinical_certificate_for_collectivity
    title_ro: "Certificat clinic pentru colectivitate"
    description_ro: >-
      Certificatul clinic eliberat pentru intrarea sau revenirea in
      colectivitate, dupa cazul aplicabil.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Certificat clinic emis de medicul competent."
    readiness_checks:
      - "Documentul este emis pentru scopul scolar corect."
    status: draft
  - id: req.epidemiological_opinion_or_vaccination_proof
    title_ro: "Aviz epidemiologic sau dovada vaccinarii"
    description_ro: >-
      Documentul epidemiologic ori dovada ceruta de ruta concreta de inscriere
      sau revenire la scoala.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Aviz epidemiologic, dovada vaccinarii sau alt document medical echivalent acceptat."
    readiness_checks:
      - "Ruta concreta cere expres acest document."
    status: draft
  - id: req.medical_certificate_a5
    title_ro: "Certificat medical A5"
    description_ro: >-
      Certificatul medical in formatul A5 cerut pentru unele trasee de
      invatamant special sau evaluare.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat medical A5 completat de medicul competent."
    readiness_checks:
      - "Traseul urmat cere explicit formatul A5."
    status: draft
  - id: req.synthetic_medical_sheet
    title_ro: "Fisa medicala sintetica"
    description_ro: >-
      Fisa sintetica medicala folosita in traseele care cer o imagine medicala
      mai ampla pentru evaluare educationala speciala.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Fisa medicala sintetica completata de profesionistul competent."
    readiness_checks:
      - "Procedura urmata cere aceasta fisa in mod expres."
    status: draft
