# Step & requirement templates for ro.life.university_admission (life.university_admission).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: step.uni.choose_program
    semantic_key: step.uni.choose_program
    title_ro: "Alege programul"
    instruction_ro: >-
      Alege programul de studiu vizat si verifica forma de invatamant, locurile disponibile si
      traseul de admitere aplicabil.
    sequence_hint: 10
    completion_evidence_ro:
      - "Programul de studiu a fost ales"
    recovery_actions_ro:
      - "Daca programul nu mai este potrivit, revino si selecteaza altul"
    status: draft

  - id: step.uni.verify_regulation
    semantic_key: step.uni.verify_regulation
    title_ro: "Verifica regulamentul"
    instruction_ro: >-
      Citeste regulamentul si calendarul proprii institutiei sau programului ales inainte de
      depunerea dosarului.
    sequence_hint: 20
    completion_evidence_ro:
      - "Regulamentul relevant a fost verificat"
    recovery_actions_ro:
      - "Daca apar conditii suplimentare, actualizeaza dosarul inainte de depunere"
    status: draft

  - id: step.uni.confirm_place
    semantic_key: step.uni.confirm_place
    title_ro: "Confirma locul obtinut"
    instruction_ro: >-
      Dupa publicarea rezultatului, confirma locul conform pasilor ceruti de institutie.
    sequence_hint: 30
    completion_evidence_ro:
      - "Locul obtinut a fost confirmat"
    recovery_actions_ro:
      - "Daca lipseste o formalitate de confirmare, finalizeaz-o in termenul anuntat"
    status: draft

requirement_templates:
  - id: req.uni.entry_diploma
    title_ro: "Diploma sau act de acces"
    description_ro: >-
      Actul de studii care permite inscrierea la programul universitar vizat.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Diploma de acces la studii"
      - "Adeverinta sau document echivalent acceptat de institutie"
    readiness_checks:
      - "Actul de acces este compatibil cu programul ales"
    status: draft

  - id: req.uni.original_budget
    title_ro: "Original pentru loc bugetat, daca este cerut"
    description_ro: >-
      Documentul in original cerut la confirmarea unui loc bugetat, dupa regulile institutiei.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Actul cerut in original pentru loc bugetat"
    readiness_checks:
      - "Originalul este disponibil daca ruta aleasa il cere"
    status: draft

  - id: req.uni.institution_dossier
    title_ro: "Dosarul cerut de institutie"
    description_ro: >-
      Setul de documente si formulare stabilit de institutia care organizeaza admiterea.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Dosarul de admitere al institutiei"
    readiness_checks:
      - "Dosarul respecta lista publicata de institutie"
    status: draft

  - id: req.uni.recognition
    title_ro: "Recunoastere sau echivalare, daca este cazul"
    description_ro: >-
      Actele privind recunoasterea sau echivalarea studiilor anterioare, daca traseul de admitere
      le cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente de recunoastere"
      - "Documente de echivalare"
    readiness_checks:
      - "Recunoasterea sau echivalarea acopera exact actele prezentate"
    status: draft
