# Step & requirement templates for ro.life.return_to_ro_work (life.return_to_ro_work).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: collect_foreign_employment_and_insurance_documents
    semantic_key: collect_foreign_employment_and_insurance_documents
    title_ro: "Colecteaza documentele de munca si asigurare din strainatate"
    instruction_ro: >-
      Strange documentele privind munca, asigurarile si perioadele lucrate in strainatate inainte
      de a porni ruta din Romania.
    sequence_hint: 10
    completion_evidence_ro:
      - "Documentele externe de munca si asigurare sunt colectate"
    recovery_actions_ro:
      - "Daca lipsesc documente, solicita-le inainte de a cere valorificarea perioadelor"
    status: draft

  - id: review_professional_qualification_in_ro
    semantic_key: review_professional_qualification_in_ro
    title_ro: "Verifica recunoasterea calificarii in Romania"
    instruction_ro: >-
      Daca profesia este reglementata in Romania, verifica daca recunoasterea calificarii este
      necesara si pregatita.
    sequence_hint: 20
    completion_evidence_ro:
      - "Necesitatea recunoasterii calificarii a fost verificata"
    recovery_actions_ro:
      - "Daca lipseste recunoasterea necesara, nu continua pe ruta profesiei reglementate"
    status: draft

  - id: review_tax_residence_arrival
    semantic_key: review_tax_residence_arrival
    title_ro: "Analizeaza rezidenta fiscala la sosire"
    instruction_ro: >-
      Verifica daca trebuie analizata rezidenta fiscala la sosire si separa acest pas de
      angajarea propriu-zisa.
    sequence_hint: 30
    completion_evidence_ro:
      - "Analiza rezidentei fiscale la sosire a fost inceputa"
    recovery_actions_ro:
      - "Daca nu este clar daca se aplica, marcheaza cazul pentru verificare suplimentara"
    status: draft

  - id: choose_job_start_or_jobseeker_route
    semantic_key: choose_job_start_or_jobseeker_route
    title_ro: "Alege ruta de angajare sau de cautare a unui job"
    instruction_ro: >-
      Stabileste daca pornesti direct pe ruta unui nou contract de munca in Romania sau pe ruta de
      servicii pentru ocupare.
    sequence_hint: 40
    completion_evidence_ro:
      - "Ruta principala din Romania a fost aleasa"
    recovery_actions_ro:
      - "Daca nu exista inca oferta de munca, muta cazul pe ruta de servicii de ocupare"
    status: draft

  - id: prepare_ro_employment_start
    semantic_key: prepare_ro_employment_start
    title_ro: "Pregateste inceperea activitatii in Romania"
    instruction_ro: >-
      Daca exista oferta de munca si plan de angajare imediata, pregateste pasii de pornire ai
      raportului de munca in Romania.
    sequence_hint: 50
    completion_evidence_ro:
      - "Pornirea activitatii in Romania este pregatita"
    recovery_actions_ro:
      - "Daca lipsesc documente pentru angajare, completeaza-le inainte de start"
    status: draft

  - id: register_for_employment_services_in_ro
    semantic_key: register_for_employment_services_in_ro
    title_ro: "Inregistreaza-te pentru servicii de ocupare in Romania"
    instruction_ro: >-
      Daca nu ai oferta de munca, foloseste ruta AJOFM sau EURES pentru sprijin la ocupare.
    sequence_hint: 60
    completion_evidence_ro:
      - "Ruta de servicii de ocupare in Romania a fost initiata"
    recovery_actions_ro:
      - "Daca lipsesc date sau acte, completeaza-le inainte de prezentare"
    status: draft

  - id: request_relevant_european_form_or_period_confirmation
    semantic_key: request_relevant_european_form_or_period_confirmation
    title_ro: "Solicita formularul european sau confirmarea perioadelor"
    instruction_ro: >-
      Daca vrei valorificarea perioadelor lucrate in UE, solicita formularul sau confirmarea
      relevanta pentru institutia competenta.
    sequence_hint: 70
    completion_evidence_ro:
      - "Solicitarea pentru formularul sau confirmarea perioadelor a fost pregatita"
    recovery_actions_ro:
      - "Daca nu stii formularul exact, cere suport pe canalul competent"
    status: draft

  - id: review_z015_tax_residence_arrival_applicability
    semantic_key: review_z015_tax_residence_arrival_applicability
    title_ro: "Verifica aplicabilitatea formularului Z015"
    instruction_ro: >-
      Verifica daca formularul Z015 sau traseul echivalent este relevant pentru analiza rezidentei
      fiscale la sosire.
    sequence_hint: 80
    completion_evidence_ro:
      - "Aplicabilitatea formularului Z015 a fost verificata"
    recovery_actions_ro:
      - "Daca aplicabilitatea ramane neclara, marcheaza cazul pentru confirmare"
    status: draft

requirement_templates:
  - id: professional_qualification_recognition_in_romania
    title_ro: "Recunoasterea calificarii profesionale in Romania"
    description_ro: >-
      Documentele sau decizia de recunoastere necesare pentru exercitarea unei profesii
      reglementate in Romania.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Decizie sau dovada de recunoastere a calificarii"
    readiness_checks:
      - "Recunoasterea acopera profesia reglementata vizata"
    status: draft

  - id: foreign_employment_and_insurance_documents
    title_ro: "Documente externe de munca si asigurare"
    description_ro: >-
      Documentele privind raporturile de munca si asigurarea sociala din strainatate, folosite
      pentru valorificarea perioadelor externe.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente de munca din strainatate"
      - "Documente de asigurare sociala din strainatate"
    readiness_checks:
      - "Documentele acopera perioadele externe pe care vrei sa le valorifici"
    status: draft
