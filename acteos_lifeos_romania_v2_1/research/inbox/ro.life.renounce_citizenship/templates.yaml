# Step & requirement templates for ro.life.renounce_citizenship (life.renounce_citizenship).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: evaluate_renunciation_conditions
    semantic_key: evaluate_renunciation_conditions
    title_ro: "Evalueaza conditiile preliminare pentru renuntare"
    instruction_ro: >-
      Verifica separat majoratul, cealalta cetatenie, situatia penala, datoriile si motivele
      temeinice inainte de pregatirea dosarului.
    sequence_hint: 10
    completion_evidence_ro:
      - "Conditiile preliminare pentru renuntare au fost evaluate"
    recovery_actions_ro:
      - "Daca una dintre conditiile esentiale ramane neclara, nu continua spre depunere"
    status: draft

  - id: prepare_renunciation_application
    semantic_key: prepare_renunciation_application
    title_ro: "Pregateste cererea de renuntare"
    instruction_ro: >-
      Daca evaluarea preliminara permite continuarea, pregateste cererea si documentele suport pentru renuntare.
    sequence_hint: 20
    completion_evidence_ro:
      - "Cererea de renuntare este pregatita"
    recovery_actions_ro:
      - "Daca lipseste un document esential, completeaza dosarul inainte de depunere"
    status: draft

  - id: file_at_anc
    semantic_key: file_at_anc
    title_ro: "Depune la ANC"
    instruction_ro: >-
      Daca persoana are domiciliul sau rezidenta relevanta in Romania, pregateste depunerea la ANC.
    sequence_hint: 30
    completion_evidence_ro:
      - "Ruta de depunere la ANC este pregatita"
    recovery_actions_ro:
      - "Daca dosarul nu este complet, nu programa depunerea"
    status: draft

  - id: file_at_romanian_mission_or_consulate
    semantic_key: file_at_romanian_mission_or_consulate
    title_ro: "Depune la misiunea sau consulatul roman"
    instruction_ro: >-
      Daca persoana are domiciliul sau resedinta relevanta in strainatate, pregateste depunerea
      prin misiunea sau consulatul roman competent.
    sequence_hint: 40
    completion_evidence_ro:
      - "Ruta de depunere consulara este pregatita"
    recovery_actions_ro:
      - "Daca baza de depunere in strainatate nu este clara, confirma-o inainte de programare"
    status: draft

  - id: assess_minor_citizenship_effects
    semantic_key: assess_minor_citizenship_effects
    title_ro: "Evalueaza separat efectele asupra minorilor"
    instruction_ro: >-
      Daca renuntarea afecteaza minori, trateaza separat efectele asupra lor si nu le presupune automat.
    sequence_hint: 50
    completion_evidence_ro:
      - "Efectele asupra minorilor au fost evaluate separat"
    recovery_actions_ro:
      - "Daca situatia minorilor nu este clara, nu o simplifica in dosarul principal"
    status: draft

requirement_templates:
  - id: req.proof_criminal_condition
    title_ro: "Dovada privind situatia penala"
    description_ro: >-
      Documentele sau dovezile folosite pentru a sustine conditia privind situatia penala.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Dovada situatiei penale"
    readiness_checks:
      - "Situatia penala este sustinuta documentar"
    status: draft

  - id: req.proof_debts_cleared_or_secured
    title_ro: "Dovada datoriilor stinse sau garantate"
    description_ro: >-
      Documentele care arata ca datoriile relevante sunt stinse sau garantate, daca este cazul.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Dovada datoriilor stinse"
      - "Dovada datoriilor garantate"
    readiness_checks:
      - "Situatia datoriilor este clar sustinuta documentar"
    status: draft

  - id: req.proof_other_citizenship_or_assurance
    title_ro: "Dovada altei cetatenii sau a asigurarii dobandirii ei"
    description_ro: >-
      Documentele care arata o alta cetatenie deja dobandita sau asigurarea dobandirii ei.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Dovada altei cetatenii"
      - "Asigurare privind dobandirea altei cetatenii"
    readiness_checks:
      - "Exista dovada evitarii apatridiei"
    status: draft

  - id: req.statement_and_proof_serious_reasons
    title_ro: "Declaratie si dovezi privind motivele temeinice"
    description_ro: >-
      Declaratia si dovezile privind motivele temeinice invocate pentru renuntare.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Declaratie privind motivele"
      - "Dovezi suport pentru motivele invocate"
    readiness_checks:
      - "Motivele temeinice sunt explicate si sustinute"
    status: draft

  - id: req.identity_and_citizenship_documents
    title_ro: "Documente de identitate si cetatenie"
    description_ro: >-
      Documentele de identitate si cetatenie folosite in dosarul de renuntare.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Documente de identitate"
      - "Documente de cetatenie"
    readiness_checks:
      - "Identitatea si cetatenia actuala sunt dovedite documentar"
    status: draft

  - id: req.supporting_documents_art27
    title_ro: "Documente suport potrivit art. 27"
    description_ro: >-
      Documentele suport cerute pentru dosarul de renuntare pe baza ramurii juridice relevante.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente suport pentru art. 27"
    readiness_checks:
      - "Documentele suport relevante sunt incluse in dosar"
    status: draft
