# Step & requirement templates for ro.life.hire_first_employee (life.hire_first_employee).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: establish_first_employee_start_date
    semantic_key: establish_first_employee_start_date
    title_ro: "Stabileste data de inceput pentru primul salariat"
    instruction_ro: >-
      Confirma data inceperii activitatii inainte de toate celelalte formalitati de angajare.
    sequence_hint: 10
    completion_evidence_ro:
      - "Data inceperii a fost confirmata"
    recovery_actions_ro:
      - "Daca data nu este clara, nu continua restul pasilor dependenti de ea"
    status: draft

  - id: activate_reges_employer_access
    semantic_key: activate_reges_employer_access
    title_ro: "Activeaza accesul angajatorului in REGES"
    instruction_ro: >-
      Verifica sau obtine accesul angajatorului in REGES-ONLINE inainte de inregistrarea primului CIM.
    sequence_hint: 20
    completion_evidence_ro:
      - "Accesul in REGES este confirmat sau pregatit"
    recovery_actions_ro:
      - "Daca accesul lipseste, porneste ruta separata de activare"
    status: draft

  - id: complete_occupational_health_and_ssm_setup
    semantic_key: complete_occupational_health_and_ssm_setup
    title_ro: "Finalizeaza medicina muncii si organizarea SSM"
    instruction_ro: >-
      Asigura aptitudinea medicala, evaluarea riscurilor, planul SSM si organizarea serviciului de
      prevenire si protectie inainte de inceperea activitatii.
    sequence_hint: 30
    completion_evidence_ro:
      - "Medicina muncii si organizarea SSM sunt pregatite"
    recovery_actions_ro:
      - "Daca lipseste o componenta SSM sau aptitudinea medicala, nu porni activitatea"
    status: draft

  - id: sign_and_transmit_first_cim
    semantic_key: sign_and_transmit_first_cim
    title_ro: "Semneaza si transmite primul CIM"
    instruction_ro: >-
      Semneaza contractul individual de munca, transmite-l in REGES in termen si ofera salariatului
      exemplarul sau.
    sequence_hint: 40
    completion_evidence_ro:
      - "Primul CIM este semnat, transmis si remis salariatului"
    recovery_actions_ro:
      - "Daca lipseste contractul semnat sau transmiterea, nu incepe activitatea"
    status: draft

  - id: configure_payroll_and_d112
    semantic_key: configure_payroll_and_d112
    title_ro: "Configureaza salarizarea si D112"
    instruction_ro: >-
      Pregateste salarizarea si verificarile legate de declaratia D112 pentru primul salariat.
    sequence_hint: 50
    completion_evidence_ro:
      - "Salarizarea si ruta D112 sunt pregatite"
    recovery_actions_ro:
      - "Daca frecventa sau configurarea lipsesc, clarifica-le inainte de rularea lunii"
    status: draft

  - id: obtain_reges_employer_access
    semantic_key: obtain_reges_employer_access
    title_ro: "Obtine accesul angajatorului in REGES"
    instruction_ro: >-
      Daca accesul in REGES nu exista inca, parcurge ruta necesara pentru activarea lui.
    sequence_hint: 60
    completion_evidence_ro:
      - "Ruta de obtinere a accesului REGES a fost initiata"
    recovery_actions_ro:
      - "Daca accesul nu este activ, nu continua cu transmiterea CIM"
    status: draft

requirement_templates:
  - id: confirmed_employment_start_date
    title_ro: "Data confirmata a inceperii raportului de munca"
    description_ro: >-
      Data confirmata de inceput folosita pentru toate formalitatile primului salariat.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Data confirmata a inceperii"
    readiness_checks:
      - "Data inceperii este stabilita clar"
    status: draft

  - id: reges_online_employer_access
    title_ro: "Acces al angajatorului in REGES-ONLINE"
    description_ro: >-
      Accesul angajatorului necesar pentru operarea in REGES-ONLINE.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Acces activ in REGES-ONLINE"
    readiness_checks:
      - "Angajatorul poate opera in REGES"
    status: draft

  - id: occupational_medical_aptitude
    title_ro: "Aptitudine medicala pentru salariat"
    description_ro: >-
      Documentul de aptitudine medicala al candidatului, necesar inainte de inceperea muncii.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Fisa de aptitudine"
      - "Certificat medical de aptitudine"
    readiness_checks:
      - "Salariatul este declarat apt pentru inceperea activitatii"
    status: draft

  - id: written_signed_cim_before_start
    title_ro: "CIM scris si semnat inainte de start"
    description_ro: >-
      Contractul individual de munca scris si semnat inainte de inceperea activitatii.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Contract individual de munca semnat"
    readiness_checks:
      - "CIM-ul este semnat inainte de start"
    status: draft

  - id: first_employee_reges_transmission_before_start
    title_ro: "Transmiterea primului CIM in REGES inainte de start"
    description_ro: >-
      Confirmarea ca primul CIM a fost transmis in REGES in termenul cerut.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Confirmare a transmiterii in REGES"
    readiness_checks:
      - "Transmiterea in REGES este facuta inainte de incepere"
    status: draft

  - id: signed_cim_copy_for_employee
    title_ro: "Exemplarul semnat al CIM pentru salariat"
    description_ro: >-
      Exemplarul semnat al contractului remis salariatului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Exemplarul salariatului din CIM"
    readiness_checks:
      - "Salariatul a primit copia semnata a CIM"
    status: draft

  - id: occupational_risk_assessment
    title_ro: "Evaluarea riscurilor ocupationale"
    description_ro: >-
      Evaluarea riscurilor necesara organizarii activitatii si medicinei muncii.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Evaluare a riscurilor ocupationale"
    readiness_checks:
      - "Evaluarea riscurilor este disponibila pentru activitatea respectiva"
    status: draft

  - id: prevention_and_protection_plan
    title_ro: "Plan de prevenire si protectie"
    description_ro: >-
      Planul de prevenire si protectie aferent activitatii cu primul salariat.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Plan de prevenire si protectie"
    readiness_checks:
      - "Planul de prevenire si protectie este pregatit"
    status: draft

  - id: organised_prevention_and_protection_service
    title_ro: "Serviciu organizat de prevenire si protectie"
    description_ro: >-
      Organizarea activitatilor de prevenire si protectie pentru angajator.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Dovada organizarii serviciului de prevenire si protectie"
    readiness_checks:
      - "Serviciul de prevenire si protectie este organizat"
    status: draft

  - id: employee_ssm_training
    title_ro: "Instruirea SSM a salariatului"
    description_ro: >-
      Dovada instruirii SSM a primului salariat.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Documente de instruire SSM"
    readiness_checks:
      - "Salariatul a parcurs instruirea SSM"
    status: draft

  - id: payroll_and_tax_reporting_setup
    title_ro: "Configurarea salarizarii si a raportarii fiscale"
    description_ro: >-
      Configurarea salarizarii si a obligatiilor declarative pentru primul salariat.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Configurare de salarizare"
      - "Configurare pentru raportarea fiscala"
    readiness_checks:
      - "Salarizarea si raportarea sunt pregatite"
    status: draft

  - id: foreign_worker_employment_authorisation_or_exemption
    title_ro: "Autorizatie sau exceptie pentru lucrator din afara UE"
    description_ro: >-
      Documentul care permite angajarea unui lucrator din afara UE, daca este cazul.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Autorizatie de munca"
      - "Document privind exceptia legala"
    readiness_checks:
      - "Documentul acopera angajarea lucratorului din afara UE"
    status: draft
