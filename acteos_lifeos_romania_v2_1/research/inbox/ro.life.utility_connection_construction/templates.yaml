# Step & requirement templates for ro.life.utility_connection_construction (life.utility_connection_construction).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: classify_construction_stage_and_preconditions
    semantic_key: classify_construction_stage_and_preconditions
    title_ro: "Clasifica etapa lucrarii si preconditiile"
    instruction_ro: >-
      Verifica daca aprobarea tehnica, contractul si restul preconditiilor pentru executie sunt deja
      indeplinite.
    sequence_hint: 10
    completion_evidence_ro:
      - "Etapa lucrarii si preconditiile au fost clasificate"
    recovery_actions_ro:
      - "Daca lipsesc aprobarea sau contractul, nu intra in executie"
    status: draft

  - id: correct_utility_operator_pair
    semantic_key: correct_utility_operator_pair
    title_ro: "Corecteaza perechea utilitate-operator"
    instruction_ro: >-
      Verifica din nou ca operatorul si utilitatea corespund etapei de executie.
    sequence_hint: 20
    completion_evidence_ro:
      - "Perechea utilitate-operator este confirmata"
    recovery_actions_ro:
      - "Daca operatorul este gresit, opreste executia si corecteaza ruta"
    status: draft

  - id: revalidate_technical_solution_with_operator
    semantic_key: revalidate_technical_solution_with_operator
    title_ro: "Revalideaza solutia tehnica cu operatorul"
    instruction_ro: >-
      Daca aprobarea tehnica lipseste, s-a schimbat sau a expirat, reconfirma solutia tehnica cu
      operatorul.
    sequence_hint: 30
    completion_evidence_ro:
      - "Solutia tehnica a fost revalidata sau verificata"
    recovery_actions_ro:
      - "Daca solutia tehnica nu mai este valabila, nu continua lucrarile"
    status: draft

  - id: execute_electricity_connection_by_distributor_or_anre_attested_firm
    semantic_key: execute_electricity_connection_by_distributor_or_anre_attested_firm
    title_ro: "Executa racordul electric cu entitatea autorizata"
    instruction_ro: >-
      Pentru electricitate, foloseste distribuitorul sau o firma atestata corespunzator pentru
      executia racordului.
    sequence_hint: 40
    completion_evidence_ro:
      - "Ruta de executie pentru racordul electric este pregatita"
    recovery_actions_ro:
      - "Daca executantul nu este confirmat, nu continua lucrarile"
    status: draft

  - id: track_electricity_work_against_atr_contract_and_approvals
    semantic_key: track_electricity_work_against_atr_contract_and_approvals
    title_ro: "Urmareste lucrarile electrice fata de ATR, contract si avize"
    instruction_ro: >-
      Urmareste executia racordului electric in raport cu ATR-ul, contractul si aprobarile emise.
    sequence_hint: 50
    completion_evidence_ro:
      - "Executia electrica este urmarita fata de documentele aprobate"
    recovery_actions_ro:
      - "Daca apar abateri fata de ATR sau contract, opreste si clarifica"
    status: draft

  - id: request_electricity_connection_reception_and_commissioning
    semantic_key: request_electricity_connection_reception_and_commissioning
    title_ro: "Cere receptia si punerea in functiune a racordului electric"
    instruction_ro: >-
      Dupa executie, pregateste receptia si punerea in functiune pe ruta operatorului de
      electricitate.
    sequence_hint: 60
    completion_evidence_ro:
      - "Receptia racordului electric este pregatita sau ceruta"
    recovery_actions_ro:
      - "Daca executia nu este finalizata, nu cere receptia"
    status: draft

  - id: remedy_and_repeat_electricity_reception
    semantic_key: remedy_and_repeat_electricity_reception
    title_ro: "Remediaza si reia receptia electrica"
    instruction_ro: >-
      Daca receptia electrica este respinsa sau necesita corectii, remediaza problemele si reia
      traseul de receptie.
    sequence_hint: 70
    completion_evidence_ro:
      - "Ruta de remediere pentru receptia electrica este clarificata"
    recovery_actions_ro:
      - "Daca motivele respingerii nu sunt clare, cere detalii inainte de remediere"
    status: draft

  - id: obtain_electricity_connection_certificate
    semantic_key: obtain_electricity_connection_certificate
    title_ro: "Obtine certificatul pentru racordul electric"
    instruction_ro: >-
      Dupa receptie, obtine certificatul sau documentul echivalent emis pentru racordul electric.
    sequence_hint: 80
    completion_evidence_ro:
      - "Certificatul racordului electric este disponibil"
    recovery_actions_ro:
      - "Daca documentul nu este emis dupa receptie, urmareste dosarul la operator"
    status: draft

  - id: sign_electricity_supply_contract
    semantic_key: sign_electricity_supply_contract
    title_ro: "Semneaza contractul de furnizare pentru electricitate"
    instruction_ro: >-
      Dupa receptie si certificare, pregateste contractul de furnizare pentru activarea serviciului.
    sequence_hint: 90
    completion_evidence_ro:
      - "Contractul de furnizare electricitate este pregatit sau semnat"
    recovery_actions_ro:
      - "Daca receptia nu este acceptata, nu continua spre furnizare"
    status: draft

  - id: request_meter_and_energization
    semantic_key: request_meter_and_energization
    title_ro: "Cere montarea contorului si energizarea"
    instruction_ro: >-
      Dupa pasii contractuali si tehnici, cere montarea contorului si punerea sub tensiune.
    sequence_hint: 100
    completion_evidence_ro:
      - "Ruta pentru contor si energizare este pregatita"
    recovery_actions_ro:
      - "Daca lipseste contractul de furnizare sau documentatia finala, nu cere energizarea"
    status: draft

  - id: follow_electric_network_extension_scope_from_atr_and_contract
    semantic_key: follow_electric_network_extension_scope_from_atr_and_contract
    title_ro: "Urmareste extinderea retelei electrice din ATR si contract"
    instruction_ro: >-
      Daca este necesara extinderea retelei, urmareste strict documentatia si pasii prevazuti in ATR
      si contract.
    sequence_hint: 110
    completion_evidence_ro:
      - "Ruta de extindere electrica a fost clarificata"
    recovery_actions_ro:
      - "Daca extinderea nu este confirmata documentar, nu activa aceasta ramura"
    status: draft

  - id: execute_water_sewer_connection_with_authorized_firm
    semantic_key: execute_water_sewer_connection_with_authorized_firm
    title_ro: "Executa racordul de apa-canal cu firma autorizata"
    instruction_ro: >-
      Pentru apa-canal, foloseste executantul autorizat sau acceptat pe ruta operatorului local.
    sequence_hint: 120
    completion_evidence_ro:
      - "Ruta de executie a racordului de apa-canal este pregatita"
    recovery_actions_ro:
      - "Daca executantul nu este confirmat, nu continua lucrarile"
    status: draft

  - id: request_aquatim_reception_and_meter_sealing
    semantic_key: request_aquatim_reception_and_meter_sealing
    title_ro: "Cere receptia Aquatim si sigilarea contorului"
    instruction_ro: >-
      Dupa executia racordului de apa-canal pe ruta Aquatim, pregateste receptia si sigilarea
      contorului.
    sequence_hint: 130
    completion_evidence_ro:
      - "Receptia Aquatim este pregatita sau ceruta"
    recovery_actions_ro:
      - "Daca executia nu este finalizata, nu cere receptia"
    status: draft

  - id: activate_aquatim_service_contract_after_reception
    semantic_key: activate_aquatim_service_contract_after_reception
    title_ro: "Activeaza contractul Aquatim dupa receptie"
    instruction_ro: >-
      Dupa receptia favorabila, finalizeaza activarea serviciului pe contractul relevant.
    sequence_hint: 140
    completion_evidence_ro:
      - "Activarea serviciului Aquatim este pregatita sau finalizata"
    recovery_actions_ro:
      - "Daca receptia nu este acceptata, nu activa serviciul"
    status: draft

  - id: remedy_and_repeat_aquatim_reception
    semantic_key: remedy_and_repeat_aquatim_reception
    title_ro: "Remediaza si reia receptia Aquatim"
    instruction_ro: >-
      Daca receptia Aquatim este respinsa sau amanata, remediaza lipsurile si reia traseul de
      receptie.
    sequence_hint: 150
    completion_evidence_ro:
      - "Ruta de remediere Aquatim este clarificata"
    recovery_actions_ro:
      - "Daca motivele respingerii nu sunt clare, cere detalii inainte de remediere"
    status: draft

  - id: verify_aquatim_extension_design_and_urbanism_documents
    semantic_key: verify_aquatim_extension_design_and_urbanism_documents
    title_ro: "Verifica proiectul si documentele de urbanism pentru extindere"
    instruction_ro: >-
      Daca este necesara extinderea retelei la Aquatim, verifica proiectul, urbanismul si restul
      documentelor speciale.
    sequence_hint: 160
    completion_evidence_ro:
      - "Documentele pentru extinderea Aquatim au fost verificate"
    recovery_actions_ro:
      - "Daca lipseste urbanismul sau proiectul, nu continua extinderea"
    status: draft

  - id: obtain_local_water_operator_construction_and_reception_route
    semantic_key: obtain_local_water_operator_construction_and_reception_route
    title_ro: "Obtine ruta locala de executie si receptie pentru apa-canal"
    instruction_ro: >-
      Pentru alti operatori de apa-canal, identifica ruta locala de executie si receptie aplicabila.
    sequence_hint: 170
    completion_evidence_ro:
      - "Ruta locala de executie si receptie a fost identificata"
    recovery_actions_ro:
      - "Daca operatorul local nu este confirmat, nu continua lucrarile"
    status: draft

  - id: verify_gas_authorization_type_and_service_contracts
    semantic_key: verify_gas_authorization_type_and_service_contracts
    title_ro: "Verifica tipul autorizatiei si contractele pentru gaze"
    instruction_ro: >-
      Inainte de executia pe gaze, verifica autorizarea corecta a executantului si existenta
      contractelor relevante.
    sequence_hint: 180
    completion_evidence_ro:
      - "Autorizarea si contractele pentru gaze au fost verificate"
    recovery_actions_ro:
      - "Daca tipul autorizatiei nu corespunde, nu continua lucrarile"
    status: draft

  - id: execute_gas_connection_and_installation
    semantic_key: execute_gas_connection_and_installation
    title_ro: "Executa racordul si instalatia de gaze"
    instruction_ro: >-
      Dupa validarea tehnica si contractuala, executa racordul si instalatia de gaze pe ruta
      autorizata.
    sequence_hint: 190
    completion_evidence_ro:
      - "Ruta de executie a racordului si instalatiei de gaze este pregatita"
    recovery_actions_ro:
      - "Daca documentele sau autorizarea lipsesc, nu continua executia"
    status: draft

  - id: request_gas_installation_reception
    semantic_key: request_gas_installation_reception
    title_ro: "Cere receptia instalatiei de gaze"
    instruction_ro: >-
      Dupa finalizarea lucrarilor la gaze, pregateste receptia pe ruta operatorului si a executantului.
    sequence_hint: 200
    completion_evidence_ro:
      - "Receptia instalatiei de gaze este pregatita sau ceruta"
    recovery_actions_ro:
      - "Daca executia nu este finalizata, nu cere receptia"
    status: draft

  - id: sign_gas_supply_contract
    semantic_key: sign_gas_supply_contract
    title_ro: "Semneaza contractul de furnizare gaze"
    instruction_ro: >-
      Dupa receptie, finalizeaza contractul de furnizare pentru activarea serviciului de gaze.
    sequence_hint: 210
    completion_evidence_ro:
      - "Contractul de furnizare gaze este pregatit sau semnat"
    recovery_actions_ro:
      - "Daca receptia nu este acceptata, nu continua spre furnizare"
    status: draft

  - id: remedy_and_repeat_gas_reception
    semantic_key: remedy_and_repeat_gas_reception
    title_ro: "Remediaza si reia receptia gazelor"
    instruction_ro: >-
      Daca receptia la gaze este respinsa, remediaza problemele si reia procedura de receptie.
    sequence_hint: 220
    completion_evidence_ro:
      - "Ruta de remediere pentru receptia la gaze este clarificata"
    recovery_actions_ro:
      - "Daca motivele respingerii nu sunt clare, cere detalii inainte de remediere"
    status: draft

  - id: follow_case_specific_colterm_technical_conditions
    semantic_key: follow_case_specific_colterm_technical_conditions
    title_ro: "Urmareste conditiile tehnice specifice ale operatorului de termoficare"
    instruction_ro: >-
      Pentru termoficare, urmareste conditiile tehnice specifice cazului si nu extrapola reguli
      vechi fara reconfirmare.
    sequence_hint: 230
    completion_evidence_ro:
      - "Conditiile tehnice specifice au fost evaluate"
    recovery_actions_ro:
      - "Daca conditiile nu sunt reconfirmate, nu continua executia"
    status: draft

  - id: obtain_local_heat_operator_construction_route
    semantic_key: obtain_local_heat_operator_construction_route
    title_ro: "Obtine ruta de executie pentru termoficare"
    instruction_ro: >-
      Identifica traseul local de executie si receptie pentru racordul de termoficare.
    sequence_hint: 240
    completion_evidence_ro:
      - "Ruta de executie pentru termoficare a fost identificata"
    recovery_actions_ro:
      - "Daca operatorul local nu este confirmat, opreste traseul"
    status: draft

  - id: schedule_digi_or_authorized_subcontractor_installation
    semantic_key: schedule_digi_or_authorized_subcontractor_installation
    title_ro: "Programeaza instalarea prin furnizor sau subcontractor autorizat"
    instruction_ro: >-
      Pentru internet fix, programeaza instalarea cu furnizorul confirmat sau cu subcontractorul
      autorizat de acesta.
    sequence_hint: 250
    completion_evidence_ro:
      - "Programarea instalarii a fost pregatita"
    recovery_actions_ro:
      - "Daca nu exista programare confirmata, nu marca instalarea ca pornita"
    status: draft

  - id: provide_access_and_track_digi_installation
    semantic_key: provide_access_and_track_digi_installation
    title_ro: "Asigura accesul si urmareste instalarea"
    instruction_ro: >-
      Asigura accesul la locatie si urmareste instalarea serviciului de internet pe ruta programata.
    sequence_hint: 260
    completion_evidence_ro:
      - "Instalarea serviciului este urmarita"
    recovery_actions_ro:
      - "Daca instalarea nu poate avea loc, reprogrameaza si reconfirma accesul"
    status: draft

  - id: verify_digi_service_activation_equipment_and_material_record
    semantic_key: verify_digi_service_activation_equipment_and_material_record
    title_ro: "Verifica activarea serviciului si evidenta echipamentelor"
    instruction_ro: >-
      Dupa instalare, verifica activarea serviciului si evidenta materialelor ori echipamentelor
      predate.
    sequence_hint: 270
    completion_evidence_ro:
      - "Activarea serviciului si evidenta echipamentelor au fost verificate"
    recovery_actions_ro:
      - "Daca serviciul nu este activ, urmareste problema la furnizor"
    status: draft

  - id: obtain_provider_specific_installation_and_civil_work_route
    semantic_key: obtain_provider_specific_installation_and_civil_work_route
    title_ro: "Obtine ruta specifica a furnizorului pentru instalare si lucrari civile"
    instruction_ro: >-
      Pentru alti furnizori, verifica daca sunt necesare lucrari civile sau pasi speciali de
      instalare.
    sequence_hint: 280
    completion_evidence_ro:
      - "Ruta specifica a furnizorului a fost clarificata"
    recovery_actions_ro:
      - "Daca ruta furnizorului nu este confirmata, nu incepe lucrarile"
    status: draft

  - id: confirm_provider_network_extension_and_public_domain_approvals
    semantic_key: confirm_provider_network_extension_and_public_domain_approvals
    title_ro: "Confirma extinderea retelei si aprobarile pe domeniul public"
    instruction_ro: >-
      Daca instalarea cere extindere de retea sau ocupare a domeniului public, confirma aprobarile
      relevante inainte de executie.
    sequence_hint: 290
    completion_evidence_ro:
      - "Nevoia de extindere si aprobarile aferente au fost confirmate"
    recovery_actions_ro:
      - "Daca lipsesc aprobarile pentru domeniul public, nu continua lucrarile"
    status: draft

requirement_templates:
  - id: req.valid_technical_approval
    title_ro: "Aprobarea tehnica valabila"
    description_ro: >-
      Aprobarea tehnica valabila folosita inainte de inceperea lucrarilor de racordare.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "ATR"
      - "Aviz tehnic"
      - "Alta aprobare tehnica relevanta"
    readiness_checks:
      - "Aprobarea tehnica este valabila pentru etapa de executie"
    status: draft

  - id: req.signed_connection_contract
    title_ro: "Contract de racordare semnat"
    description_ro: >-
      Contractul de racordare semnat, unde etapa de executie depinde de el.
    obligation: mandatory
    timing: now
    accepted_forms:
