# Step & requirement templates for ro.life.residence_registration_eu (life.residence_registration_eu).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: apply_for_eu_registration_certificate
    semantic_key: apply_for_eu_registration_certificate
    title_ro: "Pregateste certificatul de inregistrare pentru cetatean UE/SEE/Elvetia"
    instruction_ro: >-
      Daca sederea depaseste perioada scurta si persoana este cetatean UE/SEE/Elvetia, pregateste
      dosarul pentru certificatul de inregistrare.
    sequence_hint: 10
    completion_evidence_ro:
      - "Ruta pentru certificatul de inregistrare a fost evaluata sau pregatita"
    recovery_actions_ro:
      - "Daca sederea nu depaseste pragul sau persoana nu intra in acest grup, nu continua pe aceasta ramura"
    status: draft

  - id: apply_for_non_eu_family_residence_card
    semantic_key: apply_for_non_eu_family_residence_card
    title_ro: "Pregateste cartea de rezidenta pentru membru de familie non-UE"
    instruction_ro: >-
      Daca persoana este membru de familie non-UE al unui cetatean eligibil, pregateste dosarul
      pentru cartea de rezidenta.
    sequence_hint: 20
    completion_evidence_ro:
      - "Ruta pentru cartea de rezidenta a fost evaluata sau pregatita"
    recovery_actions_ro:
      - "Daca membrul de familie nu este non-UE, nu continua pe aceasta ramura"
    status: draft

  - id: assess_permanent_eu_residence
    semantic_key: assess_permanent_eu_residence
    title_ro: "Evalueaza eligibilitatea pentru rezidenta permanenta"
    instruction_ro: >-
      Daca exista minimum cinci ani de rezidenta legala continua, evalueaza separat eligibilitatea
      pentru rezidenta permanenta.
    sequence_hint: 30
    completion_evidence_ro:
      - "Eligibilitatea pentru rezidenta permanenta a fost evaluata"
    recovery_actions_ro:
      - "Daca perioada de rezidenta nu este suficient confirmata, nu activa aceasta ramura"
    status: draft

requirement_templates:
  - id: req.valid_national_id_or_passport
    title_ro: "Act national de identitate valabil sau pasaport"
    description_ro: >-
      Documentul de identitate valabil folosit pentru certificatul de inregistrare UE.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Act national de identitate valabil"
      - "Pasaport valabil"
    readiness_checks:
      - "Documentul de identitate este valabil si disponibil"
    status: draft

  - id: req.employment_or_worker_evidence
    title_ro: "Dovada activitatii ca lucrator"
    description_ro: >-
      Dovada activitatii ca lucrator sau angajat pentru temeiul de sedere bazat pe munca.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Contract de munca"
      - "Adeverinta de la angajator"
      - "Alta dovada a activitatii ca lucrator"
    readiness_checks:
      - "Dovada de lucrator este disponibila daca temeiul este munca"
    status: draft

  - id: req.self_employment_activity_evidence
    title_ro: "Dovada activitatii independente"
    description_ro: >-
      Dovada activitatii independente pentru temeiul de sedere bazat pe activitate proprie.
