# Step & requirement templates for ro.life.family_death (ro.life.family_death).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: register_family_death
    semantic_key: register_family_death
    title_ro: "Inregistreaza decesul"
    instruction_ro: >-
      Pregateste inregistrarea decesului cu documentele medicale, de identitate
      si dovezile speciale cerute de cauza ori de intarzierea declararii.
    sequence_hint: 10
    completion_evidence_ro:
      - "Ruta de inregistrare a decesului a fost pregatita"
    recovery_actions_ro:
      - "Daca lipsesc dovezile speciale sau aprobarea pentru declarare tarzie, completeaza dosarul inainte de depunere"
    status: draft

  - id: claim_family_death_benefit
    semantic_key: claim_family_death_benefit
    title_ro: "Solicita ajutorul de deces"
    instruction_ro: >-
      Dupa inregistrarea decesului, pregateste dosarul pentru ajutorul de deces
      pe ramura CNPP relevanta pentru solicitant.
    sequence_hint: 20
    completion_evidence_ro:
      - "Dosarul pentru ajutorul de deces a fost pregatit"
    recovery_actions_ro:
      - "Daca statutul de eligibilitate sau dovada cheltuielilor nu sunt clare, confirma ramura inainte de depunere"
    status: draft

requirement_templates:
  - id: req.medical_death_certificate
    title_ro: "Certificatul medical constatator al decesului"
    description_ro: "Documentul medical de baza pentru declararea decesului."
    obligation: conditional
    timing: now
    accepted_forms: ["Certificat medical constatator al decesului"]
    readiness_checks: ["Documentul medical este disponibil si lizibil"]
    status: draft

  - id: req.deceased_identity_document
    title_ro: "Actul de identitate al persoanei decedate"
    description_ro: "Actul de identitate al persoanei decedate, daca este disponibil."
    obligation: conditional
    timing: now
    accepted_forms: ["Actul de identitate al persoanei decedate"]
    readiness_checks: ["Actul de identitate al persoanei decedate este disponibil daca exista"]
    status: draft

  - id: req.declarant_identity_document
    title_ro: "Actul de identitate al declarantului"
    description_ro: "Actul de identitate al persoanei care declara decesul."
    obligation: conditional
    timing: now
    accepted_forms: ["Actul de identitate al declarantului"]
    readiness_checks: ["Declarantul se poate identifica prin document valabil"]
    status: draft

  - id: req.prosecutor_late_registration_approval
    title_ro: "Aprobarea pentru inregistrare tarzie"
    description_ro: "Aprobarea relevanta cand termenul general de declarare a fost depasit."
    obligation: conditional
    timing: now
    accepted_forms: ["Aprobarea procurorului sau alta aprobare oficiala relevanta"]
    readiness_checks: ["Aprobarea pentru declarare tarzie este disponibila daca se aplica"]
    status: draft

  - id: req.police_or_prosecutor_proof
    title_ro: "Dovada politiei sau a procurorului"
    description_ro: "Documentul cerut pentru cauze violente, accident, suicid sau corp gasit."
    obligation: conditional
    timing: now
    accepted_forms: ["Dovada politiei", "Dovada procurorului"]
    readiness_checks: ["Dovada speciala este pregatita daca cauza decesului o cere"]
    status: draft

  - id: req.death_certificate
    title_ro: "Certificatul de deces"
    description_ro: "Certificatul de deces folosit pentru dosarele ulterioare."
    obligation: conditional
    timing: now
    accepted_forms: ["Certificat de deces"]
    readiness_checks: ["Certificatul de deces este disponibil"]
    status: draft

  - id: req.applicant_identity_document
    title_ro: "Actul de identitate al solicitantului"
    description_ro: "Actul de identitate al persoanei care solicita ajutorul de deces."
    obligation: conditional
    timing: now
    accepted_forms: ["Act de identitate al solicitantului"]
    readiness_checks: ["Solicitantul se poate identifica prin document valabil"]
    status: draft

  - id: req.proof_funeral_expenses
    title_ro: "Dovada cheltuielilor de inmormantare"
    description_ro: "Documentele care sustin suportarea cheltuielilor funerare."
    obligation: conditional
    timing: now
    accepted_forms: ["Dovada cheltuielilor funerare"]
    readiness_checks: ["Cheltuielile de inmormantare sunt sustinute prin documente"]
    status: draft

  - id: req.civil_status_or_kinship_proof
    title_ro: "Dovada starii civile sau a rudeniei"
    description_ro: "Documentele care arata legatura solicitantului cu persoana decedata."
    obligation: conditional
    timing: now
    accepted_forms: ["Documente de stare civila", "Dovada rudeniei"]
    readiness_checks: ["Legatura relevanta este sustinuta prin documente"]
    status: draft

  - id: req.kinship_proof
    title_ro: "Dovada rudeniei"
    description_ro: "Documentul cerut pentru ramura CNPP relevanta privind rudenia."
    obligation: conditional
    timing: now
    accepted_forms: ["Dovada rudeniei"]
    readiness_checks: ["Rudenia relevanta este sustinuta prin documente"]
    status: draft

  - id: req.eligible_insured_or_pensioner_proof
    title_ro: "Dovada statutului persoanei eligibile"
    description_ro: "Dovada ca persoana decedata intra in categoria asigurat sau pensionar eligibil."
    obligation: conditional
    timing: now
    accepted_forms: ["Dovada statutului de asigurat", "Dovada statutului de pensionar"]
    readiness_checks: ["Statutul eligibil relevant este sustinut prin documente"]
    status: draft
