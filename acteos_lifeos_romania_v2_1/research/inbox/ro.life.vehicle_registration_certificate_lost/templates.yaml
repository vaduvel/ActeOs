step_templates:
  - id: prepare_registration_certificate_replacement_file
    semantic_key: vehicle_registration_certificate_prepare_file
    title_ro: "Pregateste dosarul pentru duplicatul certificatului"
    instruction_ro: >-
      Stabileste motivul inlocuirii si strange CIV-ul, actele de identitate,
      dovada incidentului si plata aplicabila.
    sequence_hint: 10
    completion_evidence_ro:
      - "Dosarul pentru duplicatul certificatului este pregatit."
    recovery_actions_ro:
      - "Daca motivul este retinere in strainatate, pregateste si documentele straine relevante."
    status: draft
  - id: submit_to_original_registering_authority
    semantic_key: vehicle_registration_certificate_submit_authority
    title_ro: "Depune la autoritatea care a inmatriculat vehiculul"
    instruction_ro: >-
      Depune cererea de duplicat la autoritatea initial competenta, prin canalul
      admis pentru cazul tau.
    sequence_hint: 20
    completion_evidence_ro:
      - "Cererea de duplicat este depusa la autoritatea competenta."
    recovery_actions_ro:
      - "Verifica daca ai contul online cerut de pilotul local, atunci cand alegi fluxul digital."
    status: draft

requirement_templates:
  - id: req.valid_vehicle_identity_card_civ
    title_ro: "CIV valabila"
    description_ro: >-
      Cartea de identitate a vehiculului valabila, ceruta pentru eliberarea
      duplicatului certificatului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "CIV in forma acceptata de procedura."
    readiness_checks:
      - "Documentul corespunde vehiculului pentru care se cere duplicatul."
    status: draft
  - id: req.registration_certificate_loss_declaration
    title_ro: "Declaratie de pierdere a certificatului"
    description_ro: >-
      Declaratia folosita pentru cazurile de pierdere a certificatului de
      inmatriculare.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Declaratie completata in forma acceptata de autoritate."
    readiness_checks:
      - "Motivul inlocuirii este pierderea certificatului."
    status: draft
  - id: req.competent_authority_certificate_theft_proof
    title_ro: "Dovada furtului certificatului"
    description_ro: >-
      Dovada emisa de autoritatea competenta pentru furtul certificatului.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Adeverinta sau alt document oficial privind furtul."
    readiness_checks:
      - "Motivul inlocuirii este furtul certificatului."
    status: draft
  - id: req.damaged_registration_certificate
    title_ro: "Certificatul deteriorat"
    description_ro: >-
      Certificatul deteriorat prezentat in dosarul de duplicat, daca este
      disponibil.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificatul deteriorat."
    readiness_checks:
      - "Motivul inlocuirii este deteriorarea."
    status: draft
  - id: req.foreign_retention_proof
    title_ro: "Dovada retinerii in strainatate"
    description_ro: >-
      Documentul oficial care arata retinerea certificatului in strainatate.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Document oficial emis de autoritatea straina."
    readiness_checks:
      - "Motivul inlocuirii este retinerea in strainatate."
    status: draft
  - id: req.proof_retention_reasons_ceased
    title_ro: "Dovada incetarii motivului retinerii"
    description_ro: >-
      Dovada ca motivele pentru retinerea in strainatate au incetat.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Dovada oficiala privind incetarea motivului retinerii."
    readiness_checks:
      - "Ruta de retinere in strainatate o cere."
    status: draft
  - id: req.authorised_romanian_translation
    title_ro: "Traducere autorizata in romana"
    description_ro: >-
      Traducerea autorizata a documentelor straine relevante pentru dosar.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Traducere autorizata in limba romana."
    readiness_checks:
      - "Documentele de baza sunt intr-o alta limba."
    status: draft
  - id: req.verified_dgpci_online_account
    title_ro: "Cont online DGPCI verificat"
    description_ro: >-
      Contul online verificat cerut de fluxul digital din pilotul local, daca se
      aplica.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Cont online DGPCI sau echivalent local verificat."
    readiness_checks:
      - "Canalul ales este online."
    status: draft
  - id: req.valid_identity_document
    title_ro: "Act de identitate valabil"
    description_ro: >-
      Actul de identitate valabil al persoanei care cere duplicatul.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Act de identitate valabil."
    readiness_checks:
      - "Solicitantul poate fi identificat oficial."
    status: draft
  - id: req.legal_entity_documents
    title_ro: "Documentele persoanei juridice"
    description_ro: >-
      Documentele necesare cand certificatul apartine unui vehicul al unei
      persoane juridice.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente oficiale ale persoanei juridice."
    readiness_checks:
      - "Solicitantul este persoana juridica."
    status: draft
  - id: req.legal_representative_identity
    title_ro: "Actul reprezentantului legal"
    description_ro: >-
      Actul de identitate al reprezentantului legal al persoanei juridice.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act de identitate valabil al reprezentantului legal."
    readiness_checks:
      - "Cererea este depusa prin reprezentant legal."
    status: draft
  - id: req.lawyer_mandate
    title_ro: "Mandat avocatial"
    description_ro: >-
      Imputernicirea folosita atunci cand cererea este depusa prin avocat.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Imputernicire avocatiala valabila."
    readiness_checks:
      - "Reprezentarea este facuta prin avocat."
    status: draft
  - id: req.notarial_power_of_attorney
    title_ro: "Procura notariala"
    description_ro: >-
      Procura folosita atunci cand cererea este depusa prin imputernicit.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Procura notariala valabila."
    readiness_checks:
      - "Reprezentarea este facuta prin imputernicit."
    status: draft
  - id: req.company_written_mandate
    title_ro: "Mandat scris al companiei"
    description_ro: >-
      Mandatul intern scris al companiei pentru delegatul care depune dosarul.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Mandat scris semnat de companie."
    readiness_checks:
      - "Depunerea este facuta de delegatul companiei."
    status: draft
  - id: req.registration_certificate_payment_proof
    title_ro: "Dovada platii pentru duplicatul certificatului"
    description_ro: >-
      Dovada platii tarifului aferent eliberarii duplicatului certificatului.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Chitanta sau alta dovada oficiala a platii."
    readiness_checks:
      - "Plata corespunde exact tipului de duplicat solicitat."
    status: draft

