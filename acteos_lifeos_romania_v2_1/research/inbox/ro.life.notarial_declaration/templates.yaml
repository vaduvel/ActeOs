step_templates:
  - id: identify_declaration_purpose_and_recipient
    semantic_key: notarial_declaration_identify_purpose
    title_ro: "Clarifica scopul declaratiei si destinatarul"
    instruction_ro: >-
      Stabileste exact pentru ce este ceruta declaratia, cine o solicita si ce
      forma notariala trebuie urmata.
    sequence_hint: 10
    completion_evidence_ro:
      - "Scopul si destinatarul declaratiei sunt clarificate."
    recovery_actions_ro:
      - "Daca destinatarul are un model propriu, pregateste-l pentru discutia cu notarul."
    status: draft
  - id: book_notary_authentication
    semantic_key: notarial_declaration_book_authentication
    title_ro: "Programeaza autentificarea notariala"
    instruction_ro: >-
      Daca este ceruta forma autentica, mergi la notarul public pentru
      autentificarea declaratiei.
    sequence_hint: 20
    completion_evidence_ro:
      - "Ruta de autentificare la notar este stabilita."
    recovery_actions_ro:
      - "Nu substitui autentificarea cu alta procedura daca destinatarul cere forma autentica."
    status: draft
  - id: appear_and_express_consent_before_notary
    semantic_key: notarial_declaration_appear_before_notary
    title_ro: "Prezinta-te si exprima consimtamantul in fata notarului"
    instruction_ro: >-
      Prezinta-te personal la notar cu actul de identitate si confirma
      continutul declaratiei in procedura de autentificare.
    sequence_hint: 30
    completion_evidence_ro:
      - "Identificarea si consimtamantul sunt exprimate in fata notarului."
    recovery_actions_ro:
      - "Daca nu te poti prezenta personal, confirma din timp daca exista alta ruta legala aplicabila."
    status: draft
  - id: bring_unsigned_copies_to_notary
    semantic_key: notarial_declaration_bring_unsigned_copies
    title_ro: "Adu exemplarele nesemnate la notar"
    instruction_ro: >-
      Pentru legalizarea semnaturii, prezinta notarului exemplarele nesemnate
      ale inscrisului.
    sequence_hint: 40
    completion_evidence_ro:
      - "Exemplarele nesemnate sunt pregatite pentru notar."
    recovery_actions_ro:
      - "Daca ai semnat deja documentul, opreste-te si confirma daca trebuie refacut."
    status: draft
  - id: sign_before_notary
    semantic_key: notarial_declaration_sign_before_notary
    title_ro: "Semneaza in fata notarului"
    instruction_ro: >-
      Semneaza documentul numai in fata notarului atunci cand urmezi procedura
      de legalizare a semnaturii.
    sequence_hint: 50
    completion_evidence_ro:
      - "Semnatura este data in prezenta notarului."
    recovery_actions_ro:
      - "Daca notarul identifica o neconcordanta de forma, corecteaza documentul inainte de semnare."
    status: draft
  - id: find_notary
    semantic_key: notarial_declaration_find_notary
    title_ro: "Gaseste un notar disponibil"
    instruction_ro: >-
      Foloseste canalele oficiale ale profesiei notariale pentru a identifica
      un notar competent si disponibil in aria ta.
    sequence_hint: 60
    completion_evidence_ro:
      - "Un notar sau o camera notariala relevanta este identificata."
    recovery_actions_ro:
      - "Daca ai nevoie de un notar intr-o anumita zona, porneste din camera teritoriala competenta."
    status: draft

requirement_templates:
  - id: valid_identity_document
    title_ro: "Act de identitate valabil"
    description_ro: >-
      Documentul de identitate folosit de notar pentru identificarea persoanei.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Act de identitate valabil in original."
    readiness_checks:
      - "Documentul este valabil si disponibil la prezentarea la notar."
    status: draft
  - id: recipient_institution_model
    title_ro: "Modelul cerut de institutia destinatara"
    description_ro: >-
      Modelul sau formularea furnizata de institutia care cere declaratia, daca
      exista.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Modelul, instructiunea sau cerinta scrisa furnizata de destinatar."
    readiness_checks:
      - "Destinatarul a publicat ori a transmis un model concret."
    status: draft
