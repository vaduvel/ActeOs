  - eu
  - ro
  - ro.cj
  - ro.cj.cluj
- id: F19
  desc: spațiul punctului expiră înainte de data pornirii
  facts:
    entity_type: pfa
    has_use_right_document: true
    activity_already_registered_authorized: true
    filing_actor: pfa_holder
