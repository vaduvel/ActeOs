step_templates:
  - id: replace_identity_card_after_name_change
    semantic_key: identity_card_change_name_replace
    title_ro: "Inlocuieste actul de identitate dupa schimbarea numelui"
    instruction_ro: >-
      Verifica termenul de 15 zile, documentul care dovedeste noul nume si
      prezinta actul vechi impreuna cu dovada domiciliului si taxa, daca este
      cazul.
    sequence_hint: 10
    completion_evidence_ro:
      - "Dosarul pentru noul act cu numele actual este pregatit sau depus."
    recovery_actions_ro:
      - "Daca schimbarea s-a produs in strainatate, asigura-te mai intai ca este reflectata in registrele romane."
    status: draft

requirement_templates:
  - id: req.old_identity_card
    title_ro: "Actul de identitate anterior"
    description_ro: >-
      Actul de identitate vechi care trebuie prezentat la schimbarea numelui.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Actul de identitate anterior, daca este disponibil."
    readiness_checks:
      - "Documentul anterior nu este deja anulat ori indisponibil din alt motiv."
    status: draft
  - id: req.birth_certificate
    title_ro: "Certificat de nastere"
    description_ro: >-
      Certificatul de nastere folosit in dosarul general pentru emiterea noului
      act.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Certificat de nastere in original sau in forma ceruta de procedura."
    readiness_checks:
      - "Documentul corespunde titularului si este disponibil."
    status: draft
  - id: req.proof_of_domicile
    title_ro: "Dovada domiciliului"
    description_ro: >-
      Documentul care sustine domiciliul pentru noul act de identitate.
    obligation: mandatory
    timing: now
    accepted_forms:
      - "Document de domiciliu acceptat de autoritatea emitenta."
    readiness_checks:
      - "Adresa declarata pentru noul act poate fi sustinuta."
    status: draft
  - id: req.payment_proof_if_due
    title_ro: "Dovada platii, daca este datorata"
    description_ro: >-
      Dovada taxei pentru documentul solicitat, atunci cand traseul ales nu este
      gratuit.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Chitanta sau alta dovada oficiala a platii."
    readiness_checks:
      - "Tipul de document si data cererii atrag plata unei taxe."
    status: draft
  - id: req.marriage_certificate_with_current_name
    title_ro: "Certificat de casatorie cu numele actual"
    description_ro: >-
      Certificatul de casatorie folosit pentru a sustine schimbarea numelui dupa
      casatorie.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat de casatorie care reflecta numele actual."
    readiness_checks:
      - "Temeiul schimbarii este casatoria."
    status: draft
  - id: req.final_divorce_certificate_or_judgment
    title_ro: "Certificat sau hotarare definitiva de divort"
    description_ro: >-
      Documentul definitiv care sustine numele actual dupa divort.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat de divort sau hotarare definitiva relevanta."
    readiness_checks:
      - "Temeiul schimbarii numelui este divortul."
    status: draft
  - id: req.final_name_change_act
    title_ro: "Act definitiv de schimbare a numelui"
    description_ro: >-
      Actul administrativ ori hotararea definitiva care a produs schimbarea
      numelui.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act administrativ sau hotarare definitiva privind schimbarea numelui."
    readiness_checks:
      - "Temeiul schimbarii este administrativ sau judiciar."
    status: draft
  - id: req.romanian_civil_certificate_with_mentions
    title_ro: "Certificat romanesc cu mentiunile actualizate"
    description_ro: >-
      Certificatul romanesc de stare civila care reflecta mentiunea ori
      transcrierea schimbarii produse in strainatate.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Certificat romanesc actualizat cu mentiunea relevanta."
    readiness_checks:
      - "Schimbarea numelui s-a produs in strainatate."
    status: draft
