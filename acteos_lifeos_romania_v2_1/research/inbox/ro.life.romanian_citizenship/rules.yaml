    requirement_id: req.civil_status_extracts_max_2y
  - type: emit_advice
    tag: foreign_document_formalities
    message_ro: Verifică apostila/supralegalizarea și vechimea extraselor de stare civilă înainte de programare.
  source_claim_ids:
  - claim.cit.foreign_documents
  status: in_review
  legal_rank: lege
