  - type: include_requirement
    requirement_id: req.personal_presence_and_biometrics
  source_claim_ids:
  - claim.cit.filing_routes_biometrics
  status: in_review
  legal_rank: lege
- id: rule.cit.foreign_documents
  canonical_rule_id: romanian_citizenship.foreign_documents
  event_type_id: ro.life.romanian_citizenship
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: in
    field: basis
    values:
    - naturalisation_art8
    - cultural_art8_1
    - sport_art8_2
    - reacquisition_art10
    - restoration_art11
  effects:
  - type: include_requirement
    requirement_id: req.foreign_acts_apostilled_or_supralegalised
