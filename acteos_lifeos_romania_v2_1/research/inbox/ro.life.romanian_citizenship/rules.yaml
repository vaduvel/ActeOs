  source_claim_ids:
  - claim.cit.special_routes
  status: in_review
  legal_rank: lege
- id: rule.cit.special_sport
  canonical_rule_id: romanian_citizenship.special_sport
  event_type_id: ro.life.romanian_citizenship
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: basis
    value: sport_art8_2
  effects:
  - type: include_step
    step_id: open_art8_2_government_route
  - type: require_confirmation
    tag: art8_2_institution_live_check
    message_ro: Confirmă instituția inițiatoare și procedura operațională actuală înainte de depunere; denumirile instituționale
      din textul legii pot necesita corelare.
  source_claim_ids:
  - claim.cit.special_routes
  status: in_review
  legal_rank: lege
- id: rule.cit.unknown_basis
  canonical_rule_id: romanian_citizenship.unknown_basis
  event_type_id: ro.life.romanian_citizenship
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: eq
    field: basis
    value: unknown
  effects:
  - type: block
    tag: citizenship_basis_unknown
    message_ro: Fără o bază juridică identificată nu se poate genera un dosar determinist.
  - type: require_confirmation
    tag: anc_basis_classification
    message_ro: Clarifică dacă este dovadă prin naștere, adopție, art. 8, art. 8^1, art. 8^2, art. 10 sau art. 11.
  source_claim_ids:
  - claim.cit.modes_and_no_entitlement
  status: in_review
  legal_rank: lege
- id: rule.cit.language_available
  canonical_rule_id: romanian_citizenship.language_available
  event_type_id: ro.life.romanian_citizenship
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: in
      field: basis
      values:
      - reacquisition_art10
      - restoration_art11
    - op: eq
      field: language_proof_status
      value: available
  effects:
  - type: include_requirement
    requirement_id: req.romanian_language_evidence
  - type: emit_advice
    tag: language_proof_available
    message_ro: Atașează dovada lingvistică în forma acceptată de lege și de procedura ANC curentă.
  source_claim_ids:
  - claim.cit.language_and_exemptions
  status: in_review
  legal_rank: lege
- id: rule.cit.language_exempt
  canonical_rule_id: romanian_citizenship.language_exempt
  event_type_id: ro.life.romanian_citizenship
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: in
      field: basis
      values:
      - reacquisition_art10
      - restoration_art11
    - op: any
      args:
      - op: eq
        field: former_romanian_citizen
        value: true
      - op: gte
        field: age
        value: 65
  effects:
  - type: emit_advice
    tag: language_proof_exempt
    message_ro: Fostul cetățean român sau solicitantul care a împlinit 65 de ani este exceptat de la obligația de a dovedi
      limba în această rută.
  source_claim_ids:
  - claim.cit.language_and_exemptions
  status: in_review
  legal_rank: lege
- id: rule.cit.language_transition
  canonical_rule_id: romanian_citizenship.language_transition
  event_type_id: ro.life.romanian_citizenship
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: in
      field: basis
      values:
      - reacquisition_art10
      - restoration_art11
    - op: eq
      field: language_proof_status
      value: transition_pending
    - op: eq
      field: former_romanian_citizen
      value: false
    - op: lt
      field: age
      value: 65
  effects:
  - type: require_confirmation
    tag: language_transition_date_check
    message_ro: Verifică exact data depunerii și norma tranzitorie aplicabilă; nu calcula automat un termen final dintr-un
