  - type: emit_warning
    tag: language_evidence_pending
    message_ro: Dosarul poate deveni nesusținut dacă dovada nu este depusă în fereastra legală aplicabilă.
  source_claim_ids:
  - claim.cit.language_transition
  status: in_review
  legal_rank: lege
- id: rule.cit.language_missing
  canonical_rule_id: romanian_citizenship.language_missing
  event_type_id: ro.life.romanian_citizenship
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: all
    args:
    - op: in
      field: basis
      values:
      - reacquisition_art10
      - restoration_art11
    - op: eq
      field: language_proof_status
      value: missing
    - op: eq
      field: former_romanian_citizen
      value: false
    - op: lt
      field: age
      value: 65
  effects:
  - type: block
    tag: language_evidence_missing
    message_ro: Pentru acest solicitant art. 10/11, dovada limbii este o condiție legală neîndeplinită în datele furnizate.
  source_claim_ids:
  - claim.cit.language_and_exemptions
  status: in_review
  legal_rank: lege
