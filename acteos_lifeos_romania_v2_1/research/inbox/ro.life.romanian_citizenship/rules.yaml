  canonical_rule_id: romanian_citizenship.supplement_art8
  event_type_id: ro.life.romanian_citizenship
  jurisdiction_ids:
  - ro
  authority_level: national_normative
  severity: critical
  effective_from: '2026-06-25'
  when:
    op: in
    field: basis
    values:
    - naturalisation_art8
    - cultural_art8_1
    - sport_art8_2
  effects:
