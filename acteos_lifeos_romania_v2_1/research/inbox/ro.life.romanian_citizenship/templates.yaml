# Step & requirement templates for ro.life.romanian_citizenship (life.romanian_citizenship).
#
# Authoring note: transcribed from event_card + source claims only. No additional
# legal text was invented.

step_templates:
  - id: classify_citizenship_basis
    semantic_key: classify_citizenship_basis
    title_ro: "Clasifica temeiul cetateniei"
    instruction_ro: >-
      Stabileste daca este vorba de cetatenie prin nastere, adoptie, acordare, redobandire sau
      restabilire inainte de orice evaluare de eligibilitate.
    sequence_hint: 10
    completion_evidence_ro:
      - "Temeiul juridic al cetateniei a fost clasificat"
    recovery_actions_ro:
      - "Daca temeiul nu este clar, nu continua cu un dosar pe baza gresita"
    status: draft

  - id: prove_citizenship_by_birth
    semantic_key: prove_citizenship_by_birth
    title_ro: "Dovedeste cetatenia prin nastere"
    instruction_ro: >-
      Daca persoana cauta doar dovada unei cetatenii deja existente prin nastere, separa aceasta
      ramura de cea a acordarii sau redobandirii la cerere.
    sequence_hint: 20
    completion_evidence_ro:
      - "Ramura privind dovada cetateniei prin nastere a fost evaluata"
    recovery_actions_ro:
      - "Daca nu este vorba de cetatenie deja existenta, revino la ramura de acordare sau redobandire"
    status: draft

  - id: open_adoption_citizenship_route
    semantic_key: open_adoption_citizenship_route
    title_ro: "Deschide ramura pentru cetatenie prin adoptie"
    instruction_ro: >-
      Daca temeiul este adoptia, separa cazul pe ramura juridica relevanta pentru aceasta situatie.
    sequence_hint: 30
    completion_evidence_ro:
      - "Ramura privind adoptia a fost evaluata"
    recovery_actions_ro:
      - "Daca temeiul nu este adoptia, nu continua pe aceasta ramura"
    status: draft

  - id: prepare_art8_application
    semantic_key: prepare_art8_application
    title_ro: "Pregateste dosarul pentru art. 8"
    instruction_ro: >-
      Daca temeiul este naturalizarea prin art. 8, pregateste documentele privind rezidenta,
      mijloacele si conduita cerute pentru evaluarea preliminara.
    sequence_hint: 40
    completion_evidence_ro:
      - "Dosarul preliminar pentru art. 8 este pregatit sau evaluat"
    recovery_actions_ro:
      - "Daca rezidenta sau conditiile de baza nu sunt clar dovedite, nu continua depunerea"
    status: draft

  - id: document_art8_reduction_case
    semantic_key: document_art8_reduction_case
    title_ro: "Documenteaza cazul de reducere pentru art. 8"
    instruction_ro: >-
      Daca este invocata o reducere a perioadei, documenteaza separat baza acestei cereri.
    sequence_hint: 50
    completion_evidence_ro:
      - "Cazul de reducere pentru art. 8 a fost documentat"
    recovery_actions_ro:
      - "Daca nu exista baza clara pentru reducere, nu o trata ca acordata"
    status: draft

  - id: prepare_art10_application
    semantic_key: prepare_art10_application
    title_ro: "Pregateste dosarul pentru art. 10"
    instruction_ro: >-
      Daca temeiul este redobandirea prin art. 10, pregateste documentele corespunzatoare acestui
      temei.
    sequence_hint: 60
    completion_evidence_ro:
      - "Dosarul preliminar pentru art. 10 este pregatit sau evaluat"
    recovery_actions_ro:
      - "Daca persoana nu intra pe art. 10, revino la clasificarea temeiului"
    status: draft

  - id: prepare_art11_application
    semantic_key: prepare_art11_application
    title_ro: "Pregateste dosarul pentru art. 11"
    instruction_ro: >-
      Daca temeiul este restabilirea prin art. 11, pregateste documentele corespunzatoare acestui
      temei.
    sequence_hint: 70
    completion_evidence_ro:
      - "Dosarul preliminar pentru art. 11 este pregatit sau evaluat"
    recovery_actions_ro:
      - "Daca persoana nu intra pe art. 11, revino la clasificarea temeiului"
    status: draft

  - id: prepare_art8_1_special_application
    semantic_key: prepare_art8_1_special_application
    title_ro: "Pregateste dosarul pentru art. 8^1"
    instruction_ro: >-
      Daca temeiul este ruta speciala art. 8^1, pregateste documentele specifice acestei ramuri.
    sequence_hint: 80
    completion_evidence_ro:
      - "Dosarul preliminar pentru art. 8^1 este pregatit sau evaluat"
    recovery_actions_ro:
      - "Daca persoana nu intra pe art. 8^1, nu continua pe aceasta ramura"
    status: draft

  - id: open_art8_2_government_route
    semantic_key: open_art8_2_government_route
    title_ro: "Deschide ruta speciala pentru art. 8^2"
    instruction_ro: >-
      Daca temeiul este ruta speciala art. 8^2, separa cazul si documentele specifice acestei proceduri.
    sequence_hint: 90
    completion_evidence_ro:
      - "Ruta speciala pentru art. 8^2 a fost evaluata"
    recovery_actions_ro:
      - "Daca temeiul nu este art. 8^2, nu continua pe aceasta ramura"
    status: draft

  - id: file_personally_at_anc
    semantic_key: file_personally_at_anc
    title_ro: "Depune personal la ANC"
    instruction_ro: >-
      Daca ruta de depunere este in Romania, pregateste prezenta personala si biometria la ANC.
    sequence_hint: 100
    completion_evidence_ro:
      - "Ruta de depunere personala la ANC este pregatita"
    recovery_actions_ro:
      - "Daca dosarul nu este complet, nu programa depunerea"
    status: draft

  - id: file_at_romanian_mission_or_consulate
    semantic_key: file_at_romanian_mission_or_consulate
    title_ro: "Depune la misiunea sau consulatul roman"
    instruction_ro: >-
      Daca temeiul si locul de rezidenta permit depunerea in strainatate, pregateste ruta prin
      misiunea diplomatica sau oficiul consular roman.
    sequence_hint: 110
    completion_evidence_ro:
      - "Ruta de depunere consulara este pregatita"
    recovery_actions_ro:
      - "Daca temeiul nu permite depunerea consulara, revino la ruta potrivita"
    status: draft

  - id: track_decision_and_oath
    semantic_key: track_decision_and_oath
    title_ro: "Urmareste decizia si depunerea juramantului"
    instruction_ro: >-
      Dupa depunere, urmareste decizia si, daca este cazul, pasii pentru juramant.
    sequence_hint: 120
    completion_evidence_ro:
      - "Etapa de urmarire a deciziei si a juramantului a fost pregatita"
    recovery_actions_ro:
      - "Daca nu exista aprobare, nu trata juramantul ca urmator pas sigur"
    status: draft

requirement_templates:
  - id: req.proof_long_term_or_permanent_residence
    title_ro: "Dovada rezidentei pe termen lung sau permanente"
    description_ro: >-
      Documentele care sustin rezidenta pe termen lung sau permanenta, pentru ramura art. 8.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Dovada rezidentei pe termen lung"
      - "Dovada rezidentei permanente"
    readiness_checks:
      - "Rezidenta relevanta este dovedita daca ramura o cere"
    status: draft

  - id: req.proof_legal_means
    title_ro: "Dovada mijloacelor legale"
    description_ro: >-
      Documentele privind mijloacele legale de existenta pentru dosarul de cetatenie, daca sunt cerute.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Dovada mijloacelor legale"
    readiness_checks:
      - "Mijloacele legale sunt dovedite daca ramura o cere"
    status: draft

  - id: req.good_conduct_documents
    title_ro: "Documente privind buna conduita"
    description_ro: >-
      Documentele privind conduita sau cazierul cerute pentru evaluarea preliminara a dosarului.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Documente privind buna conduita"
    readiness_checks:
      - "Documentele privind conduita sunt disponibile daca ramura le cere"
    status: draft

  - id: req.proof_marriage_and_cohabitation
    title_ro: "Dovada casatoriei si a convietuirii"
    description_ro: >-
      Dovada casatoriei si a convietuirii pentru ramura speciala relevanta din art. 8.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Dovada casatoriei"
      - "Dovada convietuirii"
    readiness_checks:
      - "Casatoria si convietuirea sunt dovedite daca ramura o cere"
    status: draft

  - id: req.romanian_language_evidence
    title_ro: "Dovada cunoasterii limbii romane"
    description_ro: >-
      Dovada cunoasterii limbii romane, atunci cand aceasta nu este exceptata.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Dovada cunoasterii limbii romane"
    readiness_checks:
      - "Dovada limbii este disponibila sau exceptia este clara"
    status: draft

  - id: req.personal_presence_and_biometrics
    title_ro: "Prezenta personala si biometria"
    description_ro: >-
      Prezenta personala si biometria necesare la depunerea cererii pe ruta relevanta.
    obligation: mandatory
    timing: later
    accepted_forms:
      - "Prezenta personala la depunere"
      - "Colectare biometrica"
    readiness_checks:
      - "Persoana este pregatita pentru prezenta personala la depunere"
    status: draft

  - id: req.foreign_acts_apostilled_or_supralegalised
    title_ro: "Acte straine apostilate sau supralegalizate"
    description_ro: >-
      Actele straine care trebuie pregatite cu formalitatea externa potrivita pentru dosarul de cetatenie.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Acte straine apostilate"
      - "Acte straine supralegalizate"
    readiness_checks:
      - "Formalitatea externa potrivita este aplicata actelor straine"
    status: draft

  - id: req.civil_status_extracts_max_2y
    title_ro: "Extrase de stare civila de maximum 2 ani"
    description_ro: >-
      Extrasele de stare civila folosite in dosar, in fereastra de vechime mentionata de event card.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Extrase de stare civila"
    readiness_checks:
      - "Extrasele de stare civila se incadreaza in vechimea ceruta"
    status: draft
