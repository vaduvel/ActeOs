step_templates:
  - id: file_pfa_resume_mention
    semantic_key: resume_business_file_pfa_mention
    title_ro: "Depune reluarea activitatii pentru PFA"
    instruction_ro: >-
      Verifica existenta suspendarii active si faptul ca perioada maxima nu a
      fost depasita, apoi depune mentiunea de reluare.
    sequence_hint: 10
    completion_evidence_ro:
      - "Mentiunea de reluare PFA este pregatita sau depusa."
    recovery_actions_ro:
      - "Daca suspendarea nu mai este valabila sau a expirat, clarifica mai intai situatia din registru."
    status: draft
  - id: approve_srl_resume
    semantic_key: resume_business_approve_srl_resume
    title_ro: "Aproba intern reluarea SRL"
    instruction_ro: >-
      Pentru SRL, obtine hotararea de reluare a activitatii si verifica daca
      suspendarea inscrisa permite revenirea.
    sequence_hint: 20
    completion_evidence_ro:
      - "Hotararea interna de reluare SRL este pregatita."
    recovery_actions_ro:
      - "Daca durata suspendarii depaseste limita, opreste ruta si clarifica regimul actual al societatii."
    status: draft
  - id: file_srl_resume_mention
    semantic_key: resume_business_file_srl_mention
    title_ro: "Depune mentiunea de reluare SRL"
    instruction_ro: >-
      Depune mentiunea ONRC pentru reluarea activitatii societatii si pastreaza
      dovada depunerii.
    sequence_hint: 30
    completion_evidence_ro:
      - "Mentiunea de reluare SRL este depusa."
    recovery_actions_ro:
      - "Daca semnatarul sau actul intern nu sunt valide, corecteaza dosarul inainte de redepunere."
    status: draft
  - id: update_and_authorize_activities
    semantic_key: resume_business_update_activities
    title_ro: "Actualizeaza si autorizeaza activitatile"
    instruction_ro: >-
      Verifica daca activitatile raman inregistrate si autorizate si rezolva
      orice lipsa inainte de reluarea operarii.
    sequence_hint: 40
    completion_evidence_ro:
      - "Starea activitatilor este clarificata pentru reluare."
    recovery_actions_ro:
      - "Nu relua operarea daca activitatile nu mai sunt valabile ori autorizate."
    status: draft
  - id: obtain_or_modify_timisoara_agreement
    semantic_key: resume_business_obtain_or_modify_timisoara_agreement
    title_ro: "Obtine sau modifica acordul local"
    instruction_ro: >-
      Daca activitatea locala il cere, verifica separat daca acordul comercial
      din Timisoara este inca valabil sau trebuie reemis ori modificat.
    sequence_hint: 50
    completion_evidence_ro:
      - "Starea acordului local pentru reluare este clarificata."
    recovery_actions_ro:
      - "Reluarea la ONRC nu reactiveaza automat acordul local."
    status: draft
