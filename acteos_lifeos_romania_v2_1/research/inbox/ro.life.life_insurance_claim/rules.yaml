- id: req.death_certificate
  title: Certificatul de deces
  description: Necesar pentru solicitarea indemnizației în caz de deces.
  obligation: conditional
  timing: now
  applies_when:
    op: eq
    field: event_type
    value: death
  accepted_forms:
