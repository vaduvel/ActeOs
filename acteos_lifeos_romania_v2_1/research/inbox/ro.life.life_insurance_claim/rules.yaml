rules:
- id: rule.life_insurance_claim.nn_hospital_deadline.r1
  canonical_rule_id: rule.life_insurance_claim.nn_hospital_deadline
  event_type_id: ro.life.life_insurance_claim
  jurisdiction_ids:
  - ro
  authority_level: institution
  competence_scope:
  - provider:nn
  legal_rank: null
  severity: critical
  effective_from: '2026-06-25'
  effective_to: null
  when:
    op: all
    args:
    - op: eq
      field: insurer_id
      value: nn
    - op: in
      field: event_type
      values:
      - hospitalization
      - surgery
  effects:
  - type: set_deadline
    step_id: step.notify_event
