# Step & requirement templates for ro.life.change_internet_holder (ro.life.change_internet_holder).
#
# Authoring note: transcribed from event_card + rules only. No additional
# legal text was invented.

step_templates:
  - id: classify_provider_service_and_change
    semantic_key: classify_provider_service_and_change
    title_ro: "Clasifica furnizorul, serviciul si motivul schimbarii"
    instruction_ro: >-
      Identifica furnizorul, tipul serviciului si motivul schimbarii de titular
      inainte de a selecta ruta contractuala.
    sequence_hint: 10
    completion_evidence_ro:
      - "Furnizorul, serviciul si motivul schimbarii au fost clasificate"
    recovery_actions_ro:
      - "Daca lipsesc datele de baza din contract sau factura, clarifica-le inainte de continuare"
    status: draft

  - id: identify_internet_provider
    semantic_key: identify_internet_provider
    title_ro: "Identifica furnizorul de internet"
    instruction_ro: >-
      Daca furnizorul nu este cunoscut, verifica contractul, factura sau contul
      de client pentru a stabili operatorul corect.
    sequence_hint: 20
    completion_evidence_ro:
      - "Furnizorul de internet a fost identificat"
    recovery_actions_ro:
      - "Daca furnizorul ramane necunoscut, nu genera o procedura specifica"
    status: draft

  - id: obtain_provider_live_assignment_checklist
    semantic_key: obtain_provider_live_assignment_checklist
    title_ro: "Obtine checklistul live al furnizorului"
    instruction_ro: >-
      Pentru furnizorii neacoperiti complet in batch, confirma direct lista
      curenta de acte, canalul, costurile si termenul.
    sequence_hint: 30
    completion_evidence_ro:
      - "Checklistul curent al furnizorului a fost solicitat sau confirmat"
    recovery_actions_ro:
      - "Daca checklistul live nu este disponibil, nu prezenta o ruta inchisa"
    status: draft

  - id: use_mobile_contract_assignment_route
    semantic_key: use_mobile_contract_assignment_route
    title_ro: "Foloseste ruta pentru contract exclusiv mobil"
    instruction_ro: >-
      Daca serviciul este exclusiv mobil, foloseste ruta contractuala specifica
      acelui tip de serviciu si nu aplica regulile instalarii fixe.
    sequence_hint: 40
    completion_evidence_ro:
      - "Ruta pentru contractul exclusiv mobil a fost selectata"
    recovery_actions_ro:
      - "Daca serviciul include instalare fixa, revino la ramura potrivita"
    status: draft

  - id: request_orange_written_assignment_consent
    semantic_key: request_orange_written_assignment_consent
    title_ro: "Solicita acordul scris Orange pentru cesiune"
    instruction_ro: >-
      Pentru Orange, pregateste ruta de cesiune si obtine acordul scris al
      operatorului inainte de a considera transferul efectiv.
    sequence_hint: 50
    completion_evidence_ro:
      - "Ruta de acord scris Orange a fost pregatita"
    recovery_actions_ro:
      - "Daca acordul scris lipseste, nu trata cesiunea ca finalizata"
    status: draft

  - id: visit_orange_or_partner_shop_for_assignment
    semantic_key: visit_orange_or_partner_shop_for_assignment
    title_ro: "Mergi in magazin Orange sau partener pentru cesiune"
    instruction_ro: >-
      Pentru persoana fizica pe Orange, foloseste canalul oficial indicat
      pentru cesiune in magazin sau partener autorizat.
    sequence_hint: 60
    completion_evidence_ro:
      - "Canalul Orange pentru persoana fizica a fost identificat"
    recovery_actions_ro:
      - "Daca profilul clientului nu este persoana fizica, alege ruta corespunzatoare segmentului"
    status: draft

  - id: confirm_orange_business_segment_and_channel
    semantic_key: confirm_orange_business_segment_and_channel
    title_ro: "Confirma segmentul si canalul Orange Business"
    instruction_ro: >-
      Daca titularul este business la Orange, confirma segmentul contractual si
      canalul corect inainte de depunerea documentelor.
    sequence_hint: 70
    completion_evidence_ro:
      - "Segmentul si canalul Orange Business au fost clarificate"
    recovery_actions_ro:
      - "Daca segmentul nu este cunoscut, nu presupune ruta persoanei fizice"
    status: draft

  - id: obtain_orange_prior_relocation_approval
    semantic_key: obtain_orange_prior_relocation_approval
    title_ro: "Obtine aprobarea prealabila Orange pentru relocare"
    instruction_ro: >-
      Daca schimbarea de titular implica si alta adresa pentru serviciul fix,
      cere mai intai aprobarea si conditiile de relocare de la Orange.
    sequence_hint: 80
    completion_evidence_ro:
      - "Ruta de relocare Orange a fost pregatita"
    recovery_actions_ro:
      - "Daca noua adresa sau aprobarea nu sunt confirmate, nu promite mutarea serviciului"
    status: draft

  - id: schedule_orange_technician_for_equipment
    semantic_key: schedule_orange_technician_for_equipment
    title_ro: "Programeaza echipamentul sau tehnicianul Orange"
    instruction_ro: >-
      Daca relocarea sau mutarea serviciului o cere, programeaza ruta pentru
      echipament si interventia tehnica pe canalul confirmat.
    sequence_hint: 90
    completion_evidence_ro:
      - "Ruta tehnica Orange pentru echipament a fost pregatita"
    recovery_actions_ro:
      - "Daca inventarul echipamentului nu este clar, verifica-l inainte de programare"
    status: draft

  - id: obtain_or_wait_for_orange_written_approval
    semantic_key: obtain_or_wait_for_orange_written_approval
    title_ro: "Obtine sau asteapta aprobarea scrisa Orange"
    instruction_ro: >-
      Daca cererea Orange este in curs, asteapta aprobarea scrisa a operatorului
      inainte de a inchide transferul.
    sequence_hint: 100
    completion_evidence_ro:
      - "Aprobarea scrisa Orange a fost obtinuta sau este in urmarire"
    recovery_actions_ro:
      - "Daca aprobarea este respinsa ori lipseste, nu trata transferul ca efectiv"
    status: draft

  - id: request_written_reason_or_alternative_contract_route
    semantic_key: request_written_reason_or_alternative_contract_route
    title_ro: "Cere motivarea scrisa sau ruta contractuala alternativa"
    instruction_ro: >-
      Daca furnizorul respinge cererea ori nu o poate procesa in forma asteptata,
      cere motivarea scrisa si canalul contractual alternativ.
    sequence_hint: 110
    completion_evidence_ro:
      - "Motivarea scrisa sau ruta alternativa a fost solicitata"
    recovery_actions_ro:
      - "Daca raspunsul furnizorului lipseste, mentine cazul deschis pentru confirmare"
    status: draft

  - id: submit_digi_beneficiary_change_form_or_addendum
    semantic_key: submit_digi_beneficiary_change_form_or_addendum
    title_ro: "Depune formularul sau actul aditional DIGI"
    instruction_ro: >-
      Pentru DIGI, pregateste si depune formularul standard sau actul aditional
      folosit pentru schimbarea beneficiarului.
    sequence_hint: 120
    completion_evidence_ro:
      - "Ruta DIGI pentru schimbarea beneficiarului este pregatita"
    recovery_actions_ro:
      - "Daca formularul curent nu este confirmat, reconfirma modelul folosit"
    status: draft

  - id: invoke_digi_legal_successor_route
    semantic_key: invoke_digi_legal_successor_route
    title_ro: "Activeaza ruta DIGI pentru succesor legal"
    instruction_ro: >-
      Daca schimbarea vine din succesiune, urmeaza ruta DIGI pentru succesorul legal
      si pregateste dovada calitatii.
    sequence_hint: 130
    completion_evidence_ro:
      - "Ruta DIGI pentru succesor legal a fost pregatita"
    recovery_actions_ro:
      - "Daca dovada succesiunii lipseste, completeaza documentele inainte de depunere"
    status: draft

  - id: open_provider_deceased_holder_or_successor_route
    semantic_key: open_provider_deceased_holder_or_successor_route
    title_ro: "Deschide ruta pentru titular decedat sau succesor"
    instruction_ro: >-
      Daca titularul actual este decedat, cere furnizorului ruta exacta pentru
      succesor sau pentru inchiderea si refacerea relatiei contractuale.
    sequence_hint: 140
    completion_evidence_ro:
      - "Ruta pentru titular decedat sau succesor a fost solicitata"
    recovery_actions_ro:
      - "Daca furnizorul nu a confirmat procedura, nu presupune transfer automat"
    status: draft

  - id: use_contract_data_modification_route
    semantic_key: use_contract_data_modification_route
    title_ro: "Foloseste ruta de modificare a datelor din contract"
    instruction_ro: >-
      Daca situatia este doar o corectie de date, foloseste procedura de
      actualizare contractuala si nu cea de schimbare a titularului.
    sequence_hint: 150
    completion_evidence_ro:
      - "Ruta de modificare a datelor contractuale a fost selectata"
    recovery_actions_ro:
      - "Daca este vorba de schimbare reala de titular, revino la ramura corecta"
    status: draft

  - id: open_service_relocation_route
    semantic_key: open_service_relocation_route
    title_ro: "Deschide ruta de relocare a serviciului"
    instruction_ro: >-
      Daca serviciul se muta la alta adresa, trateaza relocarea ca flux separat
      de simpla schimbare a titularului.
    sequence_hint: 160
    completion_evidence_ro:
      - "Ruta de relocare a serviciului a fost deschisa"
    recovery_actions_ro:
      - "Daca adresa ramane aceeasi, nu activa fluxul de relocare"
    status: draft

  - id: inventory_provider_equipment
    semantic_key: inventory_provider_equipment
    title_ro: "Inventariaza echipamentul furnizorului"
    instruction_ro: >-
      Verifica echipamentele aflate in custodie, mutare sau predare, astfel incat
      transferul sa nu omita dispozitivele furnizorului.
    sequence_hint: 170
    completion_evidence_ro:
      - "Inventarul echipamentului furnizorului a fost clarificat"
    recovery_actions_ro:
      - "Daca echipamentul nu este identificat complet, clarifica inventarul inainte de finalizare"
    status: draft

requirement_templates:
  - id: req.orange_standard_assignment_contract
    title_ro: "Contractul standard de cesiune Orange"
    description_ro: >-
      Documentul standard folosit de Orange pentru cesiunea contractului.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Contract standard de cesiune Orange"
    readiness_checks:
      - "Modelul Orange folosit pentru cesiune este pregatit"
    status: draft

  - id: req.orange_equipment_handover_or_move
    title_ro: "Dovada pentru predarea sau mutarea echipamentului Orange"
    description_ro: >-
      Documentul sau setul de documente folosite pentru echipamentul Orange in
      contextul mutarii sau relocarii.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Dovada predarii echipamentului"
      - "Dovada mutarii echipamentului"
    readiness_checks:
      - "Echipamentul Orange este acoperit de documentul pregatit"
    status: draft

  - id: req.digi_standard_form_or_addendum
    title_ro: "Formularul sau actul aditional DIGI"
    description_ro: >-
      Formularul standard ori actul aditional folosit de DIGI pentru schimbarea beneficiarului.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Formular standard DIGI"
      - "Act aditional DIGI"
    readiness_checks:
      - "Documentul DIGI relevant este pregatit"
    status: draft

  - id: req.personal_presence_or_power_of_attorney
    title_ro: "Prezenta personala sau procura"
    description_ro: >-
      Dovada prezentei personale ori a reprezentarii prin procura, daca ruta furnizorului o cere.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Prezenta personala confirmata"
      - "Procura sau document de reprezentare"
    readiness_checks:
      - "Modul de prezentare sau reprezentare este acoperit"
    status: draft

  - id: req.proof_of_legal_successor_status
    title_ro: "Dovada calitatii de succesor legal"
    description_ro: >-
      Documentul care sustine calitatea de succesor legal a noului titular.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Dovada calitatii de succesor legal"
    readiness_checks:
      - "Calitatea de succesor legal este sustinuta prin document"
    status: draft

  - id: req.new_holder_identity
    title_ro: "Actul de identitate al noului titular"
    description_ro: >-
      Documentul de identitate al persoanei care preia contractul.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Act de identitate al noului titular"
    readiness_checks:
      - "Identitatea noului titular este acoperita de document valabil"
    status: draft

  - id: req.provider_equipment_inventory
    title_ro: "Inventarul echipamentului furnizorului"
    description_ro: >-
      Lista sau dovada privind echipamentele aflate in custodie, relocare ori predare.
    obligation: conditional
    timing: now
    accepted_forms:
      - "Inventar al echipamentului furnizorului"
    readiness_checks:
      - "Inventarul echipamentului este pregatit daca se aplica"
    status: draft
