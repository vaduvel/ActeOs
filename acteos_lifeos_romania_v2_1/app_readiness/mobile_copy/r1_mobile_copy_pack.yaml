    primary_step_title_ro: undetermined_from_yaml
    estimated_documents_ro: []
    critical_warning_ro:
    - Reface intai cartea de identitate; restul documentelor necesita un act de identitate valid.
    - 'Pierdere (nu furt): de regula nu este necesara sesizarea la politie.'
