    subtitle_ro: Actualizez adresa din actul de identitate
    status_label_ro: Preview disponibil
    warning_label_ro: Pentru cartea electronica de identitate, schimbarea adresei nu necesita un nou act fizic (de confirmat).
  journey_preview:
    primary_step_title_ro: Actualizează actul de identitate la schimbarea domiciliului
    estimated_documents_ro:
    - Dovada adresei de domiciliu/reședință
    - Declarația de consimțământ a gazdei
    critical_warning_ro:
    - Pentru cartea electronica de identitate, schimbarea adresei nu necesita un nou act fizic (de confirmat).
    - Ai nevoie de declaratia de primire in spatiu a gazduitorului.
  empty_or_blocked_state:
    title_ro: Nu există încă un caz creat
    body_ro: Creează un caz pentru a vedea pașii și documentele necesare pentru acest eveniment.
