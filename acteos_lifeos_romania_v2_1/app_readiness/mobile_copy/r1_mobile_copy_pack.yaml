    status_label_ro: În completare
    warning_label_ro: Conținut incomplet.
  journey_preview:
    primary_step_title_ro: undetermined_from_yaml
    estimated_documents_ro: []
    critical_warning_ro:
    - Pierderea/distrugerea se anunta direct la SPCLEP de la domiciliu/resedinta, fara reclamatie la politie.
    - Daca imaginea ta nu e in R.N.E.P., adu un document oficial cu fotografie recenta (permis sau pasaport).
    - Confirma cuantumul curent al sanctiunii din sursa normativa.
  empty_or_blocked_state:
    title_ro: Conținut incomplet
    body_ro: Pașii, documentele sau dovezile necesare nu sunt complete încă pentru acest eveniment.
    action_label_ro: Vezi ce lipsește
- event_id: ro.life.identity_card_change_address
  title_ro: Îmi schimb domiciliul din actul de identitate
  category_id: identity_documents
