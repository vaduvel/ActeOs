- event_id: ro.life.moved_home
  title_ro: M-am mutat
  category_id: home_address_utilities
  trigger_phrases_ro:
  - m-am mutat
  - m-am mutat
  app_card:
    title_ro: M-am mutat
    subtitle_ro: Ruta este în curs de completare și nu are încă toți pașii sau documentele necesare.
    status_label_ro: În completare
    warning_label_ro: Conținut incomplet.
  journey_preview:
    primary_step_title_ro: undetermined_from_yaml
    estimated_documents_ro: []
    critical_warning_ro:
    - Ai 15 zile de la mutare sa soliciti noul act de identitate. Nerespectarea se sanctioneaza contraventional (40-80 lei).
    - La cartea electronica de identitate (CEI) schimbarea adresei se poate face fara un act nou. Confirma procedura curenta la DEP inainte de a renunta la actualizare.
    - Daca detii vehicul, certificatul de inmatriculare trebuie actualizat la noua adresa la DRPCIV. Termenul legal exact este in curs de confirmare din sursa oficiala.
  empty_or_blocked_state:
    title_ro: Conținut incomplet
    body_ro: Pașii, documentele sau dovezile necesare nu sunt complete încă pentru acest eveniment.
    action_label_ro: Vezi ce lipsește
