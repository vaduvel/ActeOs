events:
- event_id: ro.life.identity_card_expired
  title_ro: Îmi expiră cartea de identitate
  category_id: identity_documents
  trigger_phrases_ro:
  - îmi expiră cartea de identitate
  - imi expira cartea de identitate
  app_card:
    title_ro: Îmi expiră cartea de identitate
    subtitle_ro: Ruta este disponibilă doar în preview și conține informații care cer confirmare.
    status_label_ro: Necesită verificare
    warning_label_ro: Poti solicita noul act cu cel mult 180 de zile inainte de expirare, dar nu mai putin de 15 zile inainte.
  journey_preview:
    primary_step_title_ro: Solicită un nou act de identitate înainte de expirare
    estimated_documents_ro:
    - Trei fotografii 3/4 cm
    critical_warning_ro:
    - Poti solicita noul act cu cel mult 180 de zile inainte de expirare, dar nu mai putin de 15 zile inainte.
    - Esti mai devreme de 180 de zile fata de expirare; cererea se poate depune incepand cu acel moment.
    - Sanctiunea contraventionala difera intre sursele oficiale (40-80 lei vs 500-1000 lei). Confirma cuantumul curent inainte de afisare.
  empty_or_blocked_state:
    title_ro: Ruta este în verificare
    body_ro: Poți vedea draftul administrativ, dar trebuie să citești banner-ul de verificare înainte de a acționa.
    action_label_ro: Vezi avertismentele
- event_id: ro.life.identity_card_lost
  title_ro: Mi-am pierdut cartea de identitate
  category_id: identity_documents
  trigger_phrases_ro:
  - mi-am pierdut cartea de identitate
  - mi-am pierdut cartea de identitate
  app_card:
    title_ro: Mi-am pierdut cartea de identitate
    subtitle_ro: Ruta este disponibilă doar în preview și conține informații care cer confirmare.
    status_label_ro: Necesită verificare
    warning_label_ro: Pierderea/distrugerea se anunta direct la SPCLEP de la domiciliu/resedinta, fara reclamatie la politie.
  journey_preview:
    primary_step_title_ro: Reclamă furtul la poliție
    estimated_documents_ro:
    - Cererea pentru eliberarea actului de identitate (Anexa 11)
    - Certificatele de stare civilă
    - Dovada adresei de domiciliu sau reședință
    - Document oficial cu fotografie recentă
    - Declarația de consimțământ a gazdei
    critical_warning_ro:
    - Pierderea/distrugerea se anunta direct la SPCLEP de la domiciliu/resedinta, fara reclamatie la politie.
    - Daca imaginea ta nu e in R.N.E.P., adu un document oficial cu fotografie recenta (permis sau pasaport).
    - Confirma cuantumul curent al sanctiunii din sursa normativa.
  empty_or_blocked_state:
    title_ro: Ruta este în verificare
    body_ro: Poți vedea draftul administrativ, dar trebuie să citești banner-ul de verificare înainte de a acționa.
    action_label_ro: Vezi avertismentele
- event_id: ro.life.identity_card_stolen
  title_ro: Mi-a fost furată cartea de identitate
