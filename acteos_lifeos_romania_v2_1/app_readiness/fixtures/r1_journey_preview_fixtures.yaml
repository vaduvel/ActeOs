fixtures:
- id: fixture.journey.identity_card_expired.basic_01
  event_id: ro.life.identity_card_expired
  intent_type_id: ro.intent.identity.renew_expired_id
  expected_preview:
    user_visible_status: needs_review_banner
    certification_verdict: conditional_go
    primary_step_title_ro: Solicită un nou act de identitate înainte de expirare
    estimated_documents_ro:
    - Trei fotografii 3/4 cm
    warning_labels_ro:
    - Poti solicita noul act cu cel mult 180 de zile inainte de expirare, dar nu mai putin de 15 zile inainte.
    - Esti mai devreme de 180 de zile fata de expirare; cererea se poate depune incepand cu acel moment.
    - Sanctiunea contraventionala difera intre sursele oficiale (40-80 lei vs 500-1000 lei). Confirma cuantumul curent inainte de afisare.
    blocker_summary: rule.exp.overdue<-claim.exp.sanction_40_80(conflicting); rule.exp.overdue<-claim.exp.sanction_500_1000(conflicting); rule.exp.sanction_conflict<-claim.exp.sanction_40_80(conflicting)
    source_files:
    - research/inbox/ro.life.identity_card_expired/source_claims.yaml
    - research/inbox/ro.life.identity_card_expired/rules.yaml
    - research/inbox/ro.life.identity_card_expired/templates.yaml
- id: fixture.journey.identity_card_lost.basic_02
