  intent_type_id: ro.intent.identity.replace_lost_id
  expected_preview:
    user_visible_status: needs_review_banner
    certification_verdict: conditional_go
    primary_step_title_ro: Reclamă furtul la poliție
    estimated_documents_ro:
    - Cererea pentru eliberarea actului de identitate (Anexa 11)
    - Certificatele de stare civilă
    - Dovada adresei de domiciliu sau reședință
    - Document oficial cu fotografie recentă
    - Declarația de consimțământ a gazdei
    warning_labels_ro:
    - Pierderea/distrugerea se anunta direct la SPCLEP de la domiciliu/resedinta, fara reclamatie la politie.
    - Daca imaginea ta nu e in R.N.E.P., adu un document oficial cu fotografie recenta (permis sau pasaport).
    - Confirma cuantumul curent al sanctiunii din sursa normativa.
    blocker_summary: rule.lost.sanction_conflict<-claim.lost.sanction_500_1000(conflicting)
    source_files:
    - research/inbox/ro.life.identity_card_lost/source_claims.yaml
    - research/inbox/ro.life.identity_card_lost/rules.yaml
    - research/inbox/ro.life.identity_card_lost/templates.yaml
