  # ====== TAXES (11 evenimente) ======
  - event_id: ro.life.local_tax_certificate
    category: tax_money_penalties
    status: HAS_sources_yaml  # already has sources.yaml + source_claims.yaml
    note: "4 surse deja promovate la central. Surse per-eveniment: src.cpf_207_2015, src.ditl3_acte_pf (rămân locale)"

  - event_id: ro.life.declare_vehicle_local_tax
    category: tax_money_penalties
    reused_central_sources:
      - src.cod_fiscal
      - src.pmt_service_hub  # if Timișoara-specific claims
