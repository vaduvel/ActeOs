# =============================================================================
# S2: RECONCILIATION — source_ids din claims care trebuie rescrise
# =============================================================================
# Aceste source_ids din claims trebuie actualizate să folosească id-ul central.
reconciliation_needed:
  - claim_src_id: src.legislation.og2_2001
    central_id: src.legislation.og2_contraventions
    events: [ro.life.contest_fine, ro.life.pay_fine]
    nota: "Același URL (DetaliiDocument/29779) — id diferit în claims. Se reconciliază la central."

  - claim_src_id: src.cod_fiscal_227_2015
    central_id: src.cod_fiscal
    events: [ro.life.declare_vehicle_local_tax]
    nota: "Codul Fiscal L227/2015 — URL unic"

  - claim_src_id: src.legal.cod_fiscal.current_processing
    central_id: src.cod_fiscal
    events: [ro.life.declare_property_local_tax]
    nota: "Același URL ca Cod Fiscal — colaps"

# =============================================================================
